                      region: us-west-2
                      ipsec_tunnel: example-ipsec_tunnel
                      subnets: *id002
                      nat_pool: example-nat_pool
                      qos_enabled: false
                      folder: example-folder
                    offset: 852
                    total: 192
                    limit: 331
