                      peer_address: &id007
                        ip: 10.213.81.33
                        dynamic: true
                      authentication: &id008
                        pre_shared_key: example-pre_shared_key
                        certificate:
                          local_certificate: example-local_certificate
                      local_id: &id009
                        type: fqdn
                        id: example-id
                      peer_id: &id010
                        type: ufqdn
                        id: example-id
                      folder: example-folder
                    - id: example-id
