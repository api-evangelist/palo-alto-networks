components:
  securitySchemes:
    oauth2Bearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >-
        OAuth 2.0 Bearer token for SASE platform authentication. Obtain
        using the client_credentials grant with your SASE service account
        client ID and client secret.
  schemas:
    ServiceAccount:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier of the service account.
          example: example-id
        name:
          type: string
          description: Unique name of the service account within the TSG.
          example: Branch Agent 97
        display_name:
          type: string
          description: Human-readable display name.
          example: Sarah Wilson
        description:
          type: string
          description: Description of the service account's purpose.
          example: Investigation suspicious blocked threat on firewall suspicious Security Security alert investigation.
        tsg_id:
          type: string
          description: Tenant Service Group ID this service account belongs to.
          example: '758466'
        key_count:
          type: integer
          description: Number of active credential keys for this service account.
          example: 11
        created_at:
          type: string
          format: date-time
          example: '2026-11-23T17:14:36Z'
        updated_at:
          type: string
          format: date-time
          example: '2025-05-26T22:44:02Z'
    ServiceAccountRequest:
      type: object
      required:
      - name
      - tsg_id
      properties:
        name:
          type: string
          description: Unique name for the service account within the TSG.
          pattern: '^[a-z][a-z0-9-]{0,63}$'
          example: Primary Policy 99
        display_name:
          type: string
          description: Human-readable display name.
          example: Priya Chen
        description:
          type: string
          description: Description of the service account's purpose.
          example: Traffic malware configured firewall suspicious investigation activity applied on incident.
        tsg_id:
          type: string
          description: Tenant Service Group ID to create this service account in.
          example: '512892'
    ServiceAccountUpdate:
      type: object
      properties:
        display_name:
          type: string
          description: Updated display name.
          example: Alex Kumar
        description:
          type: string
          description: Updated description.
          example: Network on network threat policy threat traffic detected network endpoint incident configured.
    ServiceAccountCredentials:
      type: object
      properties:
        key_id:
          type: string
          description: Unique identifier of the generated key.
          example: '805173'
        client_id:
          type: string
          description: OAuth 2.0 client ID for this credential set.
          example: '846434'
        client_secret:
          type: string
          description: >-
            OAuth 2.0 client secret. Returned only once at creation time.
            Store this value securely as it cannot be retrieved again.
          writeOnly: true
          example: example-client_secret
        description:
          type: string
          description: Description provided when the key was created.
          example: Suspicious on firewall policy applied violation rule policy policy.
        expires_at:
          type: string
          format: date-time
          description: Expiration timestamp, or null if credentials do not expire.
          example: '2024-05-22T20:49:01Z'
        created_at:
          type: string
          format: date-time
          example: '2024-09-21T21:03:36Z'
    AccessPolicy:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier of the access policy.
          example: example-id
        principal_id:
          type: string
          description: ID of the service account or user this policy applies to.
          example: '228082'
        principal_type:
          type: string
          enum:
          - service_account
          - user
          description: Type of principal.
          example: service_account
        role_id:
          type: string
          description: ID of the role assigned by this policy.
          example: '930355'
        role_name:
          type: string
          description: Name of the role assigned.
          example: Primary Policy 48
        tsg_id:
          type: string
          description: TSG scope this policy applies to.
          example: '568011'
        created_at:
          type: string
          format: date-time
          example: '2025-08-17T04:28:20Z'
    AccessPolicyRequest:
      type: object
      required:
      - principal_id
      - principal_type
      - role_id
      - tsg_id
      properties:
        principal_id:
          type: string
          description: ID of the service account or user to grant access to.
          example: '988877'
        principal_type:
          type: string
          enum:
          - service_account
          - user
          description: Type of principal.
          example: user
        role_id:
          type: string
          description: ID of the role to assign.
          example: '955130'
        tsg_id:
          type: string
          description: TSG scope for this policy.
          example: '732912'
    Role:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier of the role.
          example: example-id
        name:
          type: string
          description: Role name (e.g., superuser, network_admin, readonly).
          example: Branch Policy 17
        display_name:
          type: string
          description: Human-readable role display name.
          example: Carlos Garcia
        description:
          type: string
          description: Description of the permissions granted by this role.
          example: Alert network suspicious applied blocked detected.
        permissions:
          type: array
          items:
            type: string
          description: List of permission identifiers included in this role.
          example: *id001
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Error code identifying the error type.
          example: example-error
        message:
          type: string
          description: Human-readable description of the error.
          example: Malware endpoint traffic incident on on traffic rule endpoint traffic.
        request_id:
          type: string
          description: Request identifier for support correlation.
          example: 1e1e39dd-16dd-4699-a272-365b75e92268
