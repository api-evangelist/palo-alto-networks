openapi: 3.1.0
info:
  title: Palo Alto Networks SASE Tenancy Service API
  description: >-
    SASE Tenancy Service API for Tenant Service Group (TSG) management.
    Provides programmatic control over the multi-tenant hierarchy used in
    Palo Alto Networks SASE deployments. Tenant Service Groups are the
    organizational units used to scope SASE policies, licenses, and
    administrative access. Supports creating parent and child TSG
    relationships to model managed service provider and enterprise
    sub-tenant structures.
  version: '1.0'
  contact:
    name: Palo Alto Networks Developer Support
    url: https://pan.dev/
  license:
    name: Proprietary
    url: https://www.paloaltonetworks.com/legal
servers:
- url: https://api.sase.paloaltonetworks.com/tenancy/v1
  description: SASE Tenancy Service API production server.
security:
- oauth2Bearer: []
tags:
- name: Tenant Service Groups
  description: Tenant Service Group lifecycle management and hierarchy queries.
paths:
  /tenant-service-groups:
    get:
      operationId: listTenantServiceGroups
      summary: Palo Alto Networks List Tenant Service Groups
      description: >-
        Returns the list of Tenant Service Groups accessible to the
        authenticated service account. Results include the TSG hierarchy
        metadata, license counts, and current status. Supports filtering
        and pagination for tenants managing large numbers of TSGs.
      tags:
      - Tenant Service Groups
      parameters:
      - name: parent_id
        in: query
        description: Filter to return only direct children of the specified TSG ID.
        schema:
          type: string
        example: '182341'
      - name: offset
        in: query
        description: Number of results to skip for pagination.
        schema:
          type: integer
          default: 0
        example: 0
      - name: limit
        in: query
        description: Maximum number of TSGs to return per page.
        schema:
          type: integer
          default: 50
          maximum: 200
        example: 50
      responses:
        '200':
          description: Tenant Service Groups returned.
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                    description: Total number of TSGs matching the query.
                  offset:
                    type: integer
                  limit:
                    type: integer
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/TenantServiceGroup'
              examples:
                ListTenantServiceGroups200Example:
                  summary: Default listTenantServiceGroups 200 response
                  x-microcks-default: true
                  value:
                    total: 242
                    offset: 963
                    limit: 823
                    items:
                    - id: example-id
                      display_name: Carlos Chen
                      description: Traffic threat traffic detected detected on.
                      parent_id: '413395'
                      support_account_id: '979872'
                      vertical: example-vertical
                      region: eu-west-1
                      status: active
                      child_count: 782
                      created_at: '2024-11-10T07:08:17Z'
                      updated_at: '2026-12-02T12:47:54Z'
        '400':
          description: Invalid query parameters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                ListTenantServiceGroups400Example:
                  summary: Default listTenantServiceGroups 400 response
                  x-microcks-default: true
                  value:
                    error: example-error
                    message: Rule threat threat blocked investigation rule Security malware rule alert activity monitoring.
                    request_id: a63cc0a8-4c7e-4a1b-afd6-5f5a9f73f185
        '401':
          description: Invalid or missing Bearer token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                ListTenantServiceGroups401Example:
                  summary: Default listTenantServiceGroups 401 response
                  x-microcks-default: true
                  value:
                    error: example-error
                    message: Rule threat threat blocked investigation rule Security malware rule alert activity monitoring.
                    request_id: a63cc0a8-4c7e-4a1b-afd6-5f5a9f73f185
        '403':
          description: Insufficient permissions.
          content:
            application/json:
              schema:
