components:
  securitySchemes:
    oauth2Bearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >-
        OAuth 2.0 Bearer token for SASE platform authentication. Obtain
        using the client_credentials grant with your SASE service account
        client ID and client secret.
  schemas:
    TenantServiceGroup:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier of the Tenant Service Group.
          example: example-id
        display_name:
          type: string
          description: Human-readable display name of the TSG.
          example: Carlos Chen
        description:
          type: string
          description: Optional description of the TSG's purpose.
          example: Traffic threat traffic detected detected on.
        parent_id:
          type: string
          description: ID of the parent TSG in the hierarchy. Null for root-level TSGs.
          example: '413395'
        support_account_id:
          type: string
          description: Associated Palo Alto Networks support account identifier.
          example: '979872'
        vertical:
          type: string
          description: Industry vertical classification for the TSG.
          example: example-vertical
        region:
          type: string
          description: Primary geographic region for the TSG.
          example: eu-west-1
        status:
          type: string
          enum:
          - active
          - suspended
          - pending
          description: Current status of the TSG.
          example: active
        child_count:
          type: integer
          description: Number of direct child TSGs.
          example: 782
        created_at:
          type: string
          format: date-time
          description: Timestamp when the TSG was created.
          example: '2024-11-10T07:08:17Z'
        updated_at:
          type: string
          format: date-time
