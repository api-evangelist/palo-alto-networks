  /tenant-service-groups/{tsg_id}/children:
    get:
      operationId: listChildTenantServiceGroups
      summary: Palo Alto Networks List Child Tenant Service Groups
      description: >-
        Returns all direct child Tenant Service Groups of the specified
        TSG. Use this endpoint to traverse the TSG hierarchy when managing
        multi-level tenant structures.
      tags:
      - Tenant Service Groups
      parameters:
      - name: tsg_id
        in: path
        required: true
        description: Unique identifier of the parent Tenant Service Group.
        schema:
          type: string
        example: '449835'
      - name: offset
        in: query
        description: Number of results to skip for pagination.
        schema:
          type: integer
          default: 0
        example: 0
      - name: limit
        in: query
        description: Maximum number of child TSGs to return.
        schema:
          type: integer
          default: 50
          maximum: 200
        example: 50
      responses:
        '200':
          description: Child Tenant Service Groups returned.
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                    description: Total number of direct children.
                  offset:
                    type: integer
                  limit:
                    type: integer
                  items:
                    type: array
                    items:
