openapi: 3.1.0
info:
  title: Palo Alto Networks Cortex XSOAR REST API
  description: >-
    REST API for the Cortex XSOAR (formerly Demisto) security orchestration,
    automation, and response (SOAR) platform. Provides programmatic access to
    incidents, investigations, playbooks, entries, and integrations. Enables
    automation of security workflows, creation and management of incidents,
    execution of playbooks, and integration with third-party security tools.
    Authentication uses an API key passed in the Authorization header. API keys
    are generated from the XSOAR settings under Integrations > API Keys.
  version: '1.0'
  contact:
    name: Palo Alto Networks Developer Support
    url: https://pan.dev/cortex/docs/xsoar/
  license:
    name: Proprietary
    url: https://www.paloaltonetworks.com/legal
servers:
  - url: https://{xsoar-server}
    description: Cortex XSOAR server endpoint.
    variables:
      xsoar-server:
        description: Hostname or IP address of the Cortex XSOAR server.
        default: xsoar.example.com
security:
  - apiKey: []
tags:
  - name: Incidents
    description: Incident creation, retrieval, search, and update operations.
  - name: Investigations
    description: Investigation management.
  - name: Entries
    description: Investigation entry (work note) management.
  - name: Playbooks
    description: Playbook listing and execution.
  - name: Integrations
    description: Integration and instance management.
paths:
  /incident:
    post:
      operationId: createIncident
      summary: Palo Alto Networks Create incident
      description: >-
        Creates a new incident in Cortex XSOAR. Incidents represent security
        events requiring investigation and response. Specify the incident type,
        severity, name, and any custom fields defined for the incident type.
        If an associated playbook is configured for the incident type, it starts
        automatically.
      tags:
        - Incidents
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateIncidentRequest'
      responses:
        '200':
          description: Incident created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Incident'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /incidents/search:
    get:
      operationId: searchIncidentsGet
      summary: Palo Alto Networks Search incidents (GET)
      description: >-
        Returns incidents matching query criteria specified as URL query
        parameters. Supports filtering by keyword, status, severity, type,
        and time range. For complex queries use POST /incidents/search.
      tags:
        - Incidents
      parameters:
        - name: query
          in: query
          description: >-
            Lucene query string to filter incidents (e.g., status:Active AND
            severity:High).
          schema:
            type: string
        - name: size
          in: query
          description: Maximum number of incidents to return.
          schema:
            type: integer
            default: 10
            maximum: 100
        - name: fromdate
          in: query
          description: Filter incidents created after this date (ISO 8601 format).
          schema:
            type: string
            format: date-time
        - name: todate
          in: query
          description: Filter incidents created before this date (ISO 8601 format).
          schema:
            type: string
            format: date-time
        - name: page
          in: query
          description: Page number for pagination (zero-based).
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Incidents returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IncidentSearchResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: searchIncidentsPost
      summary: Palo Alto Networks Search incidents (POST)
      description: >-
        Searches for incidents using a structured filter in the request body.
        Supports advanced filtering, field selection, sorting, and pagination.
        Preferred over GET for complex queries.
      tags:
        - Incidents
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IncidentSearchRequest'
      responses:
        '200':
          description: Incidents returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IncidentSearchResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /incident/{id}:
    get:
      operationId: getIncident
      summary: Palo Alto Networks Get incident
      description: Returns a specific incident by its unique identifier, including all fields and metadata.
      tags:
        - Incidents
      parameters:
        - $ref: '#/components/parameters/incidentId'
      responses:
        '200':
          description: Incident returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Incident'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /incident/update:
    post:
      operationId: updateIncident
      summary: Palo Alto Networks Update incident
      description: >-
        Updates one or more fields of an existing incident. Only the fields
        provided in the request body are modified. Supports updating status,
        severity, owner, labels, and custom fields.
      tags:
        - Incidents
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateIncidentRequest'
      responses:
        '200':
          description: Incident updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Incident'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /entry:
    post:
      operationId: addEntry
      summary: Palo Alto Networks Add entry to investigation
      description: >-
        Adds a work note or entry to an investigation's war room. Entries can
        be notes, commands, files, or other content types. The war room serves
        as the collaborative workspace for the incident investigation team.
      tags:
        - Entries
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEntryRequest'
      responses:
        '200':
          description: Entry added successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Entry'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /investigations/{id}:
    get:
      operationId: getInvestigation
      summary: Palo Alto Networks Get investigation
      description: >-
        Returns the full details of an investigation including all war room
        entries, playbook status, and associated incidents.
      tags:
        - Investigations
      parameters:
        - name: id
          in: path
          required: true
          description: Unique identifier of the investigation.
          schema:
            type: string
      responses:
        '200':
          description: Investigation returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Investigation'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /investigation/add:
    post:
      operationId: createInvestigation
      summary: Palo Alto Networks Create investigation
      description: >-
        Creates a new investigation attached to an existing incident. Multiple
        investigations can be created for a single incident to track separate
        analytical threads.
      tags:
        - Investigations
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - incidentId
              properties:
                incidentId:
                  type: string
                  description: ID of the incident to attach the investigation to.
                name:
                  type: string
                  description: Optional name for the investigation.
      responses:
        '200':
          description: Investigation created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Investigation'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /playbook:
    get:
      operationId: listPlaybooks
      summary: Palo Alto Networks List playbooks
      description: >-
        Returns all playbooks available in the Cortex XSOAR instance. Playbooks
        define automated response workflows that execute tasks, run integrations,
        and perform actions in response to incident conditions.
      tags:
        - Playbooks
      parameters:
        - name: query
          in: query
          description: Filter playbooks by name or keyword.
          schema:
            type: string
      responses:
        '200':
          description: Playbooks returned successfully.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Playbook'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /playbook/run:
    post:
      operationId: runPlaybook
      summary: Palo Alto Networks Run playbook
      description: >-
        Executes a playbook against a specified incident. The playbook runs
        asynchronously and its progress can be monitored through the
        investigation's war room entries.
      tags:
        - Playbooks
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - incidentId
                - playbookId
              properties:
                incidentId:
                  type: string
                  description: ID of the incident to run the playbook on.
                playbookId:
                  type: string
                  description: ID of the playbook to execute.
                version:
                  type: integer
                  description: Specific playbook version to run (defaults to latest).
      responses:
        '200':
          description: Playbook execution initiated successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: Playbook run ID.
                  status:
                    type: string
                    enum:
                      - running
                      - completed
                      - failed
                      - waiting
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /integration/search:
    get:
      operationId: searchIntegrations
      summary: Palo Alto Networks Search integrations
      description: >-
        Returns a list of available integration packs installed in the Cortex
        XSOAR instance. Integrations provide connectivity to third-party
        security tools and platforms.
      tags:
        - Integrations
      parameters:
        - name: query
          in: query
          description: Search query to filter integrations by name or category.
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: Integrations returned successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  configurations:
                    type: array
                    items:
                      $ref: '#/components/schemas/Integration'
                  total:
                    type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'
  /settings/integration/search:
    post:
      operationId: searchIntegrationInstances
      summary: Palo Alto Networks Search integration instances
      description: >-
        Returns a list of configured integration instances. Each instance
        represents a configured connection to a specific tool using a particular
        integration pack. Supports filtering by integration name and enabled status.
      tags:
        - Integrations
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                query:
                  type: string
                  description: Search query to filter instances by name or brand.
                page:
                  type: integer
                  default: 0
                size:
                  type: integer
                  default: 50
      responses:
        '200':
          description: Integration instances returned successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  instances:
                    type: array
                    items:
                      $ref: '#/components/schemas/IntegrationInstance'
                  total:
                    type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'
components:
  securitySchemes:
    apiKey:
      type: apiKey
      in: header
      name: Authorization
      description: >-
        Cortex XSOAR API key. Generate from Settings > Integrations > API Keys
        in the XSOAR console. Pass the key directly as the Authorization header
        value (no Bearer prefix required for standard API keys).
  parameters:
    incidentId:
      name: id
      in: path
      required: true
      description: Unique identifier of the incident.
      schema:
        type: string
  responses:
    BadRequest:
      description: Malformed request or invalid parameters.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Missing or invalid API key.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: The requested resource was not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalServerError:
      description: An internal server error occurred.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    Incident:
      type: object
      description: A Cortex XSOAR incident representing a security event under investigation.
      properties:
        id:
          type: string
          description: Unique incident identifier.
          readOnly: true
        name:
          type: string
          description: Incident name or title.
        type:
          type: string
          description: Incident type (maps to an incident type definition).
        status:
          type: integer
          description: >-
            Incident status code: 0 (Pending), 1 (Active), 2 (Done),
            3 (Archive).
          enum:
            - 0
            - 1
            - 2
            - 3
        severity:
          type: integer
          description: >-
            Severity level: 0 (Unknown), 1 (Informational), 2 (Low),
            3 (Medium), 4 (High), 5 (Critical).
          enum:
            - 0
            - 1
            - 2
            - 3
            - 4
            - 5
        owner:
          type: string
          description: Username of the analyst assigned to this incident.
        created:
          type: string
          format: date-time
          description: Incident creation timestamp.
          readOnly: true
        modified:
          type: string
          format: date-time
          description: Last modification timestamp.
          readOnly: true
        occurred:
          type: string
          format: date-time
          description: Timestamp when the security event occurred.
        closed:
          type: string
          format: date-time
          description: Incident closure timestamp.
        closeReason:
          type: string
          description: Reason for closing the incident.
        closeNotes:
          type: string
          description: Notes added when closing the incident.
        labels:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
              value:
                type: string
          description: Key-value label pairs attached to the incident.
        details:
          type: string
          description: Incident details or description.
        investigationId:
          type: string
          description: Associated investigation ID.
          readOnly: true
        playbookId:
          type: string
          description: Playbook assigned to this incident.
        sourceInstance:
          type: string
          description: Integration instance that created this incident.
        sourceBrand:
          type: string
          description: Integration brand that created this incident.
        rawJson:
          type: string
          description: Raw JSON payload from the originating event.
        CustomFields:
          type: object
          description: Custom field values specific to the incident type.
          additionalProperties: true
    CreateIncidentRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: Incident name.
        type:
          type: string
          description: Incident type name.
        severity:
          type: integer
          enum:
            - 0
            - 1
            - 2
            - 3
            - 4
            - 5
        owner:
          type: string
        occurred:
          type: string
          format: date-time
        details:
          type: string
        labels:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
              value:
                type: string
        createInvestigation:
          type: boolean
          default: true
          description: Whether to automatically create an investigation for this incident.
        CustomFields:
          type: object
          additionalProperties: true
        rawJson:
          type: string
    UpdateIncidentRequest:
      type: object
      required:
        - id
      properties:
        id:
          type: string
          description: ID of the incident to update.
        version:
          type: integer
          description: >-
            Incident version for optimistic locking. Retrieve from a prior GET
            request.
        status:
          type: integer
          enum:
            - 0
            - 1
            - 2
            - 3
        severity:
          type: integer
          enum:
            - 0
            - 1
            - 2
            - 3
            - 4
            - 5
        owner:
          type: string
        details:
          type: string
        closeReason:
          type: string
        closeNotes:
          type: string
        CustomFields:
          type: object
          additionalProperties: true
    IncidentSearchRequest:
      type: object
      properties:
        filter:
          type: object
          description: Structured filter criteria for the incident search.
          properties:
            query:
              type: string
              description: Lucene query string (e.g., status:Active severity:High).
            status:
              type: array
              items:
                type: integer
            sort:
              type: array
              items:
                type: object
                properties:
                  field:
                    type: string
                  asc:
                    type: boolean
            period:
              type: object
              properties:
                byFrom:
                  type: string
                  format: date-time
                byTo:
                  type: string
                  format: date-time
        fromDate:
          type: string
          format: date-time
        toDate:
          type: string
          format: date-time
        size:
          type: integer
          default: 10
          maximum: 100
        page:
          type: integer
          default: 0
    IncidentSearchResponse:
      type: object
      properties:
        total:
          type: object
          properties:
            value:
              type: integer
            relation:
              type: string
        incidents:
          type: array
          items:
            $ref: '#/components/schemas/Incident'
        searchResultTotal:
          type: integer
    Entry:
      type: object
      description: A war room entry in a Cortex XSOAR investigation.
      properties:
        id:
          type: string
          readOnly: true
        investigationId:
          type: string
        type:
          type: integer
          description: >-
            Entry type: 1 (Note), 2 (Download), 3 (File), 4 (Error), 5 (Pinned),
            6 (UserManagement), 7 (Image), 8 (PlaygroundCommand),
            9 (PlaybookStatusNote), 10 (Canvas), 11 (Widget), 12 (Summary),
            13 (Section), 14 (Table).
        user:
          type: string
          description: Username of the user who created the entry.
        created:
          type: string
          format: date-time
        modified:
          type: string
          format: date-time
        contents:
          type: string
          description: Entry content text.
        humanReadable:
          type: string
          description: Human-readable formatted content.
        tags:
          type: array
          items:
            type: string
    CreateEntryRequest:
      type: object
      required:
        - investigationId
        - data
      properties:
        investigationId:
          type: string
          description: ID of the investigation to add the entry to.
        data:
          type: string
          description: Entry content text or command to execute.
        markdown:
          type: boolean
          description: Whether to render the content as Markdown.
          default: false
        tags:
          type: array
          items:
            type: string
    Investigation:
      type: object
      description: A Cortex XSOAR investigation containing war room entries and playbook state.
      properties:
        id:
          type: string
          readOnly: true
        name:
          type: string
        status:
          type: integer
        incidentId:
          type: string
        created:
          type: string
          format: date-time
        modified:
          type: string
          format: date-time
        entries:
          type: array
          items:
            $ref: '#/components/schemas/Entry'
        playbookId:
          type: string
        runningPlaybooks:
          type: array
          items:
            type: string
    Playbook:
      type: object
      description: A Cortex XSOAR playbook defining an automated response workflow.
      properties:
        id:
          type: string
          readOnly: true
        name:
          type: string
        version:
          type: integer
        description:
          type: string
        tags:
          type: array
          items:
            type: string
        fromVersion:
          type: string
          description: Minimum XSOAR version required.
        toVersion:
          type: string
        deprecated:
          type: boolean
    Integration:
      type: object
      description: A Cortex XSOAR integration pack providing connectivity to a third-party tool.
      properties:
        id:
          type: string
        name:
          type: string
        display:
          type: string
          description: Human-readable display name.
        category:
          type: string
          description: Integration category (e.g., Endpoint, Firewall, SIEM).
        description:
          type: string
        version:
          type: integer
        fromVersion:
          type: string
        deprecated:
          type: boolean
        beta:
          type: boolean
    IntegrationInstance:
      type: object
      description: A configured instance of an integration in Cortex XSOAR.
      properties:
        id:
          type: string
        name:
          type: string
          description: Unique name of this instance.
        brand:
          type: string
          description: Integration brand name.
        enabled:
          type: string
          enum:
            - 'true'
            - 'false'
        isIntegrationScript:
          type: boolean
        incomingMapperId:
          type: string
        mappingId:
          type: string
        configuration:
          type: object
          description: Integration configuration parameters.
    ErrorResponse:
      type: object
      properties:
        id:
          type: string
        status:
          type: integer
        title:
          type: string
        detail:
          type: string
        error:
          type: string
