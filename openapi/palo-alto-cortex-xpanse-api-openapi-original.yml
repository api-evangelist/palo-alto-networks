openapi: 3.1.0
info:
  title: Palo Alto Networks Cortex Xpanse REST API
  description: >-
    REST API for the Cortex Xpanse attack surface management (ASM) platform.
    Provides programmatic access to internet-exposed asset discovery, attack
    surface incident management, attack surface rules, exposed service
    enumeration, IP range ownership, and audit logs. Cortex Xpanse
    continuously discovers and monitors internet-facing infrastructure to
    identify exposures before attackers do. Authentication uses a custom
    HMAC-SHA256 scheme identical to Cortex XDR: include x-xdr-auth-id,
    x-xdr-nonce, x-xdr-timestamp, and x-xdr-hmac-v2 headers on every
    request. Role-based access control (RBAC) API key pairs determine which
    data and operations are accessible. All endpoints use POST with JSON
    request bodies.
  version: '1.0'
  contact:
    name: Palo Alto Networks Developer Support
    url: https://pan.dev/cortex/docs/xpanse/
  license:
    name: Proprietary
    url: https://www.paloaltonetworks.com/legal
servers:
  - url: https://api-{fqdn}/public_api/v1
    description: Cortex Xpanse tenant API endpoint.
    variables:
      fqdn:
        description: >-
          Tenant FQDN from the Xpanse settings page (e.g.,
          example.xpanse.paloaltonetworks.com).
        default: example.xpanse.paloaltonetworks.com
security:
  - xpanseAuth: []
tags:
  - name: Assets
    description: Internet-exposed asset discovery and enumeration.
  - name: Incidents
    description: Attack surface incident management.
  - name: AttackSurfaceRules
    description: Attack surface rule configuration and management.
  - name: Services
    description: Exposed network service enumeration.
  - name: IPRanges
    description: Owned IP range management.
  - name: Audit
    description: Audit and management log retrieval.
paths:
  /assets/get_assets_internet_exposure:
    post:
      operationId: getAssetsInternetExposure
      summary: Palo Alto Networks Get internet-exposed assets
      description: >-
        Returns a list of assets with internet exposure discovered by Xpanse.
        Assets include servers, cloud instances, network devices, and any
        internet-facing infrastructure. Supports filtering by asset type,
        business unit, tags, and exposure classification. Use this endpoint
        to inventory all externally visible infrastructure.
      tags:
        - Assets
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                request_data:
                  type: object
                  properties:
                    filters:
                      type: array
                      items:
                        $ref: '#/components/schemas/Filter'
                      description: Filter criteria for asset list.
                    search_from:
                      type: integer
                      default: 0
                    search_to:
                      type: integer
                      default: 100
                    sort:
                      $ref: '#/components/schemas/SortOrder'
      responses:
        '200':
          description: Internet-exposed assets returned successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  reply:
                    type: object
                    properties:
                      total_count:
                        type: integer
                      result_count:
                        type: integer
                      assets_internet_exposure:
                        type: array
                        items:
                          $ref: '#/components/schemas/AssetInternetExposure'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /assets/get_asset_internet_exposure:
    post:
      operationId: getAssetInternetExposure
      summary: Palo Alto Networks Get single asset details
      description: >-
        Returns detailed information about a specific internet-exposed asset
        identified by its asset ID. Includes all services, certificates,
        observations, and associated business context data.
      tags:
        - Assets
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - request_data
              properties:
                request_data:
                  type: object
                  required:
                    - asm_id_list
                  properties:
                    asm_id_list:
                      type: array
                      items:
                        type: string
                      description: List of asset IDs to retrieve details for.
      responses:
        '200':
          description: Asset details returned successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  reply:
                    type: object
                    properties:
                      total_count:
                        type: integer
                      result_count:
                        type: integer
                      assets_internet_exposure:
                        type: array
                        items:
                          $ref: '#/components/schemas/AssetInternetExposureDetail'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /incident_management/get_incidents:
    post:
      operationId: getIncidents
      summary: Palo Alto Networks Get attack surface incidents
      description: >-
        Returns a list of attack surface incidents. Xpanse incidents represent
        confirmed exposures that require remediation such as unintended services,
        misconfigured certificates, or shadow IT. Supports filtering by status,
        severity, type, and assignee.
      tags:
        - Incidents
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                request_data:
                  type: object
                  properties:
                    filters:
                      type: array
                      items:
                        $ref: '#/components/schemas/Filter'
                    search_from:
                      type: integer
                      default: 0
                    search_to:
                      type: integer
                      default: 100
                    sort:
                      $ref: '#/components/schemas/SortOrder'
      responses:
        '200':
          description: Attack surface incidents returned successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  reply:
                    type: object
                    properties:
                      total_count:
                        type: integer
                      result_count:
                        type: integer
                      incidents:
                        type: array
                        items:
                          $ref: '#/components/schemas/AsmIncident'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /incident_management/update_incident:
    post:
      operationId: updateIncident
      summary: Palo Alto Networks Update attack surface incident
      description: >-
        Updates the status, assignee, severity, or resolution details of an
        attack surface incident. Use this endpoint to track remediation
        progress and close incidents after the exposure has been addressed.
      tags:
        - Incidents
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - request_data
              properties:
                request_data:
                  type: object
                  required:
                    - incident_id
                  properties:
                    incident_id:
                      type: string
                      description: Unique identifier of the attack surface incident.
                    status:
                      type: string
                      enum:
                        - new
                        - under_investigation
                        - resolved
                        - resolved_no_risk
                        - resolved_risk_accepted
                        - resolved_contested_asset
                        - resolved_remediated_automatically
                    assigned_user_mail:
                      type: string
                      description: Email of the user to assign the incident to.
                    assigned_user_pretty_name:
                      type: string
                    severity:
                      type: string
                      enum:
                        - critical
                        - high
                        - medium
                        - low
                        - informational
                    resolve_comment:
                      type: string
                      description: Resolution comment when closing an incident.
                    comment:
                      type: string
                      description: Comment to add to the incident.
      responses:
        '200':
          description: Attack surface incident updated successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  reply:
                    type: boolean
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /attack_surface_rules/get_attack_surface_rules:
    post:
      operationId: getAttackSurfaceRules
      summary: Palo Alto Networks Get attack surface rules
      description: >-
        Returns the configured attack surface rules. Attack surface rules define
        the criteria Xpanse uses to classify exposures as incidents, including
        service type, port, protocol, and risk classification logic. Rules can
        be enabled, disabled, or customized per business context.
      tags:
        - AttackSurfaceRules
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                request_data:
                  type: object
                  properties:
                    filters:
                      type: array
                      items:
                        $ref: '#/components/schemas/Filter'
                    search_from:
                      type: integer
                      default: 0
                    search_to:
                      type: integer
                      default: 100
                    sort:
                      $ref: '#/components/schemas/SortOrder'
      responses:
        '200':
          description: Attack surface rules returned successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  reply:
                    type: object
                    properties:
                      total_count:
                        type: integer
                      result_count:
                        type: integer
                      attack_surface_rules:
                        type: array
                        items:
                          $ref: '#/components/schemas/AttackSurfaceRule'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /attack_surface_rules/update_attack_surface_rule:
    post:
      operationId: updateAttackSurfaceRule
      summary: Palo Alto Networks Update attack surface rule
      description: >-
        Updates the configuration of an attack surface rule, such as enabling
        or disabling it, changing its severity, or modifying the scope of
        assets it applies to.
      tags:
        - AttackSurfaceRules
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - request_data
              properties:
                request_data:
                  type: object
                  required:
                    - attack_surface_rule_id
                  properties:
                    attack_surface_rule_id:
                      type: string
                      description: Unique identifier of the attack surface rule.
                    enabled_status:
                      type: string
                      enum:
                        - ON
                        - OFF
                    severity:
                      type: string
                      enum:
                        - critical
                        - high
                        - medium
                        - low
                        - informational
                    remediation_guidance:
                      type: string
                      description: Updated remediation guidance text.
      responses:
        '200':
          description: Attack surface rule updated successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  reply:
                    type: boolean
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /services/get_services:
    post:
      operationId: getServices
      summary: Palo Alto Networks Get exposed services
      description: >-
        Returns a list of internet-exposed network services discovered by
        Xpanse. Services represent open ports and protocols observed on
        internet-facing assets. Supports filtering by service type, port,
        protocol, country, and associated asset.
      tags:
        - Services
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                request_data:
                  type: object
                  properties:
                    filters:
                      type: array
                      items:
                        $ref: '#/components/schemas/Filter'
                    search_from:
                      type: integer
                      default: 0
                    search_to:
                      type: integer
                      default: 100
                    sort:
                      $ref: '#/components/schemas/SortOrder'
      responses:
        '200':
          description: Exposed services returned successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  reply:
                    type: object
                    properties:
                      total_count:
                        type: integer
                      result_count:
                        type: integer
                      services:
                        type: array
                        items:
                          $ref: '#/components/schemas/ExposedService'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /ip_range/get_owned_ip_ranges:
    post:
      operationId: getOwnedIpRanges
      summary: Palo Alto Networks Get owned IP ranges
      description: >-
        Returns the IP ranges registered as owned by the organization in
        Xpanse. Owned IP ranges define the scope of internet-facing
        infrastructure that Xpanse monitors for exposures. Includes both
        manually configured ranges and auto-discovered ranges attributed
        to the organization.
      tags:
        - IPRanges
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                request_data:
                  type: object
                  properties:
                    filters:
                      type: array
                      items:
                        $ref: '#/components/schemas/Filter'
                    search_from:
                      type: integer
                      default: 0
                    search_to:
                      type: integer
                      default: 100
                    sort:
                      $ref: '#/components/schemas/SortOrder'
      responses:
        '200':
          description: Owned IP ranges returned successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  reply:
                    type: object
                    properties:
                      total_count:
                        type: integer
                      result_count:
                        type: integer
                      owned_ip_ranges:
                        type: array
                        items:
                          $ref: '#/components/schemas/OwnedIpRange'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /audit/get_audit_management_logs:
    post:
      operationId: getAuditManagementLogs
      summary: Palo Alto Networks Get audit management logs
      description: >-
        Retrieves audit management logs recording administrative actions
        performed in the Xpanse console, including user logins, IP range
        modifications, rule configuration changes, and API key management.
      tags:
        - Audit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                request_data:
                  type: object
                  properties:
                    filters:
                      type: array
                      items:
                        $ref: '#/components/schemas/Filter'
                    search_from:
                      type: integer
                      default: 0
                    search_to:
                      type: integer
                      default: 100
                    sort:
                      $ref: '#/components/schemas/SortOrder'
      responses:
        '200':
          description: Audit management logs returned successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  reply:
                    type: object
                    properties:
                      total_count:
                        type: integer
                      result_count:
                        type: integer
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/AuditLog'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
components:
  securitySchemes:
    xpanseAuth:
      type: apiKey
      in: header
      name: x-xdr-hmac-v2
      description: >-
        Cortex Xpanse uses a custom HMAC-SHA256 authentication scheme with
        RBAC API key pairs. Include four headers: x-xdr-auth-id (API key ID),
        x-xdr-nonce (64-character random string), x-xdr-timestamp (Unix epoch
        milliseconds), and x-xdr-hmac-v2 (SHA-256 hash of api_key + nonce +
        timestamp). API keys are scoped with RBAC roles controlling which
        Xpanse data and operations are accessible. Generate keys from Xpanse
        Settings > Configurations > API Keys.
  responses:
    BadRequest:
      description: Malformed request body or invalid parameters.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Missing or invalid authentication headers.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Insufficient RBAC permissions for the requested operation.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: The requested resource was not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalServerError:
      description: An internal server error occurred.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    Filter:
      type: object
      description: A filter criterion for querying Xpanse resources.
      required:
        - field
        - operator
        - value
      properties:
        field:
          type: string
          description: Field name to filter on.
        operator:
          type: string
          enum:
            - in
            - contains
            - gte
            - lte
            - eq
            - neq
        value:
          description: Filter value (string, integer, or array for "in" operator).
          oneOf:
            - type: string
            - type: integer
            - type: array
              items:
                oneOf:
                  - type: string
                  - type: integer
    SortOrder:
      type: object
      description: Sorting specification for result sets.
      properties:
        field:
          type: string
        keyword:
          type: string
          enum:
            - asc
            - desc
    AssetInternetExposure:
      type: object
      description: Summary of an internet-exposed asset discovered by Xpanse.
      properties:
        asm_id_list:
          type: array
          items:
            type: string
          description: List of ASM identifiers for this asset.
        asset_name:
          type: string
          description: Asset hostname, IP address, or identifier.
        asset_type:
          type: string
          enum:
            - CERTIFICATE
            - CLOUD_COMPUTE_INSTANCE
            - CLOUD_LOAD_BALANCER
            - CLOUD_OBJECT_STORAGE
            - DOMAIN
            - NETWORKING_DEVICE
            - ON_PREM_SERVER
            - UNMANAGED_NETWORK_DEVICE
        ip_address:
          type: array
          items:
            type: string
          description: IP addresses associated with this asset.
        domain:
          type: array
          items:
            type: string
          description: Domain names associated with this asset.
        ipv6_address:
          type: array
          items:
            type: string
        cloud_id:
          type: string
          description: Cloud provider resource identifier.
        cloud_provider:
          type: string
          enum:
            - AWS
            - Azure
            - GCP
            - OTHER
        externally_detected_providers:
          type: array
          items:
            type: string
        business_units:
          type: array
          items:
            type: string
          description: Business units associated with this asset.
        tags:
          type: array
          items:
            type: object
            properties:
              key:
                type: string
              value:
                type: string
        created:
          type: integer
          description: Asset first discovery timestamp as Unix epoch milliseconds.
        last_observed:
          type: integer
          description: Most recent observation timestamp as Unix epoch milliseconds.
    AssetInternetExposureDetail:
      allOf:
        - $ref: '#/components/schemas/AssetInternetExposure'
        - type: object
          description: Detailed asset information including all services and observations.
          properties:
            service_list:
              type: array
              items:
                $ref: '#/components/schemas/ExposedService'
            certificate:
              type: object
              description: TLS certificate details if applicable.
              properties:
                issuer:
                  type: string
                subject:
                  type: string
                valid_from:
                  type: string
                  format: date
                valid_to:
                  type: string
                  format: date
                sha256:
                  type: string
            active_service_ids:
              type: array
              items:
                type: string
            all_service_ids:
              type: array
              items:
                type: string
    AsmIncident:
      type: object
      description: An attack surface incident representing a confirmed exposure requiring remediation.
      properties:
        incident_id:
          type: string
          description: Unique attack surface incident identifier.
        incident_name:
          type: string
        status:
          type: string
          enum:
            - new
            - under_investigation
            - resolved
            - resolved_no_risk
            - resolved_risk_accepted
            - resolved_contested_asset
            - resolved_remediated_automatically
        severity:
          type: string
          enum:
            - critical
            - high
            - medium
            - low
            - informational
        incident_type:
          type: array
          items:
            type: string
          description: Attack surface rule types that triggered this incident.
        assigned_user_mail:
          type: string
        assigned_user_pretty_name:
          type: string
        alert_count:
          type: integer
        description:
          type: string
        creation_time:
          type: integer
          description: Incident creation timestamp as Unix epoch milliseconds.
        modification_time:
          type: integer
        resolved_by:
          type: string
        resolve_comment:
          type: string
        tags:
          type: array
          items:
            type: object
            properties:
              key:
                type: string
              value:
                type: string
    AttackSurfaceRule:
      type: object
      description: >-
        An attack surface rule defining criteria for classifying internet
        exposures as incidents.
      properties:
        attack_surface_rule_id:
          type: string
        attack_surface_rule_name:
          type: string
        category:
          type: string
          description: Rule category (e.g., Unencrypted, Misconfigured, Unauthorized).
        description:
          type: string
        remediation_guidance:
          type: string
        enabled_status:
          type: string
          enum:
            - ON
            - OFF
        severity:
          type: string
          enum:
            - critical
            - high
            - medium
            - low
            - informational
        created:
          type: integer
        modified:
          type: integer
        release_status:
          type: string
          enum:
            - GA
            - BETA
    ExposedService:
      type: object
      description: An internet-exposed network service discovered on an asset.
      properties:
        service_id:
          type: string
        service_name:
          type: string
          description: Service name or protocol (e.g., HTTPS, SSH, RDP).
        service_type:
          type: string
          enum:
            - APPLICATION_SERVER
            - CLOUD_STORAGE
            - DATABASE
            - NETWORKING
            - REMOTE_DESKTOP
            - UNCLASSIFIED
            - WEB
        ip_address:
          type: array
          items:
            type: string
        domain:
          type: array
          items:
            type: string
        port:
          type: integer
          description: TCP/UDP port number.
        protocol:
          type: string
          enum:
            - TCP
            - UDP
        provider:
          type: array
          items:
            type: string
          description: Cloud or hosting providers detected for this service.
        business_units:
          type: array
          items:
            type: string
        created:
          type: integer
          description: Service first discovery timestamp as Unix epoch milliseconds.
        last_observed:
          type: integer
        is_active:
          type: string
          enum:
            - Active
            - Inactive
            - Unconfirmed
        discovery_type:
          type: string
          enum:
            - ColocatedOnIp
            - DirectlyDiscovered
            - CSP
            - CertificateAssociation
    OwnedIpRange:
      type: object
      description: An IP range owned by the organization and monitored by Xpanse.
      properties:
        range_id:
          type: string
        cidr:
          type: string
          description: IP range in CIDR notation (e.g., 203.0.113.0/24).
        first_ip:
          type: string
        last_ip:
          type: string
        range_size:
          type: integer
          description: Number of IP addresses in the range.
        business_units:
          type: array
          items:
            type: string
        attribution_reason:
          type: string
          enum:
            - RIR
            - InternallyAttributed
            - ExternallyAttributed
        created:
          type: integer
          description: Range creation timestamp as Unix epoch milliseconds.
        modified:
          type: integer
        tags:
          type: array
          items:
            type: object
            properties:
              key:
                type: string
              value:
                type: string
    AuditLog:
      type: object
      description: An audit management log entry recording an administrative action.
      properties:
        timestamp:
          type: integer
          description: Action timestamp as Unix epoch milliseconds.
        actor_primary_username:
          type: string
        actor_email:
          type: string
        actor_type:
          type: string
          enum:
            - User
            - API
        sub_type:
          type: string
          description: Action subtype (e.g., Login, IpRangeModified, RuleUpdated).
        result:
          type: string
          enum:
            - SUCCESS
            - FAIL
        reason:
          type: string
        ip:
          type: string
          description: Source IP address of the action.
        description:
          type: string
    ErrorResponse:
      type: object
      properties:
        reply:
          type: object
          properties:
            err_code:
              type: integer
            err_msg:
              type: string
            err_extra:
              type: string
