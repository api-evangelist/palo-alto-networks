        delay: 0
        dispatcher: FALLBACK
components:
  securitySchemes:
    xpanseAuth:
      type: apiKey
      in: header
      name: x-xdr-hmac-v2
      description: >-
        Cortex Xpanse uses a custom HMAC-SHA256 authentication scheme with
        RBAC API key pairs. Include four headers: x-xdr-auth-id (API key ID),
        x-xdr-nonce (64-character random string), x-xdr-timestamp (Unix epoch
        milliseconds), and x-xdr-hmac-v2 (SHA-256 hash of api_key + nonce +
        timestamp). API keys are scoped with RBAC roles controlling which
        Xpanse data and operations are accessible. Generate keys from Xpanse
        Settings > Configurations > API Keys.
  responses:
    BadRequest:
      description: Malformed request body or invalid parameters.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Missing or invalid authentication headers.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Insufficient RBAC permissions for the requested operation.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: The requested resource was not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalServerError:
      description: An internal server error occurred.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    Filter:
      type: object
      description: A filter criterion for querying Xpanse resources.
      required:
      - field
      - operator
      - value
      properties:
        field:
          type: string
          description: Field name to filter on.
          example: example-field
        operator:
          type: string
          enum:
          - in
          - contains
          - gte
          - lte
          - eq
          - neq
          example: contains
        value:
          description: Filter value (string, integer, or array for "in" operator).
          oneOf:
          - type: string
          - type: integer
          - type: array
            items:
              oneOf:
              - type: string
              - type: integer
          example: example-value
    SortOrder:
      type: object
      description: Sorting specification for result sets.
      properties:
        field:
          type: string
          example: example-field
        keyword:
          type: string
          enum:
          - asc
          - desc
          example: asc
    AssetInternetExposure:
      type: object
      description: Summary of an internet-exposed asset discovered by Xpanse.
      properties:
        asm_id_list:
          type: array
          items:
            type: string
          description: List of ASM identifiers for this asset.
          example: *id007
        asset_name:
          type: string
          description: Asset hostname, IP address, or identifier.
          example: Branch Policy 81
        asset_type:
          type: string
          enum:
          - CERTIFICATE
          - CLOUD_COMPUTE_INSTANCE
          - CLOUD_LOAD_BALANCER
          - CLOUD_OBJECT_STORAGE
          - DOMAIN
          - NETWORKING_DEVICE
          - ON_PREM_SERVER
          - UNMANAGED_NETWORK_DEVICE
          example: UNMANAGED_NETWORK_DEVICE
        ip_address:
          type: array
          items:
            type: string
          description: IP addresses associated with this asset.
          example: *id008
        domain:
          type: array
          items:
            type: string
          description: Domain names associated with this asset.
          example: *id009
        ipv6_address:
          type: array
          items:
            type: string
          example: *id010
        cloud_id:
          type: string
          description: Cloud provider resource identifier.
          example: '583636'
        cloud_provider:
          type: string
          enum:
          - AWS
          - Azure
          - GCP
          - OTHER
          example: Azure
        externally_detected_providers:
          type: array
          items:
            type: string
          example: *id011
        business_units:
          type: array
          items:
            type: string
          description: Business units associated with this asset.
          example: *id012
        tags:
          type: array
          items:
            type: object
            properties:
              key:
                type: string
                example: example-key
              value:
                type: string
                example: example-value
          example: *id013
        created:
          type: integer
          description: Asset first discovery timestamp as Unix epoch milliseconds.
          example: 919
        last_observed:
          type: integer
          description: Most recent observation timestamp as Unix epoch milliseconds.
          example: 958
    AssetInternetExposureDetail:
      allOf:
      - $ref: '#/components/schemas/AssetInternetExposure'
      - type: object
        description: Detailed asset information including all services and observations.
        properties:
          service_list:
            type: array
            items:
              $ref: '#/components/schemas/ExposedService'
          certificate:
            type: object
            description: TLS certificate details if applicable.
            properties:
              issuer:
                type: string
              subject:
                type: string
              valid_from:
                type: string
                format: date
              valid_to:
                type: string
                format: date
              sha256:
                type: string
          active_service_ids:
            type: array
            items:
              type: string
          all_service_ids:
            type: array
            items:
              type: string
    AsmIncident:
      type: object
      description: An attack surface incident representing a confirmed exposure requiring remediation.
      properties:
        incident_id:
          type: string
          description: Unique attack surface incident identifier.
          example: '593269'
        incident_name:
          type: string
          example: Production Agent 40
        status:
          type: string
          enum:
          - new
          - under_investigation
          - resolved
          - resolved_no_risk
          - resolved_risk_accepted
          - resolved_contested_asset
          - resolved_remediated_automatically
          example: resolved_no_risk
        severity:
          type: string
          enum:
          - critical
          - high
          - medium
          - low
          - informational
          example: informational
        incident_type:
          type: array
          items:
            type: string
          description: Attack surface rule types that triggered this incident.
          example: *id001
        assigned_user_mail:
          type: string
          example: analyst1@example.com
        assigned_user_pretty_name:
          type: string
          example: John Smith
        alert_count:
          type: integer
          example: 939
        description:
          type: string
          example: Alert threat detected Security incident monitoring activity incident.
        creation_time:
          type: integer
          description: Incident creation timestamp as Unix epoch milliseconds.
          example: 1704469877477
        modification_time:
          type: integer
          example: 1740534005374
        resolved_by:
          type: string
          example: example-resolved_by
        resolve_comment:
          type: string
          example: Rule on firewall violation traffic violation Security detected.
        tags:
          type: array
          items:
            type: object
            properties:
              key:
                type: string
                example: example-key
              value:
                type: string
                example: example-value
          example: *id002
    AttackSurfaceRule:
      type: object
      description: >-
        An attack surface rule defining criteria for classifying internet
        exposures as incidents.
      properties:
        attack_surface_rule_id:
          type: string
          example: '791314'
        attack_surface_rule_name:
          type: string
          example: Production Policy 68
        category:
          type: string
          description: Rule category (e.g., Unencrypted, Misconfigured, Unauthorized).
          example: standard
        description:
          type: string
          example: Monitoring activity on rule malware Security policy violation configured activity applied violation.
        remediation_guidance:
          type: string
          example: example-remediation_guidance
        enabled_status:
          type: string
          enum:
          - ON
          - OFF
          example: OFF
        severity:
          type: string
          enum:
          - critical
          - high
          - medium
          - low
          - informational
          example: low
        created:
          type: integer
          example: 981
        modified:
          type: integer
          example: 233
        release_status:
          type: string
          enum:
          - GA
          - BETA
          example: BETA
    ExposedService:
      type: object
      description: An internet-exposed network service discovered on an asset.
      properties:
        service_id:
          type: string
          example: '336506'
        service_name:
          type: string
          description: Service name or protocol (e.g., HTTPS, SSH, RDP).
          example: Corporate Agent 50
        service_type:
          type: string
          enum:
          - APPLICATION_SERVER
          - CLOUD_STORAGE
          - DATABASE
          - NETWORKING
          - REMOTE_DESKTOP
          - UNCLASSIFIED
          - WEB
          example: NETWORKING
        ip_address:
          type: array
          items:
            type: string
          example: *id003
        domain:
          type: array
          items:
            type: string
          example: *id004
        port:
          type: integer
          description: TCP/UDP port number.
          example: 278
        protocol:
          type: string
          enum:
          - TCP
          - UDP
          example: TCP
        provider:
          type: array
          items:
            type: string
          description: Cloud or hosting providers detected for this service.
          example: *id005
        business_units:
          type: array
          items:
            type: string
          example: *id006
        created:
          type: integer
          description: Service first discovery timestamp as Unix epoch milliseconds.
          example: 966
        last_observed:
          type: integer
          example: 356
        is_active:
          type: string
          enum:
          - Active
          - Inactive
          - Unconfirmed
          example: Unconfirmed
        discovery_type:
          type: string
          enum:
          - ColocatedOnIp
          - DirectlyDiscovered
          - CSP
          - CertificateAssociation
          example: DirectlyDiscovered
    OwnedIpRange:
      type: object
      description: An IP range owned by the organization and monitored by Xpanse.
      properties:
        range_id:
          type: string
          example: '919843'
        cidr:
          type: string
          description: IP range in CIDR notation (e.g., 203.0.113.0/24).
          example: example-cidr
        first_ip:
          type: string
          example: example-first_ip
        last_ip:
          type: string
          example: example-last_ip
        range_size:
          type: integer
          description: Number of IP addresses in the range.
          example: 365
        business_units:
          type: array
          items:
            type: string
          example: *id014
        attribution_reason:
          type: string
          enum:
          - RIR
          - InternallyAttributed
          - ExternallyAttributed
          example: RIR
        created:
          type: integer
          description: Range creation timestamp as Unix epoch milliseconds.
          example: 408
        modified:
          type: integer
          example: 724
        tags:
          type: array
          items:
            type: object
            properties:
              key:
                type: string
                example: example-key
              value:
                type: string
                example: example-value
          example: *id015
    AuditLog:
      type: object
      description: An audit management log entry recording an administrative action.
      properties:
        timestamp:
          type: integer
          description: Action timestamp as Unix epoch milliseconds.
          example: 1729794840874
        actor_primary_username:
          type: string
          example: jsmith
        actor_email:
          type: string
          example: example-actor_email
        actor_type:
          type: string
          enum:
          - User
          - API
          example: User
        sub_type:
          type: string
          description: Action subtype (e.g., Login, IpRangeModified, RuleUpdated).
          example: advanced
        result:
          type: string
          enum:
          - SUCCESS
          - FAIL
          example: SUCCESS
        reason:
          type: string
          example: Policy malware firewall violation applied blocked suspicious incident activity.
        ip:
          type: string
          description: Source IP address of the action.
          example: 10.209.59.205
        description:
          type: string
          example: Threat firewall monitoring activity policy rule configured.
    ErrorResponse:
      type: object
      properties:
        reply:
          type: object
          properties:
            err_code:
              type: integer
              example: 849
            err_msg:
              type: string
              example: example-err_msg
            err_extra:
              type: string
              example: example-err_extra
          example:
            err_code: 931
            err_msg: example-err_msg
            err_extra: example-err_extra
