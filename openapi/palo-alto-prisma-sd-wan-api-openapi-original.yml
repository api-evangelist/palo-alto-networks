  /sdwan/monitor/v1/alarms:
    get:
      operationId: listAlarms
      summary: Palo Alto Networks List Active Alarms
      description: >-
        Returns a list of active SD-WAN alarms across all monitored
        sites. Alarms indicate conditions requiring attention such as
        WAN link failures, high latency, device disconnections, and
        tunnel state changes.
      tags:
