openapi: 3.1.0
info:
  title: Palo Alto Networks Cortex XSIAM REST API
  description: >-
    REST API for the Cortex XSIAM (Extended Security Intelligence and Automation
    Management) AI-driven security operations platform. Provides programmatic
    access to incidents, alerts, endpoints, XQL queries, assets, audit logs,
    and data source ingestion. XSIAM extends Cortex XDR with a full SOC platform
    including SIEM, SOAR, and threat intelligence capabilities. Authentication
    uses a custom HMAC-SHA256 scheme: generate an API key ID and secret from the
    XSIAM settings, then include x-xdr-auth-id, x-xdr-nonce, x-xdr-timestamp,
    and x-xdr-hmac-v2 headers on every request. All endpoints use POST with JSON
    request bodies.
  version: '1.0'
  contact:
    name: Palo Alto Networks Developer Support
    url: https://pan.dev/cortex/docs/xsiam/
  license:
    name: Proprietary
    url: https://www.paloaltonetworks.com/legal
servers:
  - url: https://api-{fqdn}/public_api/v1
    description: Cortex XSIAM tenant API endpoint.
    variables:
      fqdn:
        description: >-
          Tenant FQDN from the XSIAM settings page (e.g.,
          example.xsiam.paloaltonetworks.com).
        default: example.xsiam.paloaltonetworks.com
security:
  - xsiamAuth: []
tags:
  - name: Alerts
    description: Alert retrieval and filtering.
  - name: Assets
    description: Asset inventory management.
  - name: Audit
    description: Audit and management log retrieval.
  - name: Endpoints
    description: Endpoint inventory management.
  - name: Incidents
    description: Incident retrieval and management.
  - name: Ingestion
    description: Data source configuration for log ingestion.
  - name: XQL
    description: XQL query execution against the XSIAM data lake.
paths:
  /incidents/get_incidents:
    post:
      operationId: getIncidents
      summary: Palo Alto Networks List incidents
      description: >-
        Returns a list of incidents matching the specified filter criteria.
        XSIAM incidents correlate alerts from endpoint, network, cloud, and
        SIEM data sources using AI-powered analytics. Supports filtering by
        status, severity, and time range.
      tags:
        - Incidents
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                request_data:
                  type: object
                  properties:
                    filters:
                      type: array
                      items:
                        $ref: '#/components/schemas/Filter'
                      description: Filter criteria for incident list.
                    search_from:
                      type: integer
                      default: 0
                    search_to:
                      type: integer
                      default: 100
                    sort:
                      $ref: '#/components/schemas/SortOrder'
      responses:
        '200':
          description: Incidents returned successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  reply:
                    type: object
                    properties:
                      total_count:
                        type: integer
                      result_count:
                        type: integer
                      incidents:
                        type: array
                        items:
                          $ref: '#/components/schemas/Incident'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /alerts/get_alerts:
    post:
      operationId: getAlerts
      summary: Palo Alto Networks Get alerts
      description: >-
        Returns alerts matching the specified filter criteria. XSIAM ingests
        and normalizes alerts from endpoint agents, network sensors, cloud
        providers, and third-party SIEM sources. Supports filtering by alert
        category, severity, source, and time range.
      tags:
        - Alerts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                request_data:
                  type: object
                  properties:
                    filters:
                      type: array
                      items:
                        $ref: '#/components/schemas/Filter'
                    search_from:
                      type: integer
                      default: 0
                    search_to:
                      type: integer
                      default: 100
                    sort:
                      $ref: '#/components/schemas/SortOrder'
      responses:
        '200':
          description: Alerts returned successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  reply:
                    type: object
                    properties:
                      total_count:
                        type: integer
                      result_count:
                        type: integer
                      alerts:
                        type: array
                        items:
                          $ref: '#/components/schemas/Alert'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /xql/start_xql_query:
    post:
      operationId: startXqlQuery
      summary: Palo Alto Networks Execute XQL query
      description: >-
        Initiates an XQL (Extended Query Language) query against the XSIAM
        data lake which includes endpoint telemetry, network logs, cloud
        activity, and ingested SIEM data. Returns a query ID for retrieving
        results asynchronously.
      tags:
        - XQL
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - request_data
              properties:
                request_data:
                  type: object
                  required:
                    - query
                  properties:
                    query:
                      type: string
                      description: XQL query string to execute.
                    timeframe:
                      type: object
                      properties:
                        relativeTime:
                          type: string
                          description: >-
                            Relative time range (e.g., last_24_hours,
                            last_7_days, last_30_days).
                        startTime:
                          type: integer
                          description: Absolute start time as Unix epoch milliseconds.
                        endTime:
                          type: integer
                          description: Absolute end time as Unix epoch milliseconds.
                    max_results:
                      type: integer
                      default: 1000
                      maximum: 10000
      responses:
        '200':
          description: XQL query initiated successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  reply:
                    type: string
                    description: Query execution ID for retrieving results.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /xql/get_query_results:
    post:
      operationId: getXqlQueryResults
      summary: Palo Alto Networks Get XQL query results
      description: >-
        Retrieves the results of an XQL query previously initiated via
        start_xql_query. Poll until status is SUCCESS or FAILED.
      tags:
        - XQL
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - request_data
              properties:
                request_data:
                  type: object
                  required:
                    - query_id
                  properties:
                    query_id:
                      type: string
                      description: Query ID returned by start_xql_query.
                    pending_duration:
                      type: integer
                      description: Seconds to wait for query completion before returning.
                      default: 0
                    max_results:
                      type: integer
                      default: 1000
                    format:
                      type: string
                      enum:
                        - json
                        - json_simple
      responses:
        '200':
          description: XQL query results returned successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  reply:
                    type: object
                    properties:
                      status:
                        type: string
                        enum:
                          - PENDING
                          - SUCCESS
                          - FAILED
                          - CANCELED
                      number_of_results:
                        type: integer
                      query_cost:
                        type: object
                        additionalProperties:
                          type: number
                      remaining_quota:
                        type: number
                      results:
                        type: object
                        properties:
                          data:
                            type: array
                            items:
                              type: object
                              additionalProperties: true
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /assets/list_assets:
    post:
      operationId: listAssets
      summary: Palo Alto Networks List assets
      description: >-
        Returns a list of assets discovered and tracked by XSIAM. Assets
        represent devices, cloud resources, users, and service accounts observed
        in the environment. Supports filtering by asset type, operating system,
        and risk score.
      tags:
        - Assets
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                request_data:
                  type: object
                  properties:
                    filters:
                      type: array
                      items:
                        $ref: '#/components/schemas/Filter'
                    search_from:
                      type: integer
                      default: 0
                    search_to:
                      type: integer
                      default: 100
                    sort:
                      $ref: '#/components/schemas/SortOrder'
      responses:
        '200':
          description: Assets returned successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  reply:
                    type: object
                    properties:
                      total_count:
                        type: integer
                      result_count:
                        type: integer
                      assets:
                        type: array
                        items:
                          $ref: '#/components/schemas/Asset'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /endpoints/get_endpoints:
    post:
      operationId: getEndpoints
      summary: Palo Alto Networks List endpoints
      description: >-
        Returns a list of endpoints enrolled in XSIAM protection. Supports
        filtering by endpoint ID, hostname, IP address, operating system, and
        agent connection status.
      tags:
        - Endpoints
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                request_data:
                  type: object
                  properties:
                    filters:
                      type: array
                      items:
                        $ref: '#/components/schemas/Filter'
                    search_from:
                      type: integer
                      default: 0
                    search_to:
                      type: integer
                      default: 100
                    sort:
                      $ref: '#/components/schemas/SortOrder'
      responses:
        '200':
          description: Endpoints returned successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  reply:
                    type: object
                    properties:
                      total_count:
                        type: integer
                      result_count:
                        type: integer
                      endpoints:
                        type: array
                        items:
                          $ref: '#/components/schemas/Endpoint'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /audits/management_logs/get_management_logs:
    post:
      operationId: getManagementLogs
      summary: Palo Alto Networks Get audit management logs
      description: >-
        Retrieves audit management logs recording administrative actions
        performed in the XSIAM console, including user logins, policy changes,
        data source configuration, and API key management.
      tags:
        - Audit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                request_data:
                  type: object
                  properties:
                    filters:
                      type: array
                      items:
                        $ref: '#/components/schemas/Filter'
                    search_from:
                      type: integer
                      default: 0
                    search_to:
                      type: integer
                      default: 100
                    sort:
                      $ref: '#/components/schemas/SortOrder'
      responses:
        '200':
          description: Management logs returned successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  reply:
                    type: object
                    properties:
                      total_count:
                        type: integer
                      result_count:
                        type: integer
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/AuditLog'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /ingestion/datasources:
    post:
      operationId: configureDatasource
      summary: Palo Alto Networks Configure data source
      description: >-
        Configures a new data source for log ingestion into XSIAM. Data sources
        define the schema, parsing rules, and normalization mappings for
        third-party log formats. Enables XSIAM to ingest and correlate data
        from firewalls, cloud platforms, SaaS applications, and custom sources.
      tags:
        - Ingestion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - request_data
              properties:
                request_data:
                  type: object
                  required:
                    - name
                    - vendor
                    - product
                  properties:
                    name:
                      type: string
                      description: Unique name for this data source configuration.
                    vendor:
                      type: string
                      description: Vendor name of the data source (e.g., Palo Alto Networks).
                    product:
                      type: string
                      description: Product name (e.g., PAN-OS, Prisma Access).
                    type:
                      type: string
                      enum:
                        - syslog
                        - https
                        - api
                        - file
                      description: Ingestion method for this data source.
                    parsing_rule:
                      type: string
                      description: >-
                        XDL (XSIAM Definition Language) parsing rule for
                        extracting fields from raw log data.
                    mapping_fields:
                      type: object
                      description: Field name mapping from source fields to XSIAM schema fields.
                      additionalProperties:
                        type: string
                    enabled:
                      type: boolean
                      default: true
      responses:
        '200':
          description: Data source configured successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  reply:
                    type: object
                    properties:
                      datasource_id:
                        type: string
                        description: Unique identifier assigned to the new data source.
                      name:
                        type: string
                      status:
                        type: string
                        enum:
                          - ACTIVE
                          - PENDING
                          - ERROR
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
components:
  securitySchemes:
    xsiamAuth:
      type: apiKey
      in: header
      name: x-xdr-hmac-v2
      description: >-
        Cortex XSIAM uses a custom HMAC-SHA256 authentication scheme. Include
        four headers on each request: x-xdr-auth-id (API key ID number),
        x-xdr-nonce (64-character random string), x-xdr-timestamp (Unix epoch
        milliseconds as a string), and x-xdr-hmac-v2 (SHA-256 hash of
        api_key + nonce + timestamp). Standard and Advanced API key types are
        supported; Advanced keys provide additional security through IP
        allowlisting. Generate API keys from XSIAM Settings > Configurations >
        API Keys.
  responses:
    BadRequest:
      description: Malformed request body or invalid parameters.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Missing or invalid authentication headers.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Insufficient permissions for the requested operation.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: A resource with the specified name already exists.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalServerError:
      description: An internal server error occurred.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    Filter:
      type: object
      description: A filter criterion for querying XSIAM resources.
      required:
        - field
        - operator
        - value
      properties:
        field:
          type: string
          description: Field name to filter on.
        operator:
          type: string
          enum:
            - in
            - contains
            - gte
            - lte
            - eq
            - neq
        value:
          description: Filter value (string, integer, or array for the "in" operator).
          oneOf:
            - type: string
            - type: integer
            - type: array
              items:
                oneOf:
                  - type: string
                  - type: integer
    SortOrder:
      type: object
      description: Sorting specification for result sets.
      properties:
        field:
          type: string
        keyword:
          type: string
          enum:
            - asc
            - desc
    Incident:
      type: object
      description: A XSIAM incident correlating related alerts into a unified investigation.
      properties:
        incident_id:
          type: string
        incident_name:
          type: string
        description:
          type: string
        status:
          type: string
          enum:
            - new
            - under_investigation
            - resolved_threat_handled
            - resolved_known_issue
            - resolved_duplicate
            - resolved_false_positive
            - resolved_other
        severity:
          type: string
          enum:
            - critical
            - high
            - medium
            - low
            - informational
            - unknown
        assigned_user_mail:
          type: string
        assigned_user_pretty_name:
          type: string
        alert_count:
          type: integer
        creation_time:
          type: integer
          description: Creation timestamp as Unix epoch milliseconds.
        modification_time:
          type: integer
        detection_time:
          type: integer
        starred:
          type: boolean
        xdr_url:
          type: string
        mitre_tactics_ids_and_names:
          type: array
          items:
            type: string
        mitre_techniques_ids_and_names:
          type: array
          items:
            type: string
    Alert:
      type: object
      description: A XSIAM alert representing a detection from any ingested data source.
      properties:
        alert_id:
          type: string
        detection_timestamp:
          type: integer
        name:
          type: string
        category:
          type: string
        description:
          type: string
        severity:
          type: string
          enum:
            - critical
            - high
            - medium
            - low
            - informational
            - unknown
        source:
          type: string
          description: Data source that generated this alert.
        host_name:
          type: string
        user_name:
          type: string
        action:
          type: string
        alert_type:
          type: string
        resolution_status:
          type: string
    Endpoint:
      type: object
      description: An endpoint enrolled in XSIAM protection.
      properties:
        endpoint_id:
          type: string
        endpoint_name:
          type: string
        endpoint_type:
          type: string
          enum:
            - SERVER
            - WORKSTATION
            - LAPTOP
        endpoint_status:
          type: string
          enum:
            - CONNECTED
            - DISCONNECTED
            - LOST
            - UNINSTALLED
        os_type:
          type: string
          enum:
            - AGENT_OS_WINDOWS
            - AGENT_OS_LINUX
            - AGENT_OS_MAC
        ip:
          type: array
          items:
            type: string
        users:
          type: array
          items:
            type: string
        domain:
          type: string
        first_seen:
          type: integer
        last_seen:
          type: integer
        endpoint_version:
          type: string
        content_version:
          type: string
        is_isolated:
          type: string
          enum:
            - AGENT_ISOLATED
            - AGENT_UNISOLATED
            - PENDING_ISOLATION
            - PENDING_UNISOLATION
        scan_status:
          type: string
    Asset:
      type: object
      description: An asset tracked in the XSIAM asset inventory.
      properties:
        asset_id:
          type: string
        asset_name:
          type: string
        asset_type:
          type: string
          enum:
            - DEVICE
            - CLOUD_RESOURCE
            - USER
            - SERVICE_ACCOUNT
        operating_system:
          type: string
        ip_addresses:
          type: array
          items:
            type: string
        risk_score:
          type: number
          description: Asset risk score (0.0 to 100.0).
        first_seen:
          type: integer
          description: First observation timestamp as Unix epoch milliseconds.
        last_seen:
          type: integer
        tags:
          type: array
          items:
            type: string
        sources:
          type: array
          items:
            type: string
          description: Data sources that reported this asset.
    AuditLog:
      type: object
      description: An audit management log entry recording an administrative action.
      properties:
        timestamp:
          type: integer
          description: Action timestamp as Unix epoch milliseconds.
        actor_primary_username:
          type: string
        actor_email:
          type: string
        actor_type:
          type: string
          enum:
            - User
            - API
        sub_type:
          type: string
          description: Action subtype (e.g., Login, PolicyUpdate, DatasourceCreate).
        result:
          type: string
          enum:
            - SUCCESS
            - FAIL
        reason:
          type: string
        ip:
          type: string
        description:
          type: string
    ErrorResponse:
      type: object
      properties:
        reply:
          type: object
          properties:
            err_code:
              type: integer
            err_msg:
              type: string
            err_extra:
              type: string
