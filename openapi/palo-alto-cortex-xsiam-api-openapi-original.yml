openapi: 3.1.0
info:
  title: Palo Alto Networks Cortex XSIAM REST API
  description: >-
    REST API for the Cortex XSIAM (Extended Security Intelligence and Automation
    Management) AI-driven security operations platform. Provides programmatic
    access to incidents, alerts, endpoints, XQL queries, assets, audit logs,
    and data source ingestion. XSIAM extends Cortex XDR with a full SOC platform
    including SIEM, SOAR, and threat intelligence capabilities. Authentication
    uses a custom HMAC-SHA256 scheme: generate an API key ID and secret from the
    XSIAM settings, then include x-xdr-auth-id, x-xdr-nonce, x-xdr-timestamp,
    and x-xdr-hmac-v2 headers on every request. All endpoints use POST with JSON
    request bodies.
  version: '1.0'
  contact:
    name: Palo Alto Networks Developer Support
    url: https://pan.dev/cortex/docs/xsiam/
  license:
    name: Proprietary
    url: https://www.paloaltonetworks.com/legal
servers:
- url: https://api-{fqdn}/public_api/v1
  description: Cortex XSIAM tenant API endpoint.
  variables:
    fqdn:
      description: >-
        Tenant FQDN from the XSIAM settings page (e.g.,
        example.xsiam.paloaltonetworks.com).
      default: example.xsiam.paloaltonetworks.com
security:
- xsiamAuth: []
tags:
- name: Alerts
  description: Alert retrieval and filtering.
- name: Assets
  description: Asset inventory management.
- name: Audit
  description: Audit and management log retrieval.
- name: Endpoints
  description: Endpoint inventory management.
- name: Incidents
  description: Incident retrieval and management.
- name: Ingestion
  description: Data source configuration for log ingestion.
- name: XQL
  description: XQL query execution against the XSIAM data lake.
paths:
  /incidents/get_incidents:
    post:
      operationId: getIncidents
      summary: Palo Alto Networks List Incidents
      description: >-
        Returns a list of incidents matching the specified filter criteria.
        XSIAM incidents correlate alerts from endpoint, network, cloud, and
        SIEM data sources using AI-powered analytics. Supports filtering by
        status, severity, and time range.
      tags:
      - Incidents
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                request_data:
                  type: object
                  properties:
                    filters:
                      type: array
                      items:
                        $ref: '#/components/schemas/Filter'
                      description: Filter criteria for incident list.
                    search_from:
                      type: integer
                      default: 0
                    search_to:
                      type: integer
                      default: 100
                    sort:
                      $ref: '#/components/schemas/SortOrder'
            examples:
              GetIncidentsRequestExample:
                summary: Default getIncidents request
                x-microcks-default: true
                value:
                  request_data:
                    filters:
                    - field: example-field
                      operator: eq
                      value: example-value
                    - field: example-field
                      operator: eq
                      value: example-value
                    search_from: 0
                    search_to: 100
                    sort:
                      field: example-field
                      keyword: desc
      responses:
        '200':
          description: Incidents returned successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  reply:
                    type: object
                    properties:
                      total_count:
                        type: integer
                      result_count:
                        type: integer
                      incidents:
                        type: array
                        items:
                          $ref: '#/components/schemas/Incident'
              examples:
                GetIncidents200Example:
                  summary: Default getIncidents 200 response
                  x-microcks-default: true
                  value:
                    reply:
                      total_count: 193
                      result_count: 967
                      incidents:
                      - incident_id: '930948'
                        incident_name: Staging Gateway 69
                        description: Malware endpoint configured on threat detected violation blocked rule violation suspicious.
                        status: resolved_false_positive
                        severity: medium
                        assigned_user_mail: security-ops@example.com
                        assigned_user_pretty_name: Carlos Smith
                        alert_count: 102
                        creation_time: 1747691175363
                        modification_time: 1703382684754
                        detection_time: 1724626599746
                        starred: true
                        xdr_url: https://vpn.test-corp.net/d6af6d
                        mitre_tactics_ids_and_names: &id001
                        - '100279'
                        - '498972'
                        mitre_techniques_ids_and_names: &id002
                        - '186119'
                        - '416278'
                      - incident_id: '930948'
                        incident_name: Staging Gateway 69
                        description: Malware endpoint configured on threat detected violation blocked rule violation suspicious.
                        status: resolved_false_positive
                        severity: medium
                        assigned_user_mail: security-ops@example.com
                        assigned_user_pretty_name: Carlos Smith
                        alert_count: 102
                        creation_time: 1747691175363
                        modification_time: 1703382684754
                        detection_time: 1724626599746
                        starred: true
                        xdr_url: https://vpn.test-corp.net/d6af6d
                        mitre_tactics_ids_and_names: *id001
                        mitre_techniques_ids_and_names: *id002
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /alerts/get_alerts:
    post:
      operationId: getAlerts
      summary: Palo Alto Networks Get Alerts
      description: >-
        Returns alerts matching the specified filter criteria. XSIAM ingests
        and normalizes alerts from endpoint agents, network sensors, cloud
        providers, and third-party SIEM sources. Supports filtering by alert
        category, severity, source, and time range.
      tags:
      - Alerts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                request_data:
                  type: object
                  properties:
                    filters:
                      type: array
                      items:
                        $ref: '#/components/schemas/Filter'
                    search_from:
                      type: integer
                      default: 0
                    search_to:
                      type: integer
                      default: 100
                    sort:
                      $ref: '#/components/schemas/SortOrder'
            examples:
              GetAlertsRequestExample:
                summary: Default getAlerts request
                x-microcks-default: true
                value:
                  request_data:
                    filters:
                    - field: example-field
                      operator: eq
                      value: example-value
                    search_from: 0
                    search_to: 100
                    sort:
                      field: example-field
                      keyword: desc
      responses:
        '200':
          description: Alerts returned successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  reply:
                    type: object
                    properties:
                      total_count:
                        type: integer
                      result_count:
                        type: integer
                      alerts:
                        type: array
                        items:
                          $ref: '#/components/schemas/Alert'
              examples:
                GetAlerts200Example:
                  summary: Default getAlerts 200 response
                  x-microcks-default: true
                  value:
                    reply:
                      total_count: 527
                      result_count: 162
                      alerts:
                      - alert_id: '590285'
                        detection_timestamp: 1743676235635
                        name: Corporate Sensor 11
                        category: advanced
                        description: Policy detected configured violation monitoring violation activity activity traffic.
                        severity: medium
                        source: example-source
                        host_name: Primary Sensor 69
                        user_name: jsmith
                        action: deny
                        alert_type: standard
                        resolution_status: enabled
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /xql/start_xql_query:
    post:
      operationId: startXqlQuery
      summary: Palo Alto Networks Execute XQL Query
      description: >-
        Initiates an XQL (Extended Query Language) query against the XSIAM
        data lake which includes endpoint telemetry, network logs, cloud
        activity, and ingested SIEM data. Returns a query ID for retrieving
        results asynchronously.
      tags:
      - XQL
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - request_data
              properties:
                request_data:
                  type: object
                  required:
                  - query
                  properties:
                    query:
                      type: string
                      description: XQL query string to execute.
                    timeframe:
                      type: object
                      properties:
                        relativeTime:
                          type: string
                          description: >-
                            Relative time range (e.g., last_24_hours,
                            last_7_days, last_30_days).
                        startTime:
                          type: integer
                          description: Absolute start time as Unix epoch milliseconds.
                        endTime:
                          type: integer
                          description: Absolute end time as Unix epoch milliseconds.
                    max_results:
                      type: integer
                      default: 1000
                      maximum: 10000
            examples:
              StartXqlQueryRequestExample:
                summary: Default startXqlQuery request
                x-microcks-default: true
                value:
                  request_data:
                    query: example-query
                    timeframe:
                      relativeTime: example-relativeTime
                      startTime: 1731765538775
                      endTime: 1741778638340
                    max_results: 1000
      responses:
        '200':
          description: XQL query initiated successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  reply:
                    type: string
                    description: Query execution ID for retrieving results.
              examples:
                StartXqlQuery200Example:
                  summary: Default startXqlQuery 200 response
                  x-microcks-default: true
                  value:
                    reply: example-reply
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /xql/get_query_results:
    post:
      operationId: getXqlQueryResults
      summary: Palo Alto Networks Get XQL Query Results
      description: >-
        Retrieves the results of an XQL query previously initiated via
        start_xql_query. Poll until status is SUCCESS or FAILED.
      tags:
      - XQL
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - request_data
              properties:
                request_data:
                  type: object
                  required:
                  - query_id
                  properties:
                    query_id:
                      type: string
                      description: Query ID returned by start_xql_query.
                    pending_duration:
                      type: integer
                      description: Seconds to wait for query completion before returning.
                      default: 0
                    max_results:
                      type: integer
                      default: 1000
                    format:
                      type: string
                      enum:
                      - json
                      - json_simple
            examples:
              GetXqlQueryResultsRequestExample:
                summary: Default getXqlQueryResults request
                x-microcks-default: true
                value:
                  request_data:
                    query_id: '568519'
                    pending_duration: 0
                    max_results: 1000
                    format: json
      responses:
        '200':
          description: XQL query results returned successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  reply:
                    type: object
                    properties:
                      status:
                        type: string
                        enum:
                        - PENDING
                        - SUCCESS
                        - FAILED
                        - CANCELED
                      number_of_results:
                        type: integer
                      query_cost:
                        type: object
                        additionalProperties:
                          type: number
                      remaining_quota:
                        type: number
                      results:
                        type: object
                        properties:
                          data:
                            type: array
                            items:
                              type: object
                              additionalProperties: true
              examples:
                GetXqlQueryResults200Example:
                  summary: Default getXqlQueryResults 200 response
                  x-microcks-default: true
                  value:
                    reply:
                      status: SUCCESS
                      number_of_results: 530
                      query_cost: {}
                      remaining_quota: 45.6
                      results:
                        data:
                        - {}
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /assets/list_assets:
    post:
      operationId: listAssets
      summary: Palo Alto Networks List Assets
      description: >-
