components:
  securitySchemes:
    xdrAuth:
      type: apiKey
      in: header
      name: x-xdr-hmac-v2
      description: >-
        Cortex XDR uses a custom HMAC-SHA256 authentication scheme. Each
        request requires four headers: x-xdr-auth-id (API key ID), x-xdr-nonce
        (64-character random string), x-xdr-timestamp (Unix epoch milliseconds),
        and x-xdr-hmac-v2 (SHA-256 hash of apikey + nonce + timestamp). Generate
        API keys from Cortex XDR Settings > Configurations > API Keys.
  responses:
    BadRequest:
      description: Malformed request body or invalid parameters.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Missing or invalid authentication headers.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Insufficient permissions for the requested operation.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: The requested resource was not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalServerError:
      description: An internal server error occurred.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    Filter:
      type: object
      description: A filter criterion for querying XDR resources.
      required:
      - field
      - operator
      - value
      properties:
        field:
          type: string
          description: Field name to filter on (e.g., incident_id, status, severity).
          example: example-field
        operator:
          type: string
          enum:
          - in
          - contains
          - gte
          - lte
          - eq
          - neq
          description: Comparison operator.
          example: lte
        value:
          description: >-
            Filter value. Use an array for the "in" operator, a string or
            integer for others.
          oneOf:
          - type: string
          - type: integer
          - type: array
            items:
              oneOf:
              - type: string
              - type: integer
          example: example-value
    SortOrder:
      type: object
      description: Sorting specification for result sets.
      properties:
        field:
          type: string
          description: Field to sort by.
          example: example-field
        keyword:
          type: string
          enum:
          - asc
          - desc
          description: Sort direction.
          example: asc
    Incident:
      type: object
      description: A Cortex XDR incident grouping related alerts.
      properties:
        incident_id:
          type: string
          example: '877543'
        incident_name:
          type: string
          example: Branch Gateway 82
        description:
          type: string
          example: Firewall traffic applied alert threat blocked Security rule.
        status:
          type: string
          enum:
          - new
          - under_investigation
          - resolved_threat_handled
          - resolved_known_issue
          - resolved_duplicate
          - resolved_false_positive
          - resolved_other
          example: resolved_threat_handled
        severity:
          type: string
          enum:
          - critical
          - high
          - medium
          - low
          - informational
          - unknown
          example: informational
        assigned_user_mail:
          type: string
          example: analyst1@example.com
        assigned_user_pretty_name:
          type: string
          example: Carlos Smith
        alert_count:
          type: integer
          example: 509
        low_severity_alert_count:
          type: integer
          example: 929
        med_severity_alert_count:
          type: integer
          example: 295
        high_severity_alert_count:
          type: integer
          example: 602
        critical_severity_alert_count:
