openapi: 3.1.0
info:
  title: Palo Alto Networks Cortex XDR REST API
  description: >-
    REST API for the Cortex XDR extended detection and response platform.
    Provides programmatic access to incidents, alerts, endpoints, scripts,
    XQL queries, and audit logs. Cortex XDR correlates data from network,
    endpoint, cloud, and third-party sources to detect and investigate threats.
    Authentication uses a custom HMAC-SHA256 scheme: generate an API key ID
    and secret from the Cortex XDR settings, then sign each request using the
    x-xdr-auth-id, x-xdr-nonce, x-xdr-timestamp, and x-xdr-hmac-v2 headers.
    All API endpoints use POST with JSON request bodies containing a request_data
    object for filters and parameters.
  version: '1.0'
  contact:
    name: Palo Alto Networks Developer Support
    url: https://pan.dev/cortex/docs/xdr/
  license:
    name: Proprietary
    url: https://www.paloaltonetworks.com/legal
servers:
  - url: https://api-{fqdn}/public_api/v1
    description: Cortex XDR tenant API endpoint.
    variables:
      fqdn:
        description: >-
          Tenant FQDN from the Cortex XDR settings page (e.g.,
          example.xdr.us.paloaltonetworks.com).
        default: example.xdr.us.paloaltonetworks.com
security:
  - xdrAuth: []
tags:
  - name: Alerts
    description: Alert retrieval and management.
  - name: Audit
    description: Audit and management log retrieval.
  - name: Endpoints
    description: Endpoint management, isolation, and scanning.
  - name: Incidents
    description: Incident management and investigation.
  - name: Scripts
    description: Script execution and results retrieval.
  - name: XQL
    description: XQL (Extended Query Language) query execution.
paths:
  /incidents/get_incidents:
    post:
      operationId: getIncidents
      summary: Palo Alto Networks List incidents
      description: >-
        Returns a list of incidents matching the specified filter criteria.
        Incidents group related alerts into a unified investigation context.
        Supports filtering by incident ID, status, severity, and creation time.
      tags:
        - Incidents
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                request_data:
                  type: object
                  properties:
                    filters:
                      type: array
                      items:
                        $ref: '#/components/schemas/Filter'
                      description: Filter criteria to apply to the incident list.
                    search_from:
                      type: integer
                      description: Pagination offset (zero-based).
                      default: 0
                    search_to:
                      type: integer
                      description: Upper bound of the result range.
                      default: 100
                    sort:
                      $ref: '#/components/schemas/SortOrder'
      responses:
        '200':
          description: Incidents returned successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  reply:
                    type: object
                    properties:
                      total_count:
                        type: integer
                      result_count:
                        type: integer
                      incidents:
                        type: array
                        items:
                          $ref: '#/components/schemas/Incident'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /incidents/get_incident_extra_data:
    post:
      operationId: getIncidentExtraData
      summary: Palo Alto Networks Get incident details
      description: >-
        Returns detailed information about a specific incident including
        all associated alerts, network artifacts, file artifacts, and
        endpoint details.
      tags:
        - Incidents
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - request_data
              properties:
                request_data:
                  type: object
                  required:
                    - incident_id
                  properties:
                    incident_id:
                      type: string
                      description: Unique identifier of the incident.
                    alerts_limit:
                      type: integer
                      description: Maximum number of alerts to include in response.
                      default: 1000
      responses:
        '200':
          description: Incident details returned successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  reply:
                    type: object
                    properties:
                      incident:
                        $ref: '#/components/schemas/IncidentDetail'
                      alerts:
                        type: object
                        properties:
                          total_count:
                            type: integer
                          data:
                            type: array
                            items:
                              $ref: '#/components/schemas/Alert'
                      network_artifacts:
                        type: object
                      file_artifacts:
                        type: object
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /incidents/update_incident:
    post:
      operationId: updateIncident
      summary: Palo Alto Networks Update incident
      description: >-
        Updates the status, severity, assignee, or other mutable fields of a
        specific incident. Only the fields provided in the request body are
        modified.
      tags:
        - Incidents
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - request_data
              properties:
                request_data:
                  type: object
                  required:
                    - incident_id
                  properties:
                    incident_id:
                      type: string
                    status:
                      type: string
                      enum:
                        - new
                        - under_investigation
                        - resolved_threat_handled
                        - resolved_known_issue
                        - resolved_duplicate
                        - resolved_false_positive
                        - resolved_other
                    severity:
                      type: string
                      enum:
                        - high
                        - medium
                        - low
                    assigned_user_mail:
                      type: string
                      description: Email of the user to assign the incident to.
                    assigned_user_pretty_name:
                      type: string
                    resolve_comment:
                      type: string
                      description: Resolution comment (required when closing an incident).
                    add_comment:
                      type: string
                      description: Comment to add to the incident timeline.
      responses:
        '200':
          description: Incident updated successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  reply:
                    type: boolean
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /alerts/get_alerts:
    post:
      operationId: getAlerts
      summary: Palo Alto Networks Get alerts
      description: >-
        Returns alerts matching the specified filter criteria. Alerts represent
        individual detections from endpoint, network, or cloud data sources.
        Supports filtering by alert ID, severity, category, and timestamp.
      tags:
        - Alerts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                request_data:
                  type: object
                  properties:
                    filters:
                      type: array
                      items:
                        $ref: '#/components/schemas/Filter'
                    search_from:
                      type: integer
                      default: 0
                    search_to:
                      type: integer
                      default: 100
                    sort:
                      $ref: '#/components/schemas/SortOrder'
      responses:
        '200':
          description: Alerts returned successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  reply:
                    type: object
                    properties:
                      total_count:
                        type: integer
                      result_count:
                        type: integer
                      alerts:
                        type: array
                        items:
                          $ref: '#/components/schemas/Alert'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /endpoints/get_endpoints:
    post:
      operationId: getEndpoints
      summary: Palo Alto Networks List endpoints
      description: >-
        Returns a list of endpoints enrolled in Cortex XDR. Supports filtering
        by endpoint ID, hostname, IP address, operating system, and protection
        status.
      tags:
        - Endpoints
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                request_data:
                  type: object
                  properties:
                    filters:
                      type: array
                      items:
                        $ref: '#/components/schemas/Filter'
                    search_from:
                      type: integer
                      default: 0
                    search_to:
                      type: integer
                      default: 100
                    sort:
                      $ref: '#/components/schemas/SortOrder'
      responses:
        '200':
          description: Endpoints returned successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  reply:
                    type: object
                    properties:
                      total_count:
                        type: integer
                      result_count:
                        type: integer
                      endpoints:
                        type: array
                        items:
                          $ref: '#/components/schemas/Endpoint'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /endpoints/isolate:
    post:
      operationId: isolateEndpoints
      summary: Palo Alto Networks Isolate endpoints
      description: >-
        Isolates one or more endpoints from the network, preventing all
        inbound and outbound communications except to the Cortex XDR service.
        Use endpoint IDs, IP addresses, or hostnames to identify targets.
      tags:
        - Endpoints
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - request_data
              properties:
                request_data:
                  type: object
                  properties:
                    endpoint_id:
                      type: string
                      description: Single endpoint ID to isolate.
                    endpoint_id_list:
                      type: array
                      items:
                        type: string
                      description: List of endpoint IDs to isolate.
                    filters:
                      type: array
                      items:
                        $ref: '#/components/schemas/Filter'
                      description: Filter to select endpoints for isolation.
      responses:
        '200':
          description: Endpoint isolation initiated successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  reply:
                    type: object
                    properties:
                      action_id:
                        type: string
                        description: Action ID to poll for completion status.
                      status:
                        type: integer
                      endpoints_count:
                        type: integer
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /endpoints/unisolate:
    post:
      operationId: unisolateEndpoints
      summary: Palo Alto Networks Unisolate endpoints
      description: >-
        Removes network isolation from one or more endpoints, restoring full
        network connectivity. Use this endpoint after an investigation is
        complete and the threat has been remediated.
      tags:
        - Endpoints
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - request_data
              properties:
                request_data:
                  type: object
                  properties:
                    endpoint_id:
                      type: string
                    endpoint_id_list:
                      type: array
                      items:
                        type: string
                    filters:
                      type: array
                      items:
                        $ref: '#/components/schemas/Filter'
      responses:
        '200':
          description: Endpoint unisolation initiated successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  reply:
                    type: object
                    properties:
                      action_id:
                        type: string
                      status:
                        type: integer
                      endpoints_count:
                        type: integer
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /endpoints/scan:
    post:
      operationId: scanEndpoints
      summary: Palo Alto Networks Scan endpoints
      description: >-
        Initiates a malware scan on one or more endpoints. The scan runs the
        Cortex XDR agent's local analysis engine to detect and quarantine
        malicious files.
      tags:
        - Endpoints
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - request_data
              properties:
                request_data:
                  type: object
                  properties:
                    endpoint_id_list:
                      type: array
                      items:
                        type: string
                    filters:
                      type: array
                      items:
                        $ref: '#/components/schemas/Filter'
      responses:
        '200':
          description: Endpoint scan initiated successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  reply:
                    type: object
                    properties:
                      action_id:
                        type: string
                      status:
                        type: integer
                      endpoints_count:
                        type: integer
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /scripts/run_script:
    post:
      operationId: runScript
      summary: Palo Alto Networks Execute script on endpoints
      description: >-
        Executes a script from the script library on one or more endpoints.
        Scripts can perform remediation actions, collect forensic data, or
        run custom commands. Returns an action ID for polling execution status.
      tags:
        - Scripts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - request_data
              properties:
                request_data:
                  type: object
                  required:
                    - script_uid
                  properties:
                    script_uid:
                      type: string
                      description: Unique identifier of the script from the script library.
                    endpoint_ids:
                      type: array
                      items:
                        type: string
                    filters:
                      type: array
                      items:
                        $ref: '#/components/schemas/Filter'
                    parameters_values:
                      type: object
                      description: Script parameter key-value pairs.
                      additionalProperties: true
                    timeout:
                      type: integer
                      description: Script execution timeout in seconds.
                      default: 600
      responses:
        '200':
          description: Script execution initiated successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  reply:
                    type: object
                    properties:
                      action_id:
                        type: string
                        description: Action ID to poll for script execution results.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /scripts/get_script_execution_results:
    post:
      operationId: getScriptExecutionResults
      summary: Palo Alto Networks Get script execution results
      description: >-
        Retrieves the execution results and output for a previously initiated
        script run identified by the action ID.
      tags:
        - Scripts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - request_data
              properties:
                request_data:
                  type: object
                  required:
                    - action_id
                  properties:
                    action_id:
                      type: string
                      description: Action ID returned by the run_script endpoint.
      responses:
        '200':
          description: Script execution results returned successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  reply:
                    type: object
                    properties:
                      action_id:
                        type: string
                      status:
                        type: string
                        enum:
                          - PENDING
                          - IN_PROGRESS
                          - COMPLETED_SUCCESSFULLY
                          - FAILED
                          - TIMEOUT
                          - CANCELED
                      results:
                        type: array
                        items:
                          type: object
                          properties:
                            endpoint_id:
                              type: string
                            endpoint_name:
                              type: string
                            endpoint_status:
                              type: string
                            domain:
                              type: string
                            ip_address:
                              type: string
                            is_isolated:
                              type: string
                            standard_output:
                              type: string
                            standard_error:
                              type: string
                            retrieved_files:
                              type: integer
                            return_value:
                              type: integer
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /xql/start_xql_query:
    post:
      operationId: startXqlQuery
      summary: Palo Alto Networks Execute XQL query
      description: >-
        Initiates an XQL (Extended Query Language) query against the Cortex
        XDR data lake. XQL is a domain-specific language for querying endpoint,
        network, and cloud telemetry data. Returns a query ID for retrieving
        results asynchronously.
      tags:
        - XQL
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - request_data
              properties:
                request_data:
                  type: object
                  required:
                    - query
                  properties:
                    query:
                      type: string
                      description: XQL query string to execute.
                    timeframe:
                      type: object
                      description: Time range for the query.
                      properties:
                        relativeTime:
                          type: string
                          description: Relative time range (e.g., last_24_hours, last_7_days).
                        startTime:
                          type: integer
                          description: Absolute start time as Unix epoch milliseconds.
                        endTime:
                          type: integer
                          description: Absolute end time as Unix epoch milliseconds.
                    max_results:
                      type: integer
                      description: Maximum number of results to return.
                      default: 1000
                      maximum: 10000
      responses:
        '200':
          description: XQL query initiated successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  reply:
                    type: string
                    description: Query execution ID for retrieving results.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /xql/get_query_results:
    post:
      operationId: getXqlQueryResults
      summary: Palo Alto Networks Get XQL query results
      description: >-
        Retrieves the results of an XQL query previously initiated via the
        start_xql_query endpoint. Poll this endpoint until the status is
        SUCCESS or FAILED.
      tags:
        - XQL
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - request_data
              properties:
                request_data:
                  type: object
                  required:
                    - query_id
                  properties:
                    query_id:
                      type: string
                      description: Query ID returned by start_xql_query.
                    pending_duration:
                      type: integer
                      description: Number of seconds to wait for query completion before returning.
                      default: 0
                    max_results:
                      type: integer
                      description: Maximum number of result rows to return.
                      default: 1000
                    format:
                      type: string
                      enum:
                        - json
                        - json_simple
      responses:
        '200':
          description: XQL query results returned successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  reply:
                    type: object
                    properties:
                      status:
                        type: string
                        enum:
                          - PENDING
                          - SUCCESS
                          - FAILED
                          - CANCELED
                      number_of_results:
                        type: integer
                      query_cost:
                        type: object
                        additionalProperties:
                          type: number
                      remaining_quota:
                        type: number
                      results:
                        type: object
                        properties:
                          data:
                            type: array
                            items:
                              type: object
                              additionalProperties: true
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /audit/get_audit_management_logs:
    post:
      operationId: getAuditManagementLogs
      summary: Palo Alto Networks Get audit management logs
      description: >-
        Retrieves audit management logs recording administrative actions
        performed in the Cortex XDR console. Includes user logins, policy
        changes, and configuration modifications.
      tags:
        - Audit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                request_data:
                  type: object
                  properties:
                    filters:
                      type: array
                      items:
                        $ref: '#/components/schemas/Filter'
                    search_from:
                      type: integer
                      default: 0
                    search_to:
                      type: integer
                      default: 100
                    sort:
                      $ref: '#/components/schemas/SortOrder'
      responses:
        '200':
          description: Audit management logs returned successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  reply:
                    type: object
                    properties:
                      total_count:
                        type: integer
                      result_count:
                        type: integer
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/AuditLog'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
components:
  securitySchemes:
    xdrAuth:
      type: apiKey
      in: header
      name: x-xdr-hmac-v2
      description: >-
        Cortex XDR uses a custom HMAC-SHA256 authentication scheme. Each
        request requires four headers: x-xdr-auth-id (API key ID), x-xdr-nonce
        (64-character random string), x-xdr-timestamp (Unix epoch milliseconds),
        and x-xdr-hmac-v2 (SHA-256 hash of apikey + nonce + timestamp). Generate
        API keys from Cortex XDR Settings > Configurations > API Keys.
  responses:
    BadRequest:
      description: Malformed request body or invalid parameters.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Missing or invalid authentication headers.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Insufficient permissions for the requested operation.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: The requested resource was not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalServerError:
      description: An internal server error occurred.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    Filter:
      type: object
      description: A filter criterion for querying XDR resources.
      required:
        - field
        - operator
        - value
      properties:
        field:
          type: string
          description: Field name to filter on (e.g., incident_id, status, severity).
        operator:
          type: string
          enum:
            - in
            - contains
            - gte
            - lte
            - eq
            - neq
          description: Comparison operator.
        value:
          description: >-
            Filter value. Use an array for the "in" operator, a string or
            integer for others.
          oneOf:
            - type: string
            - type: integer
            - type: array
              items:
                oneOf:
                  - type: string
                  - type: integer
    SortOrder:
      type: object
      description: Sorting specification for result sets.
      properties:
        field:
          type: string
          description: Field to sort by.
        keyword:
          type: string
          enum:
            - asc
            - desc
          description: Sort direction.
    Incident:
      type: object
      description: A Cortex XDR incident grouping related alerts.
      properties:
        incident_id:
          type: string
        incident_name:
          type: string
        description:
          type: string
        status:
          type: string
          enum:
            - new
            - under_investigation
            - resolved_threat_handled
            - resolved_known_issue
            - resolved_duplicate
            - resolved_false_positive
            - resolved_other
        severity:
          type: string
          enum:
            - critical
            - high
            - medium
            - low
            - informational
            - unknown
        assigned_user_mail:
          type: string
        assigned_user_pretty_name:
          type: string
        alert_count:
          type: integer
        low_severity_alert_count:
          type: integer
        med_severity_alert_count:
          type: integer
        high_severity_alert_count:
          type: integer
        critical_severity_alert_count:
          type: integer
        user_count:
          type: integer
        host_count:
          type: integer
        creation_time:
          type: integer
          description: Incident creation timestamp as Unix epoch milliseconds.
        modification_time:
          type: integer
          description: Last modification timestamp as Unix epoch milliseconds.
        detection_time:
          type: integer
        starred:
          type: boolean
        xdr_url:
          type: string
          description: Direct URL to the incident in the XDR console.
        rule_based_score:
          type: integer
        manual_score:
          type: integer
    IncidentDetail:
      allOf:
        - $ref: '#/components/schemas/Incident'
        - type: object
          properties:
            network_artifacts:
              type: object
            file_artifacts:
              type: object
            hosts:
              type: array
              items:
                type: string
            users:
              type: array
              items:
                type: string
            incident_sources:
              type: array
              items:
                type: string
            mitre_tactics_ids_and_names:
              type: array
              items:
                type: string
            mitre_techniques_ids_and_names:
              type: array
              items:
                type: string
    Alert:
      type: object
      description: A Cortex XDR alert representing a single detection event.
      properties:
        alert_id:
          type: string
        detection_timestamp:
          type: integer
          description: Detection timestamp as Unix epoch milliseconds.
        name:
          type: string
          description: Alert name or rule name that triggered this alert.
        category:
          type: string
          description: Alert category (e.g., Malware, Exploit, Lateral Movement).
        description:
          type: string
        host_ip:
          type: array
          items:
            type: string
        host_name:
          type: string
        user_name:
          type: string
        mac:
          type: array
          items:
            type: string
        source:
          type: string
          description: Data source that generated the alert.
        action:
          type: string
          description: Action taken on the alert.
        action_pretty:
          type: string
        severity:
          type: string
          enum:
            - critical
            - high
            - medium
            - low
            - informational
            - unknown
        matching_status:
          type: string
        alert_type:
          type: string
        resolution_status:
          type: string
        resolution_comment:
          type: string
    Endpoint:
      type: object
      description: An endpoint enrolled in Cortex XDR protection.
      properties:
        endpoint_id:
          type: string
          description: Unique endpoint identifier.
        endpoint_name:
          type: string
          description: Endpoint hostname.
        endpoint_type:
          type: string
          enum:
            - SERVER
            - WORKSTATION
            - LAPTOP
        endpoint_status:
          type: string
          enum:
            - CONNECTED
            - DISCONNECTED
            - LOST
            - UNINSTALLED
        os_type:
          type: string
          enum:
            - AGENT_OS_WINDOWS
            - AGENT_OS_LINUX
            - AGENT_OS_MAC
        ip:
          type: array
          items:
            type: string
          description: IP addresses assigned to the endpoint.
        users:
          type: array
          items:
            type: string
          description: Users logged into the endpoint.
        domain:
          type: string
        alias:
          type: string
        first_seen:
          type: integer
          description: First connection timestamp as Unix epoch milliseconds.
        last_seen:
          type: integer
          description: Last connection timestamp as Unix epoch milliseconds.
        content_version:
          type: string
          description: Cortex XDR agent content version.
        installation_package:
          type: string
        active_directory:
          type: string
        install_date:
          type: integer
        endpoint_version:
          type: string
          description: Cortex XDR agent version.
        is_isolated:
          type: string
          enum:
            - AGENT_ISOLATED
            - AGENT_UNISOLATED
            - PENDING_ISOLATION
            - PENDING_UNISOLATION
        isolation_reason:
          type: string
        scan_status:
          type: string
          enum:
            - SCAN_STATUS_NONE
            - SCAN_STATUS_PENDING
            - SCAN_STATUS_IN_PROGRESS
            - SCAN_STATUS_DONE
            - SCAN_STATUS_FAILED
            - SCAN_STATUS_CANCELLED
        group_name:
          type: array
          items:
            type: string
    AuditLog:
      type: object
      description: An audit management log entry recording an administrative action.
      properties:
        timestamp:
          type: integer
          description: Action timestamp as Unix epoch milliseconds.
        actor_primary_username:
          type: string
          description: Username of the administrator who performed the action.
        actor_email:
          type: string
        actor_type:
          type: string
          enum:
            - User
            - API
        sub_type:
          type: string
          description: Action subtype (e.g., Login, Logout, Policy Update).
        result:
          type: string
          enum:
            - SUCCESS
            - FAIL
        reason:
          type: string
          description: Failure reason if result is FAIL.
        ip:
          type: string
          description: Source IP address of the action.
        description:
          type: string
    ErrorResponse:
      type: object
      properties:
        reply:
          type: object
          properties:
            err_code:
              type: integer
            err_msg:
              type: string
            err_extra:
              type: string
