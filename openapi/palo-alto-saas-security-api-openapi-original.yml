components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >-
        OAuth 2.0 Bearer token. Obtain by authenticating with the SaaS
        Security API token endpoint using your service account credentials.
  schemas:
    Incident:
      type: object
      properties:
        id:
          type: string
          description: Unique incident identifier.
          example: example-id
        title:
          type: string
          description: Summary title of the incident.
          example: Primary Agent 47
        description:
          type: string
          description: Detailed description of the security incident.
          example: Investigation incident suspicious policy on applied alert endpoint traffic endpoint blocked violation.
        status:
          type: string
          enum:
          - new
          - in_progress
          - resolved
          - dismissed
          description: Current incident status.
          example: resolved
        severity:
          type: string
          enum:
          - low
          - medium
          - high
          - critical
          description: Incident severity level.
          example: critical
        app_id:
          type: string
          description: ID of the SaaS application where the incident occurred.
          example: '781451'
        app_name:
          type: string
          description: Name of the SaaS application.
          example: Staging Agent 76
        policy_name:
          type: string
          description: Name of the policy that triggered the incident.
          example: Branch Sensor 98
        affected_assets:
          type: array
          items:
            type: string
          description: IDs of assets involved in the incident.
          example: *id001
        affected_users:
          type: array
          items:
            type: string
          description: User IDs of users involved in the incident.
          example: *id002
        assignee_id:
          type: string
          description: User ID of the assigned analyst.
          example: '140527'
        created_at:
          type: string
          format: date-time
          description: Timestamp when the incident was detected.
          example: '2026-06-24T16:04:21Z'
        updated_at:
          type: string
          format: date-time
          description: Timestamp of the most recent update.
          example: '2024-02-19T07:50:40Z'
    Asset:
      type: object
      properties:
        id:
          type: string
          description: Unique asset identifier.
          example: example-id
        name:
          type: string
          description: Asset name or filename.
          example: Production Policy 38
        type:
          type: string
          enum:
          - file
          - folder
          - email
          - calendar_event
          - contact
          description: Asset type.
          example: calendar_event
        app_id:
          type: string
          description: ID of the SaaS application containing the asset.
          example: '972712'
        app_name:
          type: string
          description: Name of the SaaS application.
          example: Production Sensor 05
        owner:
          type: string
          description: User ID of the asset owner.
          example: example-owner
        exposure:
          type: string
          enum:
          - private
          - internal
          - external
          - public
          description: Current exposure level of the asset.
          example: external
        size_bytes:
          type: integer
          description: Asset size in bytes.
          example: 550
        dlp_violations:
          type: array
          items:
            type: string
          description: DLP policy violation names triggered for this asset.
          example: *id003
        created_at:
          type: string
          format: date-time
          example: '2024-12-03T07:42:31Z'
        updated_at:
          type: string
          format: date-time
          example: '2026-05-28T11:46:06Z'
        last_scanned_at:
          type: string
          format: date-time
          example: '2026-10-13T08:39:47Z'
    Application:
      type: object
      properties:
        id:
          type: string
          description: Unique application identifier.
          example: example-id
        name:
          type: string
          description: SaaS application name (e.g., Google Drive, Microsoft SharePoint).
          example: Primary Agent 80
        type:
          type: string
          description: Application type or category.
          example: advanced
        status:
          type: string
          enum:
          - connected
          - disconnected
          - error
          description: Current connection status.
          example: connected
        asset_count:
          type: integer
          description: Number of assets scanned for this application.
          example: 752
        incident_count:
          type: integer
          description: Number of active incidents for this application.
          example: 54
        connected_at:
          type: string
          format: date-time
          description: Timestamp when the application was connected.
          example: '2025-07-22T17:44:41Z'
    User:
      type: object
      properties:
        id:
          type: string
          description: Unique user identifier.
          example: example-id
        email:
          type: string
          format: email
          description: User email address.
          example: soc-admin@example.com
        display_name:
          type: string
          description: User display name.
          example: Sarah Doe
        app_id:
          type: string
          description: SaaS application ID the user belongs to.
          example: '562817'
        account_type:
          type: string
          enum:
          - internal
          - external
          - service
          description: Type of user account.
          example: internal
        last_activity:
          type: string
          format: date-time
          description: Timestamp of the user's most recent activity.
          example: '2025-01-07T13:18:09Z'
    UserActivity:
      type: object
      properties:
        id:
          type: string
          description: Unique activity record identifier.
          example: example-id
        user_id:
          type: string
          description: ID of the user who performed the action.
          example: '269446'
        app_id:
          type: string
          description: SaaS application where the activity occurred.
          example: '356501'
        action:
          type: string
          description: Type of action performed (e.g., file_download, share_external).
          example: drop
        asset_id:
          type: string
          description: ID of the asset involved in the activity.
          example: '505071'
        timestamp:
          type: string
          format: date-time
          description: Timestamp when the activity occurred.
          example: '2026-12-27T04:51:36Z'
        ip_address:
          type: string
          description: Source IP address of the activity.
          example: 10.201.17.66
        risk_level:
          type: string
          enum:
          - low
          - medium
          - high
          description: Risk level assigned to this activity.
          example: low
    LogForwardingSettings:
      type: object
      properties:
        enabled:
          type: boolean
          description: Whether log forwarding is globally enabled.
          example: false
        destinations:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
                enum:
                - syslog
                - https
                - s3
                - splunk
                description: Forwarding destination type.
                example: s3
              name:
                type: string
                description: Destination name.
                example: Staging Policy 90
              enabled:
                type: boolean
                description: Whether this destination is active.
                example: true
              log_types:
                type: array
                items:
                  type: string
                description: Log types forwarded to this destination.
                example:
                - standard
          example: *id004
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Error code identifying the error type.
          example: example-error
        message:
          type: string
          description: Human-readable description of the error.
          example: Configured monitoring network blocked investigation applied activity.
        request_id:
          type: string
          description: Request identifier for support correlation.
          example: 5cc3d66e-5479-4e15-bd64-849adde3cb60
