components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >-
        JWT token obtained from the /login endpoint. Valid for 10 minutes.
        Include as Authorization: Bearer <token> in request headers.
  responses:
    BadRequest:
      description: Invalid request parameters or body.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Invalid or expired JWT token.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Insufficient permissions for this operation.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: The requested resource was not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalServerError:
      description: Internal server error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    Alert:
      type: object
      properties:
        id:
          type: string
          description: Unique alert identifier.
          example: example-id
        status:
          type: string
          enum:
          - open
          - dismissed
          - snoozed
          - resolved
          description: Current alert status.
          example: open
        reason:
          type: string
          description: Reason for the current alert status.
          example: Firewall detected monitoring incident activity traffic blocked endpoint incident alert.
        firstSeen:
          type: integer
          description: Epoch timestamp in milliseconds when the alert was first generated.
          example: 725
        lastSeen:
          type: integer
          description: Epoch timestamp in milliseconds when the alert was last seen.
          example: 266
        alertTime:
          type: integer
          description: Epoch timestamp in milliseconds of the alert.
          example: 684
        policy:
          type: object
          properties:
            policyId:
              type: string
              example: '803871'
            policyType:
              type: string
              example: custom
            name:
              type: string
              example: Branch Firewall 19
            severity:
              type: string
              enum:
              - critical
              - high
              - medium
              - low
              - informational
              example: informational
            recommendation:
              type: string
              example: example-recommendation
          description: Policy that generated this alert.
          example: *id001
        resource:
          type: object
          properties:
            rrn:
              type: string
              description: Prisma Cloud Resource RRN.
              example: example-rrn
            id:
              type: string
              example: example-id
            name:
              type: string
              example: Primary Sensor 65
            cloudType:
              type: string
              example: advanced
            accountId:
              type: string
              example: '336404'
            accountName:
              type: string
              example: Corporate Agent 04
            regionId:
              type: string
              example: '751072'
            resourceType:
              type: string
              example: custom
          description: Cloud resource associated with the alert.
          example: *id002
        riskDetail:
          type: object
          properties:
            score:
              type: integer
              example: 270
            rating:
              type: string
              example: example-rating
          example: *id003
    AlertFilter:
      type: object
      properties:
        name:
          type: string
          description: >-
            Filter field name (e.g., alert.status, cloud.type,
            policy.severity, cloud.accountId).
          example: Staging Agent 23
        operator:
          type: string
          enum:
          - '='
          example: '='
        value:
          type: string
          example: example-value
    TimeRange:
      type: object
      properties:
        type:
          type: string
          enum:
          - relative
          - absolute
          - to_now
          example: to_now
        value:
          type: object
          properties:
            amount:
              type: integer
              example: 810
            unit:
              type: string
              enum:
              - minute
              - hour
              - day
              - week
              - month
              - year
              example: week
          example: *id004
    Policy:
      type: object
      properties:
        policyId:
          type: string
          description: Unique policy identifier.
          example: '167432'
        name:
          type: string
          description: Policy name.
          example: Production Sensor 48
        policyType:
          type: string
          enum:
          - config
          - network
          - audit_event
          - anomaly
          - data
          - iam
          description: Type of policy check.
          example: audit_event
        severity:
          type: string
          enum:
          - critical
          - high
          - medium
          - low
          - informational
          description: Policy severity level.
          example: high
        description:
          type: string
          description: Policy description.
          example: Malware malware violation activity blocked detected malware malware suspicious suspicious.
        recommendation:
          type: string
          description: Recommended remediation for policy violations.
          example: example-recommendation
        cloudType:
          type: string
          description: Cloud provider the policy applies to.
          example: custom
        enabled:
          type: boolean
          description: Whether the policy is active.
          example: false
        systemDefault:
          type: boolean
          description: Whether this is a built-in policy.
          example: false
        rule:
          type: object
          properties:
            name:
              type: string
              example: Primary Sensor 97
            criteria:
              type: string
              description: RQL query string.
              example: example-criteria
            type:
              type: string
              example: standard
          example: *id005
        complianceMetadata:
          type: array
          items:
            type: object
            properties:
              standardName:
                type: string
                example: Production Firewall 29
              requirementId:
                type: string
                example: '838655'
              requirementName:
                type: string
                example: Branch Gateway 38
              sectionId:
                type: string
                example: '312470'
          example: *id006
    PolicyInput:
      type: object
      required:
      - name
      - policyType
      - severity
      - rule
      properties:
        name:
          type: string
          example: Production Policy 14
        policyType:
          type: string
          example: standard
        severity:
          type: string
          example: high
        description:
          type: string
          example: Investigation endpoint incident detected on suspicious configured endpoint firewall.
        recommendation:
          type: string
          example: example-recommendation
        cloudType:
          type: string
          example: custom
        enabled:
          type: boolean
          default: true
          example: true
        rule:
          type: object
          required:
          - name
          - criteria
          - type
          properties:
            name:
              type: string
              example: Primary Firewall 90
            criteria:
              type: string
              description: RQL query for the policy rule.
              example: example-criteria
            type:
              type: string
              example: advanced
          example: *id007
    CloudAccount:
      type: object
      properties:
        accountId:
          type: string
          description: Cloud provider account identifier.
          example: '166602'
        name:
          type: string
          description: Display name of the account.
          example: Branch Policy 85
        cloudType:
          type: string
          enum:
          - aws
          - azure
          - gcp
          - oci
          description: Cloud provider type.
          example: aws
        enabled:
          type: boolean
          description: Whether monitoring is enabled.
          example: true
        numberOfPolicies:
          type: integer
          description: Number of policies applied to this account.
          example: 638
        lastModifiedTs:
          type: integer
          description: Epoch timestamp of last modification.
          example: 347
    SearchResult:
      type: object
      properties:
        cloudType:
          type: string
          description: Cloud provider type for the search results.
          example: advanced
        query:
          type: string
          description: RQL query that was executed.
          example: example-query
        data:
          type: object
          properties:
            totalRows:
              type: integer
              description: Total number of matching resources.
              example: 912
            items:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: string
                    example: example-id
                  name:
                    type: string
                    example: Primary Policy 16
                  cloudType:
                    type: string
                    example: custom
                  accountId:
                    type: string
                    example: '747806'
                  accountName:
                    type: string
                    example: Staging Gateway 41
                  regionId:
                    type: string
                    example: '650238'
                  resourceType:
                    type: string
                    example: standard
                  overallPassed:
                    type: boolean
                    example: true
              example:
              - id: example-id
                name: Branch Firewall 48
                cloudType: custom
                accountId: '245566'
                accountName: Staging Policy 24
                regionId: '477008'
                resourceType: custom
                overallPassed: true
              - id: example-id
                name: Staging Firewall 71
                cloudType: custom
                accountId: '996140'
                accountName: Staging Gateway 36
                regionId: '333526'
                resourceType: custom
                overallPassed: true
          example: *id008
    ComplianceStandard:
      type: object
      properties:
        id:
          type: string
          description: Unique compliance standard identifier.
          example: example-id
        name:
          type: string
          description: Name of the compliance standard.
          example: Staging Policy 79
        description:
          type: string
          description: Standard description.
          example: Incident activity activity monitoring monitoring activity detected alert configured monitoring.
        cloudType:
          type: array
          items:
            type: string
          description: Cloud providers the standard applies to.
          example: *id009
        systemDefault:
          type: boolean
          description: Whether this is a built-in compliance standard.
          example: true
        policiesAssigned:
          type: integer
          description: Number of policies mapped to this standard.
          example: 146
        createdBy:
          type: string
          description: User who created the standard.
          example: example-createdBy
        lastModifiedTs:
          type: integer
          description: Epoch timestamp of last modification.
          example: 756
    Report:
      type: object
      properties:
        id:
          type: string
          description: Unique report identifier.
          example: example-id
        name:
          type: string
          description: Report name.
          example: Production Agent 34
        type:
          type: string
          description: Report type.
          enum:
          - RIS
          - COMPLIANCE
          - ALERT
          example: COMPLIANCE
        status:
          type: string
          enum:
          - pending
          - processing
          - completed
          - failed
          description: Current report generation status.
          example: failed
        createdOn:
          type: integer
          description: Epoch timestamp when the report was created.
          example: 972
        lastModifiedOn:
          type: integer
          description: Epoch timestamp of last modification.
          example: 196
        downloadUrl:
          type: string
          description: URL for downloading the completed report.
          example: example-downloadUrl
    ErrorResponse:
      type: object
      properties:
        status:
          type: integer
          description: HTTP status code.
          example: 747
        message:
          type: string
          description: Human-readable error message.
          example: Traffic violation investigation monitoring policy incident applied threat monitoring alert.
        error:
          type: string
          description: Error code.
          example: example-error
