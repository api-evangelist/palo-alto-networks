components:
  securitySchemes:
    awsSigV4:
      type: apiKey
      in: header
      name: Authorization
      description: >-
        AWS Signature Version 4 (SigV4) signed request. Use an AWS IAM role
        or user with CloudNGFW IAM permissions. Sign requests using the service
        name cloudngfw and the target AWS region. Include x-amz-date and
        x-amz-security-token headers as required.
  parameters:
    rulestack:
      name: rulestack
      in: path
      required: true
      description: Name of the rule stack.
      schema:
        type: string
    priority:
      name: priority
      in: path
      required: true
      description: >-
        Priority number of the security rule. Rules with lower numbers are
        evaluated first (range 1-65535).
      schema:
        type: integer
        minimum: 1
        maximum: 65535
    firewall:
      name: firewall
      in: path
      required: true
      description: Name of the Cloud NGFW firewall instance.
      schema:
        type: string
  responses:
    BadRequest:
      description: Malformed request or invalid parameters.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Missing or invalid AWS credentials.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Insufficient IAM permissions for the requested operation.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: The requested resource was not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: A resource with the specified name already exists or cannot be modified.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalServerError:
      description: An internal server error occurred.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    ResponseStatus:
      type: object
      description: Standard API response status envelope included in all responses.
      properties:
        ErrorCode:
          type: integer
          description: Error code. 0 indicates success.
          example: 0
        Reason:
          type: string
          description: Human-readable status message.
          example: ''
    RuleStack:
      type: object
      description: A rule stack containing security policy for Cloud NGFW firewall instances.
      properties:
        RuleStackName:
          type: string
          description: Unique name of the rule stack.
          example: Primary Agent 48
        RuleStackEntry:
          type: object
          properties:
            Description:
              type: string
              example: Incident rule network detected investigation applied threat incident Security suspicious blocked activity.
            Scope:
              type: string
              enum:
              - Local
              - Global
              example: Local
            MinAppIdVersion:
              type: string
              description: Minimum App-ID content version required.
              example: 5.7.7
            LookupXForwardedFor:
              type: string
              enum:
              - SecurityPolicy
              - None
              example: SecurityPolicy
            Profile:
              type: object
              properties:
                AntiSpywareProfile:
                  type: string
                  example: IP Camera
                AntiVirusProfile:
                  type: string
                  example: IP Camera
                VulnerabilityProfile:
                  type: string
                  example: IP Camera
                URLFilteringProfile:
                  type: string
                  example: Network Printer
                FileBlockingProfile:
                  type: string
                  example: HVAC Controller
              example:
                AntiSpywareProfile: IP Camera
                AntiVirusProfile: Network Printer
                VulnerabilityProfile: HVAC Controller
                URLFilteringProfile: HVAC Controller
                FileBlockingProfile: HVAC Controller
          example: *id001
        UpdateToken:
          type: string
          description: Optimistic lock token for concurrent modification detection.
          example: example-UpdateToken
    RuleStackSummary:
      type: object
      properties:
        RuleStackName:
          type: string
          example: Corporate Sensor 39
        Scope:
          type: string
          enum:
          - Local
          - Global
          example: Local
        Status:
          type: string
          enum:
          - ACTIVE
          - INACTIVE
          - ERROR
          example: ACTIVE
    RuleStackRequest:
      type: object
      required:
      - RuleStackName
      - RuleStackEntry
      properties:
        RuleStackName:
          type: string
          example: Branch Policy 33
        RuleStackEntry:
          type: object
          properties:
            Description:
              type: string
              example: Endpoint activity incident network monitoring investigation.
            Scope:
              type: string
              enum:
              - Local
              - Global
              default: Local
              example: Local
            MinAppIdVersion:
              type: string
              example: 8.8.3
            Profile:
              type: object
              properties:
                AntiSpywareProfile:
                  type: string
                  example: Network Printer
                AntiVirusProfile:
                  type: string
                  example: IP Camera
                VulnerabilityProfile:
                  type: string
                  example: IP Camera
                URLFilteringProfile:
                  type: string
                  example: IP Camera
              example:
                AntiSpywareProfile: IP Camera
                AntiVirusProfile: Network Printer
                VulnerabilityProfile: IP Camera
                URLFilteringProfile: Network Printer
          example: *id002
    SecurityRule:
      type: object
      description: A security rule within a Cloud NGFW rule stack.
      properties:
        Priority:
          type: integer
          description: Rule evaluation priority (lower numbers evaluated first).
          example: 707
        RuleEntry:
          type: object
          properties:
            RuleName:
              type: string
              example: Staging Policy 40
            Description:
              type: string
              example: Threat network configured alert configured violation rule malware alert monitoring threat.
            Enabled:
              type: boolean
              default: true
              example: true
            Source:
              $ref: '#/components/schemas/RuleSource'
            NegateSource:
              type: boolean
              default: false
              example: false
            Destination:
              $ref: '#/components/schemas/RuleDestination'
            NegateDestination:
              type: boolean
              default: false
              example: false
            Applications:
              type: array
              items:
                type: string
              description: Application names to match (use any for all applications).
              example:
              - ssl
              - ssh
            Category:
              type: object
              properties:
                URLCategoryNames:
                  type: array
                  items:
                    type: string
                  example:
                  - Staging Firewall 58
                  - Primary Firewall 83
                Feeds:
                  type: array
                  items:
                    type: string
                  example:
                  - example-Feeds_item
                  - example-Feeds_item
              example:
                URLCategoryNames:
                - Production Firewall 26
                - Primary Policy 38
                Feeds:
                - example-Feeds_item
            Protocol:
              type: string
              enum:
              - APPLICATION-DEFAULT
              - TCP
              - UDP
              - ICMP
              - ANY
              example: ICMP
            Action:
              type: string
              enum:
              - Allow
              - DenyResetBoth
              - DenyResetServer
              - DenySilent
              example: Allow
            DecryptionRuleType:
              type: string
              enum:
              - SSLOutboundInspection
              - None
              example: None
            AuditComment:
              type: string
              example: Blocked suspicious rule investigation activity on.
          example: *id003
    SecurityRuleSummary:
      type: object
      properties:
        Priority:
          type: integer
          example: 234
        RuleName:
          type: string
          example: Production Policy 12
        Enabled:
          type: boolean
          example: false
    SecurityRuleRequest:
      type: object
      required:
      - Priority
      - RuleEntry
      properties:
        Priority:
          type: integer
          minimum: 1
          maximum: 65535
          example: 48316
        RuleEntry:
          type: object
          required:
          - RuleName
          - Action
          properties:
            RuleName:
              type: string
              example: Primary Sensor 76
            Description:
              type: string
              example: Threat alert rule policy investigation on activity rule threat activity traffic.
            Enabled:
              type: boolean
              default: true
              example: true
            Source:
              $ref: '#/components/schemas/RuleSource'
            Destination:
              $ref: '#/components/schemas/RuleDestination'
            Applications:
              type: array
              items:
                type: string
              example:
              - ssl
              - web-browsing
            Protocol:
              type: string
              enum:
              - APPLICATION-DEFAULT
              - ANY
              example: APPLICATION-DEFAULT
            Action:
              type: string
              enum:
              - Allow
              - DenyResetBoth
              - DenyResetServer
              - DenySilent
              example: DenyResetServer
          example: *id004
    RuleSource:
      type: object
      description: Traffic source matching criteria for a security rule.
      properties:
