                type: object
                properties:
                  SubnetId:
                    type: string
                  EndpointId:
                    type: string
                  Status:
                    type: string
    FirewallSummary:
      type: object
      properties:
        FirewallName:
          type: string
        VpcId:
          type: string
        AssociatedRuleStack:
          type: string
        Status:
          type: string
    FirewallRequest:
      type: object
