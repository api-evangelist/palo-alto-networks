  /Commit:
    get:
      operationId: getCommitStatus
      summary: Palo Alto Networks Get commit job status
      description: >-
        Returns the status of a commit operation by job ID. Poll this endpoint
        to monitor the progress of a commit job initiated via POST /Commit.
      tags:
        - Commit
      parameters:
        - name: jobid
          in: query
          required: true
          description: Job ID returned by the commit operation.
          schema:
            type: string
      responses:
        '200':
          description: Commit job status returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommitStatus'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: commitConfiguration
      summary: Palo Alto Networks Commit configuration
      description: >-
        Commits the current candidate configuration to the running
        configuration on the firewall. This operation applies all staged
        configuration changes. Returns a job ID that can be polled to track
        commit progress. Optionally specify a description and partial commit
        criteria (admin, device groups, vsys).
      tags:
        - Commit
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                cmd:
                  type: object
                  properties:
                    commit:
                      type: object
                      properties:
                        description:
                          type: string
                          description: Description for this commit.
                        partial:
                          type: object
                          description: Partial commit options.
                          properties:
                            admin:
                              type: object
                              properties:
                                member:
                                  type: array
                                  items:
                                    type: string
                                  description: Admin accounts to include in partial commit.
      responses:
        '200':
          description: Commit job initiated successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  '@status':
                    type: string
                  '@code':
                    type: string
                  result:
                    type: object
                    properties:
                      msg:
                        type: string
                      job:
                        type: string
                        description: Job ID to poll for commit status.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /Device/VirtualSystems:
    get:
      operationId: listVirtualSystems
      summary: Palo Alto Networks List virtual systems
      description: >-
        Returns all virtual systems (vsys) configured on the firewall. Virtual
        systems provide multi-tenancy on a single physical or virtual firewall
        appliance, each with its own security policy, interfaces, and zones.
      tags:
        - Device
      responses:
        '200':
          description: Virtual systems returned successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  '@status':
                    type: string
                  '@code':
                    type: string
                  result:
                    type: object
                    properties:
                      '@total-count':
                        type: string
                      '@count':
                        type: string
                      entry:
                        type: array
                        items:
                          $ref: '#/components/schemas/VirtualSystem'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
components:
  securitySchemes:
    apiKey:
      type: apiKey
      in: header
      name: X-PAN-KEY
      description: >-
        PAN-OS API key generated via the /api/?type=keygen endpoint or from
        the web interface under Device > Administrators. The key is tied to
        an administrator account and inherits its role-based permissions.
  parameters:
    location:
      name: location
      in: query
      description: Configuration location scope.
      schema:
        type: string
        enum:
          - vsys
          - device-group
          - shared
        default: vsys
    vsys:
      name: vsys
      in: query
      description: Virtual system name when location is vsys.
      schema:
        type: string
        default: vsys1
  responses:
    BadRequest:
      description: Malformed request or invalid parameters.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Missing or invalid API key.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: The requested resource was not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalServerError:
      description: An internal server error occurred.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    Address:
      type: object
      description: >-
        An address object representing an IP address, subnet, range, wildcard
        mask, or FQDN used in security policy rules.
      properties:
        '@name':
          type: string
          description: Unique name of the address object.
        ip-netmask:
          type: string
          description: IP address with CIDR netmask (e.g., 10.0.0.0/24).
        ip-range:
          type: string
          description: IP address range (e.g., 10.0.0.1-10.0.0.254).
        ip-wildcard:
          type: string
          description: IP wildcard mask (e.g., 10.20.1.0/0.0.248.255).
        fqdn:
          type: string
          description: Fully qualified domain name (e.g., www.example.com).
        description:
          type: string
          description: Description of the address object.
        tag:
          type: object
          properties:
            member:
              type: array
              items:
                type: string
              description: Tags assigned to this address object.
    AddressGroup:
      type: object
      description: >-
        A group of address objects. Can be static with an explicit member list
        or dynamic with a tag-based filter expression.
      properties:
        '@name':
          type: string
          description: Unique name of the address group.
        static:
          type: object
          description: Static address group with explicit members.
          properties:
            member:
              type: array
              items:
                type: string
              description: List of address object names.
        dynamic:
          type: object
          description: Dynamic address group with tag-based filter.
          properties:
            filter:
              type: string
              description: >-
                Tag-based filter expression (e.g., "'web-servers' and
                'production'").
        description:
          type: string
        tag:
          type: object
          properties:
            member:
              type: array
              items:
                type: string
    Service:
      type: object
      description: >-
        A service object defining a TCP or UDP protocol with destination port
        or port range.
      properties:
        '@name':
          type: string
          description: Unique name of the service object.
        protocol:
          type: object
          properties:
            tcp:
              type: object
              properties:
                port:
                  type: string
                  description: TCP destination port or range (e.g., 80, 8080-8090).
                source-port:
                  type: string
                  description: TCP source port or range.
            udp:
              type: object
              properties:
                port:
                  type: string
                  description: UDP destination port or range (e.g., 53, 500-502).
                source-port:
                  type: string
                  description: UDP source port or range.
        description:
          type: string
        tag:
          type: object
          properties:
            member:
              type: array
              items:
                type: string
    ServiceGroup:
      type: object
      description: A group of service objects for use in security policy rules.
      properties:
        '@name':
          type: string
          description: Unique name of the service group.
        members:
          type: object
          properties:
            member:
              type: array
              items:
                type: string
              description: List of service object names.
        tag:
          type: object
          properties:
            member:
              type: array
              items:
                type: string
    Tag:
      type: object
      description: A tag for categorizing configuration objects.
      properties:
        '@name':
          type: string
          description: Unique name of the tag.
        color:
          type: string
          description: Display color for the tag (e.g., color1, color2).
        comments:
          type: string
          description: Description or comments for the tag.
    SecurityRule:
      type: object
      description: >-
        A security policy rule controlling traffic flow between zones based on
        source, destination, application, service, and user criteria.
      properties:
        '@name':
          type: string
          description: Unique name of the security rule.
        from:
          type: object
          properties:
            member:
              type: array
              items:
                type: string
              description: Source zones (e.g., trust, untrust).
        to:
          type: object
          properties:
            member:
              type: array
              items:
                type: string
              description: Destination zones.
        source:
          type: object
          properties:
            member:
              type: array
              items:
                type: string
              description: Source addresses or address groups (use "any" for all).
        destination:
          type: object
          properties:
            member:
              type: array
              items:
                type: string
              description: Destination addresses or address groups.
        source-user:
          type: object
          properties:
            member:
              type: array
              items:
                type: string
              description: Source users or user groups (use "any" for all).
        application:
          type: object
          properties:
            member:
              type: array
              items:
                type: string
              description: Application names (e.g., ssl, web-browsing, any).
        service:
          type: object
          properties:
            member:
              type: array
              items:
                type: string
              description: >-
                Service objects or application-default to use application
                native ports.
        category:
          type: object
          properties:
            member:
              type: array
              items:
                type: string
              description: URL categories.
        action:
          type: string
          enum:
            - allow
            - deny
            - drop
            - reset-client
            - reset-server
            - reset-both
          description: Action to take on matching traffic.
        log-start:
          type: string
          enum:
            - 'yes'
            - 'no'
          description: Log at session start.
        log-end:
          type: string
          enum:
            - 'yes'
            - 'no'
          description: Log at session end.
        log-setting:
          type: string
          description: Log forwarding profile name.
        profile-setting:
          type: object
          description: Security profile group or individual profiles.
          properties:
            group:
              type: object
              properties:
                member:
                  type: array
                  items:
                    type: string
        disabled:
          type: string
          enum:
            - 'yes'
            - 'no'
          description: Whether the rule is disabled.
        description:
          type: string
        tag:
          type: object
          properties:
            member:
              type: array
              items:
                type: string
    NatRule:
      type: object
      description: >-
        A NAT policy rule defining source or destination address translation
        for matching traffic.
      properties:
        '@name':
          type: string
          description: Unique name of the NAT rule.
        from:
          type: object
          properties:
            member:
              type: array
              items:
                type: string
              description: Source zones.
        to:
          type: object
          properties:
            member:
              type: array
              items:
                type: string
              description: Destination zones.
        source:
          type: object
          properties:
            member:
              type: array
              items:
                type: string
              description: Source addresses.
        destination:
          type: object
          properties:
            member:
              type: array
              items:
                type: string
              description: Destination addresses.
        service:
          type: string
          description: Service object or any.
        source-translation:
          type: object
          description: Source address translation settings.
          properties:
            dynamic-ip-and-port:
              type: object
              properties:
                interface-address:
                  type: object
                  properties:
                    interface:
                      type: string
                translated-address:
                  type: object
                  properties:
                    member:
                      type: array
                      items:
                        type: string
            static-ip:
              type: object
              properties:
                translated-address:
                  type: string
                bi-directional:
                  type: string
                  enum:
                    - 'yes'
                    - 'no'
        destination-translation:
          type: object
          description: Destination address translation settings.
          properties:
            translated-address:
              type: string
            translated-port:
              type: string
        nat-type:
          type: string
          enum:
            - ipv4
            - nat64
            - nptv6
        disabled:
          type: string
          enum:
            - 'yes'
            - 'no'
        description:
          type: string
        tag:
          type: object
          properties:
            member:
              type: array
              items:
                type: string
    QosRule:
      type: object
      description: >-
        A QoS policy rule classifying traffic into QoS classes for bandwidth
        management and prioritization.
      properties:
        '@name':
          type: string
          description: Unique name of the QoS rule.
        from:
          type: object
          properties:
            member:
              type: array
              items:
                type: string
              description: Source zones.
        to:
          type: object
          properties:
            member:
              type: array
              items:
                type: string
              description: Destination zones.
        source:
          type: object
          properties:
            member:
              type: array
              items:
                type: string
        destination:
          type: object
          properties:
            member:
              type: array
              items:
                type: string
        application:
          type: object
          properties:
            member:
              type: array
              items:
                type: string
        service:
          type: object
          properties:
            member:
              type: array
              items:
                type: string
        dscp-tos:
          type: object
          description: DSCP/TOS marking settings.
          properties:
            any:
              type: object
        action:
          type: object
          properties:
            class:
              type: string
              description: QoS class number (1-8).
        disabled:
          type: string
          enum:
            - 'yes'
            - 'no'
        description:
          type: string
    VirtualSystem:
      type: object
      description: A virtual system (vsys) on the PAN-OS firewall.
      properties:
        '@name':
          type: string
          description: Virtual system name (e.g., vsys1, vsys2).
        display-name:
          type: string
          description: Human-readable display name for the vsys.
        import:
          type: object
          description: Imported network resources for this vsys.
          properties:
            network:
              type: object
              properties:
                interface:
                  type: object
                  properties:
                    member:
                      type: array
                      items:
                        type: string
                      description: Network interfaces assigned to this vsys.
    CommitStatus:
      type: object
      description: Status of a commit job.
      properties:
        '@status':
          type: string
        '@code':
          type: string
        result:
          type: object
          properties:
            job:
              type: object
              properties:
                id:
                  type: string
                type:
                  type: string
                status:
                  type: string
                  enum:
                    - ACT
                    - PEND
                    - FIN
                    - WARN
                result:
                  type: string
                  enum:
                    - OK
                    - FAIL
                    - WARN
                progress:
                  type: string
                  description: Commit progress percentage (0-100).
                details:
                  type: object
                  properties:
                    line:
                      oneOf:
                        - type: string
                        - type: array
                          items:
                            type: string
    PanOsResponse:
      type: object
      description: Standard PAN-OS API response envelope.
      properties:
        '@status':
          type: string
          enum:
            - success
            - error
        '@code':
          type: string
        msg:
          type: string
    ErrorResponse:
      type: object
      properties:
        '@status':
          type: string
        '@code':
          type: string
        msg:
          type: object
          properties:
            line:
              type: string
              description: Error message detail.
