  /Commit:
    get:
      operationId: getCommitStatus
      summary: Palo Alto Networks Get Commit Job Status
      description: >-
        Returns the status of a commit operation by job ID. Poll this endpoint
        to monitor the progress of a commit job initiated via POST /Commit.
      tags:
      - Commit
      parameters:
      - name: jobid
        in: query
        required: true
        description: Job ID returned by the commit operation.
        schema:
          type: string
        example: '327342'
      responses:
        '200':
          description: Commit job status returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommitStatus'
              examples:
                GetCommitStatus200Example:
                  summary: Default getCommitStatus 200 response
                  x-microcks-default: true
                  value:
                    '@status': active
                    '@code': example-@code
                    result: &id036
                      job:
                        id: example-id
                        type: advanced
                        status: WARN
                        result: OK
                        progress: example-progress
                        details:
                          line: example-line
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    post:
      operationId: commitConfiguration
      summary: Palo Alto Networks Commit Configuration
      description: >-
        Commits the current candidate configuration to the running
        configuration on the firewall. This operation applies all staged
        configuration changes. Returns a job ID that can be polled to track
        commit progress. Optionally specify a description and partial commit
        criteria (admin, device groups, vsys).
      tags:
      - Commit
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                cmd:
                  type: object
                  properties:
                    commit:
                      type: object
                      properties:
                        description:
                          type: string
                          description: Description for this commit.
                        partial:
                          type: object
                          description: Partial commit options.
                          properties:
                            admin:
                              type: object
                              properties:
                                member:
                                  type: array
                                  items:
                                    type: string
                                  description: Admin accounts to include in partial commit.
            examples:
              CommitConfigurationRequestExample:
                summary: Default commitConfiguration request
                x-microcks-default: true
                value:
                  cmd:
                    commit:
                      description: Incident violation policy alert monitoring investigation rule policy on incident.
                      partial:
                        admin:
                          member:
                          - example-member_item
                          - example-member_item
      responses:
        '200':
          description: Commit job initiated successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  '@status':
                    type: string
                  '@code':
                    type: string
                  result:
                    type: object
                    properties:
                      msg:
                        type: string
                      job:
                        type: string
                        description: Job ID to poll for commit status.
              examples:
                CommitConfiguration200Example:
                  summary: Default commitConfiguration 200 response
                  x-microcks-default: true
                  value:
                    '@status': enabled
                    '@code': example-@code
                    result:
                      msg: example-msg
                      job: example-job
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
