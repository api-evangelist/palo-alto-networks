                source-port:
                  type: string
                  description: UDP source port or range.
                  example: example-source-port
              example:
                port: example-port
                source-port: example-source-port
          example: *id006
        description:
          type: string
          example: On endpoint traffic rule alert blocked.
        tag:
          type: object
          properties:
            member:
              type: array
              items:
                type: string
              example:
              - example-member_item
              - example-member_item
