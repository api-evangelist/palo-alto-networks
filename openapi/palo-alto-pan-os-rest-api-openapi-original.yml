components:
  securitySchemes:
    apiKey:
      type: apiKey
      in: header
      name: X-PAN-KEY
      description: >-
        PAN-OS API key generated via the /api/?type=keygen endpoint or from
        the web interface under Device > Administrators. The key is tied to
        an administrator account and inherits its role-based permissions.
  parameters:
    location:
      name: location
      in: query
      description: Configuration location scope.
      schema:
        type: string
        enum:
        - vsys
        - device-group
        - shared
        default: vsys
    vsys:
      name: vsys
      in: query
      description: Virtual system name when location is vsys.
      schema:
        type: string
        default: vsys1
  responses:
    BadRequest:
      description: Malformed request or invalid parameters.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Missing or invalid API key.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: The requested resource was not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalServerError:
      description: An internal server error occurred.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    Address:
      type: object
      description: >-
        An address object representing an IP address, subnet, range, wildcard
        mask, or FQDN used in security policy rules.
      properties:
        '@name':
          type: string
          description: Unique name of the address object.
          example: Production Firewall 76
        ip-netmask:
          type: string
          description: IP address with CIDR netmask (e.g., 10.0.0.0/24).
          example: example-ip-netmask
        ip-range:
          type: string
          description: IP address range (e.g., 10.0.0.1-10.0.0.254).
          example: example-ip-range
        ip-wildcard:
          type: string
          description: IP wildcard mask (e.g., 10.20.1.0/0.0.248.255).
          example: example-ip-wildcard
        fqdn:
          type: string
          description: Fully qualified domain name (e.g., www.example.com).
          example: api.acme-systems.org
        description:
          type: string
          description: Description of the address object.
          example: Blocked malware incident monitoring configured threat activity violation monitoring threat detected.
        tag:
          type: object
          properties:
            member:
              type: array
              items:
                type: string
              description: Tags assigned to this address object.
              example:
              - example-member_item
          example: *id001
    AddressGroup:
      type: object
      description: >-
        A group of address objects. Can be static with an explicit member list
        or dynamic with a tag-based filter expression.
      properties:
        '@name':
          type: string
          description: Unique name of the address group.
          example: Branch Agent 57
        static:
          type: object
          description: Static address group with explicit members.
          properties:
            member:
              type: array
              items:
                type: string
              description: List of address object names.
              example:
              - example-member_item
              - example-member_item
          example: *id003
        dynamic:
          type: object
          description: Dynamic address group with tag-based filter.
          properties:
            filter:
              type: string
              description: >-
                Tag-based filter expression (e.g., "'web-servers' and
                'production'").
              example: example-filter
          example: *id004
        description:
          type: string
          example: Policy alert detected violation network network violation suspicious on malware network.
        tag:
          type: object
          properties:
            member:
              type: array
              items:
                type: string
              example:
              - example-member_item
              - example-member_item
          example: *id005
    Service:
      type: object
      description: >-
        A service object defining a TCP or UDP protocol with destination port
        or port range.
      properties:
        '@name':
          type: string
          description: Unique name of the service object.
          example: Staging Firewall 44
        protocol:
          type: object
          properties:
            tcp:
              type: object
              properties:
                port:
                  type: string
                  description: TCP destination port or range (e.g., 80, 8080-8090).
                  example: example-port
                source-port:
                  type: string
                  description: TCP source port or range.
                  example: example-source-port
              example:
                port: example-port
                source-port: example-source-port
            udp:
              type: object
              properties:
                port:
