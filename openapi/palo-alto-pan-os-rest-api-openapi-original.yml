openapi: 3.1.0
info:
  title: PAN-OS REST API
  description: >-
    RESTful API for managing Palo Alto Networks PAN-OS next-generation
    firewalls. Provides programmatic access to configure firewall policies,
    address objects, address groups, network interfaces, and device system
    information. The API follows a resource-oriented design with standard
    HTTP methods for CRUD operations. Authentication uses an API key
    passed in the X-PAN-KEY header, generated from the PAN-OS web
    interface under Device > Administrators.
  version: '10.2'
  contact:
    name: Palo Alto Networks Developer Support
    url: https://pan.dev/
  license:
    name: Proprietary
    url: https://www.paloaltonetworks.com/legal
servers:
  - url: https://{firewall}/restapi/v10.2
    description: PAN-OS firewall REST API endpoint.
    variables:
      firewall:
        description: >-
          Hostname or IP address of the PAN-OS firewall or Panorama
          appliance.
        default: firewall.example.com
security:
  - apiKey: []
tags:
  - name: Policies
    description: Security policy rule management.
  - name: Objects
    description: Address objects and address group management.
  - name: Network
    description: Network interface configuration.
  - name: Device
    description: Device system information and status.
paths:
  /Objects/Addresses:
    get:
      operationId: listAddresses
      summary: List address objects
      description: >-
        Returns all address objects configured on the firewall. Supports
        filtering by name and location (vsys, device group, or shared).
        Address objects define IP addresses, IP ranges, IP subnets, or
        FQDNs used in security policy rules.
      tags:
        - Objects
      parameters:
        - name: location
          in: query
          description: Configuration location scope.
          schema:
            type: string
            enum:
              - vsys
              - device-group
              - shared
            default: vsys
        - name: vsys
          in: query
          description: Virtual system name when location is vsys.
          schema:
            type: string
            default: vsys1
        - name: name
          in: query
          description: Filter by address object name.
          schema:
            type: string
      responses:
        '200':
          description: Address objects returned.
          content:
            application/json:
              schema:
                type: object
                properties:
                  '@status':
                    type: string
                  '@code':
                    type: string
                  result:
                    type: object
                    properties:
                      '@total-count':
                        type: string
                      '@count':
                        type: string
                      entry:
                        type: array
                        items:
                          $ref: '#/components/schemas/Address'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: createAddress
      summary: Create address object
      description: >-
        Creates a new address object on the firewall. The address object
        can be of type ip-netmask, ip-range, ip-wildcard, or fqdn. The
        object must have a unique name within the specified location scope.
      tags:
        - Objects
      parameters:
        - name: location
          in: query
          description: Configuration location scope.
          schema:
            type: string
            enum:
              - vsys
              - device-group
              - shared
            default: vsys
        - name: vsys
          in: query
          description: Virtual system name when location is vsys.
          schema:
            type: string
            default: vsys1
        - name: name
          in: query
          required: true
          description: Name of the address object to create.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                entry:
                  $ref: '#/components/schemas/Address'
      responses:
        '200':
          description: Address object created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PanOsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: Address object with the specified name already exists.
    put:
      operationId: updateAddress
      summary: Update address object
      description: >-
        Updates an existing address object identified by name. The entire
        object definition must be provided in the request body as this
        performs a full replacement.
      tags:
        - Objects
      parameters:
        - name: location
          in: query
          schema:
            type: string
            enum:
              - vsys
              - device-group
              - shared
            default: vsys
        - name: vsys
          in: query
          schema:
            type: string
            default: vsys1
        - name: name
          in: query
          required: true
          description: Name of the address object to update.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                entry:
                  $ref: '#/components/schemas/Address'
      responses:
        '200':
          description: Address object updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PanOsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          description: Address object not found.
    delete:
      operationId: deleteAddress
      summary: Delete address object
      description: >-
        Deletes an address object identified by name. The object cannot
        be deleted if it is referenced by an active security policy rule
        or address group.
      tags:
        - Objects
      parameters:
        - name: location
          in: query
          schema:
            type: string
            enum:
              - vsys
              - device-group
              - shared
            default: vsys
        - name: vsys
          in: query
          schema:
            type: string
            default: vsys1
        - name: name
          in: query
          required: true
          description: Name of the address object to delete.
          schema:
            type: string
      responses:
        '200':
          description: Address object deleted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PanOsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: Object is referenced by other configuration elements.
  /Objects/AddressGroups:
    get:
      operationId: listAddressGroups
      summary: List address groups
      description: >-
        Returns all address groups configured on the firewall. Address
        groups contain address objects or other address groups and can
        be static (explicit member list) or dynamic (tag-based membership).
      tags:
        - Objects
      parameters:
        - name: location
          in: query
          schema:
            type: string
            enum:
              - vsys
              - device-group
              - shared
            default: vsys
        - name: vsys
          in: query
          schema:
            type: string
            default: vsys1
        - name: name
          in: query
          description: Filter by address group name.
          schema:
            type: string
      responses:
        '200':
          description: Address groups returned.
          content:
            application/json:
              schema:
                type: object
                properties:
                  '@status':
                    type: string
                  '@code':
                    type: string
                  result:
                    type: object
                    properties:
                      '@total-count':
                        type: string
                      '@count':
                        type: string
                      entry:
                        type: array
                        items:
                          $ref: '#/components/schemas/AddressGroup'
    post:
      operationId: createAddressGroup
      summary: Create address group
      description: >-
        Creates a new address group. The group can be static with an
        explicit list of member address objects, or dynamic with a
        tag-based filter expression that automatically includes matching
        address objects.
      tags:
        - Objects
      parameters:
        - name: location
          in: query
          schema:
            type: string
            enum:
              - vsys
              - device-group
              - shared
            default: vsys
        - name: vsys
          in: query
          schema:
            type: string
            default: vsys1
        - name: name
          in: query
          required: true
          description: Name of the address group to create.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                entry:
                  $ref: '#/components/schemas/AddressGroup'
      responses:
        '200':
          description: Address group created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PanOsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: Address group with the specified name already exists.
  /Policies/SecurityRules:
    get:
      operationId: listSecurityRules
      summary: List security rules
      description: >-
        Returns all security policy rules configured in the specified
        rulebase. Security rules control traffic flow between zones and
        define actions (allow, deny, drop, reset) based on source,
        destination, application, service, and user criteria.
      tags:
        - Policies
      parameters:
        - name: location
          in: query
          schema:
            type: string
            enum:
              - vsys
              - device-group
              - shared
            default: vsys
        - name: vsys
          in: query
          schema:
            type: string
            default: vsys1
        - name: name
          in: query
          description: Filter by security rule name.
          schema:
            type: string
      responses:
        '200':
          description: Security rules returned.
          content:
            application/json:
              schema:
                type: object
                properties:
                  '@status':
                    type: string
                  '@code':
                    type: string
                  result:
                    type: object
                    properties:
                      '@total-count':
                        type: string
                      '@count':
                        type: string
                      entry:
                        type: array
                        items:
                          $ref: '#/components/schemas/SecurityRule'
    post:
      operationId: createSecurityRule
      summary: Create security rule
      description: >-
        Creates a new security policy rule. The rule is added to the end
        of the rulebase by default. Define source and destination zones,
        addresses, applications, services, and the action to take on
        matching traffic.
      tags:
        - Policies
      parameters:
        - name: location
          in: query
          schema:
            type: string
            enum:
              - vsys
              - device-group
              - shared
            default: vsys
        - name: vsys
          in: query
          schema:
            type: string
            default: vsys1
        - name: name
          in: query
          required: true
          description: Name of the security rule to create.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                entry:
                  $ref: '#/components/schemas/SecurityRule'
      responses:
        '200':
          description: Security rule created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PanOsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
    put:
      operationId: updateSecurityRule
      summary: Update security rule
      description: >-
        Updates an existing security rule identified by name. The entire
        rule definition must be provided as this performs a full replacement.
      tags:
        - Policies
      parameters:
        - name: location
          in: query
          schema:
            type: string
            enum:
              - vsys
              - device-group
              - shared
            default: vsys
        - name: vsys
          in: query
          schema:
            type: string
            default: vsys1
        - name: name
          in: query
          required: true
          description: Name of the security rule to update.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                entry:
                  $ref: '#/components/schemas/SecurityRule'
      responses:
        '200':
          description: Security rule updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PanOsResponse'
        '404':
          description: Security rule not found.
    delete:
      operationId: deleteSecurityRule
      summary: Delete security rule
      description: Deletes a security policy rule identified by name.
      tags:
        - Policies
      parameters:
        - name: location
          in: query
          schema:
            type: string
            enum:
              - vsys
              - device-group
              - shared
            default: vsys
        - name: vsys
          in: query
          schema:
            type: string
            default: vsys1
        - name: name
          in: query
          required: true
          description: Name of the security rule to delete.
          schema:
            type: string
      responses:
        '200':
          description: Security rule deleted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PanOsResponse'
  /Network/Interfaces:
    get:
      operationId: listInterfaces
      summary: List network interfaces
      description: >-
        Returns all network interfaces configured on the firewall including
        ethernet, loopback, tunnel, and VLAN interfaces. Each interface
        entry includes its configuration such as IP addressing, zone
        assignment, and link state.
      tags:
        - Network
      parameters:
        - name: location
          in: query
          schema:
            type: string
            enum:
              - vsys
              - device-group
              - shared
            default: vsys
        - name: vsys
          in: query
          schema:
            type: string
            default: vsys1
        - name: name
          in: query
          description: Filter by interface name (e.g., ethernet1/1).
          schema:
            type: string
      responses:
        '200':
          description: Network interfaces returned.
          content:
            application/json:
              schema:
                type: object
                properties:
                  '@status':
                    type: string
                  '@code':
                    type: string
                  result:
                    type: object
                    properties:
                      '@total-count':
                        type: string
                      '@count':
                        type: string
                      entry:
                        type: array
                        items:
                          type: object
                          properties:
                            '@name':
                              type: string
                              description: Interface name (e.g., ethernet1/1).
                            comment:
                              type: string
                            layer3:
                              type: object
                              properties:
                                ip:
                                  type: object
                                  properties:
                                    entry:
                                      type: array
                                      items:
                                        type: object
                                        properties:
                                          '@name':
                                            type: string
                                            description: IP address with CIDR notation.
                                mtu:
                                  type: string
                                interface-management-profile:
                                  type: string
                            link-state:
                              type: string
                              enum:
                                - auto
                                - up
                                - down
  /Device/SystemInfo:
    get:
      operationId: getSystemInfo
      summary: Get system information
      description: >-
        Returns device system information including hostname, PAN-OS
        version, serial number, model, uptime, and operational status.
        Useful for inventory management and firmware version tracking.
      tags:
        - Device
      responses:
        '200':
          description: System information returned.
          content:
            application/json:
              schema:
                type: object
                properties:
                  '@status':
                    type: string
                  '@code':
                    type: string
                  result:
                    type: object
                    properties:
                      system:
                        type: object
                        properties:
                          hostname:
                            type: string
                          ip-address:
                            type: string
                          model:
                            type: string
                            description: Firewall model (e.g., PA-5260, PA-850, VM-300).
                          serial:
                            type: string
                            description: Device serial number.
                          sw-version:
                            type: string
                            description: PAN-OS software version.
                          app-version:
                            type: string
                            description: Application content version.
                          threat-version:
                            type: string
                            description: Threat content version.
                          wildfire-version:
                            type: string
                            description: WildFire content version.
                          url-filtering-version:
                            type: string
                          uptime:
                            type: string
                            description: Device uptime (e.g., "45 days, 3:22:15").
                          multi-vsys:
                            type: string
                            enum:
                              - 'on'
                              - 'off'
                          operational-mode:
                            type: string
                            enum:
                              - normal
                              - fips-cc
components:
  securitySchemes:
    apiKey:
      type: apiKey
      in: header
      name: X-PAN-KEY
      description: >-
        PAN-OS API key generated via the /api/?type=keygen endpoint or
        from the web interface under Device > Administrators. The key
        is tied to an administrator account and inherits its role-based
        permissions.
  responses:
    BadRequest:
      description: Malformed request or invalid parameters.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Missing or invalid API key.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    Address:
      type: object
      description: >-
        An address object representing an IP address, subnet, range,
        wildcard mask, or FQDN.
      properties:
        '@name':
          type: string
          description: Unique name of the address object.
        ip-netmask:
          type: string
          description: IP address with CIDR netmask (e.g., 10.0.0.0/24).
        ip-range:
          type: string
          description: IP address range (e.g., 10.0.0.1-10.0.0.254).
        ip-wildcard:
          type: string
          description: IP wildcard mask (e.g., 10.20.1.0/0.0.248.255).
        fqdn:
          type: string
          description: Fully qualified domain name (e.g., www.example.com).
        description:
          type: string
          description: Description of the address object.
        tag:
          type: object
          properties:
            member:
              type: array
              items:
                type: string
              description: Tags assigned to this address object.
    AddressGroup:
      type: object
      description: >-
        A group of address objects. Can be static with an explicit member
        list or dynamic with a tag-based filter expression.
      properties:
        '@name':
          type: string
          description: Unique name of the address group.
        static:
          type: object
          description: Static address group with explicit members.
          properties:
            member:
              type: array
              items:
                type: string
              description: List of address object names.
        dynamic:
          type: object
          description: Dynamic address group with tag-based filter.
          properties:
            filter:
              type: string
              description: >-
                Tag-based filter expression (e.g., "'web-servers' and
                'production'").
        description:
          type: string
        tag:
          type: object
          properties:
            member:
              type: array
              items:
                type: string
    SecurityRule:
      type: object
      description: >-
        A security policy rule controlling traffic flow between zones
        based on source, destination, application, service, and user
        criteria.
      properties:
        '@name':
          type: string
          description: Unique name of the security rule.
        from:
          type: object
          properties:
            member:
              type: array
              items:
                type: string
              description: Source zones (e.g., trust, untrust).
        to:
          type: object
          properties:
            member:
              type: array
              items:
                type: string
              description: Destination zones.
        source:
          type: object
          properties:
            member:
              type: array
              items:
                type: string
              description: Source addresses or address groups (use "any" for all).
        destination:
          type: object
          properties:
            member:
              type: array
              items:
                type: string
              description: Destination addresses or address groups.
        source-user:
          type: object
          properties:
            member:
              type: array
              items:
                type: string
              description: Source users or user groups (use "any" for all).
        application:
          type: object
          properties:
            member:
              type: array
              items:
                type: string
              description: Application names (e.g., ssl, web-browsing, any).
        service:
          type: object
          properties:
            member:
              type: array
              items:
                type: string
              description: >-
                Service objects or application-default to use application
                native ports.
        category:
          type: object
          properties:
            member:
              type: array
              items:
                type: string
              description: URL categories.
        action:
          type: string
          enum:
            - allow
            - deny
            - drop
            - reset-client
            - reset-server
            - reset-both
          description: Action to take on matching traffic.
        log-start:
          type: string
          enum:
            - 'yes'
            - 'no'
          description: Log at session start.
        log-end:
          type: string
          enum:
            - 'yes'
            - 'no'
          description: Log at session end.
        log-setting:
          type: string
          description: Log forwarding profile name.
        profile-setting:
          type: object
          description: Security profile group or individual profiles.
          properties:
            group:
              type: object
              properties:
                member:
                  type: array
                  items:
                    type: string
        disabled:
          type: string
          enum:
            - 'yes'
            - 'no'
          description: Whether the rule is disabled.
        description:
          type: string
        tag:
          type: object
          properties:
            member:
              type: array
              items:
                type: string
    PanOsResponse:
      type: object
      description: Standard PAN-OS API response envelope.
      properties:
        '@status':
          type: string
          enum:
            - success
            - error
        '@code':
          type: string
        msg:
          type: string
    ErrorResponse:
      type: object
      properties:
        '@status':
          type: string
        '@code':
          type: string
        msg:
          type: object
          properties:
            line:
              type: string
              description: Error message detail.
