openapi: 3.1.0
info:
  title: Palo Alto Networks PAN-OS REST API
  description: >-
    RESTful API for managing Palo Alto Networks PAN-OS next-generation
    firewalls. Provides programmatic access to configure firewall policies,
    objects, network interfaces, and device settings. The API follows a
    resource-oriented design with standard HTTP methods for CRUD operations.
    Authentication uses an API key passed in the X-PAN-KEY header, generated
    from the PAN-OS web interface under Device > Administrators or via the
    /api/?type=keygen XML API endpoint. All configuration changes are staged
    in candidate configuration and require a commit to take effect.
  version: '10.2'
  contact:
    name: Palo Alto Networks Developer Support
    url: https://pan.dev/pan-os/docs/restapi/
  license:
    name: Proprietary
    url: https://www.paloaltonetworks.com/legal
servers:
  - url: https://{firewall}/restapi/v10.2
    description: PAN-OS firewall or Panorama REST API endpoint.
    variables:
      firewall:
        description: Hostname or IP address of the PAN-OS firewall or Panorama appliance.
        default: firewall.example.com
security:
  - apiKey: []
tags:
  - name: Commit
    description: Configuration commit operations.
  - name: Device
    description: Device system information and virtual system management.
  - name: Objects
    description: >-
      Address objects, address groups, service objects, service groups, and
      tag management.
  - name: Policies
    description: Security policy rules, NAT rules, and QoS rule management.
paths:
  /Objects/Addresses:
    get:
      operationId: listAddresses
      summary: Palo Alto Networks List address objects
      description: >-
        Returns all address objects configured on the firewall. Supports
        filtering by name and location (vsys, device group, or shared).
        Address objects define IP addresses, IP ranges, IP subnets, or FQDNs
        used in security policy rules.
      tags:
        - Objects
      parameters:
        - $ref: '#/components/parameters/location'
        - $ref: '#/components/parameters/vsys'
        - name: name
          in: query
          description: Filter by address object name.
          schema:
            type: string
      responses:
        '200':
          description: Address objects returned successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  '@status':
                    type: string
                    example: success
                  '@code':
                    type: string
                    example: '19'
                  result:
                    type: object
                    properties:
                      '@total-count':
                        type: string
                      '@count':
                        type: string
                      entry:
                        type: array
                        items:
                          $ref: '#/components/schemas/Address'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      operationId: createAddress
      summary: Palo Alto Networks Create address object
      description: >-
        Creates a new address object on the firewall. The address object can
        be of type ip-netmask, ip-range, ip-wildcard, or fqdn. The object must
        have a unique name within the specified location scope. Changes are
        staged in candidate configuration until committed.
      tags:
        - Objects
      parameters:
        - $ref: '#/components/parameters/location'
        - $ref: '#/components/parameters/vsys'
        - name: name
          in: query
          required: true
          description: Name of the address object to create.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                entry:
                  $ref: '#/components/schemas/Address'
      responses:
        '200':
          description: Address object created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PanOsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: Address object with the specified name already exists.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      operationId: updateAddress
      summary: Palo Alto Networks Update address object
      description: >-
        Updates an existing address object identified by name. The entire
        object definition must be provided in the request body as this
        performs a full replacement of the address object configuration.
      tags:
        - Objects
      parameters:
        - $ref: '#/components/parameters/location'
        - $ref: '#/components/parameters/vsys'
        - name: name
          in: query
          required: true
          description: Name of the address object to update.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                entry:
                  $ref: '#/components/schemas/Address'
      responses:
        '200':
          description: Address object updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PanOsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deleteAddress
      summary: Palo Alto Networks Delete address object
      description: >-
        Deletes an address object identified by name. The object cannot be
        deleted if it is referenced by an active security policy rule or
        address group. Remove all references before deleting.
      tags:
        - Objects
      parameters:
        - $ref: '#/components/parameters/location'
        - $ref: '#/components/parameters/vsys'
        - name: name
          in: query
          required: true
          description: Name of the address object to delete.
          schema:
            type: string
      responses:
        '200':
          description: Address object deleted successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PanOsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Object is referenced by other configuration elements.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /Objects/AddressGroups:
    get:
      operationId: listAddressGroups
      summary: Palo Alto Networks List address groups
      description: >-
        Returns all address groups configured on the firewall. Address groups
        contain address objects or other address groups and can be static
        (explicit member list) or dynamic (tag-based membership criteria).
      tags:
        - Objects
      parameters:
        - $ref: '#/components/parameters/location'
        - $ref: '#/components/parameters/vsys'
        - name: name
          in: query
          description: Filter by address group name.
          schema:
            type: string
      responses:
        '200':
          description: Address groups returned successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  '@status':
                    type: string
                  '@code':
                    type: string
                  result:
                    type: object
                    properties:
                      '@total-count':
                        type: string
                      '@count':
                        type: string
                      entry:
                        type: array
                        items:
                          $ref: '#/components/schemas/AddressGroup'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: createAddressGroup
      summary: Palo Alto Networks Create address group
      description: >-
        Creates a new address group. The group can be static with an explicit
        list of member address objects, or dynamic with a tag-based filter
        expression that automatically includes matching address objects.
      tags:
        - Objects
      parameters:
        - $ref: '#/components/parameters/location'
        - $ref: '#/components/parameters/vsys'
        - name: name
          in: query
          required: true
          description: Name of the address group to create.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                entry:
                  $ref: '#/components/schemas/AddressGroup'
      responses:
        '200':
          description: Address group created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PanOsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: Address group with the specified name already exists.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      operationId: updateAddressGroup
      summary: Palo Alto Networks Update address group
      description: >-
        Updates an existing address group identified by name. The entire group
        definition must be provided as this performs a full replacement.
      tags:
        - Objects
      parameters:
        - $ref: '#/components/parameters/location'
        - $ref: '#/components/parameters/vsys'
        - name: name
          in: query
          required: true
          description: Name of the address group to update.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                entry:
                  $ref: '#/components/schemas/AddressGroup'
      responses:
        '200':
          description: Address group updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PanOsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deleteAddressGroup
      summary: Palo Alto Networks Delete address group
      description: Deletes an address group identified by name.
      tags:
        - Objects
      parameters:
        - $ref: '#/components/parameters/location'
        - $ref: '#/components/parameters/vsys'
        - name: name
          in: query
          required: true
          description: Name of the address group to delete.
          schema:
            type: string
      responses:
        '200':
          description: Address group deleted successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PanOsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
  /Objects/Services:
    get:
      operationId: listServices
      summary: Palo Alto Networks List service objects
      description: >-
        Returns all service objects configured on the firewall. Service objects
        define TCP or UDP protocol and port combinations used in security policy
        rules to identify specific network services.
      tags:
        - Objects
      parameters:
        - $ref: '#/components/parameters/location'
        - $ref: '#/components/parameters/vsys'
        - name: name
          in: query
          description: Filter by service object name.
          schema:
            type: string
      responses:
        '200':
          description: Service objects returned successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  '@status':
                    type: string
                  '@code':
                    type: string
                  result:
                    type: object
                    properties:
                      '@total-count':
                        type: string
                      '@count':
                        type: string
                      entry:
                        type: array
                        items:
                          $ref: '#/components/schemas/Service'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: createService
      summary: Palo Alto Networks Create service object
      description: >-
        Creates a new service object defining a TCP or UDP protocol with
        destination port or port range.
      tags:
        - Objects
      parameters:
        - $ref: '#/components/parameters/location'
        - $ref: '#/components/parameters/vsys'
        - name: name
          in: query
          required: true
          description: Name of the service object to create.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                entry:
                  $ref: '#/components/schemas/Service'
      responses:
        '200':
          description: Service object created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PanOsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
    put:
      operationId: updateService
      summary: Palo Alto Networks Update service object
      description: Updates an existing service object identified by name.
      tags:
        - Objects
      parameters:
        - $ref: '#/components/parameters/location'
        - $ref: '#/components/parameters/vsys'
        - name: name
          in: query
          required: true
          description: Name of the service object to update.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                entry:
                  $ref: '#/components/schemas/Service'
      responses:
        '200':
          description: Service object updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PanOsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deleteService
      summary: Palo Alto Networks Delete service object
      description: Deletes a service object identified by name.
      tags:
        - Objects
      parameters:
        - $ref: '#/components/parameters/location'
        - $ref: '#/components/parameters/vsys'
        - name: name
          in: query
          required: true
          description: Name of the service object to delete.
          schema:
            type: string
      responses:
        '200':
          description: Service object deleted successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PanOsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
  /Objects/ServiceGroups:
    get:
      operationId: listServiceGroups
      summary: Palo Alto Networks List service groups
      description: >-
        Returns all service groups configured on the firewall. Service groups
        aggregate multiple service objects for use in security policy rules.
      tags:
        - Objects
      parameters:
        - $ref: '#/components/parameters/location'
        - $ref: '#/components/parameters/vsys'
        - name: name
          in: query
          description: Filter by service group name.
          schema:
            type: string
      responses:
        '200':
          description: Service groups returned successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  '@status':
                    type: string
                  '@code':
                    type: string
                  result:
                    type: object
                    properties:
                      '@total-count':
                        type: string
                      '@count':
                        type: string
                      entry:
                        type: array
                        items:
                          $ref: '#/components/schemas/ServiceGroup'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: createServiceGroup
      summary: Palo Alto Networks Create service group
      description: Creates a new service group containing one or more service objects.
      tags:
        - Objects
      parameters:
        - $ref: '#/components/parameters/location'
        - $ref: '#/components/parameters/vsys'
        - name: name
          in: query
          required: true
          description: Name of the service group to create.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                entry:
                  $ref: '#/components/schemas/ServiceGroup'
      responses:
        '200':
          description: Service group created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PanOsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
    put:
      operationId: updateServiceGroup
      summary: Palo Alto Networks Update service group
      description: Updates an existing service group identified by name.
      tags:
        - Objects
      parameters:
        - $ref: '#/components/parameters/location'
        - $ref: '#/components/parameters/vsys'
        - name: name
          in: query
          required: true
          description: Name of the service group to update.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                entry:
                  $ref: '#/components/schemas/ServiceGroup'
      responses:
        '200':
          description: Service group updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PanOsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deleteServiceGroup
      summary: Palo Alto Networks Delete service group
      description: Deletes a service group identified by name.
      tags:
        - Objects
      parameters:
        - $ref: '#/components/parameters/location'
        - $ref: '#/components/parameters/vsys'
        - name: name
          in: query
          required: true
          description: Name of the service group to delete.
          schema:
            type: string
      responses:
        '200':
          description: Service group deleted successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PanOsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
  /Objects/Tags:
    get:
      operationId: listTags
      summary: Palo Alto Networks List tags
      description: >-
        Returns all tag objects configured on the firewall. Tags are used
        to categorize address objects and other configuration elements for
        use in dynamic address groups and policy filtering.
      tags:
        - Objects
      parameters:
        - $ref: '#/components/parameters/location'
        - $ref: '#/components/parameters/vsys'
        - name: name
          in: query
          description: Filter by tag name.
          schema:
            type: string
      responses:
        '200':
          description: Tags returned successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  '@status':
                    type: string
                  '@code':
                    type: string
                  result:
                    type: object
                    properties:
                      '@total-count':
                        type: string
                      '@count':
                        type: string
                      entry:
                        type: array
                        items:
                          $ref: '#/components/schemas/Tag'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: createTag
      summary: Palo Alto Networks Create tag
      description: >-
        Creates a new tag object with optional color and comment. Tags are
        applied to address objects, security rules, and other elements to
        enable dynamic grouping and filtering.
      tags:
        - Objects
      parameters:
        - $ref: '#/components/parameters/location'
        - $ref: '#/components/parameters/vsys'
        - name: name
          in: query
          required: true
          description: Name of the tag to create.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                entry:
                  $ref: '#/components/schemas/Tag'
      responses:
        '200':
          description: Tag created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PanOsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
    put:
      operationId: updateTag
      summary: Palo Alto Networks Update tag
      description: Updates an existing tag identified by name.
      tags:
        - Objects
      parameters:
        - $ref: '#/components/parameters/location'
        - $ref: '#/components/parameters/vsys'
        - name: name
          in: query
          required: true
          description: Name of the tag to update.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                entry:
                  $ref: '#/components/schemas/Tag'
      responses:
        '200':
          description: Tag updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PanOsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deleteTag
      summary: Palo Alto Networks Delete tag
      description: Deletes a tag identified by name.
      tags:
        - Objects
      parameters:
        - $ref: '#/components/parameters/location'
        - $ref: '#/components/parameters/vsys'
        - name: name
          in: query
          required: true
          description: Name of the tag to delete.
          schema:
            type: string
      responses:
        '200':
          description: Tag deleted successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PanOsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
  /Policies/SecurityRules:
    get:
      operationId: listSecurityRules
      summary: Palo Alto Networks List security rules
      description: >-
        Returns all security policy rules configured in the specified rulebase.
        Security rules control traffic flow between zones and define actions
        (allow, deny, drop, reset) based on source, destination, application,
        service, and user criteria.
      tags:
        - Policies
      parameters:
        - $ref: '#/components/parameters/location'
        - $ref: '#/components/parameters/vsys'
        - name: name
          in: query
          description: Filter by security rule name.
          schema:
            type: string
      responses:
        '200':
          description: Security rules returned successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  '@status':
                    type: string
                  '@code':
                    type: string
                  result:
                    type: object
                    properties:
                      '@total-count':
                        type: string
                      '@count':
                        type: string
                      entry:
                        type: array
                        items:
                          $ref: '#/components/schemas/SecurityRule'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: createSecurityRule
      summary: Palo Alto Networks Create security rule
      description: >-
        Creates a new security policy rule. The rule is added to the rulebase
        in the specified position. Define source and destination zones,
        addresses, applications, services, and the action to take on matching
        traffic.
      tags:
        - Policies
      parameters:
        - $ref: '#/components/parameters/location'
        - $ref: '#/components/parameters/vsys'
        - name: name
          in: query
          required: true
          description: Name of the security rule to create.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                entry:
                  $ref: '#/components/schemas/SecurityRule'
      responses:
        '200':
          description: Security rule created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PanOsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
    put:
      operationId: updateSecurityRule
      summary: Palo Alto Networks Update security rule
      description: >-
        Updates an existing security rule identified by name. The entire rule
        definition must be provided as this performs a full replacement.
      tags:
        - Policies
      parameters:
        - $ref: '#/components/parameters/location'
        - $ref: '#/components/parameters/vsys'
        - name: name
          in: query
          required: true
          description: Name of the security rule to update.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                entry:
                  $ref: '#/components/schemas/SecurityRule'
      responses:
        '200':
          description: Security rule updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PanOsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deleteSecurityRule
      summary: Palo Alto Networks Delete security rule
      description: Deletes a security policy rule identified by name.
      tags:
        - Policies
      parameters:
        - $ref: '#/components/parameters/location'
        - $ref: '#/components/parameters/vsys'
        - name: name
          in: query
          required: true
          description: Name of the security rule to delete.
          schema:
            type: string
      responses:
        '200':
          description: Security rule deleted successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PanOsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
  /Policies/NATRules:
    get:
      operationId: listNatRules
      summary: Palo Alto Networks List NAT rules
      description: >-
        Returns all NAT policy rules configured on the firewall. NAT rules
        define source NAT (SNAT), destination NAT (DNAT), and bidirectional
        translation policies applied to matching traffic flows.
      tags:
        - Policies
      parameters:
        - $ref: '#/components/parameters/location'
        - $ref: '#/components/parameters/vsys'
        - name: name
          in: query
          description: Filter by NAT rule name.
          schema:
            type: string
      responses:
        '200':
          description: NAT rules returned successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  '@status':
                    type: string
                  '@code':
                    type: string
                  result:
                    type: object
                    properties:
                      '@total-count':
                        type: string
                      '@count':
                        type: string
                      entry:
                        type: array
                        items:
                          $ref: '#/components/schemas/NatRule'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: createNatRule
      summary: Palo Alto Networks Create NAT rule
      description: >-
        Creates a new NAT policy rule. Define source and destination zones,
        addresses, services, and the translation type (static-ip, dynamic-ip,
        dynamic-ip-and-port) and parameters.
      tags:
        - Policies
      parameters:
        - $ref: '#/components/parameters/location'
        - $ref: '#/components/parameters/vsys'
        - name: name
          in: query
          required: true
          description: Name of the NAT rule to create.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                entry:
                  $ref: '#/components/schemas/NatRule'
      responses:
        '200':
          description: NAT rule created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PanOsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
    put:
      operationId: updateNatRule
      summary: Palo Alto Networks Update NAT rule
      description: Updates an existing NAT rule identified by name.
      tags:
