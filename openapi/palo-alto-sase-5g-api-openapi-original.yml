  /monitoring/metrics:
    get:
      operationId: get5GSecurityMetrics
      summary: Palo Alto Networks Get 5G security metrics
      description: >-
        Returns security metrics for 5G network traffic including threat
        detection counts, policy enforcement statistics, subscriber counts,
        and traffic volumes per network slice.
      tags:
        - Monitoring
      parameters:
        - name: slice_id
          in: query
          description: Filter metrics by network slice.
          schema:
            type: string
        - name: start_time
          in: query
          description: Start of the metrics period (ISO 8601).
          schema:
            type: string
            format: date-time
        - name: end_time
          in: query
          description: End of the metrics period (ISO 8601).
          schema:
            type: string
            format: date-time
        - name: interval
          in: query
          description: Metrics aggregation interval.
          schema:
            type: string
            enum:
              - 5m
              - 15m
              - 1h
              - 6h
              - 1d
            default: 1h
      responses:
        '200':
          description: 5G security metrics returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SecurityMetrics5G'
        '400':
          description: Invalid query parameters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid or missing Bearer token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Insufficient permissions.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  securitySchemes:
    oauth2Bearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >-
        OAuth 2.0 Bearer token for SASE platform authentication. Obtain
        using the client_credentials grant with your SASE service account
        client ID and client secret.
  schemas:
    NetworkSlice:
      type: object
      properties:
        slice_id:
          type: string
          description: Unique identifier of the network slice.
        name:
          type: string
          description: Display name of the network slice.
        description:
          type: string
          description: Description of the slice's purpose or use case.
        slice_type:
          type: string
          enum:
            - eMBB
            - URLLC
            - mMTC
          description: >-
            5G slice type based on 3GPP SST values. eMBB for enhanced
            mobile broadband, URLLC for ultra-reliable low-latency, mMTC
            for massive machine-type communications.
        sst:
          type: integer
          description: Slice/Service Type numeric value (1=eMBB, 2=URLLC, 3=mMTC).
        sd:
          type: string
          description: Slice Differentiator hex string for distinguishing slices of the same type.
        status:
          type: string
          enum:
            - active
            - inactive
            - provisioning
            - error
          description: Current slice status.
        security_policy_id:
          type: string
          description: ID of the security policy applied to this slice.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    NetworkSliceRequest:
      type: object
      required:
        - name
        - slice_type
      properties:
        name:
          type: string
          description: Display name for the network slice.
        description:
          type: string
          description: Optional description.
        slice_type:
          type: string
          enum:
            - eMBB
            - URLLC
            - mMTC
          description: 5G slice type.
        sd:
          type: string
          description: Slice Differentiator hex string.
        security_policy_id:
          type: string
          description: Security policy ID to apply to this slice.
    SecurityPolicy5G:
      type: object
      properties:
        policy_id:
          type: string
          description: Unique identifier of the security policy.
        name:
          type: string
          description: Display name of the security policy.
        description:
          type: string
          description: Description of the policy's purpose.
        threat_prevention:
          type: boolean
          description: Whether threat prevention inspection is enabled.
        url_filtering:
          type: boolean
          description: Whether URL filtering is enabled for 5G data traffic.
        app_identification:
          type: boolean
          description: Whether application identification is enabled.
        decryption:
          type: boolean
          description: Whether SSL/TLS decryption is enabled.
        log_forwarding:
          type: boolean
          description: Whether log forwarding is enabled for this policy.
        enabled:
          type: boolean
          description: Whether this policy is active.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    SecurityPolicy5GRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: Display name for the security policy.
        description:
          type: string
          description: Optional description.
        threat_prevention:
          type: boolean
          default: true
        url_filtering:
          type: boolean
          default: false
        app_identification:
          type: boolean
          default: true
        decryption:
          type: boolean
          default: false
        log_forwarding:
          type: boolean
          default: true
        enabled:
          type: boolean
          default: true
    Tenant5G:
      type: object
      properties:
        tenant_id:
          type: string
          description: Unique identifier of the 5G tenant configuration.
        name:
          type: string
          description: Tenant display name.
        description:
          type: string
          description: Description of the tenant.
        assigned_slices:
          type: array
          items:
            type: string
          description: Network slice IDs assigned to this tenant.
        default_policy_id:
          type: string
          description: Default security policy ID for this tenant's traffic.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    Tenant5GRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: Display name for the tenant configuration.
        description:
          type: string
          description: Optional description.
        assigned_slices:
          type: array
          items:
            type: string
          description: Network slice IDs to assign to this tenant.
        default_policy_id:
          type: string
          description: Default security policy ID for this tenant.
    SecurityMetrics5G:
      type: object
      properties:
        period:
          type: object
          properties:
            start:
              type: string
              format: date-time
            end:
              type: string
              format: date-time
        total_sessions:
          type: integer
          description: Total 5G sessions inspected during the period.
        threats_detected:
          type: integer
          description: Number of threats detected in 5G traffic.
        threats_blocked:
          type: integer
          description: Number of threats blocked.
        bytes_inspected:
          type: integer
          description: Total bytes of 5G traffic inspected.
        active_subscribers:
          type: integer
          description: Number of active 5G subscribers.
        per_slice_metrics:
          type: array
          description: Metrics broken down by network slice.
          items:
            type: object
            properties:
              slice_id:
                type: string
              slice_name:
                type: string
              sessions:
                type: integer
              threats_detected:
                type: integer
              bytes_inspected:
                type: integer
        time_series:
          type: array
          description: Time-series data points for the metrics period.
          items:
            type: object
            properties:
              timestamp:
                type: string
                format: date-time
              sessions:
                type: integer
              threats:
                type: integer
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Error code identifying the error type.
        message:
          type: string
          description: Human-readable description of the error.
        request_id:
          type: string
          description: Request identifier for support correlation.
