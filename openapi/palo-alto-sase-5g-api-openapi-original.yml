components:
  securitySchemes:
    oauth2Bearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >-
        OAuth 2.0 Bearer token for SASE platform authentication. Obtain
        using the client_credentials grant with your SASE service account
        client ID and client secret.
  schemas:
    NetworkSlice:
      type: object
      properties:
        slice_id:
          type: string
          description: Unique identifier of the network slice.
          example: '411916'
        name:
          type: string
          description: Display name of the network slice.
          example: Primary Agent 05
        description:
          type: string
          description: Description of the slice's purpose or use case.
          example: Rule policy policy incident violation policy suspicious alert configured.
        slice_type:
          type: string
          enum:
          - eMBB
          - URLLC
          - mMTC
          description: >-
            5G slice type based on 3GPP SST values. eMBB for enhanced
            mobile broadband, URLLC for ultra-reliable low-latency, mMTC
            for massive machine-type communications.
          example: URLLC
        sst:
          type: integer
          description: Slice/Service Type numeric value (1=eMBB, 2=URLLC, 3=mMTC).
          example: 528
        sd:
          type: string
          description: Slice Differentiator hex string for distinguishing slices of the same type.
          example: example-sd
        status:
          type: string
          enum:
          - active
          - inactive
          - provisioning
          - error
          description: Current slice status.
          example: inactive
        security_policy_id:
          type: string
          description: ID of the security policy applied to this slice.
          example: '381926'
        created_at:
          type: string
          format: date-time
          example: '2025-07-21T07:27:57Z'
        updated_at:
          type: string
          format: date-time
          example: '2024-11-10T00:28:23Z'
    NetworkSliceRequest:
      type: object
      required:
      - name
      - slice_type
      properties:
        name:
          type: string
          description: Display name for the network slice.
          example: Primary Agent 44
        description:
          type: string
          description: Optional description.
          example: Threat monitoring configured investigation detected traffic violation traffic applied detected.
        slice_type:
          type: string
          enum:
          - eMBB
          - URLLC
          - mMTC
          description: 5G slice type.
          example: mMTC
        sd:
          type: string
          description: Slice Differentiator hex string.
          example: example-sd
        security_policy_id:
          type: string
          description: Security policy ID to apply to this slice.
          example: '716910'
    SecurityPolicy5G:
      type: object
      properties:
        policy_id:
          type: string
          description: Unique identifier of the security policy.
          example: '663558'
        name:
          type: string
          description: Display name of the security policy.
          example: Staging Policy 94
        description:
          type: string
          description: Description of the policy's purpose.
          example: Alert rule network investigation endpoint traffic rule rule policy blocked.
        threat_prevention:
          type: boolean
          description: Whether threat prevention inspection is enabled.
          example: false
        url_filtering:
          type: boolean
          description: Whether URL filtering is enabled for 5G data traffic.
          example: true
        app_identification:
          type: boolean
          description: Whether application identification is enabled.
          example: false
        decryption:
          type: boolean
          description: Whether SSL/TLS decryption is enabled.
          example: false
        log_forwarding:
          type: boolean
          description: Whether log forwarding is enabled for this policy.
          example: false
        enabled:
          type: boolean
          description: Whether this policy is active.
          example: true
        created_at:
          type: string
          format: date-time
          example: '2026-04-11T03:07:30Z'
        updated_at:
          type: string
          format: date-time
          example: '2025-02-26T20:56:47Z'
    SecurityPolicy5GRequest:
      type: object
      required:
      - name
      properties:
        name:
          type: string
          description: Display name for the security policy.
          example: Staging Firewall 55
        description:
          type: string
          description: Optional description.
          example: Suspicious activity violation suspicious alert investigation policy applied incident investigation.
        threat_prevention:
          type: boolean
          default: true
          example: true
        url_filtering:
          type: boolean
          default: false
          example: false
        app_identification:
          type: boolean
          default: true
          example: true
        decryption:
          type: boolean
          default: false
          example: false
        log_forwarding:
          type: boolean
          default: true
          example: true
        enabled:
          type: boolean
          default: true
          example: true
    Tenant5G:
      type: object
      properties:
        tenant_id:
          type: string
          description: Unique identifier of the 5G tenant configuration.
          example: tenant-79ef053e
        name:
          type: string
          description: Tenant display name.
          example: Primary Policy 73
        description:
          type: string
          description: Description of the tenant.
          example: Alert on policy traffic suspicious suspicious Security alert network detected threat.
        assigned_slices:
          type: array
          items:
            type: string
          description: Network slice IDs assigned to this tenant.
          example: *id001
        default_policy_id:
          type: string
          description: Default security policy ID for this tenant's traffic.
          example: '861821'
        created_at:
          type: string
          format: date-time
          example: '2025-12-16T10:55:16Z'
        updated_at:
          type: string
          format: date-time
          example: '2024-10-16T22:09:31Z'
    Tenant5GRequest:
      type: object
      required:
      - name
      properties:
        name:
          type: string
          description: Display name for the tenant configuration.
          example: Corporate Gateway 18
        description:
          type: string
          description: Optional description.
          example: Malware configured network rule monitoring configured traffic violation.
        assigned_slices:
          type: array
          items:
            type: string
          description: Network slice IDs to assign to this tenant.
          example: *id002
        default_policy_id:
          type: string
          description: Default security policy ID for this tenant.
          example: '449021'
    SecurityMetrics5G:
      type: object
      properties:
        period:
          type: object
          properties:
            start:
              type: string
              format: date-time
              example: '2025-07-23T02:21:44Z'
            end:
              type: string
              format: date-time
              example: '2024-05-24T08:55:26Z'
          example: *id003
        total_sessions:
          type: integer
          description: Total 5G sessions inspected during the period.
          example: 869
        threats_detected:
          type: integer
          description: Number of threats detected in 5G traffic.
          example: 523
        threats_blocked:
          type: integer
          description: Number of threats blocked.
          example: 380
        bytes_inspected:
          type: integer
          description: Total bytes of 5G traffic inspected.
          example: 198
        active_subscribers:
          type: integer
          description: Number of active 5G subscribers.
          example: 772
        per_slice_metrics:
          type: array
          description: Metrics broken down by network slice.
          items:
            type: object
            properties:
              slice_id:
                type: string
                example: '877779'
              slice_name:
                type: string
                example: Primary Sensor 69
              sessions:
                type: integer
                example: 257
              threats_detected:
                type: integer
                example: 380
              bytes_inspected:
                type: integer
                example: 50
          example: *id004
        time_series:
          type: array
          description: Time-series data points for the metrics period.
          items:
            type: object
            properties:
              timestamp:
                type: string
                format: date-time
                example: '2025-09-21T07:06:03Z'
              sessions:
                type: integer
                example: 842
              threats:
                type: integer
                example: 159
          example: *id005
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Error code identifying the error type.
          example: example-error
        message:
          type: string
          description: Human-readable description of the error.
          example: Applied blocked incident traffic network applied threat traffic incident alert traffic network.
        request_id:
          type: string
          description: Request identifier for support correlation.
          example: b8969609-ec40-4367-a0fc-c65a6696edee
