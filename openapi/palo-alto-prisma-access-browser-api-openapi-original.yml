components:
  securitySchemes:
    oauth2Bearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >-
        OAuth 2.0 Bearer token for SASE platform authentication. Requires
        Super User or View-Only Admin role. Obtain using the
        client_credentials grant with your SASE service account credentials.
  schemas:
    BrowserPolicy:
      type: object
      properties:
        policy_id:
          type: string
          description: Unique identifier of the browser policy.
          example: '762727'
        name:
          type: string
          description: Display name of the policy.
          example: Staging Gateway 02
        description:
          type: string
          description: Description of the policy's purpose.
          example: Blocked suspicious policy network configured on blocked.
        enabled:
          type: boolean
          description: Whether the policy is active.
          example: false
        web_filtering:
          type: object
          description: Web filtering configuration.
          properties:
            enabled:
              type: boolean
              example: true
            blocked_categories:
              type: array
              items:
                type: string
              example:
              - example-blocked_categories_item
          example: *id001
        dlp_enabled:
          type: boolean
          description: Whether DLP controls are enabled.
          example: true
        extension_policy:
          type: string
          enum:
          - allow_all
          - allow_list
          - block_all
          description: Extension installation policy.
          example: block_all
        download_control:
          type: string
          enum:
          - allow
          - scan
          - block
          description: File download control setting.
          example: scan
        created_at:
          type: string
          format: date-time
          example: '2025-06-14T10:46:06Z'
        updated_at:
          type: string
          format: date-time
          example: '2025-10-12T19:10:58Z'
    BrowserPolicyRequest:
      type: object
      required:
      - name
      properties:
        name:
          type: string
          description: Display name for the browser policy.
          example: Primary Sensor 04
        description:
          type: string
          description: Optional description.
          example: Incident rule applied configured on network incident detected activity.
        enabled:
          type: boolean
          default: true
          example: true
        web_filtering:
          type: object
          properties:
            enabled:
              type: boolean
              example: true
            blocked_categories:
              type: array
              items:
                type: string
              example:
              - example-blocked_categories_item
          example: *id002
        dlp_enabled:
          type: boolean
          default: false
          example: false
        extension_policy:
          type: string
          enum:
          - allow_all
          - allow_list
          - block_all
          default: allow_all
          example: allow_all
        download_control:
          type: string
          enum:
          - allow
          - scan
          - block
          default: allow
          example: allow
    BrowserUser:
      type: object
      properties:
        user_id:
          type: string
          description: Unique identifier of the browser user.
          example: '519106'
        email:
          type: string
          format: email
          description: User email address.
          example: jane.doe@example.com
        display_name:
          type: string
          description: User display name.
          example: Carlos Doe
        policy_id:
          type: string
          description: ID of the browser policy assigned to this user.
          example: '550297'
        active_sessions:
          type: integer
          description: Current number of active browser sessions.
          example: 493
        last_active_at:
          type: string
          format: date-time
          example: '2024-12-26T17:43:03Z'
    BrowserSession:
      type: object
      properties:
        session_id:
          type: string
          description: Unique identifier of the browser session.
          example: '926940'
        user_id:
          type: string
          description: User ID of the session owner.
          example: '494860'
        device_id:
          type: string
          description: Device ID used in this session.
          example: '107670'
        ip_address:
          type: string
          description: Client IP address.
          example: 10.108.68.13
        policy_id:
          type: string
          description: Policy applied during this session.
          example: '176224'
        browser_version:
          type: string
          description: Prisma Access Browser version.
          example: 4.0.8
        status:
          type: string
          enum:
          - active
          - terminated
          description: Session status.
          example: active
        started_at:
          type: string
          format: date-time
          example: '2024-10-10T11:55:14Z'
        ended_at:
          type: string
          format: date-time
          example: '2026-07-09T16:25:54Z'
