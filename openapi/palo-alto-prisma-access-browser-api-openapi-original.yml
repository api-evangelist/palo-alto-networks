  /v1/deployments:
    get:
      operationId: listDeployments
      summary: Palo Alto Networks List Browser Deployments
      description: >-
        Returns the list of browser deployment configurations. Deployments
        define how the Prisma Access Browser is distributed and configured
        for groups of users, including installation packages and update
        channel settings.
      tags:
      - Deployments
      responses:
        '200':
          description: Deployments returned.
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                  items:
                    type: array
                    items:
