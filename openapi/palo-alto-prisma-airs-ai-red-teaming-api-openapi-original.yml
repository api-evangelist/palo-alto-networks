components:
  securitySchemes:
    oauth2Bearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >-
        OAuth 2.0 Bearer token for SASE platform authentication. Obtain
        using the client_credentials grant with your SASE service account
        client ID and client secret.
  schemas:
    ScanTarget:
      type: object
      properties:
        target_id:
          type: string
          description: Unique identifier of the scan target.
          example: '296460'
        name:
          type: string
          description: Display name of the scan target.
          example: Branch Policy 32
        description:
          type: string
          description: Description of the target AI application.
          example: Detected violation Security incident threat violation malware firewall policy incident rule rule.
        type:
          type: string
          enum:
          - openai_chat
          - anthropic_messages
          - custom_http
          - huggingface
          description: AI interface type of the target endpoint.
          example: openai_chat
        endpoint_url:
          type: string
          format: uri
          description: URL of the AI application endpoint.
          example: https://vpn.example.com/8fea53
        model:
          type: string
          description: AI model name or identifier used by the endpoint.
          example: PA-5250
        created_at:
          type: string
          format: date-time
          example: '2025-11-15T21:07:35Z'
        updated_at:
          type: string
          format: date-time
          example: '2024-07-13T20:05:13Z'
    ScanTargetRequest:
      type: object
      required:
      - name
      - type
      - endpoint_url
      properties:
        name:
          type: string
          description: Display name for the scan target.
          maxLength: 256
          example: Primary Agent 91
        description:
          type: string
          description: Optional description of the target application.
          example: On violation blocked incident traffic monitoring.
        type:
          type: string
          enum:
          - openai_chat
          - anthropic_messages
          - custom_http
          - huggingface
          description: AI interface type of the target endpoint.
          example: huggingface
        endpoint_url:
          type: string
          format: uri
          description: URL of the AI application endpoint to scan.
          example: https://api.acme-systems.org/696e96
        model:
          type: string
          description: AI model name to include in requests (e.g., gpt-4o, claude-3-5-sonnet-20241022).
          example: PA-3260
        auth_config:
          type: object
          description: Authentication configuration for the target endpoint.
          properties:
            type:
              type: string
              enum:
              - bearer_token
              - api_key_header
              - basic
              - none
              description: Authentication method.
              example: basic
            header_name:
              type: string
              description: Header name for API key authentication.
              example: Corporate Gateway 37
            credential:
              type: string
              description: Authentication credential value (API key or token).
              writeOnly: true
              example: example-credential
          example: *id004
        system_prompt:
          type: string
          description: >-
            System prompt to include in requests to the target. Used to
            scope red teaming attacks to the intended application context.
          maxLength: 8192
          example: example-system_prompt
    Scan:
      type: object
      properties:
        scan_id:
          type: string
          description: Unique identifier of the scan.
          example: '588456'
        target_id:
          type: string
          description: ID of the scan target being assessed.
          example: '410241'
        target_name:
          type: string
          description: Display name of the scan target.
          example: Production Agent 95
        status:
          type: string
          enum:
          - pending
          - running
          - completed
          - failed
          - cancelled
          description: Current status of the scan.
          example: running
        attack_categories:
          type: array
          items:
            type: string
          description: Attack categories included in this scan.
          example: *id001
        progress:
          type: number
          format: float
          description: Scan completion progress from 0.0 to 1.0.
          minimum: 0.0
          maximum: 1.0
          example: 0.36
        total_attacks:
          type: integer
          description: Total number of attack probes to be executed.
          example: 275
        completed_attacks:
          type: integer
          description: Number of attack probes completed so far.
          example: 880
        vulnerabilities_found:
          type: integer
          description: Number of vulnerabilities discovered so far.
          example: 746
        error_message:
          type: string
          description: Error description if the scan failed.
          example: example-error_message
        started_at:
          type: string
          format: date-time
          description: Timestamp when the scan started.
          example: '2025-08-08T22:13:06Z'
        completed_at:
          type: string
          format: date-time
          description: Timestamp when the scan completed.
          example: '2024-11-03T18:50:01Z'
    ScanRequest:
      type: object
      required:
      - target_id
      - attack_categories
      properties:
        target_id:
          type: string
          description: ID of the scan target to assess.
          example: '645262'
        attack_categories:
          type: array
          items:
            type: string
          minItems: 1
          description: >-
            Attack category identifiers to include in the scan. Use
            GET /v1/attack-categories to retrieve available category IDs.
          example: *id005
        custom_prompts:
          type: array
          items:
            type: string
          description: >-
            Optional custom adversarial prompts to include alongside the
            built-in attack library. Useful for testing application-specific
            threat scenarios.
          maxItems: 100
          example: *id006
        max_attacks_per_category:
          type: integer
          description: >-
            Maximum number of attack probes per category. Limits scan
            duration for large attack libraries. If omitted, all available
            attacks for each category are executed.
          minimum: 1
          maximum: 1000
          example: 740
    ScanReport:
      type: object
      properties:
        scan_id:
          type: string
          description: Unique identifier of the scan.
          example: '428692'
        target_id:
          type: string
          description: ID of the assessed target.
          example: '819001'
        target_name:
          type: string
          description: Display name of the assessed target.
          example: Branch Agent 03
        overall_risk_score:
          type: number
          format: float
          description: Overall vulnerability risk score from 0.0 (no risk) to 10.0 (critical).
          minimum: 0.0
          maximum: 10.0
          example: 2.13
        total_attacks_executed:
          type: integer
          description: Total number of attack probes executed.
          example: 817
        vulnerabilities_found:
          type: integer
          description: Total number of vulnerabilities discovered.
          example: 907
        category_summaries:
          type: array
          description: Vulnerability summary per attack category.
          items:
            type: object
            properties:
              category_id:
                type: string
                example: '298745'
              category_name:
                type: string
                example: Corporate Gateway 46
              attacks_executed:
                type: integer
                example: 157
              vulnerabilities_found:
                type: integer
                example: 72
              risk_score:
                type: number
                format: float
                example: 11.02
          example: *id007
        findings:
          type: array
          description: Individual vulnerability findings.
          items:
            $ref: '#/components/schemas/VulnerabilityFinding'
          example: *id008
        generated_at:
          type: string
          format: date-time
          description: Timestamp when the report was generated.
          example: '2026-12-07T01:42:19Z'
    VulnerabilityFinding:
      type: object
      properties:
        finding_id:
          type: string
          description: Unique identifier of the finding.
          example: '299305'
        category_id:
          type: string
          description: Attack category identifier.
          example: '468963'
        category_name:
          type: string
          description: Human-readable attack category name.
          example: Staging Sensor 12
        severity:
          type: string
          enum:
          - informational
          - low
          - medium
          - high
          - critical
          description: Severity level of the vulnerability.
          example: high
        title:
          type: string
          description: Brief title describing the vulnerability.
          example: Branch Agent 11
        description:
          type: string
          description: Detailed description of the vulnerability and its impact.
          example: Applied applied configured incident rule incident threat.
        attack_prompt:
          type: string
          description: The adversarial prompt that revealed the vulnerability.
          example: example-attack_prompt
        model_response:
          type: string
          description: >-
            The AI model's response to the attack prompt, demonstrating
            the vulnerability. May be truncated.
          example: PA-3260
        remediation:
          type: string
          description: Recommended steps to mitigate the vulnerability.
          example: example-remediation
    AttackCategory:
      type: object
      properties:
        category_id:
          type: string
          description: Unique identifier for the attack category.
          example: '244722'
        name:
          type: string
          description: Human-readable category name.
          example: Production Sensor 88
        description:
          type: string
          description: Description of the vulnerability class this category tests.
          example: Endpoint applied on monitoring on detected firewall malware detected.
        attack_count:
          type: integer
          description: Number of built-in attack probes in this category.
          example: 293
        severity_range:
          type: object
          description: Severity range of vulnerabilities this category can discover.
          properties:
            min:
              type: string
              enum:
              - informational
              - low
              - medium
              - high
              - critical
              example: high
            max:
              type: string
              enum:
              - informational
              - low
              - medium
              - high
              - critical
              example: medium
          example: *id002
        examples:
          type: array
          items:
            type: string
          description: Example attack type names within this category.
          example: *id003
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Error code identifying the error type.
          example: example-error
        message:
          type: string
          description: Human-readable description of the error.
          example: Policy investigation blocked activity on activity suspicious configured configured suspicious.
        request_id:
          type: string
          description: Request identifier for support correlation.
          example: f62400eb-5426-47bb-acc1-166eb163d06c
