openapi: 3.1.0
info:
  title: Prisma Cloud Compute API
  description: >-
    REST API for Prisma Cloud Compute (CWPP) providing programmatic access to
    container and workload security across hosts, images, containers, and
    serverless functions. The API enables vulnerability management, compliance
    monitoring, runtime defense, and Defender deployment. Authentication uses
    either a bearer token obtained from the /api/v1/authenticate endpoint or
    HTTP Basic authentication with Prisma Cloud Compute credentials. The console
    address varies per deployment and must be substituted in the server URL.
  version: '32.07'
  contact:
    name: Palo Alto Networks Developer Support
    url: https://pan.dev/
  license:
    name: Proprietary
    url: https://www.paloaltonetworks.com/legal
servers:
  - url: https://{console}/api/v1
    description: Prisma Cloud Compute Console API.
    variables:
      console:
        default: console.example.com
        description: >-
          Address of the Prisma Cloud Compute Console. For SaaS deployments,
          use the address provided in Prisma Cloud under Compute > Manage >
          System > Utilities.
security:
  - bearerAuth: []
  - basicAuth: []
tags:
  - name: Authenticate
    description: Token-based authentication for API access.
  - name: Images
    description: Container image vulnerability and compliance data.
  - name: Containers
    description: Running container inventory and security posture.
  - name: Hosts
    description: Host machine security monitoring and vulnerability data.
  - name: Registry
    description: Registry image scanning and results.
  - name: Compliance
    description: Compliance check results across all asset types.
  - name: Defenders
    description: Defender agent deployment and management.
paths:
  /authenticate:
    post:
      operationId: authenticate
      summary: Authenticate and obtain token
      description: >-
        Authenticates with Prisma Cloud Compute credentials and returns a JWT
        bearer token for subsequent API calls. The token is valid for 30
        minutes. For integrations using project-level access, include the
        project name in the request body.
      tags:
        - Authenticate
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - password
              properties:
                username:
                  type: string
                  description: Prisma Cloud Compute username or access key.
                password:
                  type: string
                  description: Prisma Cloud Compute password or secret key.
                project:
                  type: string
                  description: >-
                    Project name for project-scoped access. Omit for
                    Central Console access.
      responses:
        '200':
          description: Authentication successful.
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    description: >-
                      JWT bearer token. Include in subsequent requests as
                      Authorization: Bearer <token>.
        '401':
          description: Invalid credentials or unauthorized access.
  /images:
    get:
      operationId: getImages
      summary: List image scan results
      description: >-
        Returns vulnerability and compliance scan results for all container
        images known to Prisma Cloud Compute. Results include images from
        deployed containers on hosts with Defenders and from registry scans.
        Supports filtering by name, cluster, and compliance ID. Results are
        sorted by most recent scan time by default.
      tags:
        - Images
      parameters:
        - name: offset
          in: query
          description: Number of records to skip for pagination.
          schema:
            type: integer
            default: 0
        - name: limit
          in: query
          description: Maximum number of records to return.
          schema:
            type: integer
            default: 50
        - name: search
          in: query
          description: >-
            Search term to filter images by repository name or tag.
          schema:
            type: string
        - name: sort
          in: query
          description: Field to sort results by.
          schema:
            type: string
            enum:
              - vulnerabilities
              - compliance
              - scanTime
        - name: reverse
          in: query
          description: Sort in reverse order.
          schema:
            type: boolean
            default: false
        - name: collections
          in: query
          description: Filter by collection name.
          schema:
            type: string
        - name: clusters
          in: query
          description: Filter by cluster name.
          schema:
            type: string
        - name: compact
          in: query
          description: Return compact results without full vulnerability details.
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Image scan results returned.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Image'
  /containers:
    get:
      operationId: getContainers
      summary: List running containers
      description: >-
        Returns information about all running containers monitored by Prisma
        Cloud Compute Defenders. Includes container metadata, associated image
        scan results, network information, and runtime profile status.
      tags:
        - Containers
      parameters:
        - name: offset
          in: query
          description: Number of records to skip for pagination.
          schema:
            type: integer
            default: 0
        - name: limit
          in: query
          description: Maximum number of records to return.
          schema:
            type: integer
            default: 50
        - name: search
          in: query
          description: Search term to filter containers by name or image.
          schema:
            type: string
        - name: collections
          in: query
          description: Filter by collection name.
          schema:
            type: string
        - name: clusters
          in: query
          description: Filter by cluster name.
          schema:
            type: string
        - name: hostname
          in: query
          description: Filter by host where the container is running.
          schema:
            type: string
      responses:
        '200':
          description: Container details returned.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Container'
  /hosts:
    get:
      operationId: getHosts
      summary: List host scan results
      description: >-
        Returns vulnerability and compliance scan results for all hosts
        protected by Prisma Cloud Compute Defenders. Includes OS-level
        vulnerabilities, installed packages, and compliance check results.
      tags:
        - Hosts
      parameters:
        - name: offset
          in: query
          description: Number of records to skip for pagination.
          schema:
            type: integer
            default: 0
        - name: limit
          in: query
          description: Maximum number of records to return.
          schema:
            type: integer
            default: 50
        - name: search
          in: query
          description: Search term to filter hosts by hostname.
          schema:
            type: string
        - name: sort
          in: query
          description: Field to sort results by.
          schema:
            type: string
            enum:
              - vulnerabilities
              - compliance
              - scanTime
        - name: reverse
          in: query
          description: Sort in reverse order.
          schema:
            type: boolean
            default: false
        - name: collections
          in: query
          description: Filter by collection name.
          schema:
            type: string
        - name: clusters
          in: query
          description: Filter by cluster name.
          schema:
            type: string
      responses:
        '200':
          description: Host scan results returned.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Host'
  /registry:
    get:
      operationId: getRegistryImages
      summary: List registry scan results
      description: >-
        Returns vulnerability and compliance scan results for images discovered
        in configured container registries. Registry scanning runs on a
        configured schedule or can be triggered manually.
      tags:
        - Registry
      parameters:
        - name: offset
          in: query
          description: Number of records to skip for pagination.
          schema:
            type: integer
            default: 0
        - name: limit
          in: query
          description: Maximum number of records to return.
          schema:
            type: integer
            default: 50
        - name: search
          in: query
          description: Search term to filter by repository name or tag.
          schema:
            type: string
        - name: compact
          in: query
          description: Return compact results without full vulnerability details.
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Registry scan results returned.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Image'
  /registry/scan:
    post:
      operationId: triggerRegistryScan
      summary: Trigger registry scan
      description: >-
        Initiates an on-demand scan of all configured container registries.
        The scan runs asynchronously in the background. Use the GET /registry
        endpoint to retrieve results once scanning is complete. Only one
        registry scan can run at a time.
      tags:
        - Registry
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                tag:
                  type: string
                  description: >-
                    Specific image tag to scan. If omitted, all configured
                    registries and repositories are scanned.
                repo:
                  type: string
                  description: >-
                    Specific repository to scan within the configured
                    registries.
      responses:
        '200':
          description: Registry scan initiated.
        '429':
          description: A registry scan is already in progress.
  /compliance:
    get:
      operationId: getComplianceResults
      summary: List compliance results
      description: >-
        Returns compliance check results across images, containers, and hosts.
        Results indicate pass or fail status for each compliance check defined
        in the active compliance policy. Supports filtering by compliance ID,
        resource type, and collection.
      tags:
        - Compliance
      parameters:
        - name: offset
          in: query
          description: Number of records to skip for pagination.
          schema:
            type: integer
            default: 0
        - name: limit
          in: query
          description: Maximum number of records to return.
          schema:
            type: integer
            default: 50
        - name: search
          in: query
          description: Search term to filter compliance results.
          schema:
            type: string
        - name: type
          in: query
          description: Filter by resource type.
          schema:
            type: string
            enum:
              - image
              - container
              - host
              - serverless
        - name: collections
          in: query
          description: Filter by collection name.
          schema:
            type: string
      responses:
        '200':
          description: Compliance results returned.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ComplianceResult'
  /defenders:
    get:
      operationId: getDefenders
      summary: List Defenders
      description: >-
        Returns information about all deployed Defenders including their
        connection status, version, type, and the host they are running on.
        Defenders are the runtime agents that enforce security policies and
        report vulnerability and compliance data to the Console.
      tags:
        - Defenders
      parameters:
        - name: offset
          in: query
          description: Number of records to skip for pagination.
          schema:
            type: integer
            default: 0
        - name: limit
          in: query
          description: Maximum number of records to return.
          schema:
            type: integer
            default: 50
        - name: search
          in: query
          description: Search term to filter Defenders by hostname.
          schema:
            type: string
        - name: connected
          in: query
          description: Filter by connection status.
          schema:
            type: boolean
        - name: type
          in: query
          description: Filter by Defender type.
          schema:
            type: string
            enum:
              - docker
              - dockerWindows
              - cri
              - fargate
              - appEmbedded
              - serverless
        - name: cluster
          in: query
          description: Filter by cluster name.
          schema:
            type: string
      responses:
        '200':
          description: Defender list returned.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Defender'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >-
        JWT token obtained from the /api/v1/authenticate endpoint. Valid for
        30 minutes.
    basicAuth:
      type: http
      scheme: basic
      description: >-
        HTTP Basic authentication using Prisma Cloud Compute credentials.
        Encode username:password in Base64.
  schemas:
    Image:
      type: object
      properties:
        _id:
          type: string
          description: Unique image identifier composed of registry, repository, and tag.
        hostname:
          type: string
          description: Hostname of the machine where the image was scanned.
        scanTime:
          type: string
          format: date-time
          description: Timestamp of the most recent scan.
        repoTag:
          type: object
          description: Repository and tag information for the image.
          properties:
            registry:
              type: string
              description: Container registry URL.
            repo:
              type: string
              description: Repository name.
            tag:
              type: string
              description: Image tag.
        repoDigests:
          type: array
          description: Content-addressable image digests.
          items:
            type: string
        osDistro:
          type: string
          description: Operating system distribution of the image.
        osDistroVersion:
          type: string
          description: Operating system distribution version.
        distro:
          type: string
          description: Linux distribution name.
        packages:
          type: array
          description: Installed OS packages in the image.
          items:
            type: object
            properties:
              name:
                type: string
              version:
                type: string
              license:
                type: string
        vulnerabilities:
          type: array
          description: Vulnerabilities discovered in the image.
          items:
            $ref: '#/components/schemas/Vulnerability'
        vulnerabilitiesCount:
          type: integer
          description: Total number of vulnerabilities found.
        vulnerabilityDistribution:
          type: object
          description: Vulnerability count by severity level.
          properties:
            critical:
              type: integer
            high:
              type: integer
            medium:
              type: integer
            low:
              type: integer
        complianceIssues:
          type: array
          description: Compliance check failures for the image.
          items:
            $ref: '#/components/schemas/ComplianceIssue'
        complianceIssuesCount:
          type: integer
          description: Total number of compliance issues found.
        riskFactors:
          type: object
          description: >-
            Risk factors associated with the image such as attack complexity,
            remote execution, and exploit availability.
          additionalProperties:
            type: object
        clusters:
          type: array
          description: Kubernetes clusters where this image is deployed.
          items:
            type: string
        labels:
          type: array
          description: Image labels.
          items:
            type: string
        installedProducts:
          type: object
          description: Detected application frameworks and runtimes.
          properties:
            docker:
              type: string
            osDistro:
              type: string
            hasPackageManager:
              type: boolean
    Vulnerability:
      type: object
      properties:
        id:
          type: string
          description: CVE identifier (e.g., CVE-2024-1234).
        status:
          type: string
          description: Fix availability status.
          enum:
            - fixed in
            - needed
            - will not fix
            - deferred
        cvss:
          type: number
          format: float
          description: CVSS v3 base score.
        severity:
          type: string
          description: Severity level derived from CVSS score.
          enum:
            - critical
            - high
            - medium
            - low
        packageName:
          type: string
          description: Name of the affected package.
        packageVersion:
          type: string
          description: Installed version of the affected package.
        fixedVersion:
          type: string
          description: Version that contains the fix, if available.
        link:
          type: string
          description: URL to the CVE advisory or details page.
        description:
          type: string
          description: Brief description of the vulnerability.
        riskFactors:
          type: object
          description: Risk factors such as exploit availability or attack vector.
          additionalProperties:
            type: object
        publishedDate:
          type: string
          format: date-time
          description: Date the vulnerability was publicly disclosed.
        discoveredDate:
          type: string
          format: date-time
          description: Date Prisma Cloud first detected this vulnerability.
        vecStr:
          type: string
          description: CVSS vector string.
    Container:
      type: object
      properties:
        _id:
          type: string
          description: Unique container identifier.
        name:
          type: string
          description: Container name.
        hostname:
          type: string
          description: Host where the container is running.
        imageId:
          type: string
          description: ID of the container image.
        imageName:
          type: string
          description: Full image name including registry, repository, and tag.
        state:
          type: string
          description: Current container state.
          enum:
            - running
            - created
            - exited
            - paused
        created:
          type: string
          format: date-time
          description: Container creation timestamp.
        network:
          type: object
          description: Container network configuration.
          properties:
            ports:
              type: array
              items:
                type: object
                properties:
                  containerPort:
                    type: integer
                  hostPort:
                    type: integer
                  protocol:
                    type: string
            networkMode:
              type: string
        profileId:
          type: string
          description: Runtime profile ID associated with this container.
        cluster:
          type: string
          description: Kubernetes cluster name.
        namespace:
          type: string
          description: Kubernetes namespace.
        labels:
          type: array
          description: Container labels.
          items:
            type: string
        collections:
          type: array
          description: Collections this container belongs to.
          items:
            type: string
        vulnerabilitiesCount:
          type: integer
          description: Number of vulnerabilities in the container image.
        complianceIssuesCount:
          type: integer
          description: Number of compliance issues for this container.
    Host:
      type: object
      properties:
        _id:
          type: string
          description: Unique host identifier.
        hostname:
          type: string
          description: Host machine hostname.
        scanTime:
          type: string
          format: date-time
          description: Timestamp of the most recent host scan.
        osDistro:
          type: string
          description: Operating system distribution.
        osDistroVersion:
          type: string
          description: Operating system version.
        kernelVersion:
          type: string
          description: Linux kernel version.
        dockerVersion:
          type: string
          description: Docker engine version installed on the host.
        k8sVersion:
          type: string
          description: Kubernetes version if the host is a cluster node.
        cloudMetadata:
          type: object
          description: Cloud provider metadata for the host.
          properties:
            provider:
              type: string
              enum:
                - aws
                - azure
                - gcp
                - oci
                - alibaba
            accountId:
              type: string
            region:
              type: string
            instanceId:
              type: string
            instanceType:
              type: string
            vpcId:
              type: string
        vulnerabilities:
          type: array
          description: Vulnerabilities discovered on the host.
          items:
            $ref: '#/components/schemas/Vulnerability'
        vulnerabilitiesCount:
          type: integer
          description: Total number of vulnerabilities found.
        vulnerabilityDistribution:
          type: object
          description: Vulnerability count by severity level.
          properties:
            critical:
              type: integer
            high:
              type: integer
            medium:
              type: integer
            low:
              type: integer
        complianceIssues:
          type: array
          description: Compliance check failures for the host.
          items:
            $ref: '#/components/schemas/ComplianceIssue'
        complianceIssuesCount:
          type: integer
          description: Total number of compliance issues found.
        cluster:
          type: string
          description: Kubernetes cluster name if applicable.
        collections:
          type: array
          description: Collections this host belongs to.
          items:
            type: string
        defenderStatus:
          type: string
          description: Status of the Defender agent on this host.
          enum:
            - connected
            - disconnected
    Defender:
      type: object
      properties:
        hostname:
          type: string
          description: Hostname where the Defender is deployed.
        version:
          type: string
          description: Defender agent version.
        type:
          type: string
          description: Type of Defender deployment.
          enum:
            - docker
            - dockerWindows
            - cri
            - fargate
            - appEmbedded
            - serverless
        connected:
          type: boolean
          description: Whether the Defender is currently connected to the Console.
        lastModified:
          type: string
          format: date-time
          description: Timestamp of the last status update from the Defender.
        features:
          type: object
          description: Enabled security features on this Defender.
          properties:
            containerRuntime:
              type: boolean
            hostCustomCompliance:
              type: boolean
            hostForensics:
              type: boolean
            cloudMetadata:
              type: boolean
        cluster:
          type: string
          description: Kubernetes cluster name if applicable.
        cloudMetadata:
          type: object
          description: Cloud provider metadata for the Defender host.
          properties:
            provider:
              type: string
            accountId:
              type: string
            region:
              type: string
        category:
          type: string
          description: Defender category based on deployment type.
          enum:
            - container
            - host
            - serverless
            - appEmbedded
        proxy:
          type: object
          description: Proxy configuration for Defender communication.
          properties:
            httpProxy:
              type: string
            noProxy:
              type: string
        systemInfo:
          type: object
          description: System information from the Defender host.
          properties:
            kernelVersion:
              type: string
            osDistro:
              type: string
            totalMemory:
              type: integer
              description: Total memory in bytes.
    ComplianceResult:
      type: object
      properties:
        id:
          type: integer
          description: Compliance check ID.
        title:
          type: string
          description: Title of the compliance check.
        description:
          type: string
          description: Detailed description of the compliance requirement.
        severity:
          type: string
          description: Severity of the compliance issue.
          enum:
            - critical
            - high
            - medium
            - low
        type:
          type: string
          description: Resource type this compliance check applies to.
          enum:
            - image
            - container
            - host
            - serverless
        passed:
          type: integer
          description: Number of resources that passed this check.
        failed:
          type: integer
          description: Number of resources that failed this check.
        total:
          type: integer
          description: Total number of resources evaluated.
        applicableRules:
          type: array
          description: Policy rules associated with this compliance check.
          items:
            type: string
        benchmark:
          type: string
          description: >-
            Compliance benchmark standard (e.g., CIS Docker Benchmark,
            NIST SP 800-190).
    ComplianceIssue:
      type: object
      properties:
        id:
          type: integer
          description: Compliance check ID.
        title:
          type: string
          description: Title of the compliance check.
        severity:
          type: string
          description: Severity of the compliance issue.
          enum:
            - critical
            - high
            - medium
            - low
        cause:
          type: string
          description: Explanation of why the resource failed the check.
        description:
          type: string
          description: Detailed description of the compliance requirement.
