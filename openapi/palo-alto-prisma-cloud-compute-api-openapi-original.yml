openapi: 3.1.0
info:
  title: Prisma Cloud Compute API
  description: >-
    REST API for Prisma Cloud Compute (CWPP) providing programmatic access to
    container and workload security across hosts, images, containers, and
    serverless functions. The API enables vulnerability management, compliance
    monitoring, runtime defense, registry scanning, and Defender deployment
    management. Authentication uses either a bearer token obtained from the
    /api/v1/authenticate endpoint (valid for 30 minutes) or HTTP Basic
    authentication with Prisma Cloud Compute credentials. The console address
    varies per deployment and must be substituted in the server URL.
  version: '32.07'
  contact:
    name: Palo Alto Networks Developer Support
    url: https://pan.dev/
  license:
    name: Proprietary
    url: https://www.paloaltonetworks.com/legal
servers:
  - url: https://{console}/api/v1
    description: Prisma Cloud Compute Console API.
    variables:
      console:
        default: console.example.com
        description: >-
          Address of the Prisma Cloud Compute Console. For SaaS deployments,
          use the address provided in Prisma Cloud under Compute > Manage >
          System > Utilities.
security:
  - bearerAuth: []
  - basicAuth: []
tags:
  - name: Authentication
    description: Token-based authentication for API access.
  - name: Images
    description: Container image vulnerability and compliance scan data.
  - name: Containers
    description: Running container inventory and security posture.
  - name: Hosts
    description: Host machine security monitoring and vulnerability data.
  - name: Policies
    description: Vulnerability and compliance policy management.
  - name: Registry
    description: Registry image scanning configuration and results.
  - name: Defenders
    description: Defender agent deployment and management.
  - name: Scans
    description: CI/CD pipeline scan results.
paths:
  /authenticate:
    post:
      operationId: authenticate
      summary: Authenticate and obtain bearer token
      description: >-
        Authenticates with Prisma Cloud Compute credentials and returns a JWT
        bearer token for subsequent API calls. The token is valid for 30
        minutes. For integrations requiring project-level access, include the
        project name in the request body.
      tags:
        - Authentication
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - password
              properties:
                username:
                  type: string
                  description: Prisma Cloud Compute username or access key.
                password:
                  type: string
                  description: Prisma Cloud Compute password or secret key.
                project:
                  type: string
                  description: >-
                    Project name for project-scoped access. Omit for
                    Central Console access.
      responses:
        '200':
          description: Authentication successful.
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    description: JWT bearer token valid for 30 minutes.
        '401':
          description: Invalid credentials or unauthorized access.
  /images:
    get:
      operationId: getImages
      summary: List image scan results
      description: >-
        Returns vulnerability and compliance scan results for all container
        images known to Prisma Cloud Compute. Results include images from
        deployed containers on hosts with Defenders and from registry scans.
        Supports filtering by search term, cluster, and collection.
      tags:
        - Images
      parameters:
        - name: offset
          in: query
          description: Number of records to skip for pagination.
          schema:
            type: integer
            default: 0
        - name: limit
          in: query
          description: Maximum number of records to return.
          schema:
            type: integer
            default: 50
        - name: search
          in: query
          description: Search term to filter images by repository name or tag.
          schema:
            type: string
        - name: sort
          in: query
          description: Field to sort results by.
          schema:
            type: string
            enum:
              - vulnerabilities
              - compliance
              - scanTime
        - name: reverse
          in: query
          description: Sort in reverse order.
          schema:
            type: boolean
            default: false
        - name: collections
          in: query
          description: Filter by collection name.
          schema:
            type: string
        - name: clusters
          in: query
          description: Filter by cluster name.
          schema:
            type: string
        - name: compact
          in: query
          description: Return compact results without full vulnerability details.
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Image scan results returned successfully.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Image'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /images/download:
    get:
      operationId: downloadImageScanResults
      summary: Download image scan results
      description: >-
        Downloads image scan results as a CSV file. Supports the same
        filtering parameters as the GET /images endpoint. Useful for
        bulk export and integration with external vulnerability management
        systems.
      tags:
        - Images
      parameters:
        - name: search
          in: query
          description: Search term to filter images by repository name or tag.
          schema:
            type: string
        - name: collections
          in: query
          description: Filter by collection name.
          schema:
            type: string
        - name: clusters
          in: query
          description: Filter by cluster name.
          schema:
            type: string
      responses:
        '200':
          description: Image scan results CSV file returned.
          content:
            text/csv:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /containers:
    get:
      operationId: getContainers
      summary: List running containers
      description: >-
        Returns information about all running containers monitored by Prisma
        Cloud Compute Defenders. Includes container metadata, associated image
        scan results, network information, and runtime profile status.
      tags:
        - Containers
      parameters:
        - name: offset
          in: query
          description: Number of records to skip for pagination.
          schema:
            type: integer
            default: 0
        - name: limit
          in: query
          description: Maximum number of records to return.
          schema:
            type: integer
            default: 50
        - name: search
          in: query
          description: Search term to filter containers by name or image.
          schema:
            type: string
        - name: collections
          in: query
          description: Filter by collection name.
          schema:
            type: string
        - name: clusters
          in: query
          description: Filter by cluster name.
          schema:
            type: string
        - name: hostname
          in: query
          description: Filter by host where the container is running.
          schema:
            type: string
      responses:
        '200':
          description: Container list returned successfully.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Container'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /hosts:
    get:
      operationId: getHosts
      summary: List host scan results
      description: >-
        Returns vulnerability and compliance scan results for all hosts
        protected by Prisma Cloud Compute Defenders. Includes OS-level
        vulnerabilities, installed packages, and compliance check results.
      tags:
        - Hosts
      parameters:
        - name: offset
          in: query
          description: Number of records to skip for pagination.
          schema:
            type: integer
            default: 0
        - name: limit
          in: query
          description: Maximum number of records to return.
          schema:
            type: integer
            default: 50
        - name: search
          in: query
          description: Search term to filter hosts by hostname.
          schema:
            type: string
        - name: sort
          in: query
          description: Field to sort results by.
          schema:
            type: string
            enum:
              - vulnerabilities
              - compliance
              - scanTime
        - name: reverse
          in: query
          description: Sort in reverse order.
          schema:
            type: boolean
            default: false
        - name: collections
          in: query
          description: Filter by collection name.
          schema:
            type: string
        - name: clusters
          in: query
          description: Filter by cluster name.
          schema:
            type: string
      responses:
        '200':
          description: Host scan results returned successfully.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Host'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /policies/vulnerability/images:
    get:
      operationId: getImageVulnerabilityPolicy
      summary: Get image vulnerability policy
      description: >-
        Returns the currently configured image vulnerability policy.
        The policy defines the rules for blocking, alerting, and ignoring
        vulnerabilities found in container images based on severity,
        CVE, package, and other criteria.
      tags:
        - Policies
      responses:
        '200':
          description: Image vulnerability policy returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VulnerabilityPolicy'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
    put:
      operationId: updateImageVulnerabilityPolicy
      summary: Update image vulnerability policy
      description: >-
        Replaces the image vulnerability policy with the provided
        configuration. The policy is applied to all image scans and
        enforced at container admission.
      tags:
        - Policies
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VulnerabilityPolicy'
      responses:
        '200':
          description: Image vulnerability policy updated successfully.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /policies/compliance/images:
    get:
      operationId: getImageCompliancePolicy
      summary: Get image compliance policy
      description: >-
        Returns the currently configured image compliance policy.
        The compliance policy defines the checks applied to container
        images based on CIS benchmarks and custom rules.
      tags:
        - Policies
      responses:
        '200':
          description: Image compliance policy returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompliancePolicy'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /policies/runtime/container:
    get:
      operationId: getContainerRuntimePolicy
      summary: Get container runtime policy
      description: >-
        Returns the currently configured container runtime defense policy.
        Runtime policies define allowed process, network, and file system
        activities for running containers, enabling detection and prevention
        of anomalous runtime behavior.
      tags:
        - Policies
      responses:
        '200':
          description: Container runtime policy returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuntimePolicy'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /registry:
    get:
      operationId: getRegistries
      summary: List configured registries
      description: >-
        Returns a list of container registries configured for scanning in
        Prisma Cloud Compute. Each entry includes the registry URL,
        credential references, scanning scope, and schedule.
      tags:
        - Registry
      responses:
        '200':
          description: Registry configurations returned successfully.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RegistryConfig'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      operationId: addRegistry
      summary: Add a registry
      description: >-
        Adds a new container registry to the scanning configuration.
        Supports Docker Hub, AWS ECR, Azure Container Registry, Google
        Container Registry, and other OCI-compatible registries.
      tags:
        - Registry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegistryConfig'
      responses:
        '200':
          description: Registry added successfully.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /defenders:
    get:
      operationId: getDefenders
      summary: List Defenders
      description: >-
        Returns information about all deployed Defenders including their
        connection status, version, type, and the host they are running on.
        Defenders are the runtime agents that enforce security policies and
        report vulnerability and compliance data to the Console.
      tags:
        - Defenders
      parameters:
        - name: offset
          in: query
          description: Number of records to skip for pagination.
          schema:
            type: integer
            default: 0
        - name: limit
          in: query
          description: Maximum number of records to return.
          schema:
            type: integer
            default: 50
        - name: search
          in: query
          description: Search term to filter Defenders by hostname.
          schema:
            type: string
        - name: connected
          in: query
          description: Filter by connection status.
          schema:
            type: boolean
        - name: type
          in: query
          description: Filter by Defender type.
          schema:
            type: string
            enum:
              - docker
              - dockerWindows
              - cri
              - fargate
              - appEmbedded
              - serverless
        - name: cluster
          in: query
          description: Filter by cluster name.
          schema:
            type: string
      responses:
        '200':
          description: Defender list returned successfully.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Defender'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /defenders/summary:
    get:
      operationId: getDefendersSummary
      summary: Get Defender summary statistics
      description: >-
        Returns summary statistics about deployed Defenders including
        total count, connected count, version distribution, and
        deployment type breakdown.
      tags:
        - Defenders
      responses:
        '200':
          description: Defender summary statistics returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DefenderSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /scans:
    get:
      operationId: getCIScans
      summary: Get CI scan results
      description: >-
        Returns vulnerability and compliance scan results from CI/CD
        pipeline scans run using the twistcli tool or CI/CD integrations.
        Results include the scan target, policy outcome, and detailed
        findings for each scan run.
      tags:
        - Scans
      parameters:
        - name: offset
          in: query
          description: Number of records to skip for pagination.
          schema:
            type: integer
            default: 0
        - name: limit
          in: query
          description: Maximum number of records to return.
          schema:
            type: integer
            default: 50
        - name: search
          in: query
          description: Search term to filter scan results by image name.
          schema:
            type: string
        - name: type
          in: query
          description: Filter by scan target type.
          schema:
            type: string
            enum:
              - ciImage
              - ciServerless
              - ciIaC
      responses:
        '200':
          description: CI scan results returned successfully.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CIScan'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >-
        JWT token obtained from the /api/v1/authenticate endpoint. Valid for
        30 minutes.
    basicAuth:
      type: http
      scheme: basic
      description: HTTP Basic authentication using Prisma Cloud Compute credentials.
  responses:
    BadRequest:
      description: Invalid request parameters or body.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Invalid or expired authentication credentials.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Insufficient permissions for this operation.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalServerError:
      description: Internal server error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    Image:
      type: object
      properties:
        _id:
          type: string
          description: Unique image identifier composed of registry, repository, and tag.
        hostname:
          type: string
          description: Hostname of the machine where the image was scanned.
        scanTime:
          type: string
          format: date-time
          description: Timestamp of the most recent scan.
        repoTag:
          type: object
          description: Repository and tag information for the image.
          properties:
            registry:
              type: string
              description: Container registry URL.
            repo:
              type: string
              description: Repository name.
            tag:
              type: string
              description: Image tag.
        repoDigests:
          type: array
          description: Content-addressable image digests.
          items:
            type: string
        osDistro:
          type: string
          description: Operating system distribution of the image.
        osDistroVersion:
          type: string
          description: Operating system distribution version.
        vulnerabilities:
          type: array
          description: Vulnerabilities discovered in the image.
          items:
            $ref: '#/components/schemas/Vulnerability'
        vulnerabilitiesCount:
          type: integer
          description: Total number of vulnerabilities found.
        vulnerabilityDistribution:
          type: object
          description: Vulnerability count by severity level.
          properties:
            critical:
              type: integer
            high:
              type: integer
            medium:
              type: integer
            low:
              type: integer
        complianceIssues:
          type: array
          description: Compliance check failures for the image.
          items:
            $ref: '#/components/schemas/ComplianceIssue'
        complianceIssuesCount:
          type: integer
          description: Total number of compliance issues found.
        clusters:
          type: array
          description: Kubernetes clusters where this image is deployed.
          items:
            type: string
    Vulnerability:
      type: object
      properties:
        id:
          type: string
          description: CVE identifier (e.g., CVE-2024-1234).
        status:
          type: string
          enum:
            - fixed in
            - needed
            - will not fix
            - deferred
          description: Fix availability status.
        cvss:
          type: number
          format: float
          description: CVSS v3 base score.
        severity:
          type: string
          enum:
            - critical
            - high
            - medium
            - low
          description: Severity level derived from CVSS score.
        packageName:
          type: string
          description: Name of the affected package.
        packageVersion:
          type: string
          description: Installed version of the affected package.
        fixedVersion:
          type: string
          description: Version that contains the fix, if available.
        link:
          type: string
          description: URL to the CVE advisory or details page.
        description:
          type: string
          description: Brief description of the vulnerability.
        publishedDate:
          type: string
          format: date-time
          description: Date the vulnerability was publicly disclosed.
    Container:
      type: object
      properties:
        _id:
          type: string
          description: Unique container identifier.
        name:
          type: string
          description: Container name.
        hostname:
          type: string
          description: Host where the container is running.
        imageId:
          type: string
          description: ID of the container image.
        imageName:
          type: string
          description: Full image name including registry, repository, and tag.
        state:
          type: string
          enum:
            - running
            - created
            - exited
            - paused
          description: Current container state.
        created:
          type: string
          format: date-time
          description: Container creation timestamp.
        cluster:
          type: string
          description: Kubernetes cluster name.
        namespace:
          type: string
          description: Kubernetes namespace.
        vulnerabilitiesCount:
          type: integer
          description: Number of vulnerabilities in the container image.
        complianceIssuesCount:
          type: integer
          description: Number of compliance issues for this container.
    Host:
      type: object
      properties:
        _id:
          type: string
          description: Unique host identifier.
        hostname:
          type: string
          description: Host machine hostname.
        scanTime:
          type: string
          format: date-time
          description: Timestamp of the most recent host scan.
        osDistro:
          type: string
          description: Operating system distribution.
        osDistroVersion:
          type: string
          description: Operating system version.
        kernelVersion:
          type: string
          description: Linux kernel version.
        cloudMetadata:
          type: object
          description: Cloud provider metadata for the host.
          properties:
            provider:
              type: string
              enum:
                - aws
                - azure
                - gcp
                - oci
            accountId:
              type: string
            region:
              type: string
            instanceId:
              type: string
        vulnerabilities:
          type: array
          description: Vulnerabilities discovered on the host.
          items:
            $ref: '#/components/schemas/Vulnerability'
        vulnerabilitiesCount:
          type: integer
          description: Total number of vulnerabilities found.
        vulnerabilityDistribution:
          type: object
          properties:
            critical:
              type: integer
            high:
              type: integer
            medium:
              type: integer
            low:
              type: integer
        complianceIssues:
          type: array
          items:
            $ref: '#/components/schemas/ComplianceIssue'
        complianceIssuesCount:
          type: integer
    VulnerabilityPolicy:
      type: object
      properties:
        rules:
          type: array
          description: Ordered list of vulnerability policy rules.
          items:
            type: object
            properties:
              name:
                type: string
                description: Rule name.
              collections:
                type: array
                items:
                  type: string
                description: Collections this rule applies to.
              effect:
                type: string
                enum:
                  - ignore
                  - alert
                  - block
                description: Action to take for matching vulnerabilities.
              condition:
                type: object
                description: Conditions that trigger this rule.
                properties:
                  cves:
                    type: object
                    properties:
                      ids:
                        type: array
                        items:
                          type: string
                      effect:
                        type: string
                  severities:
                    type: array
                    items:
                      type: string
                      enum:
                        - critical
                        - high
                        - medium
                        - low
    CompliancePolicy:
      type: object
      properties:
        rules:
          type: array
          description: Ordered list of compliance policy rules.
          items:
            type: object
            properties:
              name:
                type: string
              collections:
                type: array
                items:
                  type: string
              effect:
                type: string
                enum:
                  - ignore
                  - alert
                  - block
              condition:
                type: object
                properties:
                  checks:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          description: Compliance check ID.
                        block:
                          type: boolean
    RuntimePolicy:
      type: object
      properties:
        rules:
          type: array
          description: Container runtime defense rules.
          items:
            type: object
            properties:
              name:
                type: string
              collections:
                type: array
                items:
                  type: string
              processes:
                type: object
                properties:
                  effect:
                    type: string
                    enum:
                      - ignore
                      - alert
                      - block
                  whitelist:
                    type: array
                    items:
                      type: string
                  blacklist:
                    type: array
                    items:
                      type: string
              network:
                type: object
                properties:
                  effect:
                    type: string
                    enum:
                      - ignore
                      - alert
                      - block
              filesystem:
                type: object
                properties:
                  effect:
                    type: string
                    enum:
                      - ignore
                      - alert
                      - block
    RegistryConfig:
      type: object
      required:
        - version
        - registry
      properties:
        version:
          type: string
          description: Registry type identifier.
          enum:
            - dockerhub
            - aws
            - azure
            - gcr
            - jfrog
            - quay
            - other
        registry:
          type: string
          description: Registry URL or hostname.
        namespace:
          type: string
          description: Registry namespace or organization name.
        credentialID:
          type: string
          description: Credential store identifier for registry authentication.
        os:
          type: string
          enum:
            - linux
            - windows
          default: linux
          description: Base OS for scanned images.
        cap:
          type: integer
          description: Maximum number of images to scan from this registry.
        scanners:
          type: integer
          description: Number of scanner instances to use.
        tag:
          type: string
          description: Specific tag to scan. Scans all tags if omitted.
    Defender:
      type: object
      properties:
        hostname:
          type: string
          description: Hostname where the Defender is deployed.
        version:
          type: string
          description: Defender agent version.
        type:
          type: string
          enum:
            - docker
            - dockerWindows
            - cri
            - fargate
            - appEmbedded
            - serverless
          description: Type of Defender deployment.
        connected:
          type: boolean
          description: Whether the Defender is currently connected to the Console.
        lastModified:
          type: string
          format: date-time
          description: Timestamp of the last status update from the Defender.
        cluster:
          type: string
          description: Kubernetes cluster name if applicable.
        cloudMetadata:
          type: object
          properties:
            provider:
              type: string
            accountId:
              type: string
            region:
              type: string
        category:
          type: string
          enum:
            - container
            - host
            - serverless
            - appEmbedded
    DefenderSummary:
      type: object
      properties:
        total:
          type: integer
          description: Total number of deployed Defenders.
        connected:
          type: integer
          description: Number of currently connected Defenders.
        disconnected:
          type: integer
          description: Number of disconnected Defenders.
        by_type:
          type: object
          description: Defender count breakdown by deployment type.
          properties:
            docker:
              type: integer
            dockerWindows:
              type: integer
            cri:
              type: integer
            fargate:
              type: integer
            appEmbedded:
              type: integer
            serverless:
              type: integer
        version_distribution:
          type: array
          items:
            type: object
            properties:
              version:
                type: string
              count:
                type: integer
    CIScan:
      type: object
      properties:
        entityInfo:
          type: object
          properties:
            _id:
              type: string
            type:
              type: string
              enum:
                - ciImage
                - ciServerless
                - ciIaC
            hostname:
              type: string
            scanTime:
              type: string
              format: date-time
        pass:
          type: boolean
          description: Whether the scan passed the configured policy thresholds.
        vulnerabilitiesCount:
          type: integer
        complianceIssuesCount:
          type: integer
        vulnerabilityDistribution:
          type: object
          properties:
            critical:
              type: integer
            high:
              type: integer
            medium:
              type: integer
            low:
              type: integer
    ComplianceIssue:
      type: object
      properties:
        id:
          type: integer
          description: Compliance check ID.
        title:
          type: string
          description: Title of the compliance check.
        severity:
          type: string
          enum:
            - critical
            - high
            - medium
            - low
          description: Severity of the compliance issue.
        cause:
          type: string
          description: Explanation of why the resource failed the check.
        description:
          type: string
          description: Detailed description of the compliance requirement.
    ErrorResponse:
      type: object
      properties:
        err:
          type: string
          description: Error message.
