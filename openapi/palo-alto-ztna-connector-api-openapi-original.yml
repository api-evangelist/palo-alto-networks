openapi: 3.1.0
info:
  title: Palo Alto Networks ZTNA Connector API
  description: >-
    ZTNA Connector API for zero trust network access management. Provides
    programmatic control over ZTNA connectors, connector groups, protected
    applications, FQDN-based access rules, subnet-based access rules, and
    license information. Connectors are software agents deployed in private
    network environments that provide secure access paths for ZTNA-protected
    applications without requiring inbound firewall rules. Part of the Palo
    Alto Networks SASE platform.
  version: '2.0'
  contact:
    name: Palo Alto Networks Developer Support
    url: https://pan.dev/
  license:
    name: Proprietary
    url: https://www.paloaltonetworks.com/legal
servers:
- url: https://api.sase.paloaltonetworks.com/ztna
  description: SASE ZTNA Connector API production server.
security:
- oauth2Bearer: []
tags:
- name: Applications
  description: ZTNA-protected application definitions.
- name: Connector Groups
  description: Logical grouping of ZTNA connectors for high availability.
- name: Connectors
  description: ZTNA connector lifecycle management.
- name: FQDN Rules
  description: FQDN-based access rules for ZTNA applications.
- name: Licenses
  description: ZTNA license and entitlement information.
- name: Subnet Rules
  description: Subnet-based access rules for ZTNA network segments.
paths:
  /v2/connectors:
    get:
      operationId: listConnectors
      summary: Palo Alto Networks List ZTNA Connectors
      description: >-
        Returns the list of ZTNA connectors configured for the tenant.
        Connectors are software agents deployed in private network environments.
        Each connector entry includes its current health status, associated
        connector group, software version, and connected application count.
      tags:
      - Connectors
      parameters:
      - name: group_id
        in: query
        description: Filter connectors by connector group ID.
        schema:
          type: string
        example: '716603'
      - name: status
        in: query
        description: Filter connectors by health status.
        schema:
          type: string
          enum:
          - connected
          - disconnected
          - upgrading
          - error
        example: error
      - name: offset
        in: query
        description: Number of results to skip for pagination.
        schema:
          type: integer
          default: 0
        example: 0
      - name: limit
        in: query
        description: Maximum number of connectors to return.
        schema:
          type: integer
          default: 50
          maximum: 200
        example: 50
      responses:
        '200':
          description: Connectors returned.
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                  offset:
                    type: integer
                  limit:
                    type: integer
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Connector'
              examples:
                ListConnectors200Example:
                  summary: Default listConnectors 200 response
                  x-microcks-default: true
                  value:
                    total: 660
                    offset: 883
                    limit: 838
                    items:
                    - connector_id: '794298'
                      name: Production Gateway 37
                      group_id: '577658'
                      status: connected
                      version: 10.4.9
                      hostname: host-51b1
                      ip_address: 10.28.192.109
                      region: eu-west-1
                      last_seen_at: '2024-07-11T13:58:11Z'
                      created_at: '2025-10-12T04:55:41Z'
                    - connector_id: '794298'
                      name: Production Gateway 37
                      group_id: '577658'
                      status: connected
