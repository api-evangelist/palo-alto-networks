          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      operationId: createConnectorGroup
      summary: Palo Alto Networks Create connector group
      description: Creates a new connector group for organizing ZTNA connectors.
      tags:
