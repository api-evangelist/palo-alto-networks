          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      operationId: deleteConnectorGroup
      summary: Palo Alto Networks Delete connector group
      description: >-
        Deletes a connector group. The group must have no connectors assigned
        before deletion.
      tags:
        - Connector Groups
      parameters:
        - name: group_id
          in: path
          required: true
          description: Unique identifier of the connector group to delete.
          schema:
            type: string
      responses:
