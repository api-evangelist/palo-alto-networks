components:
  securitySchemes:
    oauth2Bearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >-
        OAuth 2.0 Bearer token for SASE platform authentication. Obtain
        using the client_credentials grant with your SASE service account
        client ID and client secret.
  schemas:
    Connector:
      type: object
      properties:
        connector_id:
          type: string
          description: Unique identifier of the connector.
          example: '794298'
        name:
          type: string
          description: Display name of the connector.
          example: Production Gateway 37
        group_id:
          type: string
          description: ID of the connector group this connector belongs to.
          example: '577658'
        status:
          type: string
          enum:
          - connected
          - disconnected
          - upgrading
          - error
          description: Current health status of the connector.
          example: connected
        version:
          type: string
          description: Installed connector software version.
          example: 10.4.9
        hostname:
          type: string
          description: Hostname of the system where the connector is installed.
          example: host-51b1
        ip_address:
          type: string
          description: IP address of the connector host.
          example: 10.28.192.109
        region:
          type: string
          description: Geographic region where the connector is deployed.
          example: eu-west-1
        last_seen_at:
          type: string
          format: date-time
          description: Timestamp of the connector's most recent heartbeat.
          example: '2024-07-11T13:58:11Z'
        created_at:
          type: string
          format: date-time
          example: '2025-10-12T04:55:41Z'
    ConnectorRequest:
      type: object
      required:
      - name
      - group_id
      properties:
        name:
          type: string
          description: Display name for the connector.
          example: Production Sensor 37
        group_id:
          type: string
          description: ID of the connector group to assign the connector to.
          example: '814975'
        description:
          type: string
          description: Optional description of the connector's purpose or location.
          example: Blocked suspicious investigation malware alert rule policy.
    ConnectorGroup:
      type: object
      properties:
        group_id:
          type: string
          description: Unique identifier of the connector group.
          example: '985333'
        name:
          type: string
          description: Display name of the connector group.
          example: Staging Sensor 26
        description:
          type: string
          description: Description of the connector group's purpose.
          example: Monitoring investigation blocked applied activity traffic.
        connector_count:
          type: integer
          description: Number of connectors in this group.
          example: 400
        region:
          type: string
          description: Primary geographic region for this connector group.
          example: us-west-2
        created_at:
          type: string
          format: date-time
          example: '2026-09-14T06:06:49Z'
    ConnectorGroupRequest:
      type: object
      required:
      - name
      properties:
        name:
          type: string
          description: Display name for the connector group.
          example: Corporate Sensor 60
        description:
          type: string
          description: Optional description of the connector group.
          example: Violation rule blocked violation network applied incident monitoring.
        region:
          type: string
          description: Geographic region for this connector group.
          example: us-east-1
    ZTNAApplication:
      type: object
      properties:
        app_id:
          type: string
          description: Unique identifier of the ZTNA application.
          example: '768496'
        name:
          type: string
          description: Display name of the application.
          example: Corporate Sensor 20
        description:
          type: string
          description: Description of the application.
          example: On investigation rule violation threat monitoring.
        group_id:
          type: string
          description: Connector group ID used to access this application.
          example: '907399'
        fqdn:
          type: string
          description: Fully qualified domain name of the private application.
          example: api.acme-systems.org
        ports:
          type: array
          items:
            type: integer
          description: TCP/UDP ports accessible through ZTNA.
          example: *id001
        protocols:
          type: array
          items:
            type: string
            enum:
            - TCP
            - UDP
          description: Network protocols allowed for this application.
          example: *id002
        enabled:
          type: boolean
          description: Whether ZTNA access for this application is enabled.
          example: true
        created_at:
          type: string
          format: date-time
          example: '2024-05-17T06:02:30Z'
    ZTNAApplicationRequest:
      type: object
      required:
      - name
      - group_id
      - fqdn
      properties:
        name:
          type: string
          description: Display name for the ZTNA application.
          example: Branch Agent 75
        description:
          type: string
          description: Optional description of the application.
          example: Incident suspicious firewall Security suspicious policy threat suspicious.
        group_id:
          type: string
          description: Connector group ID to use for accessing the application.
          example: '376339'
        fqdn:
          type: string
          description: Fully qualified domain name of the private application.
          example: login.test-corp.net
        ports:
          type: array
          items:
            type: integer
          description: TCP/UDP ports to expose through ZTNA.
          example: *id003
        protocols:
          type: array
          items:
            type: string
            enum:
            - TCP
            - UDP
          description: Network protocols to allow.
          example: *id004
        enabled:
          type: boolean
          default: true
          description: Whether to enable ZTNA access immediately after creation.
          example: true
    FQDNRule:
      type: object
      properties:
        rule_id:
          type: string
          description: Unique identifier of the FQDN rule.
          example: '519537'
        name:
          type: string
          description: Display name of the rule.
          example: Corporate Gateway 72
        fqdn_pattern:
          type: string
          description: >-
            FQDN pattern or wildcard (e.g., *.internal.example.com) that
            this rule matches.
          example: example-fqdn_pattern
        group_id:
          type: string
          description: Connector group used to resolve and access matching FQDNs.
          example: '945832'
        ports:
          type: array
          items:
            type: integer
          description: Ports covered by this rule.
          example: *id005
        enabled:
          type: boolean
          description: Whether this rule is active.
          example: true
        created_at:
          type: string
          format: date-time
          example: '2026-08-05T06:31:43Z'
    FQDNRuleRequest:
      type: object
      required:
      - name
      - fqdn_pattern
      - group_id
      properties:
        name:
          type: string
          description: Display name for the FQDN rule.
          example: Corporate Agent 77
        fqdn_pattern:
          type: string
          description: FQDN pattern or wildcard this rule matches.
          example: example-fqdn_pattern
        group_id:
          type: string
          description: Connector group to use for matching FQDNs.
          example: '533942'
        ports:
          type: array
          items:
            type: integer
          description: Ports covered by this rule.
          example: *id006
        enabled:
          type: boolean
          default: true
          example: true
    SubnetRule:
      type: object
      properties:
        rule_id:
          type: string
          description: Unique identifier of the subnet rule.
          example: '373292'
        name:
          type: string
          description: Display name of the rule.
          example: Corporate Firewall 37
        subnet:
          type: string
          description: CIDR notation subnet this rule covers (e.g., 10.0.0.0/8).
          example: 10.131.182.0/24
        group_id:
          type: string
          description: Connector group used to route traffic to this subnet.
          example: '527569'
        enabled:
          type: boolean
          description: Whether this rule is active.
          example: false
        created_at:
          type: string
          format: date-time
          example: '2025-04-09T20:01:23Z'
    SubnetRuleRequest:
      type: object
      required:
      - name
      - subnet
      - group_id
      properties:
        name:
          type: string
          description: Display name for the subnet rule.
          example: Production Firewall 11
        subnet:
          type: string
          description: CIDR notation subnet this rule covers.
          example: 10.175.38.0/24
        group_id:
          type: string
          description: Connector group to use for routing traffic to this subnet.
          example: '115097'
        enabled:
          type: boolean
          default: true
          example: true
    LicenseInfo:
      type: object
      properties:
        licensed_users:
          type: integer
          description: Total number of ZTNA user licenses purchased.
          example: 279
        active_users:
          type: integer
          description: Number of users actively using ZTNA.
          example: 419
        subscription_id:
          type: string
          description: Subscription identifier.
          example: '360915'
        expires_at:
          type: string
          format: date-time
          description: Subscription expiration date and time.
          example: '2025-11-19T10:30:55Z'
        features:
          type: array
          items:
            type: string
          description: List of enabled ZTNA feature entitlements.
          example: *id007
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Error code identifying the error type.
          example: example-error
        message:
          type: string
          description: Human-readable description of the error.
          example: Security firewall network configured traffic blocked threat.
        request_id:
          type: string
          description: Request identifier for support correlation.
          example: 709c60bb-8234-4bc4-938b-d0835224c350
