          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      operationId: createSubnetRule
      summary: Palo Alto Networks Create subnet-based access rule
      description: Creates a new subnet-based access rule for ZTNA.
      tags:
