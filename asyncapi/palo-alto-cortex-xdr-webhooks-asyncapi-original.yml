asyncapi: 2.6.0
info:
  title: Cortex XDR Alert & Incident Webhooks
  version: '1.0'
  description: >-
    Cortex XDR sends real-time webhook notifications when alerts are triggered
    and incidents are created or updated. Webhooks are configured in Cortex XDR
    Settings > Notifications > External Applications and deliver HTTP POST
    requests with JSON payloads to registered endpoint URLs. Alerts originate
    from analytics engines, BIOC rules, IOC matches, and third-party
    integrations. Incidents are automatically created by correlating related
    alerts across endpoints, network, and cloud data sources. Webhook
    notifications enable integration with SOAR platforms, ticketing systems,
    and custom automation workflows for accelerated incident response.
  contact:
    name: Palo Alto Networks Developer Support
    url: https://pan.dev/
  license:
    name: Proprietary
    url: https://www.paloaltonetworks.com/legal
servers:
  webhook:
    url: '{webhookUrl}'
    protocol: https
    description: >-
      Your webhook endpoint URL configured in Cortex XDR Settings >
      Notifications > External Applications. The endpoint must accept POST
      requests with JSON payloads and return a 2xx response. Configure
      notification profiles to select which alert and incident events trigger
      webhook delivery.
    variables:
      webhookUrl:
        description: The URL of your registered webhook endpoint.
channels:
  /incident/created:
    description: >-
      Channel for new incident notifications. Cortex XDR sends a webhook when
      a new incident is created by correlating one or more related alerts.
      Incidents group alerts that share common attributes such as endpoints,
      users, or attack patterns into a single investigation context.
    subscribe:
      operationId: onIncidentCreated
      summary: New incident created notification
      message:
        $ref: '#/components/messages/IncidentNotification'
  /incident/updated:
    description: >-
      Channel for incident update notifications. Triggered when an incident's
      status, severity, or assignment changes. Updates include status
      transitions (new, under investigation, resolved), severity
      reclassification, analyst assignment changes, and the addition of new
      correlated alerts to an existing incident.
    subscribe:
      operationId: onIncidentUpdated
      summary: Incident updated notification
      message:
        $ref: '#/components/messages/IncidentNotification'
  /alert/new:
    description: >-
      Channel for new alert notifications. Triggered when a new alert is
      generated by Cortex XDR analytics engines, BIOC (Behavioral Indicator
      of Compromise) rules, IOC matches, or third-party detection sources.
      Alerts represent individual suspicious or malicious activities detected
      across endpoints, network traffic, and cloud workloads.
    subscribe:
      operationId: onAlertNew
      summary: New alert triggered notification
      message:
        $ref: '#/components/messages/AlertNotification'
  /alert/excluded:
    description: >-
      Channel for excluded alert notifications. Triggered when a newly
      generated alert matches a configured exclusion rule and is automatically
      excluded from incident creation and investigation queues. Exclusion
      rules are defined in Cortex XDR to suppress known benign activity and
      reduce alert fatigue.
    subscribe:
      operationId: onAlertExcluded
      summary: Alert excluded notification
      message:
        $ref: '#/components/messages/AlertNotification'
components:
  messages:
    IncidentNotification:
      name: IncidentNotification
      title: Cortex XDR Incident Notification
      summary: >-
        Webhook payload sent when an incident is created or updated in
        Cortex XDR. Contains incident metadata, correlated alert counts,
        affected hosts and users, and current investigation status.
      contentType: application/json
      payload:
        type: object
        properties:
          incidentId:
            type: string
            description: Unique incident identifier assigned by Cortex XDR.
          name:
            type: string
            description: >-
              Auto-generated or analyst-assigned incident name summarizing the
              correlated threat activity.
          description:
            type: string
            description: >-
              Detailed description of the incident including correlated alert
              summary and affected scope.
          severity:
            type: string
            enum:
              - informational
              - low
              - medium
              - high
              - critical
            description: >-
              Incident severity level determined by the highest-severity
              correlated alert or manual analyst override.
          status:
            type: string
            enum:
              - new
              - under_investigation
              - resolved_threat_handled
              - resolved_known_issue
              - resolved_duplicate
              - resolved_false_positive
              - resolved_other
            description: Current incident investigation status.
          assignedTo:
            type: string
            description: >-
              Email address or username of the analyst assigned to investigate
              the incident.
          alertCount:
            type: integer
            description: Total number of alerts correlated into this incident.
          hosts:
            type: array
            description: List of affected hosts involved in the incident.
            items:
              $ref: '#/components/schemas/EndpointInfo'
          users:
            type: array
            description: List of affected users associated with the incident.
            items:
              $ref: '#/components/schemas/UserInfo'
          creationTime:
            type: string
            format: date-time
            description: Timestamp when the incident was first created.
          modificationTime:
            type: string
            format: date-time
            description: Timestamp of the most recent incident update.
    AlertNotification:
      name: AlertNotification
      title: Cortex XDR Alert Notification
      summary: >-
        Webhook payload sent when a new alert is triggered or an alert is
        excluded by a configured exclusion rule in Cortex XDR.
      contentType: application/json
      payload:
        type: object
        properties:
          alertId:
            type: string
            description: Unique alert identifier assigned by Cortex XDR.
          name:
            type: string
            description: Alert name derived from the detection rule or analytics engine.
          category:
            type: string
            description: >-
              Alert category indicating the type of threat detected, such as
              malware, exploit, phishing, command-and-control, or lateral
              movement.
          severity:
            type: string
            enum:
              - informational
              - low
              - medium
              - high
              - critical
            description: Alert severity as determined by the triggering detection rule.
          action:
            type: string
            enum:
              - detected
              - prevented
              - blocked
              - reported
              - excluded
            description: >-
              Action taken by the Cortex XDR agent or analytics engine in
              response to the detected activity.
          endpoint:
            $ref: '#/components/schemas/EndpointInfo'
          user:
            $ref: '#/components/schemas/UserInfo'
          timestamp:
            type: string
            format: date-time
            description: Timestamp when the alert was generated.
  schemas:
    IncidentSummary:
      type: object
      description: >-
        Summary representation of a Cortex XDR incident for cross-reference
        in alert payloads and related notifications.
      properties:
        incidentId:
          type: string
          description: Unique incident identifier.
        name:
          type: string
          description: Incident name.
        severity:
          type: string
          enum:
            - informational
            - low
            - medium
            - high
            - critical
        status:
          type: string
          enum:
            - new
            - under_investigation
            - resolved_threat_handled
            - resolved_known_issue
            - resolved_duplicate
            - resolved_false_positive
            - resolved_other
        alertCount:
          type: integer
          description: Number of correlated alerts in the incident.
        creationTime:
          type: string
          format: date-time
    AlertSummary:
      type: object
      description: >-
        Summary representation of a Cortex XDR alert for cross-reference
        in incident payloads and related notifications.
      properties:
        alertId:
          type: string
          description: Unique alert identifier.
        name:
          type: string
          description: Alert name.
        category:
          type: string
          description: Alert threat category.
        severity:
          type: string
          enum:
            - informational
            - low
            - medium
            - high
            - critical
        action:
          type: string
          description: Action taken on the alert.
        timestamp:
          type: string
          format: date-time
    EndpointInfo:
      type: object
      description: >-
        Information about an endpoint (host) involved in an alert or incident.
      properties:
        endpointId:
          type: string
          description: Unique endpoint identifier in Cortex XDR.
        hostname:
          type: string
          description: Hostname of the endpoint.
        ip:
          type: string
          description: IP address of the endpoint at the time of detection.
        os:
          type: string
          enum:
            - windows
            - macos
            - linux
            - android
            - chromeos
          description: Operating system of the endpoint.
        osVersion:
          type: string
          description: Operating system version string.
        agentVersion:
          type: string
          description: Cortex XDR agent version installed on the endpoint.
        isolationStatus:
          type: string
          enum:
            - connected
            - isolated
            - pending_isolation
          description: Current network isolation status of the endpoint.
    UserInfo:
      type: object
      description: >-
        Information about a user associated with an alert or incident.
      properties:
        userId:
          type: string
          description: User identifier from the identity source.
        username:
          type: string
          description: Username or login name.
        domain:
          type: string
          description: User domain or directory context.
        email:
          type: string
          format: email
          description: User email address if available.
        department:
          type: string
          description: Organizational department of the user.
