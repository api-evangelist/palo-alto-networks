asyncapi: 2.6.0
info:
  title: Prisma Cloud Alert Webhooks
  version: '1.0'
  description: >-
    Prisma Cloud sends webhook notifications when security alerts are
    triggered, updated, or resolved across monitored cloud environments.
    Webhooks are configured as alert notification channels (integrations)
    in Prisma Cloud Settings and deliver real-time alert data as HTTP POST
    requests to registered endpoint URLs. Supports custom headers for
    authentication and payload templates for integration with incident
    management systems such as ServiceNow, Jira, Slack, and PagerDuty.
  contact:
    name: Palo Alto Networks Developer Support
    url: https://pan.dev/
  license:
    name: Proprietary
    url: https://www.paloaltonetworks.com/legal
servers:
  webhook:
    url: '{webhookUrl}'
    protocol: https
    description: >-
      Your webhook endpoint URL configured in Prisma Cloud Settings >
      Integrations > Add Integration > Webhook. The endpoint must accept
      POST requests with JSON payloads and return a 2xx response.
    variables:
      webhookUrl:
        description: The URL of your registered webhook endpoint.
channels:
  /alert/open:
    description: >-
      Channel for new alert notifications. Prisma Cloud sends a webhook
      when a new security alert is generated by a policy violation
      detected during a scan cycle.
    subscribe:
      operationId: onAlertOpen
      summary: New alert notification
      message:
        $ref: '#/components/messages/AlertNotification'
  /alert/updated:
    description: >-
      Channel for alert update notifications. Triggered when an alert's
      status changes, risk score is recalculated, or associated resource
      metadata is updated.
    subscribe:
      operationId: onAlertUpdated
      summary: Alert updated notification
      message:
        $ref: '#/components/messages/AlertNotification'
  /alert/resolved:
    description: >-
      Channel for resolved alert notifications. Triggered when an alert
      is automatically resolved because the underlying misconfiguration
      or violation has been remediated.
    subscribe:
      operationId: onAlertResolved
      summary: Alert resolved notification
      message:
        $ref: '#/components/messages/AlertNotification'
  /alert/dismissed:
    description: >-
      Channel for dismissed alert notifications. Triggered when a user
      manually dismisses an alert with a reason.
    subscribe:
      operationId: onAlertDismissed
      summary: Alert dismissed notification
      message:
        $ref: '#/components/messages/AlertNotification'
  /compliance/violation:
    description: >-
      Channel for compliance violation notifications. Triggered when
      resources fail compliance checks against configured standards
      such as CIS, SOC 2, HIPAA, PCI DSS, or custom standards.
    subscribe:
      operationId: onComplianceViolation
      summary: Compliance violation notification
      message:
        $ref: '#/components/messages/ComplianceNotification'
  /anomaly/detected:
    description: >-
      Channel for anomaly detection notifications. Triggered by
      machine-learning-based anomaly policies detecting unusual
      network activity, user behavior, or resource usage patterns.
    subscribe:
      operationId: onAnomalyDetected
      summary: Anomaly detected notification
      message:
        $ref: '#/components/messages/AnomalyNotification'
components:
  messages:
    AlertNotification:
      name: AlertNotification
      title: Prisma Cloud Alert Notification
      summary: >-
        Webhook payload sent when a security alert is created, updated,
        resolved, or dismissed in Prisma Cloud.
      contentType: application/json
      payload:
        type: object
        properties:
          alertId:
            type: string
            description: Unique alert identifier.
          alertStatus:
            type: string
            enum:
              - open
              - resolved
              - dismissed
              - snoozed
            description: Current alert status.
          alertRuleName:
            type: string
            description: Name of the alert rule that triggered the notification.
          alertTime:
            type: string
            format: date-time
            description: Timestamp when the alert was generated.
          policy:
            $ref: '#/components/schemas/PolicySummary'
          resource:
            $ref: '#/components/schemas/ResourceSummary'
          account:
            $ref: '#/components/schemas/AccountSummary'
          callbackUrl:
            type: string
            format: uri
            description: Direct link to the alert in the Prisma Cloud console.
          severity:
            type: string
            enum:
              - informational
              - low
              - medium
              - high
              - critical
          riskRating:
            type: string
            description: Risk rating based on alert context and exposure.
          reason:
            type: string
            description: Reason for the alert state change.
          dismissalNote:
            type: string
            description: User-provided note when dismissing an alert.
    ComplianceNotification:
      name: ComplianceNotification
      title: Compliance Violation Notification
      summary: >-
        Webhook payload for compliance standard violations detected
        during posture evaluation.
      contentType: application/json
      payload:
        type: object
        properties:
          alertId:
            type: string
          complianceStandard:
            type: string
            description: Name of the compliance standard (e.g., CIS AWS 1.5.0).
          requirementId:
            type: string
          requirementName:
            type: string
          sectionId:
            type: string
          policy:
            $ref: '#/components/schemas/PolicySummary'
          resource:
            $ref: '#/components/schemas/ResourceSummary'
          account:
            $ref: '#/components/schemas/AccountSummary'
          severity:
            type: string
          alertTime:
            type: string
            format: date-time
          callbackUrl:
            type: string
            format: uri
    AnomalyNotification:
      name: AnomalyNotification
      title: Anomaly Detection Notification
      summary: >-
        Webhook payload for anomalous behavior detected by Prisma Cloud's
        ML-based anomaly detection policies.
      contentType: application/json
      payload:
        type: object
        properties:
          alertId:
            type: string
          anomalyType:
            type: string
            description: >-
              Type of anomaly (e.g., unusual network activity, suspicious
              user behavior, anomalous resource usage).
          policy:
            $ref: '#/components/schemas/PolicySummary'
          resource:
            $ref: '#/components/schemas/ResourceSummary'
          account:
            $ref: '#/components/schemas/AccountSummary'
          severity:
            type: string
          alertTime:
            type: string
            format: date-time
          details:
            type: object
            description: Anomaly-specific details including baseline and observed values.
            additionalProperties: true
          callbackUrl:
            type: string
            format: uri
  schemas:
    PolicySummary:
      type: object
      description: Summary of the policy that triggered the alert.
      properties:
        policyId:
          type: string
        policyName:
          type: string
        policyType:
          type: string
          enum:
            - config
            - network
            - audit_event
            - anomaly
            - data
            - iam
        severity:
          type: string
          enum:
            - informational
            - low
            - medium
            - high
            - critical
        recommendation:
          type: string
        remediable:
          type: boolean
          description: Whether automatic remediation is available.
    ResourceSummary:
      type: object
      description: Summary of the cloud resource associated with the alert.
      properties:
        rrn:
          type: string
          description: Prisma Cloud Resource RRN.
        resourceId:
          type: string
        resourceName:
          type: string
        resourceType:
          type: string
          description: Cloud provider resource type.
        regionId:
          type: string
        cloudType:
          type: string
          enum:
            - aws
            - azure
            - gcp
            - oci
            - alibaba_cloud
        resourceApiName:
          type: string
        resourceUrl:
          type: string
          format: uri
          description: Direct link to the resource in the cloud provider console.
    AccountSummary:
      type: object
      description: Summary of the cloud account containing the resource.
      properties:
        accountId:
          type: string
        accountName:
          type: string
        cloudType:
          type: string
        accountGroupName:
          type: string
