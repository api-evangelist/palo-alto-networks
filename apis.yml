    Management APIs for configuring security profiles, API keys, and deployments. Supports
    Secure MCP, custom topic guardrails, contextual grounding, and data masking. Available
    in US, EU (Germany), India, and Singapore regions. Integrates via REST API or the
    pan-aisecurity Python SDK with API key or OAuth 2.0 authentication.
