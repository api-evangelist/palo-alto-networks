      CI/CD pipeline integration, and defender deployment management.
      Supports both SaaS and self-hosted Console deployments. Authentication
      uses time-limited tokens (30-minute validity) obtained from the
      /api/v1/authenticate endpoint or HTTP Basic authentication.
  - aid: palo-alto-networks:prisma-cloud-code-security-api
