      REST APIs for managing Prisma SD-WAN (formerly CloudGenix) branch
      networking infrastructure. The API supports configuration of sites,
      WAN interfaces, routing policies, application definitions, path
      quality monitoring, and network analytics. Provides both a unified
      API using SASE OAuth 2.0 authentication and a legacy API with session
      token authentication. Supports full lifecycle management of SD-WAN
      deployments including site provisioning, policy configuration, and
      real-time network telemetry retrieval.
  - aid: palo-alto-networks:prisma-cloud-cspm-api
    name: Prisma Cloud CSPM API
    tags:
