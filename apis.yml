        type: OpenAPI
    description: >-
      REST APIs for managing Palo Alto Networks Cloud NGFW, a cloud-native
      managed firewall service available on AWS and Azure. The API supports
      creating and managing firewall resources, configuring security rules
      and rule stacks, managing FQDN lists and prefix lists, and retrieving
      firewall logs. On AWS, authentication uses IAM roles; on Azure,
      authentication uses Azure Active Directory. Cloud NGFW delivers
      next-generation firewall capabilities as a fully managed cloud service
      without requiring infrastructure management.
  - aid: palo-alto-networks:wildfire-api
    name: WildFire API
    tags:
      - Malware Analysis
      - Sandbox
      - File Analysis
      - Threat Prevention
      - Verdicts
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://wildfire.paloaltonetworks.com/publicapi/
    humanURL: https://docs.paloaltonetworks.com/wildfire/u-v/wildfire-api
    properties:
      - url: https://docs.paloaltonetworks.com/wildfire/u-v/wildfire-api
        type: Documentation
      - url: https://docs.paloaltonetworks.com/wildfire/u-v/wildfire-api/get-started-with-the-wildfire-api
        type: GettingStarted
      - url: openapi/palo-alto-wildfire-api-openapi-original.yml
        type: OpenAPI
    description: >-
      A cloud-based API for submitting files, URLs, and links for advanced
      malware analysis in the WildFire sandbox environment. The API returns
      threat verdicts (benign, malware, grayware, phishing) and detailed
      analysis reports including behavioral indicators, network activity,
      and file artifacts. Supports file submission via multipart form upload,
      verdict queries by hash (MD5, SHA-256), and retrieval of PCAP files
      and detailed analysis reports. WildFire processes over 10 million
      unique samples daily across the global threat intelligence network.
  - aid: palo-alto-networks:threat-vault-api
    name: Threat Vault API
    tags:
      - Threat Intelligence
      - Signatures
      - IPS
      - Antivirus
      - CVE
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.threatvault.paloaltonetworks.com
    humanURL: https://pan.dev/threat-vault/api/
    properties:
      - url: https://pan.dev/threat-vault/api/
        type: Documentation
      - url: https://pan.dev/cdss/docs/getstarted/
        type: GettingStarted
      - url: openapi/palo-alto-threat-vault-api-openapi-original.yml
        type: OpenAPI
    description: >-
      A REST API for querying Palo Alto Networks threat signature metadata,
      content release notes, and threat intelligence data. The API provides
      access to antivirus signatures, anti-spyware signatures, vulnerability
      protection (IPS) signatures, and file type identification data. Supports
      queries by signature ID, CVE, threat name, and content release version.
      Replaces the deprecated AutoFocus API for threat intelligence lookups.
      Requires an Advanced Threat Prevention or Threat Prevention subscription.
      Authentication uses an API key in the X-API-KEY header.
  - aid: palo-alto-networks:autofocus-api
    name: AutoFocus API (Deprecated)
    tags:
      - Threat Intelligence
      - Malware
      - Analysis
      - Deprecated
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://autofocus.paloaltonetworks.com/api/v1.0/
    humanURL: https://docs.paloaltonetworks.com/autofocus/autofocus-api
