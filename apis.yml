      endpoint operations, and threat hunting. Key API modules include
      incidents (get, update, close), alerts (get details, exclusions),
      endpoints (isolate, unisolate, scan, get agent info), scripts
      (execute, get results), and audit logs. Authentication uses API key
      pairs (API Key ID + API Key) with support for Standard, Advanced, and
      RBAC key types providing different permission levels.
