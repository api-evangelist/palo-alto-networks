      - Interconnect
      - Multi-Tenant
      - SASE
      - Service Provider
      - Network Routing
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.sase.paloaltonetworks.com
    humanURL: https://pan.dev/sase/api/mt-interconnect/multitenant-interconnect-apis/
    properties:
      - url: https://pan.dev/sase/api/mt-interconnect/multitenant-interconnect-apis/
        type: Documentation
    description: >-
      A REST API for managing service provider interconnect
      configurations within the SASE platform. Enables using service
      provider backbones for directing Prisma Access egress traffic
      instead of relying on public cloud providers. Supports managing
      traffic routing preferences on a per-service-provider and
      per-region basis for telecommunications partners including BT,
      Orange, and AT&T. Uses OAuth 2.0 authentication.
  - aid: palo-alto-networks:cloud-identity-engine-api
    name: Cloud Identity Engine API
    tags:
      - Identity
      - Directory Sync
      - Active Directory
      - Azure AD
      - Cloud Identity
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.strata.paloaltonetworks.com
    humanURL: https://pan.dev/scm/api/config/ciedss/ciedss/
    properties:
      - url: https://pan.dev/scm/api/config/ciedss/ciedss/
        type: Documentation
      - url: https://pan.dev/scm/docs/getstarted/
        type: GettingStarted
    description: >-
      A REST API for the Cloud Identity Engine (CIE) Directory Sync Service
      that aggregates, normalizes, and provides access to enterprise identity
      data from multiple directory sources through a unified API. Supports
      synchronization of user, group, and organizational unit data from
      Active Directory, Azure Active Directory, Okta, Google Workspace, and
      PingFederate. Provides enriched user context including device, location,
      and logon event data for identity-aware security policies. Operates
      within the Strata Cloud Manager platform using its common
      authentication mechanism.
  - aid: palo-alto-networks:prisma-cloud-mssp-api
    name: Prisma Cloud MSSP API
    tags:
      - MSSP
      - Multi-Tenant
      - Managed Services
      - Cloud Security
      - Licensing
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.prismacloud.io
    humanURL: https://pan.dev/prisma-cloud/api/mssp/prisma-cloud-managed-security-service-provider-mssp/
    properties:
      - url: https://pan.dev/prisma-cloud/api/mssp/prisma-cloud-managed-security-service-provider-mssp/
        type: Documentation
    description: >-
      A REST API enabling Managed Security Service Providers to manage
      multi-tenant security operations at scale within Prisma Cloud. The
      API provides endpoints for policy group and tenant group management,
      user account administration, license usage tracking, tenant lifecycle
      operations, stack mapping, and proxy endpoint provisioning.
      Authentication uses JWT-based bearer tokens supporting both
      service-to-service and user-to-service authentication schemes.
  - aid: palo-alto-networks:vm-series-licensing-api
    name: VM-Series Licensing API
    tags:
      - Licensing
      - VM-Series
      - Virtualization
      - Firewall
      - Automation
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://licensing.paloaltonetworks.com
    humanURL: https://docs.paloaltonetworks.com/vm-series/10-2/vm-series-deployment/license-the-vm-series-firewall/vm-series-models/licensing-api
    properties:
      - url: https://docs.paloaltonetworks.com/vm-series/10-2/vm-series-deployment/license-the-vm-series-firewall/vm-series-models/licensing-api
        type: Documentation
    description: >-
      A REST API for licensing VM-Series virtual firewalls that do not
      have direct internet access to the Palo Alto Networks license
      server. Supports automated license activation, deactivation,
      and management for VM-Series deployments across private clouds
      and air-gapped environments. Enables integration with
      orchestration platforms for automated firewall provisioning
      and license lifecycle management.
