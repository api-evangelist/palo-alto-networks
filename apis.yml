    description: >-
      REST APIs for configuring and monitoring Prisma Access, Palo Alto
      Networks' cloud-delivered SASE platform. The Configuration API manages
      security policies, remote networks, service connections, and mobile
      user configurations for cloud-managed tenants. The Insights API
      (versions 1.0 through 3.0) provides health monitoring, tunnel status,
      bandwidth utilization, and user connectivity data. Authentication uses
      OAuth 2.0 with tenant service group (TSG) based credentials via the
      common SASE authentication framework.
  - aid: palo-alto-networks:autonomous-dem-api
    name: Autonomous DEM API
    tags:
