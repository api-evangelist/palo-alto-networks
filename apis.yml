  description: >-
    A REST API for querying the health and performance of Prisma Access
    network deployments across multiple API versions (v1.0, v2.0, v3.0).
    Supports data resource queries for tunnel status, bandwidth utilization,
    connected user analytics, site health, accelerated application
    performance, and PAB events. Available for both cloud-managed
    (TSG-based) and Panorama-managed Prisma Access customers. Uses OAuth
    2.0 bearer token authentication consistent with the SASE platform.
