      Supports reviewing and managing incidents detected across network
      traffic, cloud applications, and email channels. Uses SASE OAuth 2.0
      authentication aligned with the broader Prisma SASE authentication
      framework.
  - aid: palo-alto-networks:prisma-access-api
    name: Prisma Access API
    tags:
