      The Cloud Security Posture Management API for Prisma Cloud (formerly
      RedLock) providing programmatic access to cloud security monitoring
      across AWS, Azure, GCP, and Oracle Cloud. The API supports managing
      security alerts, compliance policies, cloud accounts, asset inventories,
      and remediation workflows. Endpoints cover alert management, policy
      configuration, compliance reporting, cloud account onboarding, resource
      queries using RQL (Resource Query Language), and integration management.
      Authentication uses JWT tokens obtained from the /login endpoint with
      access key credentials.
