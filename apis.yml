      providing infrastructure-as-code scanning, software composition analysis,
      and supply chain security. The API supports checking Terraform,
      CloudFormation, Kubernetes manifests, and Dockerfiles against security
      policies, managing code repositories, retrieving scan results, and
      configuring fix suggestions. Integrates with CI/CD pipelines for
      shift-left security enforcement during the development lifecycle.
  - aid: palo-alto-networks:cortex-xdr-api
