      A REST API for monitoring digital experience metrics within Prisma Access
      environments. The Autonomous Digital Experience Management (ADEM) API
      provides application performance data, network path analysis, endpoint
      health metrics, and user experience scoring. Supports querying
      performance data by user, application, location, and time range to
      identify connectivity and performance issues affecting remote and
      branch users connected through Prisma Access.
