        - name: panos-delete-address-group
          description: "Delete a PAN-OS firewall address group."
          call: pan-os.delete-address-group
          hints:
            - "delete firewall address group"
            - "remove PAN-OS address group"

        - name: panos-list-services
          description: "List PAN-OS firewall service objects."
          call: pan-os.list-services
          hints:
            - "list firewall services"
            - "show PAN-OS service objects"

        - name: panos-create-service
          description: "Create a PAN-OS firewall service object."
          call: pan-os.create-service
          hints:
            - "create firewall service"
            - "add PAN-OS service object"

        - name: panos-update-service
          description: "Update a PAN-OS firewall service object."
          call: pan-os.update-service
          hints:
            - "update firewall service"
            - "modify PAN-OS service object"

        - name: panos-delete-service
          description: "Delete a PAN-OS firewall service object."
          call: pan-os.delete-service
