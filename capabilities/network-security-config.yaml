        # ---------------------------------------------------------------
        # SCM Rule Tools
        # ---------------------------------------------------------------
        - name: scm-list-security-rules
          description: "List Strata Cloud Manager security rules."
          call: strata-cloud-manager.list-security-rules
          hints:
