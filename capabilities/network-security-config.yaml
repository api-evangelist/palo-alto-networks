        - name: scm-get-service
          description: "Get a specific Strata Cloud Manager service object."
          call: strata-cloud-manager.get-service
          hints:
            - "get SCM service"
            - "fetch cloud manager service"

        - name: scm-update-service
          description: "Update a Strata Cloud Manager service object."
          call: strata-cloud-manager.update-service
          hints:
            - "update SCM service"
            - "modify cloud manager service"

        - name: scm-delete-service
          description: "Delete a Strata Cloud Manager service object."
          call: strata-cloud-manager.delete-service
          hints:
