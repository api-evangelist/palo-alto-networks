naftiko: "1.0.0-alpha1"

info:
  label: "Palo Alto Networks Network Security Configuration"
  description: "Unified network security configuration capability for managing firewall objects, security rules, NAT rules, and cloud NGFW rule stacks across PAN-OS, Strata Cloud Manager, and Cloud NGFW."
  tags:
    - Palo Alto Networks
    - Network Security
    - Firewall
    - Security Rules
    - Configuration
  created: "2026-04-16"
  modified: "2026-04-16"

binds:
  - namespace: env
    keys:
      PAN_OS_API_KEY: PAN_OS_API_KEY
      PAN_OS_FIREWALL: PAN_OS_FIREWALL
      STRATA_CLOUD_MANAGER_TOKEN: STRATA_CLOUD_MANAGER_TOKEN
      AWS_ACCESS_KEY_ID: AWS_ACCESS_KEY_ID
      AWS_SECRET_ACCESS_KEY: AWS_SECRET_ACCESS_KEY

capability:
  consumes:
    - import: pan-os
      location: ./shared/pan-os.yaml
    - import: strata-cloud-manager
      location: ./shared/strata-cloud-manager.yaml
    - import: cloud-ngfw
      location: ./shared/cloud-ngfw.yaml

  serves:
    rest:
      port: 8083
      resources:

        # ---------------------------------------------------------------
        # Address Objects
        # ---------------------------------------------------------------

        # PAN-OS Addresses
        - path: /v1/panos-addresses
          operations:
            - method: GET
              operationId: list-panos-addresses
              description: "List PAN-OS address objects."
              call: pan-os.list-addresses
              hints:
                - "list firewall address objects"
                - "show PAN-OS addresses"
              inputParameters:
                - name: location
                  in: query
                  type: string
                  required: false
                  description: "Configuration location (e.g., vsys, panorama)."
                - name: vsys
                  in: query
                  type: string
                  required: false
                  description: "Virtual system name."
                - name: name
                  in: query
                  type: string
                  required: false
                  description: "Filter by address object name."
            - method: POST
              operationId: create-panos-address
              description: "Create a PAN-OS address object."
              call: pan-os.create-address
              hints:
                - "create firewall address object"
                - "add PAN-OS address"
            - method: PUT
              operationId: update-panos-address
              description: "Update a PAN-OS address object."
              call: pan-os.update-address
              hints:
                - "update firewall address object"
                - "modify PAN-OS address"
            - method: DELETE
              operationId: delete-panos-address
              description: "Delete a PAN-OS address object."
              call: pan-os.delete-address
              hints:
                - "delete firewall address object"
                - "remove PAN-OS address"

        # SCM Addresses
        - path: /v1/scm-addresses
          operations:
            - method: GET
              operationId: list-scm-addresses
              description: "List Strata Cloud Manager address objects."
              call: strata-cloud-manager.list-addresses
              hints:
                - "list SCM address objects"
                - "show cloud manager addresses"
              inputParameters:
                - name: folder
                  in: query
                  type: string
                  required: false
                  description: "Folder name."
                - name: snippet
                  in: query
                  type: string
                  required: false
                  description: "Snippet name."
                - name: device
                  in: query
                  type: string
                  required: false
                  description: "Device name."
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of results."
                - name: offset
                  in: query
                  type: integer
                  required: false
                  description: "Result offset for pagination."
                - name: name
                  in: query
                  type: string
                  required: false
                  description: "Filter by address name."
            - method: POST
              operationId: create-scm-address
              description: "Create a Strata Cloud Manager address object."
              call: strata-cloud-manager.create-address
              hints:
                - "create SCM address"
                - "add cloud manager address"

        - path: /v1/scm-addresses/{id}
          operations:
            - method: GET
              operationId: get-scm-address
              description: "Get a specific Strata Cloud Manager address object."
              call: strata-cloud-manager.get-address
              hints:
                - "get SCM address by ID"
                - "fetch cloud manager address"
            - method: PUT
              operationId: update-scm-address
              description: "Update a Strata Cloud Manager address object."
              call: strata-cloud-manager.update-address
              hints:
                - "update SCM address"
                - "modify cloud manager address"
            - method: DELETE
              operationId: delete-scm-address
              description: "Delete a Strata Cloud Manager address object."
              call: strata-cloud-manager.delete-address
              hints:
                - "delete SCM address"
                - "remove cloud manager address"

        # ---------------------------------------------------------------
        # Address Groups
        # ---------------------------------------------------------------

        # PAN-OS Address Groups
        - path: /v1/panos-address-groups
          operations:
            - method: GET
              operationId: list-panos-address-groups
              description: "List PAN-OS address groups."
              call: pan-os.list-address-groups
              hints:
                - "list firewall address groups"
                - "show PAN-OS address groups"
            - method: POST
              operationId: create-panos-address-group
              description: "Create a PAN-OS address group."
              call: pan-os.create-address-group
              hints:
                - "create firewall address group"
                - "add PAN-OS address group"
            - method: PUT
              operationId: update-panos-address-group
              description: "Update a PAN-OS address group."
              call: pan-os.update-address-group
              hints:
                - "update firewall address group"
                - "modify PAN-OS address group"
            - method: DELETE
              operationId: delete-panos-address-group
              description: "Delete a PAN-OS address group."
              call: pan-os.delete-address-group
              hints:
                - "delete firewall address group"
                - "remove PAN-OS address group"

        # SCM Address Groups
        - path: /v1/scm-address-groups
          operations:
            - method: GET
              operationId: list-scm-address-groups
              description: "List Strata Cloud Manager address groups."
              call: strata-cloud-manager.list-address-groups
              hints:
                - "list SCM address groups"
                - "show cloud manager address groups"
            - method: POST
              operationId: create-scm-address-group
              description: "Create a Strata Cloud Manager address group."
              call: strata-cloud-manager.create-address-group
              hints:
                - "create SCM address group"
                - "add cloud manager address group"

        - path: /v1/scm-address-groups/{id}
          operations:
            - method: GET
              operationId: get-scm-address-group
              description: "Get a specific Strata Cloud Manager address group."
              call: strata-cloud-manager.get-address-group
              hints:
                - "get SCM address group by ID"
                - "fetch cloud manager address group"
            - method: PUT
              operationId: update-scm-address-group
              description: "Update a Strata Cloud Manager address group."
              call: strata-cloud-manager.update-address-group
              hints:
                - "update SCM address group"
                - "modify cloud manager address group"
            - method: DELETE
              operationId: delete-scm-address-group
              description: "Delete a Strata Cloud Manager address group."
              call: strata-cloud-manager.delete-address-group
              hints:
                - "delete SCM address group"
                - "remove cloud manager address group"

        # ---------------------------------------------------------------
        # Service Objects
        # ---------------------------------------------------------------

        # PAN-OS Services
        - path: /v1/panos-services
          operations:
            - method: GET
              operationId: list-panos-services
              description: "List PAN-OS service objects."
              call: pan-os.list-services
              hints:
                - "list firewall service objects"
                - "show PAN-OS services"
            - method: POST
              operationId: create-panos-service
              description: "Create a PAN-OS service object."
              call: pan-os.create-service
              hints:
                - "create firewall service object"
                - "add PAN-OS service"
            - method: PUT
              operationId: update-panos-service
              description: "Update a PAN-OS service object."
              call: pan-os.update-service
              hints:
                - "update firewall service object"
                - "modify PAN-OS service"
            - method: DELETE
              operationId: delete-panos-service
              description: "Delete a PAN-OS service object."
              call: pan-os.delete-service
              hints:
                - "delete firewall service object"
                - "remove PAN-OS service"

        # SCM Services
        - path: /v1/scm-services
          operations:
            - method: GET
              operationId: list-scm-services
              description: "List Strata Cloud Manager service objects."
              call: strata-cloud-manager.list-services
              hints:
                - "list SCM service objects"
                - "show cloud manager services"
            - method: POST
              operationId: create-scm-service
              description: "Create a Strata Cloud Manager service object."
              call: strata-cloud-manager.create-service
              hints:
                - "create SCM service"
                - "add cloud manager service"

        - path: /v1/scm-services/{id}
          operations:
            - method: GET
              operationId: get-scm-service
              description: "Get a specific Strata Cloud Manager service object."
              call: strata-cloud-manager.get-service
              hints:
                - "get SCM service by ID"
                - "fetch cloud manager service"
            - method: PUT
              operationId: update-scm-service
              description: "Update a Strata Cloud Manager service object."
              call: strata-cloud-manager.update-service
              hints:
                - "update SCM service"
                - "modify cloud manager service"
            - method: DELETE
              operationId: delete-scm-service
              description: "Delete a Strata Cloud Manager service object."
              call: strata-cloud-manager.delete-service
              hints:
                - "delete SCM service"
                - "remove cloud manager service"

        # ---------------------------------------------------------------
        # Security Rules (SCM)
        # ---------------------------------------------------------------
        - path: /v1/scm-security-rules
          operations:
            - method: GET
              operationId: list-scm-security-rules
              description: "List Strata Cloud Manager security rules."
              call: strata-cloud-manager.list-security-rules
              hints:
                - "list SCM security rules"
                - "show cloud manager security policies"
              inputParameters:
                - name: folder
                  in: query
                  type: string
                  required: false
                  description: "Folder name."
                - name: snippet
                  in: query
                  type: string
                  required: false
                  description: "Snippet name."
                - name: device
                  in: query
                  type: string
                  required: false
                  description: "Device name."
                - name: position
                  in: query
                  type: string
                  required: false
                  description: "Rule position (pre, post)."
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of results."
                - name: offset
                  in: query
                  type: integer
                  required: false
                  description: "Result offset for pagination."
                - name: name
                  in: query
                  type: string
                  required: false
                  description: "Filter by rule name."
            - method: POST
              operationId: create-scm-security-rule
              description: "Create a Strata Cloud Manager security rule."
              call: strata-cloud-manager.create-security-rule
              hints:
                - "create SCM security rule"
                - "add cloud manager security policy"

        - path: /v1/scm-security-rules/{id}
          operations:
            - method: GET
              operationId: get-scm-security-rule
              description: "Get a specific Strata Cloud Manager security rule."
              call: strata-cloud-manager.get-security-rule
              hints:
                - "get SCM security rule by ID"
                - "fetch cloud manager security rule"
            - method: PUT
              operationId: update-scm-security-rule
              description: "Update a Strata Cloud Manager security rule."
              call: strata-cloud-manager.update-security-rule
              hints:
                - "update SCM security rule"
                - "modify cloud manager security policy"
            - method: DELETE
              operationId: delete-scm-security-rule
              description: "Delete a Strata Cloud Manager security rule."
              call: strata-cloud-manager.delete-security-rule
              hints:
                - "delete SCM security rule"
                - "remove cloud manager security policy"

        # ---------------------------------------------------------------
        # NAT Rules (SCM)
        # ---------------------------------------------------------------
        - path: /v1/scm-nat-rules
          operations:
            - method: GET
              operationId: list-scm-nat-rules
              description: "List Strata Cloud Manager NAT rules."
              call: strata-cloud-manager.list-nat-rules
              hints:
                - "list SCM NAT rules"
                - "show cloud manager NAT policies"
            - method: POST
              operationId: create-scm-nat-rule
              description: "Create a Strata Cloud Manager NAT rule."
              call: strata-cloud-manager.create-nat-rule
              hints:
                - "create SCM NAT rule"
                - "add cloud manager NAT policy"

        # ---------------------------------------------------------------
        # Configuration Management (SCM)
        # ---------------------------------------------------------------
        - path: /v1/config/push
          operations:
            - method: POST
              operationId: push-scm-candidate-config
              description: "Push the candidate configuration in Strata Cloud Manager."
              call: strata-cloud-manager.push-candidate-config
              hints:
                - "push SCM configuration"
                - "deploy cloud manager config"
                - "commit SCM changes"

        - path: /v1/config/jobs/{job_id}
          operations:
            - method: GET
              operationId: get-scm-job
              description: "Get the status of a Strata Cloud Manager configuration job."
              call: strata-cloud-manager.get-job
              hints:
                - "get SCM job status"
                - "check config push status"

        # ---------------------------------------------------------------
        # Cloud NGFW Rule Stacks
        # ---------------------------------------------------------------
        - path: /v1/rule-stacks
          operations:
            - method: GET
              operationId: list-rule-stacks
              description: "List Cloud NGFW rule stacks."
              call: cloud-ngfw.list-rule-stacks
              hints:
                - "list cloud NGFW rule stacks"
                - "show rule stacks"
            - method: POST
              operationId: create-rule-stack
              description: "Create a Cloud NGFW rule stack."
              call: cloud-ngfw.create-rule-stack
              hints:
                - "create cloud NGFW rule stack"
                - "add rule stack"

        - path: /v1/rule-stacks/{rulestack_id}
          operations:
            - method: GET
              operationId: get-rule-stack
              description: "Get a specific Cloud NGFW rule stack."
              call: cloud-ngfw.get-rule-stack
              hints:
                - "get cloud NGFW rule stack"
                - "fetch rule stack details"
            - method: PUT
              operationId: update-rule-stack
              description: "Update a Cloud NGFW rule stack."
              call: cloud-ngfw.update-rule-stack
              hints:
                - "update cloud NGFW rule stack"
                - "modify rule stack"
            - method: DELETE
              operationId: delete-rule-stack
              description: "Delete a Cloud NGFW rule stack."
              call: cloud-ngfw.delete-rule-stack
              hints:
                - "delete cloud NGFW rule stack"
                - "remove rule stack"

        - path: /v1/rule-stacks/{rulestack_id}/commit
          operations:
            - method: POST
              operationId: commit-rule-stack
              description: "Commit a Cloud NGFW rule stack."
              call: cloud-ngfw.commit-rule-stack
              hints:
                - "commit cloud NGFW rule stack"
                - "deploy rule stack changes"

        # ---------------------------------------------------------------
        # Cloud NGFW Security Rules
        # ---------------------------------------------------------------
        - path: /v1/rule-stacks/{rulestack_id}/security-rules
          operations:
            - method: GET
              operationId: list-cloud-security-rules
              description: "List Cloud NGFW security rules in a rule stack."
              call: cloud-ngfw.list-security-rules
              hints:
                - "list cloud NGFW security rules"
                - "show cloud firewall rules"
            - method: POST
              operationId: create-cloud-security-rule
              description: "Create a Cloud NGFW security rule in a rule stack."
              call: cloud-ngfw.create-security-rule
              hints:
                - "create cloud NGFW security rule"
                - "add cloud firewall rule"

        - path: /v1/rule-stacks/{rulestack_id}/security-rules/{priority}
          operations:
            - method: GET
              operationId: get-cloud-security-rule
              description: "Get a specific Cloud NGFW security rule by priority."
              call: cloud-ngfw.get-security-rule
              hints:
                - "get cloud NGFW security rule"
                - "fetch cloud firewall rule"
            - method: PUT
              operationId: update-cloud-security-rule
              description: "Update a Cloud NGFW security rule."
              call: cloud-ngfw.update-security-rule
              hints:
                - "update cloud NGFW security rule"
                - "modify cloud firewall rule"
            - method: DELETE
              operationId: delete-cloud-security-rule
              description: "Delete a Cloud NGFW security rule."
              call: cloud-ngfw.delete-security-rule
              hints:
                - "delete cloud NGFW security rule"
                - "remove cloud firewall rule"

        # ---------------------------------------------------------------
        # Cloud NGFW FQDN Lists
        # ---------------------------------------------------------------
        - path: /v1/rule-stacks/{rulestack_id}/fqdn-lists
          operations:
            - method: GET
              operationId: list-fqdn-lists
              description: "List Cloud NGFW FQDN lists in a rule stack."
              call: cloud-ngfw.list-fqdn-lists
              hints:
                - "list cloud NGFW FQDN lists"
                - "show FQDN lists"
            - method: POST
              operationId: create-fqdn-list
              description: "Create a Cloud NGFW FQDN list in a rule stack."
              call: cloud-ngfw.create-fqdn-list
              hints:
                - "create cloud NGFW FQDN list"
                - "add FQDN list"

        # ---------------------------------------------------------------
        # Cloud NGFW Prefix Lists
        # ---------------------------------------------------------------
        - path: /v1/rule-stacks/{rulestack_id}/prefix-lists
          operations:
            - method: GET
              operationId: list-prefix-lists
              description: "List Cloud NGFW prefix lists in a rule stack."
              call: cloud-ngfw.list-prefix-lists
              hints:
                - "list cloud NGFW prefix lists"
                - "show prefix lists"
            - method: POST
              operationId: create-prefix-list
              description: "Create a Cloud NGFW prefix list in a rule stack."
              call: cloud-ngfw.create-prefix-list
              hints:
                - "create cloud NGFW prefix list"
                - "add prefix list"

        # ---------------------------------------------------------------
        # Cloud NGFW Firewalls
        # ---------------------------------------------------------------
        - path: /v1/cloud-firewalls
          operations:
            - method: GET
              operationId: list-cloud-firewalls
              description: "List Cloud NGFW firewalls."
              call: cloud-ngfw.list-firewalls
              hints:
                - "list cloud NGFW firewalls"
                - "show cloud firewalls"
            - method: POST
              operationId: create-cloud-firewall
              description: "Create a Cloud NGFW firewall."
              call: cloud-ngfw.create-firewall
              hints:
                - "create cloud NGFW firewall"
                - "add cloud firewall"

        - path: /v1/cloud-firewalls/{firewall_id}
          operations:
            - method: GET
              operationId: get-cloud-firewall
              description: "Get a specific Cloud NGFW firewall."
              call: cloud-ngfw.get-firewall
              hints:
                - "get cloud NGFW firewall"
                - "fetch cloud firewall details"
            - method: PUT
              operationId: update-cloud-firewall
              description: "Update a Cloud NGFW firewall."
              call: cloud-ngfw.update-firewall
              hints:
                - "update cloud NGFW firewall"
                - "modify cloud firewall"
            - method: DELETE
              operationId: delete-cloud-firewall
              description: "Delete a Cloud NGFW firewall."
              call: cloud-ngfw.delete-firewall
              hints:
                - "delete cloud NGFW firewall"
                - "remove cloud firewall"

    mcp:
      port: 9093
      tools:

        # ---------------------------------------------------------------
        # PAN-OS Object Tools
        # ---------------------------------------------------------------
        - name: panos-list-addresses
          description: "List PAN-OS firewall address objects."
          call: pan-os.list-addresses
          hints:
            - "list firewall address objects"
            - "show PAN-OS addresses"

        - name: panos-create-address
          description: "Create a PAN-OS firewall address object."
          call: pan-os.create-address
          hints:
            - "create firewall address"
            - "add PAN-OS address object"

        - name: panos-update-address
          description: "Update a PAN-OS firewall address object."
          call: pan-os.update-address
          hints:
            - "update firewall address"
            - "modify PAN-OS address object"

        - name: panos-delete-address
          description: "Delete a PAN-OS firewall address object."
          call: pan-os.delete-address
