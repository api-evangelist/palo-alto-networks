naftiko: "1.0.0-alpha1"

info:
  label: "Palo Alto Networks Monitoring and Observability"
  description: "Unified monitoring and observability capability for tracking digital experience, aggregating security data, managing log forwarding, and running best practice assessments across Autonomous DEM, SASE Aggregate Monitoring, Strata Logging Service, and AIOps BPA APIs."
  tags:
    - Palo Alto Networks
    - Monitoring
    - Observability
    - Logging
    - Digital Experience
    - Best Practice Assessment
    - Notifications
  created: "2026-04-16"
  modified: "2026-04-16"

binds:
  - namespace: env
    keys:
      PALO_ALTO_OAUTH_TOKEN: PALO_ALTO_OAUTH_TOKEN

capability:
  consumes:
    - import: autonomous-dem
      location: ./shared/autonomous-dem.yaml
    - import: sase-aggregate-monitoring
      location: ./shared/sase-aggregate-monitoring.yaml
    - import: strata-logging-service
      location: ./shared/strata-logging-service.yaml
    - import: aiops-ngfw-bpa
      location: ./shared/aiops-ngfw-bpa.yaml
    - import: sase-multitenant-notifications
      location: ./shared/sase-multitenant-notifications.yaml

  exposes:
    - type: rest
      port: 8087
      namespace: monitoring-and-observability-api
      description: "Unified REST API for monitoring and observability workflows across Autonomous DEM, SASE Aggregate Monitoring, Strata Logging Service, and AIOps BPA."
      resources:

        # -------------------------------------------------------
        # Digital Experience Monitoring (Autonomous DEM)
        # -------------------------------------------------------
        - path: /v1/dem-application-scores
          name: dem-application-scores
          description: "Application experience scores from Autonomous DEM."
          operations:
            - method: GET
              name: get-dem-application-scores
              description: "Get application experience scores."
              inputParameters:
                - name: start_time
                  in: query
                  type: string
                  required: false
                  description: "Start time for the query range."
                - name: end_time
                  in: query
                  type: string
                  required: false
                  description: "End time for the query range."
                - name: offset
                  in: query
                  type: integer
                  required: false
                  description: "Pagination offset."
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of results to return."
              call: "autonomous-dem.get-application-scores"
              with:
                start_time: "rest.start_time"
                end_time: "rest.end_time"
                offset: "rest.offset"
                limit: "rest.limit"
              outputParameters:
                - type: array
                  mapping: "$."

        - path: /v1/dem-agent-scores
          name: dem-agent-scores
          description: "Agent and endpoint scores from Autonomous DEM."
          operations:
            - method: GET
              name: get-dem-agent-scores
              description: "Get agent and endpoint scores."
              inputParameters:
                - name: start_time
                  in: query
                  type: string
                  required: false
                  description: "Start time for the query range."
                - name: end_time
                  in: query
                  type: string
                  required: false
                  description: "End time for the query range."
                - name: offset
                  in: query
                  type: integer
                  required: false
                  description: "Pagination offset."
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of results to return."
              call: "autonomous-dem.get-agent-scores"
              with:
                start_time: "rest.start_time"
                end_time: "rest.end_time"
                offset: "rest.offset"
                limit: "rest.limit"
              outputParameters:
                - type: array
                  mapping: "$."

        - path: /v1/dem-tests/{test_id}/results
          name: dem-test-results
          description: "Synthetic test results from Autonomous DEM."
          operations:
            - method: GET
              name: get-dem-test-results
              description: "Get synthetic test results."
              inputParameters:
                - name: test_id
                  in: path
                  type: string
                  required: true
                  description: "The ID of the test."
                - name: start_time
                  in: query
                  type: string
                  required: false
                  description: "Start time for the query range."
                - name: end_time
                  in: query
                  type: string
                  required: false
                  description: "End time for the query range."
              call: "autonomous-dem.get-test-results"
              with:
                test_id: "rest.test_id"
                start_time: "rest.start_time"
                end_time: "rest.end_time"
              outputParameters:
                - type: array
                  mapping: "$."

        - path: /v1/dem-applications
          name: dem-applications
          description: "Monitored applications from Autonomous DEM."
          operations:
            - method: GET
              name: list-dem-applications
              description: "List monitored applications."
              inputParameters:
                - name: offset
                  in: query
                  type: integer
                  required: false
                  description: "Pagination offset."
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of results to return."
              call: "autonomous-dem.list-monitored-applications"
              with:
                offset: "rest.offset"
                limit: "rest.limit"
              outputParameters:
                - type: array
                  mapping: "$."

        - path: /v1/dem-agents
          name: dem-agents
          description: "Monitored agents from Autonomous DEM."
          operations:
            - method: GET
              name: list-dem-agents
              description: "List monitored agents."
              inputParameters:
                - name: offset
                  in: query
                  type: integer
                  required: false
                  description: "Pagination offset."
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of results to return."
              call: "autonomous-dem.list-monitored-agents"
              with:
                offset: "rest.offset"
                limit: "rest.limit"
              outputParameters:
                - type: array
                  mapping: "$."

        - path: /v1/dem-metrics
          name: dem-metrics
          description: "Performance metrics from Autonomous DEM."
          operations:
            - method: GET
              name: get-dem-metrics
              description: "Get performance metrics."
              inputParameters:
                - name: start_time
                  in: query
                  type: string
                  required: false
                  description: "Start time for the query range."
                - name: end_time
                  in: query
                  type: string
                  required: false
                  description: "End time for the query range."
                - name: metric_type
                  in: query
                  type: string
                  required: false
                  description: "The type of metric to retrieve."
                - name: granularity
                  in: query
                  type: string
                  required: false
                  description: "The granularity of the metrics."
              call: "autonomous-dem.get-performance-metrics"
              with:
                start_time: "rest.start_time"
                end_time: "rest.end_time"
                metric_type: "rest.metric_type"
                granularity: "rest.granularity"
              outputParameters:
                - type: array
                  mapping: "$."

        # -------------------------------------------------------
        # Aggregate Monitoring (SASE Aggregate Monitoring)
        # -------------------------------------------------------
        - path: /v1/monitoring/threats
          name: monitoring-threats
          description: "Query aggregated threat monitoring data."
          operations:
            - method: POST
              name: query-threat-data
              description: "Query aggregated threat monitoring data with filters, time ranges, and grouping."
              inputParameters:
                - name: tsg_id
                  in: body
                  type: string
                  required: false
                  description: "Tenant service group ID."
                - name: filter
                  in: body
                  type: object
                  required: false
                  description: "Filter criteria."
                - name: time_range
                  in: body
                  type: object
                  required: false
                  description: "Time range for the query."
                - name: count
                  in: body
                  type: integer
                  required: false
                  description: "Number of results to return."
                - name: histogram
                  in: body
                  type: object
                  required: false
                  description: "Histogram configuration."
                - name: group_by
                  in: body
                  type: object
                  required: false
                  description: "Group by configuration."
                - name: sort
                  in: body
                  type: object
                  required: false
                  description: "Sort configuration."
              call: "sase-aggregate-monitoring.query-threat-data"
              with:
                tsg_id: "rest.tsg_id"
                filter: "rest.filter"
                time_range: "rest.time_range"
                count: "rest.count"
                histogram: "rest.histogram"
                group_by: "rest.group_by"
                sort: "rest.sort"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/monitoring/urls
          name: monitoring-urls
          description: "Query aggregated URL monitoring data."
          operations:
            - method: POST
              name: query-url-data
              description: "Query aggregated URL monitoring data with filters, time ranges, and grouping."
              inputParameters:
                - name: tsg_id
                  in: body
                  type: string
                  required: false
                  description: "Tenant service group ID."
                - name: filter
                  in: body
                  type: object
                  required: false
                  description: "Filter criteria."
                - name: time_range
                  in: body
                  type: object
                  required: false
                  description: "Time range for the query."
                - name: count
                  in: body
                  type: integer
                  required: false
                  description: "Number of results to return."
                - name: histogram
                  in: body
                  type: object
                  required: false
                  description: "Histogram configuration."
                - name: group_by
                  in: body
                  type: object
                  required: false
                  description: "Group by configuration."
                - name: sort
                  in: body
                  type: object
                  required: false
                  description: "Sort configuration."
              call: "sase-aggregate-monitoring.query-url-data"
              with:
                tsg_id: "rest.tsg_id"
                filter: "rest.filter"
                time_range: "rest.time_range"
                count: "rest.count"
                histogram: "rest.histogram"
                group_by: "rest.group_by"
                sort: "rest.sort"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/monitoring/applications
          name: monitoring-applications
          description: "Query aggregated application monitoring data."
          operations:
            - method: POST
              name: query-application-data
              description: "Query aggregated application monitoring data with filters, time ranges, and grouping."
              inputParameters:
                - name: tsg_id
                  in: body
                  type: string
                  required: false
                  description: "Tenant service group ID."
                - name: filter
                  in: body
                  type: object
                  required: false
                  description: "Filter criteria."
                - name: time_range
                  in: body
                  type: object
                  required: false
                  description: "Time range for the query."
                - name: count
                  in: body
                  type: integer
                  required: false
                  description: "Number of results to return."
                - name: histogram
                  in: body
                  type: object
                  required: false
                  description: "Histogram configuration."
                - name: group_by
                  in: body
                  type: object
                  required: false
                  description: "Group by configuration."
                - name: sort
                  in: body
                  type: object
                  required: false
                  description: "Sort configuration."
              call: "sase-aggregate-monitoring.query-application-data"
              with:
                tsg_id: "rest.tsg_id"
                filter: "rest.filter"
                time_range: "rest.time_range"
                count: "rest.count"
                histogram: "rest.histogram"
                group_by: "rest.group_by"
                sort: "rest.sort"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/monitoring/bandwidth
          name: monitoring-bandwidth
          description: "Query aggregated bandwidth monitoring data."
          operations:
            - method: POST
              name: query-bandwidth-data
              description: "Query aggregated bandwidth monitoring data with filters, time ranges, and grouping."
              inputParameters:
                - name: tsg_id
                  in: body
                  type: string
                  required: false
                  description: "Tenant service group ID."
                - name: filter
                  in: body
                  type: object
                  required: false
                  description: "Filter criteria."
                - name: time_range
                  in: body
                  type: object
                  required: false
                  description: "Time range for the query."
                - name: count
                  in: body
                  type: integer
                  required: false
                  description: "Number of results to return."
                - name: histogram
                  in: body
                  type: object
                  required: false
                  description: "Histogram configuration."
                - name: group_by
                  in: body
                  type: object
                  required: false
                  description: "Group by configuration."
                - name: sort
                  in: body
                  type: object
                  required: false
                  description: "Sort configuration."
              call: "sase-aggregate-monitoring.query-bandwidth-data"
              with:
                tsg_id: "rest.tsg_id"
                filter: "rest.filter"
                time_range: "rest.time_range"
                count: "rest.count"
                histogram: "rest.histogram"
                group_by: "rest.group_by"
                sort: "rest.sort"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/monitoring/licenses
          name: monitoring-licenses
          description: "Query aggregated license monitoring data."
          operations:
            - method: POST
              name: query-license-data
              description: "Query aggregated license monitoring data with filters, time ranges, and grouping."
              inputParameters:
                - name: tsg_id
                  in: body
                  type: string
                  required: false
                  description: "Tenant service group ID."
                - name: filter
                  in: body
                  type: object
                  required: false
                  description: "Filter criteria."
                - name: time_range
                  in: body
                  type: object
                  required: false
                  description: "Time range for the query."
                - name: count
                  in: body
                  type: integer
                  required: false
                  description: "Number of results to return."
                - name: histogram
                  in: body
                  type: object
                  required: false
                  description: "Histogram configuration."
                - name: group_by
                  in: body
                  type: object
                  required: false
                  description: "Group by configuration."
                - name: sort
                  in: body
                  type: object
                  required: false
                  description: "Sort configuration."
              call: "sase-aggregate-monitoring.query-license-data"
              with:
                tsg_id: "rest.tsg_id"
                filter: "rest.filter"
                time_range: "rest.time_range"
                count: "rest.count"
                histogram: "rest.histogram"
                group_by: "rest.group_by"
                sort: "rest.sort"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/monitoring/tenants
          name: monitoring-tenants
          description: "List monitoring tenants."
          operations:
            - method: GET
              name: list-monitoring-tenants
              description: "List all tenants available for monitoring."
              inputParameters:
                - name: tsg_id
                  in: query
                  type: string
                  required: false
                  description: "Tenant service group ID."
              call: "sase-aggregate-monitoring.list-monitoring-tenants"
              with:
                tsg_id: "rest.tsg_id"
              outputParameters:
                - type: array
                  mapping: "$."

        # -------------------------------------------------------
        # Log Forwarding (Strata Logging Service)
        # -------------------------------------------------------
        - path: /v1/log-forwarding-profiles
          name: log-forwarding-profiles
          description: "Log forwarding profile management."
          operations:
            - method: GET
              name: list-log-forwarding-profiles
              description: "List all log forwarding profiles."
              inputParameters:
                - name: offset
                  in: query
                  type: integer
                  required: false
                  description: "Pagination offset."
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of results to return."
              call: "strata-logging-service.list-log-forwarding-profiles"
              with:
                offset: "rest.offset"
                limit: "rest.limit"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-log-forwarding-profile
              description: "Create a new log forwarding profile."
              inputParameters:
                - name: name
                  in: body
                  type: string
                  required: true
                  description: "Name of the log forwarding profile."
                - name: log_types
                  in: body
                  type: object
                  required: true
                  description: "Log types to forward."
                - name: description
                  in: body
                  type: string
                  required: false
                  description: "Description of the profile."
                - name: enabled
                  in: body
                  type: boolean
                  required: false
                  description: "Whether the profile is enabled."
              call: "strata-logging-service.create-log-forwarding-profile"
              with:
                name: "rest.name"
                log_types: "rest.log_types"
                description: "rest.description"
                enabled: "rest.enabled"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/log-forwarding-profiles/{profile_id}
          name: log-forwarding-profile
          description: "Individual log forwarding profile operations."
          operations:
            - method: GET
              name: get-log-forwarding-profile
              description: "Get a specific log forwarding profile by ID."
              inputParameters:
                - name: profile_id
                  in: path
                  type: string
                  required: true
                  description: "The log forwarding profile ID."
              call: "strata-logging-service.get-log-forwarding-profile"
              with:
                profile_id: "rest.profile_id"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: PUT
              name: update-log-forwarding-profile
              description: "Update a specific log forwarding profile by ID."
              inputParameters:
                - name: profile_id
                  in: path
                  type: string
                  required: true
                  description: "The log forwarding profile ID."
              call: "strata-logging-service.update-log-forwarding-profile"
              with:
                profile_id: "rest.profile_id"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: DELETE
              name: delete-log-forwarding-profile
              description: "Delete a specific log forwarding profile by ID."
              inputParameters:
                - name: profile_id
                  in: path
                  type: string
                  required: true
                  description: "The log forwarding profile ID."
              call: "strata-logging-service.delete-log-forwarding-profile"
              with:
                profile_id: "rest.profile_id"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/log-forwarding-profiles/{profile_id}/destinations/syslog
          name: syslog-destinations
          description: "Syslog destination management for log forwarding profiles."
          operations:
            - method: GET
              name: list-syslog-destinations
              description: "List syslog destinations for a log forwarding profile."
              inputParameters:
                - name: profile_id
                  in: path
                  type: string
                  required: true
                  description: "The log forwarding profile ID."
              call: "strata-logging-service.list-syslog-destinations"
              with:
                profile_id: "rest.profile_id"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-syslog-destination
              description: "Create a syslog destination for a log forwarding profile."
              inputParameters:
                - name: profile_id
                  in: path
                  type: string
                  required: true
                  description: "The log forwarding profile ID."
                - name: name
                  in: body
                  type: string
                  required: true
                  description: "Name of the syslog destination."
                - name: server
                  in: body
                  type: string
                  required: true
                  description: "Syslog server address."
                - name: port
                  in: body
                  type: integer
                  required: true
                  description: "Syslog server port."
                - name: protocol
                  in: body
                  type: string
                  required: true
                  description: "Transport protocol."
                - name: format
                  in: body
                  type: string
                  required: true
                  description: "Syslog message format."
                - name: facility
                  in: body
                  type: string
                  required: true
                  description: "Syslog facility."
                - name: enabled
                  in: body
                  type: boolean
                  required: false
                  description: "Whether the destination is enabled."
              call: "strata-logging-service.create-syslog-destination"
              with:
                profile_id: "rest.profile_id"
                name: "rest.name"
                server: "rest.server"
                port: "rest.port"
                protocol: "rest.protocol"
                format: "rest.format"
                facility: "rest.facility"
                enabled: "rest.enabled"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/log-forwarding-profiles/{profile_id}/destinations/https
          name: https-destinations
          description: "HTTPS destination management for log forwarding profiles."
          operations:
            - method: GET
              name: list-https-destinations
              description: "List HTTPS destinations for a log forwarding profile."
              inputParameters:
                - name: profile_id
                  in: path
                  type: string
                  required: true
                  description: "The log forwarding profile ID."
              call: "strata-logging-service.list-https-destinations"
              with:
                profile_id: "rest.profile_id"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-https-destination
              description: "Create an HTTPS destination for a log forwarding profile."
              inputParameters:
                - name: profile_id
                  in: path
                  type: string
                  required: true
                  description: "The log forwarding profile ID."
                - name: name
                  in: body
                  type: string
                  required: true
                  description: "Name of the HTTPS destination."
                - name: uri
                  in: body
                  type: string
                  required: true
                  description: "HTTPS destination URI."
                - name: http_method
                  in: body
                  type: string
                  required: true
                  description: "HTTP method to use."
                - name: headers
                  in: body
                  type: object
                  required: false
                  description: "Custom HTTP headers."
                - name: tls_verify
                  in: body
                  type: boolean
                  required: false
                  description: "Whether to verify TLS certificates."
                - name: enabled
                  in: body
                  type: boolean
                  required: false
                  description: "Whether the destination is enabled."
              call: "strata-logging-service.create-https-destination"
              with:
                profile_id: "rest.profile_id"
                name: "rest.name"
                uri: "rest.uri"
                http_method: "rest.http_method"
                headers: "rest.headers"
                tls_verify: "rest.tls_verify"
                enabled: "rest.enabled"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/log-forwarding-profiles/{profile_id}/destinations/email
          name: email-destinations
          description: "Email destination management for log forwarding profiles."
          operations:
            - method: GET
              name: list-email-destinations
              description: "List email destinations for a log forwarding profile."
              inputParameters:
                - name: profile_id
                  in: path
                  type: string
                  required: true
                  description: "The log forwarding profile ID."
              call: "strata-logging-service.list-email-destinations"
              with:
                profile_id: "rest.profile_id"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-email-destination
              description: "Create an email destination for a log forwarding profile."
              inputParameters:
                - name: profile_id
                  in: path
                  type: string
                  required: true
                  description: "The log forwarding profile ID."
                - name: name
                  in: body
                  type: string
                  required: true
                  description: "Name of the email destination."
                - name: gateway
                  in: body
                  type: string
                  required: true
                  description: "Email gateway server."
                - name: from
                  in: body
                  type: string
                  required: true
                  description: "From email address."
                - name: to
                  in: body
                  type: string
                  required: true
                  description: "To email address."
                - name: and_also_to
                  in: body
                  type: string
                  required: false
                  description: "Additional recipient email address."
                - name: enabled
                  in: body
                  type: boolean
                  required: false
                  description: "Whether the destination is enabled."
              call: "strata-logging-service.create-email-destination"
              with:
                profile_id: "rest.profile_id"
                name: "rest.name"
                gateway: "rest.gateway"
                from: "rest.from"
                to: "rest.to"
                and_also_to: "rest.and_also_to"
                enabled: "rest.enabled"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/log-forwarding-profiles/{profile_id}/status
          name: log-forwarding-status
          description: "Log forwarding profile status."
          operations:
            - method: GET
              name: get-log-forwarding-status
              description: "Get the status of a log forwarding profile."
              inputParameters:
                - name: profile_id
                  in: path
                  type: string
                  required: true
                  description: "The log forwarding profile ID."
              call: "strata-logging-service.get-log-forwarding-status"
              with:
                profile_id: "rest.profile_id"
              outputParameters:
                - type: object
                  mapping: "$."

        # -------------------------------------------------------
        # Best Practice Assessment (AIOps NGFW BPA)
        # -------------------------------------------------------
        - path: /v1/bpa-requests
          name: bpa-requests
          description: "BPA request operations."
          operations:
            - method: POST
              name: submit-bpa-request
              description: "Submit a BPA request."
              inputParameters:
                - name: device_serial
                  in: body
                  type: string
                  required: true
                  description: "The serial number of the device to assess."
                - name: config_type
                  in: body
                  type: string
                  required: true
                  description: "The configuration type for the BPA request."
              call: "aiops-ngfw-bpa.submit-bpa-request"
              with:
                device_serial: "rest.device_serial"
                config_type: "rest.config_type"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/bpa-requests/{request_id}
          name: bpa-request-status
          description: "BPA request status."
          operations:
            - method: GET
              name: get-bpa-request-status
              description: "Check the status of a BPA request."
              inputParameters:
                - name: request_id
