      tools:

        # ── Prisma Access ────────────────────────────────────────────────
        - name: list-remote-networks
          description: "List all Prisma Access remote networks with pagination."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          inputParameters:
            - name: offset
              type: integer
              required: false
            - name: limit
              type: integer
              required: false
          call: "prisma-access.list-remote-networks"
