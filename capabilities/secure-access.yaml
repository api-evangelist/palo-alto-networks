naftiko: "1.0.0-alpha1"

info:
  label: "Palo Alto Networks Secure Access"
  description: "Unified secure access capability for managing remote networks, ZTNA connectors, SD-WAN sites, 5G network slices, and SASE configuration across Prisma Access, ZTNA Connector, SD-WAN, Config Orchestration, and 5G APIs."
  tags:
    - Palo Alto Networks
    - Secure Access
    - SASE
    - SD-WAN
    - ZTNA
    - 5G
    - Service Provider Interconnect
  created: "2026-04-16"
  modified: "2026-04-16"

binds:
  - namespace: env
    keys:
      PALO_ALTO_OAUTH_TOKEN: PALO_ALTO_OAUTH_TOKEN

capability:
  consumes:
    - import: prisma-access
      location: ./shared/prisma-access.yaml
    - import: ztna-connector
      location: ./shared/ztna-connector.yaml
    - import: prisma-sd-wan
      location: ./shared/prisma-sd-wan.yaml
    - import: sase-config-orchestration
      location: ./shared/sase-config-orchestration.yaml
    - import: sase-5g
      location: ./shared/sase-5g.yaml
    - import: sase-multitenant-interconnect
      location: ./shared/sase-multitenant-interconnect.yaml

  exposes:
    - type: rest
      port: 8084
      namespace: secure-access-api
      description: "Unified REST API for secure access management."
      resources:

        # ── Remote Networks & VPN (Prisma Access) ────────────────────────
        - path: /v1/remote-networks
          name: remote-networks
          description: "Prisma Access remote networks."
          operations:
            - method: GET
              name: list-remote-networks
              description: "List all remote networks with pagination."
              inputParameters:
                - name: offset
                  in: query
                  type: integer
                  required: false
                - name: limit
                  in: query
                  type: integer
                  required: false
              call: "prisma-access.list-remote-networks"
              with:
                offset: "rest.offset"
                limit: "rest.limit"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-remote-network
              description: "Create a new remote network."
              inputParameters:
                - name: name
                  in: body
                  type: string
                  required: true
                - name: location
                  in: body
                  type: string
                  required: true
                - name: subnets
                  in: body
                  type: string
                  required: true
                - name: ike_gateway
                  in: body
                  type: string
                  required: true
              call: "prisma-access.create-remote-network"
              with:
                name: "rest.name"
                location: "rest.location"
                subnets: "rest.subnets"
                ike_gateway: "rest.ike_gateway"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/remote-networks/{id}
          name: remote-network
          description: "Prisma Access remote network by ID."
          operations:
            - method: GET
              name: get-remote-network
              description: "Get a specific remote network by ID."
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
              call: "prisma-access.get-remote-network"
              with:
                id: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: PUT
              name: update-remote-network
              description: "Update a specific remote network by ID."
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
              call: "prisma-access.update-remote-network"
              with:
                id: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: DELETE
              name: delete-remote-network
              description: "Delete a specific remote network by ID."
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
              call: "prisma-access.delete-remote-network"
              with:
                id: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/service-connections
          name: service-connections
          description: "Prisma Access service connections."
          operations:
            - method: GET
              name: list-service-connections
              description: "List all service connections with pagination."
              inputParameters:
                - name: offset
                  in: query
                  type: integer
                  required: false
                - name: limit
                  in: query
                  type: integer
                  required: false
              call: "prisma-access.list-service-connections"
              with:
                offset: "rest.offset"
                limit: "rest.limit"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-service-connection
              description: "Create a new service connection."
              inputParameters:
                - name: name
                  in: body
                  type: string
                  required: true
                - name: ipsec_tunnel
                  in: body
                  type: string
                  required: true
                - name: region
                  in: body
                  type: string
                  required: true
              call: "prisma-access.create-service-connection"
              with:
                name: "rest.name"
                ipsec_tunnel: "rest.ipsec_tunnel"
                region: "rest.region"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/service-connections/{id}
          name: service-connection
          description: "Prisma Access service connection by ID."
          operations:
            - method: GET
              name: get-service-connection
              description: "Get a specific service connection by ID."
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
              call: "prisma-access.get-service-connection"
              with:
                id: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: PUT
              name: update-service-connection
              description: "Update a specific service connection by ID."
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
              call: "prisma-access.update-service-connection"
              with:
                id: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: DELETE
              name: delete-service-connection
              description: "Delete a specific service connection by ID."
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
              call: "prisma-access.delete-service-connection"
              with:
                id: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/mobile-agent-settings
          name: mobile-agent-settings
          description: "Mobile agent infrastructure settings."
          operations:
            - method: GET
              name: get-mobile-agent-settings
              description: "Get mobile agent infrastructure settings."
              call: "prisma-access.get-mobile-agent-infrastructure-settings"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-mobile-agent-settings
              description: "Create or update mobile agent infrastructure settings."
              inputParameters:
                - name: settings
                  in: body
                  type: object
                  required: true
              call: "prisma-access.create-mobile-agent-infrastructure-settings"
              with:
                settings: "rest.settings"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/ike-gateways
          name: ike-gateways
          description: "IKE gateways."
          operations:
            - method: GET
              name: list-ike-gateways
              description: "List all IKE gateways with pagination."
              inputParameters:
                - name: offset
                  in: query
                  type: integer
                  required: false
                - name: limit
                  in: query
                  type: integer
                  required: false
              call: "prisma-access.list-ike-gateways"
              with:
                offset: "rest.offset"
                limit: "rest.limit"
              outputParameters:
                - type: object
                  mapping: "$."

        # ── SASE Orchestration ───────────────────────────────────────────
        - path: /v1/orchestrated-remote-networks
          name: orchestrated-remote-networks
          description: "SASE Config Orchestration remote networks."
          operations:
            - method: GET
              name: list-orchestrated-remote-networks
              description: "List all orchestrated remote networks with optional filtering."
              inputParameters:
                - name: location
                  in: query
                  type: string
                  required: false
                - name: status
                  in: query
                  type: string
                  required: false
                - name: offset
                  in: query
                  type: integer
                  required: false
                - name: limit
                  in: query
                  type: integer
                  required: false
              call: "sase-config-orchestration.list-remote-networks"
              with:
                location: "rest.location"
                status: "rest.status"
                offset: "rest.offset"
                limit: "rest.limit"
              outputParameters:
                - type: array
                  mapping: "$."
            - method: POST
              name: create-orchestrated-remote-network
              description: "Create a new orchestrated remote network configuration."
              inputParameters:
                - name: name
                  in: body
                  type: string
                  required: true
                - name: location
                  in: body
                  type: string
                  required: true
                - name: subnets
                  in: body
                  type: object
                  required: false
                - name: ike_gateway
                  in: body
                  type: object
                  required: false
                - name: description
                  in: body
                  type: string
                  required: false
                - name: bandwidth_mbps
                  in: body
                  type: integer
                  required: false
              call: "sase-config-orchestration.create-remote-network"
              with:
                name: "rest.name"
                location: "rest.location"
                subnets: "rest.subnets"
                ike_gateway: "rest.ike_gateway"
                description: "rest.description"
                bandwidth_mbps: "rest.bandwidth_mbps"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/orchestrated-remote-networks/{id}
          name: orchestrated-remote-network
          description: "SASE Config Orchestration remote network by ID."
          operations:
            - method: GET
              name: get-orchestrated-remote-network
              description: "Get details of a specific orchestrated remote network by ID."
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
              call: "sase-config-orchestration.get-remote-network"
              with:
                id: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: PUT
              name: update-orchestrated-remote-network
              description: "Update an existing orchestrated remote network configuration."
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                - name: name
                  in: body
                  type: string
                  required: false
                - name: location
                  in: body
                  type: string
                  required: false
                - name: subnets
                  in: body
                  type: object
                  required: false
                - name: ike_gateway
                  in: body
                  type: object
                  required: false
                - name: description
                  in: body
                  type: string
                  required: false
                - name: bandwidth_mbps
                  in: body
                  type: integer
                  required: false
              call: "sase-config-orchestration.update-remote-network"
              with:
                id: "rest.id"
                name: "rest.name"
                location: "rest.location"
                subnets: "rest.subnets"
                ike_gateway: "rest.ike_gateway"
                description: "rest.description"
                bandwidth_mbps: "rest.bandwidth_mbps"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: DELETE
              name: delete-orchestrated-remote-network
              description: "Delete an orchestrated remote network by ID."
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
              call: "sase-config-orchestration.delete-remote-network"
              with:
                id: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/orchestrated-remote-networks/{id}/refresh-ike-gateway
          name: refresh-ike-gateway
          description: "Refresh IKE gateway for an orchestrated remote network."
          operations:
            - method: POST
              name: refresh-ike-gateway
              description: "Refresh the IKE gateway for a specific remote network."
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
              call: "sase-config-orchestration.refresh-ike-gateway"
              with:
                id: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/bandwidth-allocations
          name: bandwidth-allocations
          description: "Bandwidth allocations."
          operations:
            - method: GET
              name: get-bandwidth-allocations
              description: "Get bandwidth allocations optionally filtered by location."
              inputParameters:
                - name: location
                  in: query
                  type: string
                  required: false
              call: "sase-config-orchestration.get-bandwidth-allocations"
              with:
                location: "rest.location"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/access-locations
          name: access-locations
          description: "Prisma Access locations."
          operations:
            - method: GET
              name: list-access-locations
              description: "List all available Prisma Access locations."
              call: "sase-config-orchestration.list-prisma-access-locations"
              outputParameters:
                - type: array
                  mapping: "$."

        - path: /v1/onboarding-status/{id}
          name: onboarding-status
          description: "Onboarding status."
          operations:
            - method: GET
              name: get-onboarding-status
              description: "Get the onboarding status for a specific resource."
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
              call: "sase-config-orchestration.get-onboarding-status"
              with:
                id: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."

        # ── Zero Trust Network Access ────────────────────────────────────
        - path: /v1/ztna-connectors
          name: ztna-connectors
          description: "ZTNA connectors."
          operations:
            - method: GET
              name: list-ztna-connectors
              description: "List all ZTNA connectors."
              inputParameters:
                - name: group_id
                  in: query
                  type: string
                  required: false
                - name: status
                  in: query
                  type: string
                  required: false
                - name: offset
                  in: query
                  type: integer
                  required: false
                - name: limit
                  in: query
                  type: integer
                  required: false
              call: "ztna-connector.list-connectors"
              with:
                group_id: "rest.group_id"
                status: "rest.status"
                offset: "rest.offset"
                limit: "rest.limit"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-ztna-connector
              description: "Create a new ZTNA connector."
              inputParameters:
                - name: name
                  in: body
                  type: string
                  required: true
                - name: group_id
                  in: body
                  type: string
                  required: true
                - name: description
                  in: body
                  type: string
                  required: false
              call: "ztna-connector.create-connector"
              with:
                name: "rest.name"
                group_id: "rest.group_id"
                description: "rest.description"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/ztna-connectors/{connector_id}
          name: ztna-connector
          description: "ZTNA connector by ID."
          operations:
            - method: GET
              name: get-ztna-connector
              description: "Get a specific ZTNA connector by ID."
              inputParameters:
                - name: connector_id
                  in: path
                  type: string
                  required: true
              call: "ztna-connector.get-connector"
              with:
                connector_id: "rest.connector_id"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: PUT
              name: update-ztna-connector
              description: "Update a specific ZTNA connector by ID."
              inputParameters:
                - name: connector_id
                  in: path
                  type: string
                  required: true
              call: "ztna-connector.update-connector"
              with:
                connector_id: "rest.connector_id"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: DELETE
              name: delete-ztna-connector
              description: "Delete a specific ZTNA connector by ID."
              inputParameters:
                - name: connector_id
                  in: path
                  type: string
                  required: true
              call: "ztna-connector.delete-connector"
              with:
                connector_id: "rest.connector_id"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/ztna-connectors/{connector_id}/upgrade
          name: ztna-connector-upgrade
          description: "Schedule ZTNA connector upgrade."
          operations:
            - method: POST
              name: schedule-connector-upgrade
              description: "Schedule an upgrade for a ZTNA connector."
              inputParameters:
                - name: connector_id
                  in: path
                  type: string
                  required: true
                - name: scheduled_at
                  in: body
                  type: string
                  required: true
                - name: target_version
                  in: body
                  type: string
                  required: true
              call: "ztna-connector.schedule-connector-upgrade"
              with:
                connector_id: "rest.connector_id"
                scheduled_at: "rest.scheduled_at"
                target_version: "rest.target_version"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/connector-groups
          name: connector-groups
          description: "ZTNA connector groups."
          operations:
            - method: GET
              name: list-connector-groups
              description: "List all ZTNA connector groups."
              call: "ztna-connector.list-connector-groups"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-connector-group
              description: "Create a new ZTNA connector group."
              inputParameters:
                - name: name
                  in: body
                  type: string
                  required: true
                - name: description
                  in: body
                  type: string
                  required: false
                - name: region
                  in: body
                  type: string
                  required: true
              call: "ztna-connector.create-connector-group"
              with:
                name: "rest.name"
                description: "rest.description"
                region: "rest.region"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/connector-groups/{group_id}
          name: connector-group
          description: "ZTNA connector group by ID."
          operations:
            - method: GET
              name: get-connector-group
              description: "Get a specific ZTNA connector group by ID."
              inputParameters:
                - name: group_id
                  in: path
                  type: string
                  required: true
              call: "ztna-connector.get-connector-group"
              with:
                group_id: "rest.group_id"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: PUT
              name: update-connector-group
              description: "Update a specific ZTNA connector group by ID."
              inputParameters:
                - name: group_id
                  in: path
                  type: string
                  required: true
              call: "ztna-connector.update-connector-group"
              with:
                group_id: "rest.group_id"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: DELETE
              name: delete-connector-group
              description: "Delete a specific ZTNA connector group by ID."
              inputParameters:
                - name: group_id
                  in: path
                  type: string
                  required: true
              call: "ztna-connector.delete-connector-group"
              with:
                group_id: "rest.group_id"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/ztna-applications
          name: ztna-applications
          description: "ZTNA applications."
          operations:
            - method: GET
              name: list-ztna-applications
              description: "List all ZTNA applications."
              call: "ztna-connector.list-ztna-applications"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-ztna-application
              description: "Create a new ZTNA application."
              inputParameters:
                - name: name
                  in: body
                  type: string
                  required: true
                - name: group_id
                  in: body
                  type: string
                  required: true
                - name: fqdn
                  in: body
                  type: string
                  required: true
                - name: description
                  in: body
                  type: string
                  required: false
                - name: ports
                  in: body
                  type: object
                  required: true
                - name: protocols
                  in: body
                  type: object
                  required: true
                - name: enabled
                  in: body
                  type: boolean
                  required: false
              call: "ztna-connector.create-ztna-application"
              with:
                name: "rest.name"
                group_id: "rest.group_id"
                fqdn: "rest.fqdn"
                description: "rest.description"
                ports: "rest.ports"
                protocols: "rest.protocols"
                enabled: "rest.enabled"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/ztna-applications/{app_id}
          name: ztna-application
          description: "ZTNA application by ID."
          operations:
            - method: GET
              name: get-ztna-application
              description: "Get a specific ZTNA application by ID."
              inputParameters:
                - name: app_id
                  in: path
                  type: string
                  required: true
              call: "ztna-connector.get-ztna-application"
              with:
                app_id: "rest.app_id"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: PUT
              name: update-ztna-application
              description: "Update a specific ZTNA application by ID."
              inputParameters:
                - name: app_id
                  in: path
                  type: string
                  required: true
              call: "ztna-connector.update-ztna-application"
              with:
                app_id: "rest.app_id"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: DELETE
              name: delete-ztna-application
              description: "Delete a specific ZTNA application by ID."
              inputParameters:
                - name: app_id
                  in: path
                  type: string
                  required: true
              call: "ztna-connector.delete-ztna-application"
              with:
                app_id: "rest.app_id"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/fqdn-rules
          name: fqdn-rules
          description: "FQDN rules."
          operations:
            - method: GET
              name: list-fqdn-rules
              description: "List all FQDN rules."
              call: "ztna-connector.list-fqdn-rules"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-fqdn-rule
              description: "Create a new FQDN rule."
              inputParameters:
                - name: name
                  in: body
                  type: string
                  required: true
                - name: fqdn_pattern
                  in: body
                  type: string
                  required: true
                - name: group_id
                  in: body
                  type: string
                  required: true
                - name: ports
                  in: body
                  type: object
                  required: true
                - name: enabled
                  in: body
                  type: boolean
                  required: false
              call: "ztna-connector.create-fqdn-rule"
              with:
                name: "rest.name"
                fqdn_pattern: "rest.fqdn_pattern"
                group_id: "rest.group_id"
                ports: "rest.ports"
                enabled: "rest.enabled"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/subnet-rules
          name: subnet-rules
          description: "Subnet rules."
          operations:
            - method: GET
              name: list-subnet-rules
              description: "List all subnet rules."
              call: "ztna-connector.list-subnet-rules"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-subnet-rule
              description: "Create a new subnet rule."
              inputParameters:
                - name: name
                  in: body
                  type: string
                  required: true
                - name: subnet
                  in: body
                  type: string
                  required: true
                - name: group_id
                  in: body
                  type: string
                  required: true
                - name: enabled
                  in: body
                  type: boolean
                  required: false
              call: "ztna-connector.create-subnet-rule"
              with:
                name: "rest.name"
                subnet: "rest.subnet"
                group_id: "rest.group_id"
                enabled: "rest.enabled"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/ztna-licenses
          name: ztna-licenses
          description: "ZTNA licenses."
          operations:
            - method: GET
              name: get-ztna-licenses
              description: "Get ZTNA license information."
              call: "ztna-connector.get-ztna-licenses"
              outputParameters:
                - type: object
                  mapping: "$."

        # ── SD-WAN ───────────────────────────────────────────────────────
        - path: /v1/sd-wan-sites
          name: sd-wan-sites
          description: "SD-WAN sites."
          operations:
            - method: GET
              name: list-sdwan-sites
              description: "Retrieve a list of SD-WAN sites."
              inputParameters:
                - name: offset
                  in: query
                  type: integer
                  required: false
                - name: limit
                  in: query
                  type: integer
                  required: false
                - name: name
                  in: query
                  type: string
                  required: false
              call: "prisma-sd-wan.list-sites"
              with:
                offset: "rest.offset"
                limit: "rest.limit"
