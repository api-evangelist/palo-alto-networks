naftiko: "1.0.0-alpha1"

info:
  label: "SASE 5G Managed Services"
  description: "Provides 5G network security management through the SASE 5G Managed Services API, including network slice management, security policy configuration, tenant management, and security metrics monitoring."
  tags:
    - 5g-security
    - network-slicing
    - sase
    - tenant-management
    - security-monitoring
  created: "2026-04-16"
  modified: "2026-04-16"

binds:
  - namespace: env
    keys:
      PALO_ALTO_OAUTH_TOKEN: PALO_ALTO_OAUTH_TOKEN

capability:
  consumes:
    - type: http
      namespace: sase-5g
      baseUri: https://api.sase.paloaltonetworks.com/5g/v1
      authentication:
        type: bearer
        token: "{{env.PALO_ALTO_OAUTH_TOKEN}}"
      resources:
        - name: network-slices
          path: /network-slices
          operations:
            - name: list-network-slices
              method: GET
              description: "Retrieve a list of 5G network slices"
              inputParameters:
                - name: status
                  in: query
                  type: string
                  required: false
                - name: slice_type
                  in: query
                  type: string
                  required: false
                - name: offset
                  in: query
                  type: integer
                  required: false
                - name: limit
                  in: query
                  type: integer
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: create-network-slice
              method: POST
              description: "Create a new 5G network slice"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  slice_type: "{{tools.slice_type}}"
                  description: "{{tools.description}}"
                  sd: "{{tools.sd}}"
                  security_policy_id: "{{tools.security_policy_id}}"

        - name: network-slice-by-id
          path: /network-slices/{slice_id}
          operations:
            - name: get-network-slice
              method: GET
              description: "Retrieve details for a specific network slice"
              inputParameters:
                - name: slice_id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: update-network-slice
              method: PUT
              description: "Update an existing network slice"
              inputParameters:
                - name: slice_id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  slice_type: "{{tools.slice_type}}"
                  description: "{{tools.description}}"
                  sd: "{{tools.sd}}"
                  security_policy_id: "{{tools.security_policy_id}}"

            - name: delete-network-slice
              method: DELETE
              description: "Delete a network slice"
              inputParameters:
                - name: slice_id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: security-policies
          path: /security-policies
          operations:
            - name: list-5g-security-policies
              method: GET
              description: "Retrieve a list of 5G security policies"
              inputParameters:
                - name: slice_id
                  in: query
                  type: string
                  required: false
                - name: offset
                  in: query
                  type: integer
                  required: false
                - name: limit
                  in: query
                  type: integer
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: create-5g-security-policy
              method: POST
              description: "Create a new 5G security policy"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  description: "{{tools.description}}"
                  threat_prevention: "{{tools.threat_prevention}}"
                  url_filtering: "{{tools.url_filtering}}"
                  app_identification: "{{tools.app_identification}}"
                  decryption: "{{tools.decryption}}"
                  log_forwarding: "{{tools.log_forwarding}}"
                  enabled: "{{tools.enabled}}"

        - name: security-policy-by-id
          path: /security-policies/{policy_id}
          operations:
            - name: get-5g-security-policy
              method: GET
              description: "Retrieve details for a specific 5G security policy"
              inputParameters:
                - name: policy_id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: update-5g-security-policy
              method: PUT
              description: "Update an existing 5G security policy"
              inputParameters:
                - name: policy_id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  description: "{{tools.description}}"
                  threat_prevention: "{{tools.threat_prevention}}"
                  url_filtering: "{{tools.url_filtering}}"
                  app_identification: "{{tools.app_identification}}"
                  decryption: "{{tools.decryption}}"
                  log_forwarding: "{{tools.log_forwarding}}"
                  enabled: "{{tools.enabled}}"

            - name: delete-5g-security-policy
              method: DELETE
              description: "Delete a 5G security policy"
              inputParameters:
                - name: policy_id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: tenants
          path: /tenants
          operations:
            - name: list-5g-tenants
              method: GET
              description: "Retrieve a list of 5G tenants"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: create-5g-tenant
              method: POST
              description: "Create a new 5G tenant"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  description: "{{tools.description}}"
                  assigned_slices: "{{tools.assigned_slices}}"
                  default_policy_id: "{{tools.default_policy_id}}"

        - name: tenant-by-id
          path: /tenants/{tenant_id}
          operations:
            - name: get-5g-tenant
              method: GET
              description: "Retrieve details for a specific 5G tenant"
              inputParameters:
                - name: tenant_id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: update-5g-tenant
              method: PUT
              description: "Update an existing 5G tenant"
              inputParameters:
                - name: tenant_id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  description: "{{tools.description}}"
                  assigned_slices: "{{tools.assigned_slices}}"
                  default_policy_id: "{{tools.default_policy_id}}"

            - name: delete-5g-tenant
              method: DELETE
              description: "Delete a 5G tenant"
              inputParameters:
                - name: tenant_id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: monitoring-metrics
          path: /monitoring/metrics
          operations:
            - name: get-5g-security-metrics
              method: GET
              description: "Retrieve 5G security monitoring metrics"
              inputParameters:
                - name: slice_id
                  in: query
                  type: string
                  required: false
                - name: start_time
                  in: query
                  type: string
                  required: false
                - name: end_time
                  in: query
                  type: string
                  required: false
                - name: interval
                  in: query
                  type: string
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8104
      namespace: rest-sase-5g
      resources:
        - path: /v1/network-slices
          operations:
            - method: GET
              name: list-network-slices
              call: "sase-5g.list-network-slices"
              with:
                status: "rest.status"
                slice_type: "rest.slice_type"
                offset: "rest.offset"
                limit: "rest.limit"
              outputParameters:
                - type: array
                  mapping: "$."

            - method: POST
              name: create-network-slice
              call: "sase-5g.create-network-slice"
              with:
                name: "rest.name"
                slice_type: "rest.slice_type"
                description: "rest.description"
                sd: "rest.sd"
                security_policy_id: "rest.security_policy_id"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/network-slices/{slice_id}
          operations:
            - method: GET
              name: get-network-slice
              call: "sase-5g.get-network-slice"
              with:
                slice_id: "rest.slice_id"
              outputParameters:
                - type: object
                  mapping: "$."

            - method: PUT
              name: update-network-slice
              call: "sase-5g.update-network-slice"
              with:
                slice_id: "rest.slice_id"
                name: "rest.name"
                slice_type: "rest.slice_type"
                description: "rest.description"
                sd: "rest.sd"
                security_policy_id: "rest.security_policy_id"
              outputParameters:
                - type: object
                  mapping: "$."

            - method: DELETE
              name: delete-network-slice
              call: "sase-5g.delete-network-slice"
              with:
                slice_id: "rest.slice_id"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/security-policies
          operations:
            - method: GET
              name: list-5g-security-policies
              call: "sase-5g.list-5g-security-policies"
              with:
                slice_id: "rest.slice_id"
                offset: "rest.offset"
                limit: "rest.limit"
              outputParameters:
                - type: array
                  mapping: "$."

            - method: POST
              name: create-5g-security-policy
              call: "sase-5g.create-5g-security-policy"
              with:
                name: "rest.name"
                description: "rest.description"
                threat_prevention: "rest.threat_prevention"
                url_filtering: "rest.url_filtering"
                app_identification: "rest.app_identification"
                decryption: "rest.decryption"
                log_forwarding: "rest.log_forwarding"
                enabled: "rest.enabled"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/security-policies/{policy_id}
          operations:
            - method: GET
              name: get-5g-security-policy
              call: "sase-5g.get-5g-security-policy"
              with:
                policy_id: "rest.policy_id"
              outputParameters:
                - type: object
                  mapping: "$."

            - method: PUT
              name: update-5g-security-policy
              call: "sase-5g.update-5g-security-policy"
              with:
                policy_id: "rest.policy_id"
                name: "rest.name"
                description: "rest.description"
                threat_prevention: "rest.threat_prevention"
                url_filtering: "rest.url_filtering"
                app_identification: "rest.app_identification"
                decryption: "rest.decryption"
                log_forwarding: "rest.log_forwarding"
                enabled: "rest.enabled"
              outputParameters:
                - type: object
                  mapping: "$."

            - method: DELETE
              name: delete-5g-security-policy
              call: "sase-5g.delete-5g-security-policy"
              with:
                policy_id: "rest.policy_id"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/tenants
          operations:
            - method: GET
              name: list-5g-tenants
              call: "sase-5g.list-5g-tenants"
              outputParameters:
                - type: array
                  mapping: "$."

            - method: POST
              name: create-5g-tenant
              call: "sase-5g.create-5g-tenant"
              with:
                name: "rest.name"
                description: "rest.description"
                assigned_slices: "rest.assigned_slices"
                default_policy_id: "rest.default_policy_id"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/tenants/{tenant_id}
          operations:
            - method: GET
              name: get-5g-tenant
              call: "sase-5g.get-5g-tenant"
              with:
                tenant_id: "rest.tenant_id"
              outputParameters:
                - type: object
                  mapping: "$."

            - method: PUT
              name: update-5g-tenant
              call: "sase-5g.update-5g-tenant"
              with:
                tenant_id: "rest.tenant_id"
                name: "rest.name"
                description: "rest.description"
                assigned_slices: "rest.assigned_slices"
                default_policy_id: "rest.default_policy_id"
              outputParameters:
                - type: object
                  mapping: "$."

            - method: DELETE
              name: delete-5g-tenant
              call: "sase-5g.delete-5g-tenant"
              with:
                tenant_id: "rest.tenant_id"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/monitoring/metrics
          operations:
            - method: GET
              name: get-5g-security-metrics
              call: "sase-5g.get-5g-security-metrics"
              with:
                slice_id: "rest.slice_id"
                start_time: "rest.start_time"
                end_time: "rest.end_time"
                interval: "rest.interval"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9114
      namespace: mcp-sase-5g
      transport: http
      tools:
        - name: list-network-slices
          description: "Retrieve a list of 5G network slices"
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          inputParameters:
            - name: status
              type: string
              required: false
            - name: slice_type
              type: string
              required: false
            - name: offset
              type: integer
              required: false
            - name: limit
              type: integer
              required: false
          call: "sase-5g.list-network-slices"
          with:
            status: "tools.status"
            slice_type: "tools.slice_type"
            offset: "tools.offset"
            limit: "tools.limit"
          outputParameters:
            - type: array
              mapping: "$."

        - name: create-network-slice
          description: "Create a new 5G network slice"
