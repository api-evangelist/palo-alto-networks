          outputParameters:
            - type: object
              mapping: "$."

        - name: update-network-slice
          description: "Update an existing network slice"
          hints:
            readOnly: false
            destructive: false
            idempotent: true
            openWorld: true
          inputParameters:
            - name: slice_id
