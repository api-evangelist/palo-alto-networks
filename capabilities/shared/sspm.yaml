naftiko: "1.0.0-alpha1"

info:
  label: "SaaS Security Posture Management"
  description: "Manages SaaS application onboarding, posture checks, app catalog, and Jira integrations for SaaS Security Posture Management."
  tags:
    - Security
    - Saas
    - Posture Management
    - Palo Alto
  created: "2026-04-16"
  modified: "2026-04-16"

binds:
  - namespace: env
    keys:
      PALO_ALTO_OAUTH_TOKEN: PALO_ALTO_OAUTH_TOKEN

capability:
  consumes:
    - type: http
      namespace: sspm
      baseUri: https://api.sase.paloaltonetworks.com/sspm
      description: "SaaS Security Posture Management API for onboarding apps, managing posture checks, browsing the app catalog, and configuring Jira integrations."
      authentication:
        type: bearer
        token: "{{env.PALO_ALTO_OAUTH_TOKEN}}"
      resources:
        - name: apps
          path: /v1/apps
          operations:
            - name: list-onboarded-apps
              method: GET
              description: "List all onboarded SaaS applications."
              inputParameters:
                - name: status
                  in: query
                  type: string
                  required: false
                - name: offset
                  in: query
                  type: integer
                  required: false
                - name: limit
                  in: query
                  type: integer
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: onboard-app
              method: POST
              description: "Onboard a new SaaS application."
              inputParameters:
                - name: app_type
                  in: body
                  type: string
                  required: true
                - name: display_name
                  in: body
                  type: string
                  required: true
                - name: credentials
                  in: body
                  type: object
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  app_type: "{{tools.app_type}}"
                  display_name: "{{tools.display_name}}"
                  credentials: "{{tools.credentials}}"
        - name: app
          path: /v1/apps/{app_id}
          operations:
            - name: remove-app
              method: DELETE
              description: "Remove an onboarded SaaS application."
              inputParameters:
                - name: app_id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: posture-checks
          path: /v1/posture-checks
          operations:
            - name: list-posture-checks
              method: GET
              description: "List posture checks with optional filters."
              inputParameters:
                - name: app_id
                  in: query
                  type: string
                  required: false
                - name: check_type
                  in: query
                  type: string
                  required: false
                - name: severity
                  in: query
                  type: string
                  required: false
                - name: status
                  in: query
                  type: string
                  required: false
                - name: offset
                  in: query
                  type: integer
                  required: false
                - name: limit
                  in: query
                  type: integer
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: posture-check
          path: /v1/posture-checks/{check_id}
          operations:
            - name: get-posture-check
              method: GET
              description: "Get a specific posture check by ID."
              inputParameters:
                - name: check_id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: posture-check-status
          path: /v1/posture-checks/{check_id}/status
          operations:
            - name: update-posture-check-status
              method: PUT
              description: "Update the status of a posture check."
              inputParameters:
                - name: check_id
                  in: path
                  type: string
                  required: true
                - name: status
                  in: body
                  type: string
                  required: true
                - name: justification
                  in: body
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  status: "{{tools.status}}"
                  justification: "{{tools.justification}}"
        - name: app-catalog
          path: /v1/app-catalog
          operations:
            - name: list-app-catalog
              method: GET
              description: "List available applications in the catalog."
              inputParameters:
                - name: category
                  in: query
                  type: string
                  required: false
                - name: offset
                  in: query
                  type: integer
                  required: false
                - name: limit
                  in: query
                  type: integer
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: jira-integrations
          path: /v1/jira-integrations
          operations:
            - name: list-jira-integrations
              method: GET
              description: "List all Jira integrations."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-jira-integration
              method: POST
              description: "Create a new Jira integration."
              inputParameters:
                - name: name
                  in: body
                  type: string
                  required: true
                - name: jira_url
                  in: body
                  type: string
                  required: true
                - name: project_key
                  in: body
                  type: string
                  required: true
                - name: api_token
                  in: body
                  type: string
                  required: true
                - name: email
                  in: body
                  type: string
                  required: true
                - name: issue_type
                  in: body
                  type: string
                  required: true
                - name: severity_mapping
                  in: body
                  type: object
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  jira_url: "{{tools.jira_url}}"
                  project_key: "{{tools.project_key}}"
                  api_token: "{{tools.api_token}}"
                  email: "{{tools.email}}"
                  issue_type: "{{tools.issue_type}}"
                  severity_mapping: "{{tools.severity_mapping}}"

  exposes:
    - type: rest
      port: 8111
      namespace: sspm-rest
      resources:
        - path: /v1/apps
          name: apps
          operations:
            - method: GET
              name: list-onboarded-apps
              call: "sspm.list-onboarded-apps"
              with:
                status: "rest.status"
                offset: "rest.offset"
                limit: "rest.limit"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: onboard-app
              call: "sspm.onboard-app"
              with:
                app_type: "rest.app_type"
                display_name: "rest.display_name"
                credentials: "rest.credentials"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/apps/{app_id}
          name: app
          operations:
            - method: DELETE
              name: remove-app
              call: "sspm.remove-app"
              with:
                app_id: "rest.app_id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/posture-checks
          name: posture-checks
          operations:
            - method: GET
              name: list-posture-checks
              call: "sspm.list-posture-checks"
              with:
                app_id: "rest.app_id"
                check_type: "rest.check_type"
                severity: "rest.severity"
                status: "rest.status"
                offset: "rest.offset"
                limit: "rest.limit"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/posture-checks/{check_id}
          name: posture-check
          operations:
            - method: GET
              name: get-posture-check
              call: "sspm.get-posture-check"
              with:
                check_id: "rest.check_id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/posture-checks/{check_id}/status
          name: posture-check-status
          operations:
            - method: PUT
              name: update-posture-check-status
              call: "sspm.update-posture-check-status"
              with:
                check_id: "rest.check_id"
                status: "rest.status"
                justification: "rest.justification"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/app-catalog
          name: app-catalog
          operations:
            - method: GET
              name: list-app-catalog
              call: "sspm.list-app-catalog"
              with:
                category: "rest.category"
                offset: "rest.offset"
                limit: "rest.limit"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/jira-integrations
          name: jira-integrations
          operations:
            - method: GET
              name: list-jira-integrations
              call: "sspm.list-jira-integrations"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-jira-integration
              call: "sspm.create-jira-integration"
              with:
                name: "rest.name"
                jira_url: "rest.jira_url"
                project_key: "rest.project_key"
                api_token: "rest.api_token"
                email: "rest.email"
                issue_type: "rest.issue_type"
                severity_mapping: "rest.severity_mapping"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9121
      namespace: sspm-mcp
      transport: http
      tools:
        - name: list-onboarded-apps
          description: "List all onboarded SaaS applications."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          inputParameters:
            - name: status
              type: string
              required: false
            - name: offset
              type: integer
              required: false
            - name: limit
              type: integer
              required: false
          call: "sspm.list-onboarded-apps"
          with:
            status: "tools.status"
            offset: "tools.offset"
            limit: "tools.limit"
          outputParameters:
            - type: object
              mapping: "$."
        - name: onboard-app
          description: "Onboard a new SaaS application."
          hints:
            readOnly: false
            destructive: false
            idempotent: false
            openWorld: true
          inputParameters:
            - name: app_type
              type: string
              required: true
            - name: display_name
              type: string
              required: true
            - name: credentials
              type: object
              required: true
          call: "sspm.onboard-app"
          with:
            app_type: "tools.app_type"
            display_name: "tools.display_name"
            credentials: "tools.credentials"
          outputParameters:
            - type: object
              mapping: "$."
        - name: remove-app
          description: "Remove an onboarded SaaS application."
          hints:
            readOnly: false
            destructive: true
            idempotent: true
            openWorld: true
          inputParameters:
            - name: app_id
              type: string
              required: true
          call: "sspm.remove-app"
          with:
            app_id: "tools.app_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-posture-checks
          description: "List posture checks with optional filters."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          inputParameters:
            - name: app_id
              type: string
              required: false
            - name: check_type
              type: string
              required: false
            - name: severity
              type: string
              required: false
            - name: status
              type: string
              required: false
            - name: offset
              type: integer
              required: false
            - name: limit
              type: integer
              required: false
          call: "sspm.list-posture-checks"
          with:
            app_id: "tools.app_id"
            check_type: "tools.check_type"
            severity: "tools.severity"
            status: "tools.status"
            offset: "tools.offset"
            limit: "tools.limit"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-posture-check
          description: "Get a specific posture check by ID."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          inputParameters:
            - name: check_id
              type: string
              required: true
          call: "sspm.get-posture-check"
          with:
            check_id: "tools.check_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: update-posture-check-status
          description: "Update the status of a posture check."
          hints:
            readOnly: false
            destructive: false
            idempotent: true
            openWorld: true
          inputParameters:
            - name: check_id
              type: string
              required: true
            - name: status
              type: string
              required: true
            - name: justification
              type: string
              required: true
          call: "sspm.update-posture-check-status"
          with:
            check_id: "tools.check_id"
            status: "tools.status"
            justification: "tools.justification"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-app-catalog
          description: "List available applications in the catalog."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          inputParameters:
            - name: category
              type: string
              required: false
            - name: offset
              type: integer
              required: false
            - name: limit
              type: integer
              required: false
          call: "sspm.list-app-catalog"
          with:
            category: "tools.category"
            offset: "tools.offset"
            limit: "tools.limit"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-jira-integrations
          description: "List all Jira integrations."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          call: "sspm.list-jira-integrations"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-jira-integration
          description: "Create a new Jira integration."
          hints:
            readOnly: false
            destructive: false
            idempotent: false
            openWorld: true
          inputParameters:
            - name: name
              type: string
              required: true
            - name: jira_url
              type: string
              required: true
            - name: project_key
              type: string
              required: true
            - name: api_token
              type: string
              required: true
            - name: email
              type: string
              required: true
            - name: issue_type
              type: string
              required: true
            - name: severity_mapping
              type: object
              required: true
          call: "sspm.create-jira-integration"
          with:
            name: "tools.name"
            jira_url: "tools.jira_url"
            project_key: "tools.project_key"
            api_token: "tools.api_token"
            email: "tools.email"
            issue_type: "tools.issue_type"
            severity_mapping: "tools.severity_mapping"
          outputParameters:
            - type: object
              mapping: "$."
