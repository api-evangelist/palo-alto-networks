                data:
                  entry: "{{tools.entry}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: update-address-group
              method: PUT
              description: "Update an existing address group."
              inputParameters:
                - name: location
                  in: query
                  type: string
                  required: true
                  description: "Configuration location."
                - name: vsys
                  in: query
                  type: string
                  required: false
                  description: "Virtual system name."
                - name: name
                  in: query
                  type: string
                  required: true
                  description: "Name of the address group to update."
                - name: entry
