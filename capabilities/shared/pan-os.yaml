naftiko: "1.0.0-alpha1"

info:
  label: "PAN-OS"
  description: "Provides access to the PAN-OS REST API for managing firewall objects including addresses, address groups, and services."
  tags:
    - Security
    - Firewall
    - PAN-OS
    - Network
    - Palo Alto Networks
  created: "2026-04-16"
  modified: "2026-04-16"

binds:
  - namespace: env
    keys:
      PAN_OS_API_KEY: PAN_OS_API_KEY

capability:
  consumes:
    - type: http
      namespace: pan-os-api
      baseUri: https://{firewall}/restapi/v10.2
      description: "PAN-OS REST API for managing firewall objects including addresses, address groups, and services."
      authentication:
        type: apikey
        in: header
        name: X-PAN-KEY
        value: "{{PAN_OS_API_KEY}}"
      resources:
        - name: addresses
          path: /Objects/Addresses
          description: "Manage firewall address objects."
          operations:
            - name: list-addresses
              method: GET
              description: "List address objects."
              inputParameters:
                - name: location
                  in: query
                  type: string
                  required: false
                  description: "Configuration location (e.g., vsys, panorama)."
                - name: vsys
                  in: query
                  type: string
                  required: false
                  description: "Virtual system name."
                - name: name
                  in: query
                  type: string
                  required: false
                  description: "Filter by address object name."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: create-address
              method: POST
              description: "Create a new address object."
              inputParameters:
                - name: location
                  in: query
                  type: string
                  required: true
                  description: "Configuration location."
                - name: vsys
                  in: query
                  type: string
                  required: false
                  description: "Virtual system name."
                - name: name
                  in: query
                  type: string
                  required: true
                  description: "Name of the address object."
                - name: entry
                  in: body
                  type: object
                  required: true
                  description: "Address entry with ip-netmask, ip-range, or fqdn."
              body:
                type: json
                data:
                  entry: "{{tools.entry}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: update-address
              method: PUT
              description: "Update an existing address object."
              inputParameters:
                - name: location
                  in: query
                  type: string
                  required: true
                  description: "Configuration location."
                - name: vsys
                  in: query
                  type: string
                  required: false
                  description: "Virtual system name."
                - name: name
                  in: query
                  type: string
                  required: true
                  description: "Name of the address object to update."
                - name: entry
                  in: body
                  type: object
                  required: true
                  description: "Updated address entry."
              body:
                type: json
                data:
                  entry: "{{tools.entry}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: delete-address
              method: DELETE
              description: "Delete an address object."
              inputParameters:
                - name: location
                  in: query
                  type: string
                  required: true
                  description: "Configuration location."
                - name: vsys
                  in: query
                  type: string
                  required: false
                  description: "Virtual system name."
                - name: name
                  in: query
                  type: string
                  required: true
                  description: "Name of the address object to delete."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: address-groups
          path: /Objects/AddressGroups
          description: "Manage firewall address group objects."
          operations:
            - name: list-address-groups
              method: GET
              description: "List address group objects."
              inputParameters:
                - name: location
                  in: query
                  type: string
                  required: false
                  description: "Configuration location."
                - name: vsys
                  in: query
                  type: string
                  required: false
