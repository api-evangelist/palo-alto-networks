                  type: string
                  required: true
                  description: "Configuration location."
                - name: vsys
                  in: query
                  type: string
                  required: false
                  description: "Virtual system name."
                - name: name
                  in: query
                  type: string
                  required: true
                  description: "Name of the address group to delete."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
