              type: string
              required: false
            - name: filter
              type: object
              required: false
            - name: time_range
              type: object
              required: false
            - name: count
              type: integer
              required: false
            - name: histogram
              type: object
              required: false
            - name: group_by
              type: object
              required: false
            - name: sort
              type: object
              required: false
          call: "sase-aggregate-monitoring.query-threat-data"
          with:
            tsg_id: "tools.tsg_id"
            filter: "tools.filter"
            time_range: "tools.time_range"
            count: "tools.count"
            histogram: "tools.histogram"
            group_by: "tools.group_by"
            sort: "tools.sort"
          outputParameters:
