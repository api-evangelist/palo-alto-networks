naftiko: "1.0.0-alpha1"

info:
  label: "SASE Aggregate Monitoring"
  description: "Query aggregated monitoring data for threats, URLs, applications, bandwidth, and licenses across SASE tenants."
  tags:
    - sase
    - monitoring
    - analytics
    - palo-alto-networks
  created: "2026-04-16"
  modified: "2026-04-16"

binds:
  - namespace: env
    keys:
      PALO_ALTO_OAUTH_TOKEN: PALO_ALTO_OAUTH_TOKEN

capability:
  consumes:
    - type: http
      namespace: sase-aggregate-monitoring
      baseUri: https://api.sase.paloaltonetworks.com/mt/monitor/v1
      authentication:
        type: bearer
        token: "{{env.PALO_ALTO_OAUTH_TOKEN}}"
      resources:
        - name: aggregate-queries
          path: /agg/query
          operations:
            - name: query-threat-data
              method: POST
              description: "Query aggregated threat monitoring data with filters, time ranges, and grouping."
              path: /threat
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  tsg_id: "{{tools.tsg_id}}"
                  filter: "{{tools.filter}}"
                  time_range: "{{tools.time_range}}"
                  count: "{{tools.count}}"
                  histogram: "{{tools.histogram}}"
                  group_by: "{{tools.group_by}}"
                  sort: "{{tools.sort}}"
            - name: query-url-data
              method: POST
              description: "Query aggregated URL monitoring data with filters, time ranges, and grouping."
              path: /url
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  tsg_id: "{{tools.tsg_id}}"
                  filter: "{{tools.filter}}"
                  time_range: "{{tools.time_range}}"
                  count: "{{tools.count}}"
                  histogram: "{{tools.histogram}}"
                  group_by: "{{tools.group_by}}"
                  sort: "{{tools.sort}}"
            - name: query-application-data
              method: POST
              description: "Query aggregated application monitoring data with filters, time ranges, and grouping."
              path: /application
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  tsg_id: "{{tools.tsg_id}}"
                  filter: "{{tools.filter}}"
                  time_range: "{{tools.time_range}}"
                  count: "{{tools.count}}"
                  histogram: "{{tools.histogram}}"
                  group_by: "{{tools.group_by}}"
                  sort: "{{tools.sort}}"
            - name: query-bandwidth-data
              method: POST
              description: "Query aggregated bandwidth monitoring data with filters, time ranges, and grouping."
              path: /bandwidth
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  tsg_id: "{{tools.tsg_id}}"
                  filter: "{{tools.filter}}"
                  time_range: "{{tools.time_range}}"
                  count: "{{tools.count}}"
                  histogram: "{{tools.histogram}}"
                  group_by: "{{tools.group_by}}"
                  sort: "{{tools.sort}}"
            - name: query-license-data
              method: POST
              description: "Query aggregated license monitoring data with filters, time ranges, and grouping."
              path: /license
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  tsg_id: "{{tools.tsg_id}}"
                  filter: "{{tools.filter}}"
                  time_range: "{{tools.time_range}}"
                  count: "{{tools.count}}"
                  histogram: "{{tools.histogram}}"
                  group_by: "{{tools.group_by}}"
                  sort: "{{tools.sort}}"
        - name: tenants
          path: /tenants
          operations:
            - name: list-monitoring-tenants
              method: GET
              description: "List all tenants available for monitoring."
              inputParameters:
                - name: tsg_id
                  in: query
                  type: string
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8105
      namespace: sase-aggregate-monitoring-rest
      resources:
        - path: /v1/aggregate-queries/threats
          operations:
            - method: POST
              name: query-threat-data
              call: "sase-aggregate-monitoring.query-threat-data"
              with:
                tsg_id: "rest.tsg_id"
                filter: "rest.filter"
                time_range: "rest.time_range"
                count: "rest.count"
                histogram: "rest.histogram"
                group_by: "rest.group_by"
                sort: "rest.sort"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/aggregate-queries/urls
          operations:
            - method: POST
              name: query-url-data
              call: "sase-aggregate-monitoring.query-url-data"
              with:
                tsg_id: "rest.tsg_id"
                filter: "rest.filter"
                time_range: "rest.time_range"
                count: "rest.count"
                histogram: "rest.histogram"
                group_by: "rest.group_by"
                sort: "rest.sort"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/aggregate-queries/applications
          operations:
            - method: POST
              name: query-application-data
              call: "sase-aggregate-monitoring.query-application-data"
              with:
                tsg_id: "rest.tsg_id"
                filter: "rest.filter"
                time_range: "rest.time_range"
                count: "rest.count"
                histogram: "rest.histogram"
                group_by: "rest.group_by"
                sort: "rest.sort"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/aggregate-queries/bandwidth
          operations:
            - method: POST
              name: query-bandwidth-data
              call: "sase-aggregate-monitoring.query-bandwidth-data"
              with:
                tsg_id: "rest.tsg_id"
                filter: "rest.filter"
                time_range: "rest.time_range"
                count: "rest.count"
                histogram: "rest.histogram"
                group_by: "rest.group_by"
                sort: "rest.sort"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/aggregate-queries/licenses
          operations:
            - method: POST
              name: query-license-data
              call: "sase-aggregate-monitoring.query-license-data"
              with:
                tsg_id: "rest.tsg_id"
                filter: "rest.filter"
                time_range: "rest.time_range"
                count: "rest.count"
                histogram: "rest.histogram"
                group_by: "rest.group_by"
                sort: "rest.sort"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/monitoring-tenants
          operations:
            - method: GET
              name: list-monitoring-tenants
              call: "sase-aggregate-monitoring.list-monitoring-tenants"
              with:
                tsg_id: "rest.tsg_id"
              outputParameters:
                - type: array
                  mapping: "$."

    - type: mcp
      port: 9115
      namespace: sase-aggregate-monitoring-mcp
      transport: http
      tools:
        - name: query-threat-data
          description: "Query aggregated threat monitoring data with filters, time ranges, and grouping."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          inputParameters:
