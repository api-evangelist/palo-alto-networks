naftiko: "1.0.0-alpha1"

info:
  label: "Cloud NGFW for AWS"
  description: "Capability for the Palo Alto Networks Cloud NGFW for AWS API, managing rule stacks, security rules, FQDN lists, prefix lists, and firewalls."
  tags:
    - Palo Alto Networks
    - Cloud NGFW
    - AWS
    - Firewall
    - Security
  created: "2026-04-16"
  modified: "2026-04-16"

binds:
  - namespace: env
    keys:
      AWS_ACCESS_KEY_ID: AWS_ACCESS_KEY_ID
      AWS_SECRET_ACCESS_KEY: AWS_SECRET_ACCESS_KEY

capability:
  consumes:
    - type: http
      namespace: cloud-ngfw
      baseUri: https://api.cloudngfw.aws.paloaltonetworks.com
      description: "Palo Alto Networks Cloud NGFW for AWS API for managing cloud-delivered next-generation firewalls."
      authentication:
        type: apikey
        key: Authorization
        value: "{{AWS_ACCESS_KEY_ID}}"
        placement: header
      resources:
        - name: rule-stacks
          path: /config/rulestacks
          description: "Rule stack management operations."
          operations:
            - name: list-rule-stacks
              method: GET
              description: "List all rule stacks."
              outputRawFormat: json
              outputParameters:
                - name: rule_stacks
                  type: array
                  value: "$.rule_stacks"
            - name: create-rule-stack
              method: POST
              description: "Create a new rule stack."
              inputParameters:
                - name: name
                  in: body
                  type: string
                  required: true
                  description: "Name of the rule stack."
                - name: description
                  in: body
                  type: string
                  required: false
                  description: "Description of the rule stack."
                - name: scope
                  in: body
                  type: string
                  required: true
                  description: "Scope of the rule stack."
              outputRawFormat: json
              outputParameters:
                - name: rule_stack
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  description: "{{tools.description}}"
                  scope: "{{tools.scope}}"
            - name: get-rule-stack
              method: GET
              description: "Get a specific rule stack."
              inputParameters:
                - name: rulestack
                  in: path
                  type: string
                  required: true
                  description: "The rule stack identifier."
              outputRawFormat: json
              outputParameters:
                - name: rule_stack
                  type: object
                  value: "$."
            - name: update-rule-stack
              method: PUT
              description: "Update a rule stack."
              inputParameters:
                - name: rulestack
                  in: path
                  type: string
                  required: true
                  description: "The rule stack identifier."
              outputRawFormat: json
              outputParameters:
                - name: rule_stack
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  description: "{{tools.description}}"
                  scope: "{{tools.scope}}"
            - name: delete-rule-stack
              method: DELETE
              description: "Delete a rule stack."
              inputParameters:
                - name: rulestack
                  in: path
                  type: string
                  required: true
                  description: "The rule stack identifier."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: commit-rule-stack
              method: POST
              description: "Commit a rule stack."
              inputParameters:
                - name: rulestack
                  in: path
                  type: string
                  required: true
                  description: "The rule stack identifier."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: security-rules
          path: /config/rulestacks/{rulestack}/security-rules
          description: "Security rule management operations."
          operations:
            - name: list-security-rules
              method: GET
              description: "List security rules in a rule stack."
              inputParameters:
                - name: rulestack
                  in: path
                  type: string
                  required: true
                  description: "The rule stack identifier."
              outputRawFormat: json
              outputParameters:
                - name: security_rules
                  type: array
                  value: "$.security_rules"
            - name: create-security-rule
              method: POST
              description: "Create a security rule in a rule stack."
              inputParameters:
                - name: rulestack
                  in: path
                  type: string
                  required: true
                  description: "The rule stack identifier."
                - name: priority
                  in: body
                  type: integer
                  required: true
                  description: "Priority of the security rule."
                - name: rule_list_name
                  in: body
                  type: string
                  required: true
                  description: "Name of the rule list."
                - name: action
                  in: body
                  type: string
                  required: true
                  description: "Action for the security rule."
              outputRawFormat: json
              outputParameters:
                - name: security_rule
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  priority: "{{tools.priority}}"
                  rule_list_name: "{{tools.rule_list_name}}"
                  action: "{{tools.action}}"
            - name: get-security-rule
              method: GET
              description: "Get a specific security rule."
              inputParameters:
                - name: rulestack
                  in: path
                  type: string
                  required: true
                  description: "The rule stack identifier."
                - name: priority
                  in: path
                  type: integer
                  required: true
                  description: "Priority of the security rule."
              outputRawFormat: json
              outputParameters:
                - name: security_rule
                  type: object
                  value: "$."
            - name: update-security-rule
              method: PUT
              description: "Update a security rule."
              inputParameters:
                - name: rulestack
                  in: path
                  type: string
                  required: true
                  description: "The rule stack identifier."
                - name: priority
                  in: path
                  type: integer
                  required: true
                  description: "Priority of the security rule."
              outputRawFormat: json
              outputParameters:
                - name: security_rule
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  rule_list_name: "{{tools.rule_list_name}}"
                  action: "{{tools.action}}"
            - name: delete-security-rule
              method: DELETE
              description: "Delete a security rule."
              inputParameters:
                - name: rulestack
                  in: path
                  type: string
                  required: true
                  description: "The rule stack identifier."
                - name: priority
                  in: path
                  type: integer
                  required: true
                  description: "Priority of the security rule."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: fqdn-lists
          path: /config/rulestacks/{rulestack}/fqdnlists
          description: "FQDN list management operations."
          operations:
            - name: list-fqdn-lists
              method: GET
              description: "List FQDN lists in a rule stack."
              inputParameters:
                - name: rulestack
                  in: path
                  type: string
                  required: true
                  description: "The rule stack identifier."
              outputRawFormat: json
              outputParameters:
                - name: fqdn_lists
                  type: array
                  value: "$.fqdn_lists"
            - name: create-fqdn-list
              method: POST
              description: "Create an FQDN list in a rule stack."
              inputParameters:
                - name: rulestack
                  in: path
                  type: string
                  required: true
                  description: "The rule stack identifier."
                - name: name
                  in: body
                  type: string
                  required: true
                  description: "Name of the FQDN list."
                - name: fqdn_list
                  in: body
                  type: array
                  required: true
                  description: "List of FQDNs."
              outputRawFormat: json
              outputParameters:
                - name: fqdn_list
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  fqdn_list: "{{tools.fqdn_list}}"
        - name: prefix-lists
          path: /config/rulestacks/{rulestack}/prefixlists
          description: "Prefix list management operations."
          operations:
            - name: list-prefix-lists
              method: GET
              description: "List prefix lists in a rule stack."
              inputParameters:
                - name: rulestack
                  in: path
                  type: string
                  required: true
                  description: "The rule stack identifier."
              outputRawFormat: json
              outputParameters:
                - name: prefix_lists
                  type: array
                  value: "$.prefix_lists"
            - name: create-prefix-list
              method: POST
              description: "Create a prefix list in a rule stack."
              inputParameters:
                - name: rulestack
                  in: path
                  type: string
                  required: true
                  description: "The rule stack identifier."
                - name: name
                  in: body
                  type: string
                  required: true
                  description: "Name of the prefix list."
                - name: prefix_list
                  in: body
                  type: array
                  required: true
                  description: "List of prefixes."
              outputRawFormat: json
              outputParameters:
                - name: prefix_list
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  prefix_list: "{{tools.prefix_list}}"
        - name: firewalls
          path: /config/ngfirewalls
          description: "Firewall management operations."
          operations:
            - name: list-firewalls
              method: GET
              description: "List all firewalls."
              outputRawFormat: json
              outputParameters:
                - name: firewalls
                  type: array
                  value: "$.firewalls"
            - name: create-firewall
              method: POST
              description: "Create a new firewall."
              inputParameters:
                - name: name
                  in: body
                  type: string
                  required: true
                  description: "Name of the firewall."
                - name: vpc_id
                  in: body
                  type: string
                  required: true
                  description: "VPC ID for the firewall."
                - name: subnet_mappings
                  in: body
                  type: array
                  required: true
                  description: "Subnet mappings for the firewall."
                - name: rulestack
                  in: body
                  type: string
                  required: true
                  description: "Rule stack to associate with the firewall."
              outputRawFormat: json
              outputParameters:
                - name: firewall
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  vpc_id: "{{tools.vpc_id}}"
                  subnet_mappings: "{{tools.subnet_mappings}}"
                  rulestack: "{{tools.rulestack}}"
            - name: get-firewall
              method: GET
              description: "Get a specific firewall."
              inputParameters:
                - name: firewall
                  in: path
                  type: string
                  required: true
                  description: "The firewall identifier."
              outputRawFormat: json
              outputParameters:
                - name: firewall
                  type: object
                  value: "$."
            - name: update-firewall
              method: PUT
              description: "Update a firewall."
              inputParameters:
                - name: firewall
                  in: path
                  type: string
                  required: true
                  description: "The firewall identifier."
              outputRawFormat: json
              outputParameters:
                - name: firewall
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  vpc_id: "{{tools.vpc_id}}"
                  subnet_mappings: "{{tools.subnet_mappings}}"
                  rulestack: "{{tools.rulestack}}"
            - name: delete-firewall
              method: DELETE
              description: "Delete a firewall."
              inputParameters:
                - name: firewall
                  in: path
                  type: string
                  required: true
                  description: "The firewall identifier."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8081
      namespace: cloud-ngfw-rest
      description: "REST adapter for the Cloud NGFW for AWS API."
      resources:
        - path: /v1/rule-stacks
          name: rule-stacks
          description: "Rule stack management."
          operations:
            - method: GET
              name: list-rule-stacks
              description: "List all rule stacks."
              call: "cloud-ngfw.list-rule-stacks"
              with: {}
              outputParameters:
                - type: array
                  mapping: "$."
            - method: POST
              name: create-rule-stack
              description: "Create a new rule stack."
              inputParameters:
                - name: name
                  in: body
                  type: string
                  required: true
                  description: "Name of the rule stack."
                - name: description
                  in: body
                  type: string
                  required: false
                  description: "Description of the rule stack."
                - name: scope
                  in: body
                  type: string
                  required: true
                  description: "Scope of the rule stack."
              call: "cloud-ngfw.create-rule-stack"
              with:
                name: "rest.name"
                description: "rest.description"
                scope: "rest.scope"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/rule-stacks/{rulestack}
          name: rule-stack-detail
          description: "Individual rule stack operations."
          operations:
            - method: GET
              name: get-rule-stack
              description: "Get a specific rule stack."
              inputParameters:
                - name: rulestack
                  in: path
                  type: string
                  required: true
                  description: "The rule stack identifier."
              call: "cloud-ngfw.get-rule-stack"
              with:
                rulestack: "rest.rulestack"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: PUT
              name: update-rule-stack
              description: "Update a rule stack."
              inputParameters:
                - name: rulestack
                  in: path
                  type: string
                  required: true
                  description: "The rule stack identifier."
              call: "cloud-ngfw.update-rule-stack"
              with:
                rulestack: "rest.rulestack"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: DELETE
              name: delete-rule-stack
              description: "Delete a rule stack."
              inputParameters:
                - name: rulestack
                  in: path
                  type: string
                  required: true
                  description: "The rule stack identifier."
              call: "cloud-ngfw.delete-rule-stack"
              with:
                rulestack: "rest.rulestack"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/rule-stacks/{rulestack}/commits
          name: rule-stack-commits
          description: "Rule stack commit operations."
          operations:
            - method: POST
              name: commit-rule-stack
              description: "Commit a rule stack."
              inputParameters:
                - name: rulestack
                  in: path
                  type: string
                  required: true
                  description: "The rule stack identifier."
              call: "cloud-ngfw.commit-rule-stack"
              with:
                rulestack: "rest.rulestack"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/rule-stacks/{rulestack}/security-rules
          name: security-rules
          description: "Security rule management."
          operations:
            - method: GET
              name: list-security-rules
              description: "List security rules in a rule stack."
              inputParameters:
                - name: rulestack
                  in: path
                  type: string
                  required: true
                  description: "The rule stack identifier."
              call: "cloud-ngfw.list-security-rules"
              with:
                rulestack: "rest.rulestack"
              outputParameters:
                - type: array
                  mapping: "$."
            - method: POST
              name: create-security-rule
              description: "Create a security rule."
              inputParameters:
                - name: rulestack
                  in: path
                  type: string
                  required: true
                  description: "The rule stack identifier."
                - name: priority
                  in: body
                  type: integer
                  required: true
                  description: "Priority of the security rule."
                - name: rule_list_name
                  in: body
                  type: string
                  required: true
                  description: "Name of the rule list."
                - name: action
                  in: body
                  type: string
                  required: true
                  description: "Action for the security rule."
              call: "cloud-ngfw.create-security-rule"
              with:
                rulestack: "rest.rulestack"
                priority: "rest.priority"
                rule_list_name: "rest.rule_list_name"
                action: "rest.action"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/rule-stacks/{rulestack}/security-rules/{priority}
          name: security-rule-detail
          description: "Individual security rule operations."
          operations:
            - method: GET
              name: get-security-rule
              description: "Get a specific security rule."
              inputParameters:
                - name: rulestack
                  in: path
                  type: string
                  required: true
                  description: "The rule stack identifier."
                - name: priority
                  in: path
                  type: integer
                  required: true
                  description: "Priority of the security rule."
              call: "cloud-ngfw.get-security-rule"
              with:
                rulestack: "rest.rulestack"
                priority: "rest.priority"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: PUT
              name: update-security-rule
              description: "Update a security rule."
              inputParameters:
                - name: rulestack
                  in: path
                  type: string
                  required: true
                  description: "The rule stack identifier."
                - name: priority
                  in: path
                  type: integer
                  required: true
                  description: "Priority of the security rule."
              call: "cloud-ngfw.update-security-rule"
              with:
                rulestack: "rest.rulestack"
                priority: "rest.priority"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: DELETE
              name: delete-security-rule
              description: "Delete a security rule."
              inputParameters:
                - name: rulestack
                  in: path
                  type: string
                  required: true
                  description: "The rule stack identifier."
                - name: priority
                  in: path
                  type: integer
                  required: true
                  description: "Priority of the security rule."
              call: "cloud-ngfw.delete-security-rule"
              with:
                rulestack: "rest.rulestack"
                priority: "rest.priority"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/rule-stacks/{rulestack}/fqdn-lists
          name: fqdn-lists
          description: "FQDN list management."
          operations:
            - method: GET
              name: list-fqdn-lists
              description: "List FQDN lists in a rule stack."
              inputParameters:
                - name: rulestack
                  in: path
                  type: string
                  required: true
                  description: "The rule stack identifier."
              call: "cloud-ngfw.list-fqdn-lists"
              with:
                rulestack: "rest.rulestack"
              outputParameters:
                - type: array
                  mapping: "$."
            - method: POST
              name: create-fqdn-list
              description: "Create an FQDN list."
              inputParameters:
                - name: rulestack
                  in: path
                  type: string
                  required: true
                  description: "The rule stack identifier."
                - name: name
                  in: body
                  type: string
                  required: true
                  description: "Name of the FQDN list."
                - name: fqdn_list
                  in: body
                  type: array
                  required: true
                  description: "List of FQDNs."
              call: "cloud-ngfw.create-fqdn-list"
              with:
                rulestack: "rest.rulestack"
                name: "rest.name"
                fqdn_list: "rest.fqdn_list"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/rule-stacks/{rulestack}/prefix-lists
          name: prefix-lists
          description: "Prefix list management."
          operations:
            - method: GET
              name: list-prefix-lists
              description: "List prefix lists in a rule stack."
              inputParameters:
                - name: rulestack
                  in: path
                  type: string
                  required: true
                  description: "The rule stack identifier."
              call: "cloud-ngfw.list-prefix-lists"
              with:
                rulestack: "rest.rulestack"
              outputParameters:
                - type: array
                  mapping: "$."
            - method: POST
              name: create-prefix-list
              description: "Create a prefix list."
              inputParameters:
                - name: rulestack
                  in: path
                  type: string
                  required: true
                  description: "The rule stack identifier."
                - name: name
                  in: body
                  type: string
                  required: true
                  description: "Name of the prefix list."
                - name: prefix_list
                  in: body
                  type: array
                  required: true
                  description: "List of prefixes."
              call: "cloud-ngfw.create-prefix-list"
              with:
                rulestack: "rest.rulestack"
                name: "rest.name"
                prefix_list: "rest.prefix_list"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/firewalls
          name: firewalls
          description: "Firewall management."
          operations:
            - method: GET
              name: list-firewalls
              description: "List all firewalls."
              call: "cloud-ngfw.list-firewalls"
              with: {}
              outputParameters:
                - type: array
                  mapping: "$."
            - method: POST
              name: create-firewall
              description: "Create a new firewall."
              inputParameters:
                - name: name
                  in: body
                  type: string
                  required: true
                  description: "Name of the firewall."
                - name: vpc_id
                  in: body
                  type: string
                  required: true
                  description: "VPC ID for the firewall."
                - name: subnet_mappings
                  in: body
                  type: array
                  required: true
                  description: "Subnet mappings for the firewall."
                - name: rulestack
                  in: body
                  type: string
                  required: true
                  description: "Rule stack to associate."
              call: "cloud-ngfw.create-firewall"
              with:
                name: "rest.name"
                vpc_id: "rest.vpc_id"
                subnet_mappings: "rest.subnet_mappings"
                rulestack: "rest.rulestack"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/firewalls/{firewall}
          name: firewall-detail
          description: "Individual firewall operations."
          operations:
            - method: GET
              name: get-firewall
              description: "Get a specific firewall."
              inputParameters:
                - name: firewall
                  in: path
                  type: string
                  required: true
                  description: "The firewall identifier."
              call: "cloud-ngfw.get-firewall"
              with:
                firewall: "rest.firewall"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: PUT
              name: update-firewall
              description: "Update a firewall."
              inputParameters:
                - name: firewall
                  in: path
                  type: string
                  required: true
                  description: "The firewall identifier."
              call: "cloud-ngfw.update-firewall"
              with:
                firewall: "rest.firewall"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: DELETE
              name: delete-firewall
              description: "Delete a firewall."
              inputParameters:
                - name: firewall
                  in: path
                  type: string
                  required: true
                  description: "The firewall identifier."
              call: "cloud-ngfw.delete-firewall"
              with:
                firewall: "rest.firewall"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9091
      namespace: cloud-ngfw-mcp
      transport: http
      description: "MCP adapter for the Cloud NGFW for AWS API."
      tools:
        - name: list-rule-stacks
          description: "List all rule stacks."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          inputParameters: []
          call: "cloud-ngfw.list-rule-stacks"
          with: {}
          outputParameters:
            - type: array
              mapping: "$."
        - name: create-rule-stack
          description: "Create a new rule stack."
          hints:
            readOnly: false
            destructive: false
            idempotent: false
            openWorld: true
          inputParameters:
            - name: name
              type: string
              description: "Name of the rule stack."
              required: true
            - name: description
              type: string
              description: "Description of the rule stack."
              required: false
            - name: scope
              type: string
              description: "Scope of the rule stack."
              required: true
          call: "cloud-ngfw.create-rule-stack"
          with:
            name: "tools.name"
            description: "tools.description"
            scope: "tools.scope"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-rule-stack
          description: "Get a specific rule stack."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          inputParameters:
            - name: rulestack
              type: string
              description: "The rule stack identifier."
              required: true
          call: "cloud-ngfw.get-rule-stack"
          with:
            rulestack: "tools.rulestack"
          outputParameters:
            - type: object
              mapping: "$."
        - name: update-rule-stack
          description: "Update a rule stack."
          hints:
            readOnly: false
            destructive: false
            idempotent: true
            openWorld: true
          inputParameters:
            - name: rulestack
              type: string
              description: "The rule stack identifier."
              required: true
          call: "cloud-ngfw.update-rule-stack"
          with:
            rulestack: "tools.rulestack"
          outputParameters:
            - type: object
              mapping: "$."
        - name: delete-rule-stack
          description: "Delete a rule stack."
          hints:
            readOnly: false
            destructive: true
            idempotent: false
            openWorld: true
          inputParameters:
            - name: rulestack
              type: string
