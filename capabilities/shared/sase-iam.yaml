naftiko: "1.0.0-alpha1"

info:
  label: "SASE IAM"
  description: "Manage service accounts, access policies, and roles for SASE identity and access management."
  tags:
    - SASE
    - IAM
    - Identity
    - Access Management
    - Palo Alto Networks
  created: "2026-04-16"
  modified: "2026-04-16"

binds:
  - namespace: env
    keys:
      PALO_ALTO_OAUTH_TOKEN: PALO_ALTO_OAUTH_TOKEN

capability:
  consumes:
    - type: http
      namespace: sase-iam
      baseUri: https://api.sase.paloaltonetworks.com/iam/v1
      authentication:
        type: bearer
        token: "{{env.PALO_ALTO_OAUTH_TOKEN}}"
      resources:
        - name: service-accounts
          path: /service-accounts
          operations:
            - name: list-service-accounts
              method: GET
              description: "List all service accounts with optional filtering."
              inputParameters:
                - name: tsg_id
                  in: query
                  type: string
                  required: false
                - name: offset
                  in: query
                  type: integer
                  required: false
                - name: limit
                  in: query
                  type: integer
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-service-account
              method: POST
              description: "Create a new service account."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  tsg_id: "{{tools.tsg_id}}"
                  display_name: "{{tools.display_name}}"
                  description: "{{tools.description}}"
            - name: get-service-account
              method: GET
              description: "Get details of a specific service account by ID."
              path: /{id}
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-service-account
              method: PUT
              description: "Update an existing service account."
              path: /{id}
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  display_name: "{{tools.display_name}}"
                  description: "{{tools.description}}"
            - name: delete-service-account
              method: DELETE
              description: "Delete a service account by ID."
              path: /{id}
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: generate-service-account-credentials
              method: POST
              description: "Generate credentials for a service account."
              path: /{id}/keys
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  description: "{{tools.description}}"
                  expires_in_days: "{{tools.expires_in_days}}"
            - name: revoke-service-account-key
              method: DELETE
              description: "Revoke a specific key for a service account."
              path: /{id}/keys/{key_id}
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                - name: key_id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: access-policies
          path: /access-policies
          operations:
            - name: list-access-policies
              method: GET
              description: "List all access policies with optional filtering."
              inputParameters:
                - name: principal_id
                  in: query
                  type: string
                  required: false
                - name: tsg_id
                  in: query
                  type: string
                  required: false
                - name: offset
                  in: query
                  type: integer
                  required: false
                - name: limit
                  in: query
                  type: integer
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-access-policy
              method: POST
              description: "Create a new access policy."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  principal_id: "{{tools.principal_id}}"
                  principal_type: "{{tools.principal_type}}"
                  role_id: "{{tools.role_id}}"
                  tsg_id: "{{tools.tsg_id}}"
            - name: get-access-policy
              method: GET
              description: "Get details of a specific access policy by ID."
              path: /{id}
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-access-policy
              method: PUT
              description: "Update an existing access policy."
              path: /{id}
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  principal_id: "{{tools.principal_id}}"
                  principal_type: "{{tools.principal_type}}"
                  role_id: "{{tools.role_id}}"
                  tsg_id: "{{tools.tsg_id}}"
            - name: delete-access-policy
              method: DELETE
              description: "Delete an access policy by ID."
              path: /{id}
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: roles
          path: /roles
          operations:
            - name: list-roles
              method: GET
              description: "List all available roles."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8107
      namespace: sase-iam-rest
      resources:
        - path: /v1/service-accounts
          operations:
            - method: GET
              name: list-service-accounts
              call: "sase-iam.list-service-accounts"
              with:
                tsg_id: "rest.tsg_id"
                offset: "rest.offset"
                limit: "rest.limit"
              outputParameters:
                - type: array
                  mapping: "$."
            - method: POST
              name: create-service-account
              call: "sase-iam.create-service-account"
              with:
                name: "rest.name"
                tsg_id: "rest.tsg_id"
                display_name: "rest.display_name"
                description: "rest.description"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/service-accounts/{id}
          operations:
            - method: GET
              name: get-service-account
              call: "sase-iam.get-service-account"
              with:
                id: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: PUT
              name: update-service-account
              call: "sase-iam.update-service-account"
              with:
                id: "rest.id"
                display_name: "rest.display_name"
                description: "rest.description"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: DELETE
              name: delete-service-account
              call: "sase-iam.delete-service-account"
              with:
                id: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/service-accounts/{id}/keys
          operations:
            - method: POST
              name: generate-service-account-credentials
              call: "sase-iam.generate-service-account-credentials"
              with:
                id: "rest.id"
                description: "rest.description"
                expires_in_days: "rest.expires_in_days"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/service-accounts/{id}/keys/{key_id}
          operations:
            - method: DELETE
              name: revoke-service-account-key
              call: "sase-iam.revoke-service-account-key"
              with:
                id: "rest.id"
                key_id: "rest.key_id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/access-policies
          operations:
            - method: GET
              name: list-access-policies
              call: "sase-iam.list-access-policies"
              with:
                principal_id: "rest.principal_id"
                tsg_id: "rest.tsg_id"
                offset: "rest.offset"
                limit: "rest.limit"
              outputParameters:
                - type: array
                  mapping: "$."
            - method: POST
              name: create-access-policy
              call: "sase-iam.create-access-policy"
              with:
                principal_id: "rest.principal_id"
                principal_type: "rest.principal_type"
                role_id: "rest.role_id"
                tsg_id: "rest.tsg_id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/access-policies/{id}
          operations:
            - method: GET
              name: get-access-policy
              call: "sase-iam.get-access-policy"
              with:
                id: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: PUT
              name: update-access-policy
              call: "sase-iam.update-access-policy"
              with:
                id: "rest.id"
                principal_id: "rest.principal_id"
                principal_type: "rest.principal_type"
                role_id: "rest.role_id"
                tsg_id: "rest.tsg_id"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: DELETE
              name: delete-access-policy
              call: "sase-iam.delete-access-policy"
              with:
                id: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/roles
          operations:
            - method: GET
              name: list-roles
              call: "sase-iam.list-roles"
              outputParameters:
                - type: array
                  mapping: "$."

    - type: mcp
      port: 9117
      namespace: sase-iam-mcp
      transport: http
      tools:
        - name: list-service-accounts
          description: "List all service accounts with optional filtering."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          inputParameters:
            - name: tsg_id
              type: string
              required: false
            - name: offset
              type: integer
              required: false
            - name: limit
              type: integer
              required: false
          call: "sase-iam.list-service-accounts"
          with:
            tsg_id: "tools.tsg_id"
            offset: "tools.offset"
            limit: "tools.limit"
          outputParameters:
            - type: array
              mapping: "$."
        - name: create-service-account
          description: "Create a new service account."
          hints:
            readOnly: false
            destructive: false
            idempotent: false
            openWorld: true
          inputParameters:
            - name: name
              type: string
              required: true
            - name: tsg_id
              type: string
              required: true
            - name: display_name
              type: string
              required: false
            - name: description
              type: string
              required: false
          call: "sase-iam.create-service-account"
          with:
            name: "tools.name"
            tsg_id: "tools.tsg_id"
            display_name: "tools.display_name"
            description: "tools.description"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-service-account
          description: "Get details of a specific service account by ID."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          inputParameters:
            - name: id
              type: string
              required: true
          call: "sase-iam.get-service-account"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: update-service-account
          description: "Update an existing service account."
          hints:
            readOnly: false
            destructive: false
            idempotent: true
            openWorld: true
          inputParameters:
            - name: id
              type: string
              required: true
            - name: display_name
              type: string
              required: false
            - name: description
              type: string
              required: false
          call: "sase-iam.update-service-account"
          with:
            id: "tools.id"
            display_name: "tools.display_name"
            description: "tools.description"
          outputParameters:
            - type: object
              mapping: "$."
        - name: delete-service-account
          description: "Delete a service account by ID."
          hints:
            readOnly: false
            destructive: true
            idempotent: true
            openWorld: true
          inputParameters:
            - name: id
              type: string
              required: true
          call: "sase-iam.delete-service-account"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: generate-service-account-credentials
          description: "Generate credentials for a service account."
          hints:
            readOnly: false
            destructive: false
            idempotent: false
            openWorld: true
          inputParameters:
            - name: id
              type: string
              required: true
            - name: description
              type: string
              required: false
            - name: expires_in_days
              type: integer
              required: false
          call: "sase-iam.generate-service-account-credentials"
          with:
            id: "tools.id"
            description: "tools.description"
            expires_in_days: "tools.expires_in_days"
          outputParameters:
            - type: object
              mapping: "$."
        - name: revoke-service-account-key
          description: "Revoke a specific key for a service account."
          hints:
            readOnly: false
            destructive: true
            idempotent: true
            openWorld: true
          inputParameters:
            - name: id
              type: string
              required: true
            - name: key_id
              type: string
              required: true
          call: "sase-iam.revoke-service-account-key"
          with:
            id: "tools.id"
            key_id: "tools.key_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-access-policies
          description: "List all access policies with optional filtering."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          inputParameters:
            - name: principal_id
              type: string
              required: false
            - name: tsg_id
              type: string
              required: false
            - name: offset
              type: integer
              required: false
            - name: limit
              type: integer
              required: false
          call: "sase-iam.list-access-policies"
          with:
            principal_id: "tools.principal_id"
            tsg_id: "tools.tsg_id"
            offset: "tools.offset"
            limit: "tools.limit"
          outputParameters:
            - type: array
              mapping: "$."
        - name: create-access-policy
          description: "Create a new access policy."
          hints:
            readOnly: false
            destructive: false
            idempotent: false
            openWorld: true
          inputParameters:
            - name: principal_id
              type: string
              required: true
            - name: principal_type
              type: string
              required: true
            - name: role_id
              type: string
              required: true
            - name: tsg_id
              type: string
              required: true
          call: "sase-iam.create-access-policy"
          with:
            principal_id: "tools.principal_id"
            principal_type: "tools.principal_type"
            role_id: "tools.role_id"
            tsg_id: "tools.tsg_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-access-policy
          description: "Get details of a specific access policy by ID."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          inputParameters:
            - name: id
              type: string
              required: true
          call: "sase-iam.get-access-policy"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: update-access-policy
          description: "Update an existing access policy."
          hints:
            readOnly: false
            destructive: false
            idempotent: true
            openWorld: true
          inputParameters:
            - name: id
              type: string
              required: true
            - name: principal_id
              type: string
              required: false
            - name: principal_type
              type: string
              required: false
            - name: role_id
              type: string
              required: false
            - name: tsg_id
              type: string
              required: false
          call: "sase-iam.update-access-policy"
          with:
            id: "tools.id"
            principal_id: "tools.principal_id"
            principal_type: "tools.principal_type"
            role_id: "tools.role_id"
            tsg_id: "tools.tsg_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: delete-access-policy
          description: "Delete an access policy by ID."
          hints:
            readOnly: false
            destructive: true
            idempotent: true
            openWorld: true
          inputParameters:
            - name: id
              type: string
              required: true
          call: "sase-iam.delete-access-policy"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-roles
          description: "List all available roles."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          inputParameters: []
          call: "sase-iam.list-roles"
          outputParameters:
            - type: array
              mapping: "$."
