naftiko: "1.0.0-alpha1"

info:
  label: "IoT Security"
  description: "Provides access to the Palo Alto Networks IoT Security API for managing IoT devices, alerts, vulnerabilities, policy recommendations, and device tags."
  tags:
    - Security
    - IoT
    - Devices
    - Vulnerabilities
    - Palo Alto Networks
  created: "2026-04-16"
  modified: "2026-04-16"

binds:
  - namespace: env
    keys:
      IOT_KEY_ID: IOT_KEY_ID
      IOT_ACCESS_KEY: IOT_ACCESS_KEY

capability:
  consumes:
    - type: http
      namespace: iot-security-api
      baseUri: https://{customer}.iot.paloaltonetworks.com/pub/v4.0
      description: "IoT Security API for managing IoT devices, alerts, vulnerabilities, and policies."
      authentication:
        type: apikey
        in: header
        headers:
          X-Key-Id: "{{IOT_KEY_ID}}"
          X-Access-Key: "{{IOT_ACCESS_KEY}}"
      resources:
        - name: devices
          path: /device
          description: "Manage IoT devices."
          operations:
            - name: list-devices
              method: GET
              description: "List IoT devices."
              inputParameters:
                - name: offset
                  in: query
                  type: integer
                  required: false
                  description: "Offset for pagination."
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of results to return."
                - name: detail
                  in: query
                  type: boolean
                  required: false
                  description: "Whether to include detailed device information."
                - name: stime
                  in: query
                  type: string
                  required: false
                  description: "Start time filter."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: device-detail
          path: /device/detail
          description: "Get detailed device information."
          operations:
            - name: get-device-detail
              method: GET
              description: "Get detailed information for a specific device."
              inputParameters:
                - name: deviceid
                  in: query
                  type: string
                  required: true
                  description: "The device ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: alerts
          path: /alert
          description: "Manage IoT alerts."
          operations:
            - name: list-alerts
              method: GET
              description: "List IoT security alerts."
              inputParameters:
                - name: offset
                  in: query
                  type: integer
                  required: false
                  description: "Offset for pagination."
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of results to return."
                - name: stime
                  in: query
                  type: string
                  required: false
                  description: "Start time filter."
                - name: type
                  in: query
                  type: string
                  required: false
                  description: "Filter by alert type."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: alert-detail
          path: /alert/detail
          description: "Get detailed alert information."
          operations:
            - name: get-alert-detail
              method: GET
              description: "Get detailed information for a specific alert."
              inputParameters:
                - name: zb_ticketid
                  in: query
                  type: string
                  required: true
                  description: "The alert ticket ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: alert-update
          path: /alert/update
          description: "Update IoT alerts."
          operations:
            - name: update-alert
              method: PUT
              description: "Update an IoT security alert."
              inputParameters:
                - name: zb_ticketid
                  in: body
                  type: string
                  required: true
                  description: "The alert ticket ID."
                - name: status
                  in: body
                  type: string
                  required: true
                  description: "New status for the alert."
                - name: reason
                  in: body
                  type: string
                  required: false
                  description: "Reason for the status change."
              body:
                type: json
                data:
                  zb_ticketid: "{{tools.zb_ticketid}}"
                  status: "{{tools.status}}"
                  reason: "{{tools.reason}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: vulnerabilities
          path: /vulnerability
          description: "Manage IoT vulnerabilities."
          operations:
            - name: list-vulnerabilities
              method: GET
              description: "List IoT vulnerabilities."
              inputParameters:
                - name: offset
                  in: query
                  type: integer
                  required: false
                  description: "Offset for pagination."
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of results to return."
                - name: stime
                  in: query
                  type: string
                  required: false
                  description: "Start time filter."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: vulnerability-detail
          path: /vulnerability/detail
          description: "Get detailed vulnerability information."
          operations:
            - name: get-vulnerability-detail
              method: GET
              description: "Get vulnerability details for a specific device."
              inputParameters:
                - name: deviceid
                  in: query
                  type: string
                  required: true
                  description: "The device ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: policy-recommendation
          path: /policy/recommendation
          description: "Get policy recommendations."
          operations:
            - name: get-policy-recommendation
              method: GET
              description: "Get policy recommendation for a specific device."
              inputParameters:
                - name: deviceid
                  in: query
                  type: string
                  required: true
                  description: "The device ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: device-tags
          path: /device/tag/list
          description: "Manage device tags."
          operations:
            - name: list-device-tags
              method: GET
              description: "List device tags."
              inputParameters:
                - name: offset
                  in: query
                  type: integer
                  required: false
                  description: "Offset for pagination."
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of results to return."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8091
      namespace: iot-security-rest
      description: "REST API adapter for IoT Security operations."
      resources:
        - path: /v1/devices
          name: devices
          description: "List IoT devices."
          operations:
            - method: GET
              name: list-devices
              description: "List IoT devices."
              inputParameters:
                - name: offset
                  in: query
                  type: integer
                  required: false
                - name: limit
                  in: query
                  type: integer
                  required: false
                - name: detail
                  in: query
                  type: boolean
                  required: false
                - name: stime
                  in: query
                  type: string
                  required: false
              call: "iot-security-api.list-devices"
              with:
                offset: "rest.offset"
                limit: "rest.limit"
                detail: "rest.detail"
                stime: "rest.stime"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/devices/details
          name: device-details
          description: "Get detailed device information."
          operations:
            - method: GET
              name: get-device-detail
              description: "Get detailed information for a specific device."
              inputParameters:
                - name: deviceid
                  in: query
                  type: string
                  required: true
              call: "iot-security-api.get-device-detail"
              with:
                deviceid: "rest.deviceid"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/alerts
          name: alerts
          description: "List IoT security alerts."
          operations:
            - method: GET
              name: list-alerts
              description: "List IoT security alerts."
              inputParameters:
                - name: offset
                  in: query
                  type: integer
                  required: false
                - name: limit
                  in: query
                  type: integer
                  required: false
                - name: stime
                  in: query
                  type: string
                  required: false
                - name: type
                  in: query
                  type: string
                  required: false
              call: "iot-security-api.list-alerts"
              with:
                offset: "rest.offset"
                limit: "rest.limit"
                stime: "rest.stime"
                type: "rest.type"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/alerts/details
          name: alert-details
          description: "Get detailed alert information."
          operations:
            - method: GET
              name: get-alert-detail
              description: "Get detailed information for a specific alert."
              inputParameters:
                - name: zb_ticketid
                  in: query
                  type: string
                  required: true
              call: "iot-security-api.get-alert-detail"
              with:
                zb_ticketid: "rest.zb_ticketid"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/alerts/updates
          name: alert-updates
          description: "Update IoT alerts."
          operations:
            - method: PUT
              name: update-alert
              description: "Update an IoT security alert."
              inputParameters:
                - name: zb_ticketid
                  in: body
                  type: string
                  required: true
                - name: status
                  in: body
                  type: string
                  required: true
                - name: reason
                  in: body
                  type: string
                  required: false
              call: "iot-security-api.update-alert"
              with:
                zb_ticketid: "rest.zb_ticketid"
                status: "rest.status"
                reason: "rest.reason"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/vulnerabilities
          name: vulnerabilities
          description: "List IoT vulnerabilities."
          operations:
            - method: GET
              name: list-vulnerabilities
              description: "List IoT vulnerabilities."
              inputParameters:
                - name: offset
                  in: query
                  type: integer
                  required: false
                - name: limit
                  in: query
                  type: integer
                  required: false
                - name: stime
                  in: query
                  type: string
                  required: false
              call: "iot-security-api.list-vulnerabilities"
              with:
                offset: "rest.offset"
                limit: "rest.limit"
                stime: "rest.stime"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/vulnerabilities/details
          name: vulnerability-details
          description: "Get vulnerability details for a device."
          operations:
            - method: GET
              name: get-vulnerability-detail
              description: "Get vulnerability details for a specific device."
              inputParameters:
                - name: deviceid
                  in: query
                  type: string
                  required: true
              call: "iot-security-api.get-vulnerability-detail"
              with:
                deviceid: "rest.deviceid"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/policies/recommendations
          name: policy-recommendations
          description: "Get policy recommendations."
          operations:
            - method: GET
              name: get-policy-recommendation
              description: "Get policy recommendation for a specific device."
              inputParameters:
                - name: deviceid
                  in: query
                  type: string
                  required: true
              call: "iot-security-api.get-policy-recommendation"
              with:
                deviceid: "rest.deviceid"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/devices/tags
          name: device-tags
          description: "List device tags."
          operations:
            - method: GET
              name: list-device-tags
              description: "List device tags."
              inputParameters:
                - name: offset
                  in: query
                  type: integer
                  required: false
                - name: limit
                  in: query
                  type: integer
                  required: false
              call: "iot-security-api.list-device-tags"
              with:
                offset: "rest.offset"
                limit: "rest.limit"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9101
      namespace: iot-security-mcp
      transport: http
      description: "MCP adapter for IoT Security operations."
      tools:
        - name: list-devices
          description: "List IoT devices with optional filters."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          inputParameters:
            - name: offset
              type: integer
              description: "Offset for pagination."
              required: false
            - name: limit
              type: integer
              description: "Maximum number of results to return."
              required: false
            - name: detail
              type: boolean
              description: "Whether to include detailed device information."
              required: false
            - name: stime
              type: string
              description: "Start time filter."
              required: false
          call: "iot-security-api.list-devices"
          with:
            offset: "tools.offset"
            limit: "tools.limit"
            detail: "tools.detail"
            stime: "tools.stime"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-device-detail
          description: "Get detailed information for a specific IoT device."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          inputParameters:
            - name: deviceid
              type: string
              description: "The device ID."
              required: true
          call: "iot-security-api.get-device-detail"
          with:
            deviceid: "tools.deviceid"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-alerts
          description: "List IoT security alerts."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          inputParameters:
            - name: offset
              type: integer
              description: "Offset for pagination."
              required: false
            - name: limit
              type: integer
              description: "Maximum number of results to return."
              required: false
            - name: stime
              type: string
              description: "Start time filter."
              required: false
            - name: type
              type: string
              description: "Filter by alert type."
              required: false
          call: "iot-security-api.list-alerts"
          with:
            offset: "tools.offset"
            limit: "tools.limit"
            stime: "tools.stime"
            type: "tools.type"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-alert-detail
          description: "Get detailed information for a specific IoT alert."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          inputParameters:
            - name: zb_ticketid
              type: string
              description: "The alert ticket ID."
              required: true
          call: "iot-security-api.get-alert-detail"
          with:
            zb_ticketid: "tools.zb_ticketid"
          outputParameters:
            - type: object
              mapping: "$."

        - name: update-alert
          description: "Update an IoT security alert status."
          hints:
            readOnly: false
            destructive: false
            idempotent: true
            openWorld: true
          inputParameters:
            - name: zb_ticketid
              type: string
              description: "The alert ticket ID."
              required: true
            - name: status
              type: string
              description: "New status for the alert."
              required: true
            - name: reason
              type: string
              description: "Reason for the status change."
              required: false
          call: "iot-security-api.update-alert"
          with:
            zb_ticketid: "tools.zb_ticketid"
            status: "tools.status"
            reason: "tools.reason"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-vulnerabilities
          description: "List IoT vulnerabilities."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          inputParameters:
            - name: offset
              type: integer
              description: "Offset for pagination."
              required: false
            - name: limit
              type: integer
              description: "Maximum number of results to return."
              required: false
            - name: stime
              type: string
              description: "Start time filter."
              required: false
          call: "iot-security-api.list-vulnerabilities"
          with:
            offset: "tools.offset"
            limit: "tools.limit"
            stime: "tools.stime"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-vulnerability-detail
          description: "Get vulnerability details for a specific IoT device."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          inputParameters:
            - name: deviceid
              type: string
              description: "The device ID."
              required: true
          call: "iot-security-api.get-vulnerability-detail"
          with:
            deviceid: "tools.deviceid"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-policy-recommendation
          description: "Get policy recommendation for a specific IoT device."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          inputParameters:
            - name: deviceid
              type: string
              description: "The device ID."
              required: true
          call: "iot-security-api.get-policy-recommendation"
          with:
            deviceid: "tools.deviceid"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-device-tags
          description: "List IoT device tags."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          inputParameters:
            - name: offset
              type: integer
              description: "Offset for pagination."
              required: false
            - name: limit
              type: integer
              description: "Maximum number of results to return."
              required: false
          call: "iot-security-api.list-device-tags"
          with:
            offset: "tools.offset"
            limit: "tools.limit"
          outputParameters:
            - type: object
              mapping: "$."
