naftiko: "1.0.0-alpha1"

info:
  label: "Autonomous DEM"
  description: "Capability for the Palo Alto Networks Autonomous Digital Experience Monitoring (DEM) API, providing application scores, agent scores, test results, and performance metrics."
  tags:
    - palo-alto-networks
    - autonomous-dem
    - monitoring
    - digital-experience
  created: "2026-04-16"
  modified: "2026-04-16"

binds:
  - namespace: env
    keys:
      PALO_ALTO_OAUTH_TOKEN: PALO_ALTO_OAUTH_TOKEN

capability:
  consumes:
    - type: http
      namespace: autonomous-dem
      baseUri: https://api.sase.paloaltonetworks.com
      description: "Palo Alto Networks Autonomous DEM API for monitoring digital experience across applications and agents."
      authentication:
        type: bearer
        token: "{{PALO_ALTO_OAUTH_TOKEN}}"
      resources:
        - name: application-scores
          path: /mt/monitor/adem/v1/applications/scores
          description: "Application experience scores."
          operations:
            - name: get-application-scores
              method: GET
              description: "Get application experience scores."
              inputParameters:
                - name: start_time
                  in: query
                  type: string
                  required: false
                  description: "Start time for the query range."
                - name: end_time
                  in: query
                  type: string
                  required: false
                  description: "End time for the query range."
                - name: offset
                  in: query
                  type: integer
                  required: false
                  description: "Pagination offset."
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of results to return."
              outputRawFormat: json
              outputParameters:
                - name: scores
                  type: array
                  value: "$.scores"
        - name: agent-scores
          path: /mt/monitor/adem/v1/agents/scores
          description: "Agent and endpoint scores."
          operations:
            - name: get-agent-scores
              method: GET
              description: "Get agent and endpoint scores."
              inputParameters:
                - name: start_time
                  in: query
                  type: string
                  required: false
                  description: "Start time for the query range."
                - name: end_time
                  in: query
                  type: string
                  required: false
                  description: "End time for the query range."
                - name: offset
                  in: query
                  type: integer
                  required: false
                  description: "Pagination offset."
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of results to return."
              outputRawFormat: json
              outputParameters:
                - name: scores
                  type: array
                  value: "$.scores"
        - name: test-results
          path: /mt/monitor/adem/v1/tests
          description: "Synthetic test results."
          operations:
            - name: get-test-results
              method: GET
              description: "Get synthetic test results."
              inputParameters:
                - name: test_id
                  in: path
                  type: string
                  required: true
                  description: "The ID of the test."
                - name: start_time
                  in: query
                  type: string
                  required: false
                  description: "Start time for the query range."
                - name: end_time
                  in: query
                  type: string
                  required: false
                  description: "End time for the query range."
              outputRawFormat: json
              outputParameters:
                - name: results
                  type: array
                  value: "$.results"
        - name: applications
          path: /mt/monitor/adem/v1/applications
          description: "Monitored applications."
          operations:
            - name: list-monitored-applications
              method: GET
              description: "List monitored applications."
              inputParameters:
                - name: offset
                  in: query
                  type: integer
                  required: false
                  description: "Pagination offset."
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of results to return."
              outputRawFormat: json
              outputParameters:
                - name: applications
                  type: array
                  value: "$.applications"
        - name: agents
          path: /mt/monitor/adem/v1/agents
          description: "Monitored agents."
          operations:
            - name: list-monitored-agents
              method: GET
              description: "List monitored agents."
              inputParameters:
                - name: offset
                  in: query
                  type: integer
                  required: false
                  description: "Pagination offset."
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of results to return."
              outputRawFormat: json
              outputParameters:
                - name: agents
                  type: array
                  value: "$.agents"
        - name: metrics
          path: /mt/monitor/adem/v1/metrics
          description: "Performance metrics."
          operations:
            - name: get-performance-metrics
              method: GET
              description: "Get performance metrics."
              inputParameters:
                - name: start_time
                  in: query
                  type: string
                  required: false
                  description: "Start time for the query range."
                - name: end_time
                  in: query
                  type: string
                  required: false
                  description: "End time for the query range."
                - name: metric_type
                  in: query
                  type: string
                  required: false
                  description: "The type of metric to retrieve."
                - name: granularity
                  in: query
                  type: string
                  required: false
                  description: "The granularity of the metrics."
              outputRawFormat: json
              outputParameters:
                - name: metrics
                  type: array
                  value: "$.metrics"

  exposes:
    - type: rest
      port: 8081
      namespace: autonomous-dem-rest
      description: "REST adapter for the Autonomous DEM API."
      resources:
        - path: /v1/application-scores
          name: application-scores
          description: "Application experience scores."
          operations:
            - method: GET
              name: get-application-scores
              description: "Get application experience scores."
              inputParameters:
                - name: start_time
                  in: query
                  type: string
                  required: false
                  description: "Start time for the query range."
                - name: end_time
                  in: query
                  type: string
                  required: false
                  description: "End time for the query range."
                - name: offset
                  in: query
                  type: integer
                  required: false
                  description: "Pagination offset."
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of results to return."
              call: "autonomous-dem.get-application-scores"
              with:
                start_time: "rest.start_time"
                end_time: "rest.end_time"
                offset: "rest.offset"
                limit: "rest.limit"
              outputParameters:
                - type: array
                  mapping: "$."
        - path: /v1/agent-scores
          name: agent-scores
          description: "Agent and endpoint scores."
          operations:
            - method: GET
              name: get-agent-scores
              description: "Get agent and endpoint scores."
              inputParameters:
                - name: start_time
                  in: query
                  type: string
                  required: false
                  description: "Start time for the query range."
                - name: end_time
                  in: query
                  type: string
                  required: false
                  description: "End time for the query range."
                - name: offset
                  in: query
                  type: integer
                  required: false
                  description: "Pagination offset."
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of results to return."
              call: "autonomous-dem.get-agent-scores"
              with:
                start_time: "rest.start_time"
                end_time: "rest.end_time"
                offset: "rest.offset"
                limit: "rest.limit"
              outputParameters:
                - type: array
                  mapping: "$."
        - path: /v1/test-results/{test_id}
          name: test-results
          description: "Synthetic test results."
          operations:
            - method: GET
              name: get-test-results
              description: "Get synthetic test results."
              inputParameters:
                - name: test_id
                  in: path
                  type: string
                  required: true
                  description: "The ID of the test."
                - name: start_time
                  in: query
                  type: string
                  required: false
                  description: "Start time for the query range."
                - name: end_time
                  in: query
                  type: string
                  required: false
                  description: "End time for the query range."
              call: "autonomous-dem.get-test-results"
              with:
                test_id: "rest.test_id"
                start_time: "rest.start_time"
                end_time: "rest.end_time"
              outputParameters:
                - type: array
                  mapping: "$."
        - path: /v1/monitored-applications
          name: monitored-applications
          description: "Monitored applications."
          operations:
            - method: GET
              name: list-monitored-applications
              description: "List monitored applications."
              inputParameters:
                - name: offset
                  in: query
                  type: integer
                  required: false
                  description: "Pagination offset."
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of results to return."
              call: "autonomous-dem.list-monitored-applications"
              with:
                offset: "rest.offset"
                limit: "rest.limit"
              outputParameters:
                - type: array
                  mapping: "$."
        - path: /v1/monitored-agents
          name: monitored-agents
          description: "Monitored agents."
          operations:
            - method: GET
              name: list-monitored-agents
              description: "List monitored agents."
              inputParameters:
                - name: offset
                  in: query
                  type: integer
                  required: false
                  description: "Pagination offset."
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of results to return."
              call: "autonomous-dem.list-monitored-agents"
              with:
                offset: "rest.offset"
                limit: "rest.limit"
              outputParameters:
                - type: array
                  mapping: "$."
        - path: /v1/performance-metrics
          name: performance-metrics
          description: "Performance metrics."
          operations:
            - method: GET
              name: get-performance-metrics
              description: "Get performance metrics."
              inputParameters:
                - name: start_time
                  in: query
                  type: string
                  required: false
                  description: "Start time for the query range."
                - name: end_time
                  in: query
                  type: string
                  required: false
                  description: "End time for the query range."
                - name: metric_type
                  in: query
                  type: string
                  required: false
                  description: "The type of metric to retrieve."
                - name: granularity
                  in: query
                  type: string
                  required: false
                  description: "The granularity of the metrics."
              call: "autonomous-dem.get-performance-metrics"
              with:
                start_time: "rest.start_time"
                end_time: "rest.end_time"
                metric_type: "rest.metric_type"
                granularity: "rest.granularity"
              outputParameters:
                - type: array
                  mapping: "$."

    - type: mcp
      port: 9091
      namespace: autonomous-dem-mcp
      transport: http
      description: "MCP adapter for the Autonomous DEM API."
      tools:
        - name: get-application-scores
          description: "Get application experience scores."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          inputParameters:
            - name: start_time
              type: string
              description: "Start time for the query range."
              required: false
            - name: end_time
              type: string
              description: "End time for the query range."
              required: false
            - name: offset
              type: integer
              description: "Pagination offset."
              required: false
            - name: limit
              type: integer
              description: "Maximum number of results to return."
              required: false
          call: "autonomous-dem.get-application-scores"
          with:
            start_time: "tools.start_time"
            end_time: "tools.end_time"
            offset: "tools.offset"
            limit: "tools.limit"
          outputParameters:
            - type: array
              mapping: "$."
        - name: get-agent-scores
          description: "Get agent and endpoint scores."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          inputParameters:
            - name: start_time
              type: string
              description: "Start time for the query range."
              required: false
            - name: end_time
              type: string
              description: "End time for the query range."
              required: false
            - name: offset
              type: integer
              description: "Pagination offset."
              required: false
            - name: limit
              type: integer
              description: "Maximum number of results to return."
              required: false
          call: "autonomous-dem.get-agent-scores"
          with:
            start_time: "tools.start_time"
            end_time: "tools.end_time"
            offset: "tools.offset"
            limit: "tools.limit"
          outputParameters:
            - type: array
              mapping: "$."
        - name: get-test-results
          description: "Get synthetic test results."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          inputParameters:
            - name: test_id
              type: string
              description: "The ID of the test."
              required: true
            - name: start_time
              type: string
              description: "Start time for the query range."
              required: false
            - name: end_time
              type: string
              description: "End time for the query range."
              required: false
          call: "autonomous-dem.get-test-results"
          with:
            test_id: "tools.test_id"
            start_time: "tools.start_time"
            end_time: "tools.end_time"
          outputParameters:
            - type: array
              mapping: "$."
        - name: list-monitored-applications
          description: "List monitored applications."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          inputParameters:
            - name: offset
              type: integer
              description: "Pagination offset."
              required: false
            - name: limit
              type: integer
              description: "Maximum number of results to return."
              required: false
          call: "autonomous-dem.list-monitored-applications"
          with:
            offset: "tools.offset"
            limit: "tools.limit"
          outputParameters:
            - type: array
              mapping: "$."
        - name: list-monitored-agents
          description: "List monitored agents."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          inputParameters:
            - name: offset
              type: integer
              description: "Pagination offset."
              required: false
            - name: limit
              type: integer
              description: "Maximum number of results to return."
              required: false
          call: "autonomous-dem.list-monitored-agents"
          with:
            offset: "tools.offset"
            limit: "tools.limit"
          outputParameters:
            - type: array
              mapping: "$."
        - name: get-performance-metrics
          description: "Get performance metrics."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          inputParameters:
            - name: start_time
              type: string
              description: "Start time for the query range."
              required: false
            - name: end_time
              type: string
              description: "End time for the query range."
              required: false
            - name: metric_type
              type: string
              description: "The type of metric to retrieve."
              required: false
            - name: granularity
              type: string
              description: "The granularity of the metrics."
              required: false
          call: "autonomous-dem.get-performance-metrics"
          with:
            start_time: "tools.start_time"
            end_time: "tools.end_time"
            metric_type: "tools.metric_type"
            granularity: "tools.granularity"
          outputParameters:
            - type: array
              mapping: "$."
