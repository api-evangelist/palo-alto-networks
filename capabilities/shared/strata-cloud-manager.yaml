              inputParameters:
                - name: folder
                  in: query
                  type: string
                  required: false
                - name: snippet
                  in: query
                  type: string
                  required: false
                - name: device
                  in: query
                  type: string
                  required: false
                - name: name
                  in: body
                  type: string
                  required: true
                - name: protocol
                  in: body
                  type: object
