    - type: mcp
      port: 9122
      namespace: strata-cloud-manager-mcp
      transport: http
      tools:
        - name: list-addresses
          description: "List all addresses with optional filters."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          inputParameters:
            - name: folder
              type: string
              required: false
            - name: snippet
              type: string
              required: false
            - name: device
              type: string
              required: false
            - name: limit
              type: integer
              required: false
            - name: offset
              type: integer
              required: false
            - name: name
              type: string
              required: false
          call: "strata-cloud-manager.list-addresses"
          with:
            folder: "tools.folder"
            snippet: "tools.snippet"
            device: "tools.device"
            limit: "tools.limit"
            offset: "tools.offset"
            name: "tools.name"
