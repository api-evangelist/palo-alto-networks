              name: list-addresses
              call: "strata-cloud-manager.list-addresses"
              with:
                folder: "rest.folder"
                snippet: "rest.snippet"
                device: "rest.device"
                limit: "rest.limit"
                offset: "rest.offset"
                name: "rest.name"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-address
              call: "strata-cloud-manager.create-address"
              with:
                folder: "rest.folder"
                snippet: "rest.snippet"
                device: "rest.device"
                name: "rest.name"
                ip_netmask: "rest.ip_netmask"
                ip_range: "rest.ip_range"
