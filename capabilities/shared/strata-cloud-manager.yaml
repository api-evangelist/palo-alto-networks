naftiko: "1.0.0-alpha1"

info:
  label: "Strata Cloud Manager"
  description: "Manages addresses, address groups, services, security rules, NAT rules, and configuration push for Strata Cloud Manager."
  tags:
    - Networking
    - Security
    - Firewall
    - Palo Alto
  created: "2026-04-16"
  modified: "2026-04-16"

binds:
  - namespace: env
    keys:
      STRATA_CLOUD_MANAGER_TOKEN: STRATA_CLOUD_MANAGER_TOKEN

capability:
  consumes:
    - type: http
      namespace: strata-cloud-manager
      baseUri: https://api.strata.paloaltonetworks.com
      description: "Strata Cloud Manager API for managing addresses, address groups, services, security rules, NAT rules, and configuration deployment."
      authentication:
        type: bearer
        token: "{{env.STRATA_CLOUD_MANAGER_TOKEN}}"
      resources:
        - name: addresses
          path: /sse/config/v1/addresses
          operations:
            - name: list-addresses
              method: GET
              description: "List all addresses with optional filters."
              inputParameters:
                - name: folder
                  in: query
                  type: string
                  required: false
                - name: snippet
                  in: query
                  type: string
                  required: false
                - name: device
                  in: query
                  type: string
                  required: false
                - name: limit
                  in: query
                  type: integer
                  required: false
                - name: offset
                  in: query
                  type: integer
                  required: false
                - name: name
                  in: query
                  type: string
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-address
              method: POST
              description: "Create a new address object."
              inputParameters:
                - name: folder
                  in: query
                  type: string
                  required: false
                - name: snippet
                  in: query
                  type: string
                  required: false
                - name: device
                  in: query
                  type: string
                  required: false
                - name: name
                  in: body
                  type: string
                  required: true
                - name: ip_netmask
                  in: body
                  type: string
                  required: false
                - name: ip_range
                  in: body
                  type: string
                  required: false
                - name: ip_wildcard
                  in: body
                  type: string
                  required: false
                - name: fqdn
                  in: body
                  type: string
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  ip_netmask: "{{tools.ip_netmask}}"
                  ip_range: "{{tools.ip_range}}"
                  ip_wildcard: "{{tools.ip_wildcard}}"
                  fqdn: "{{tools.fqdn}}"
        - name: address
          path: /sse/config/v1/addresses/{id}
          operations:
            - name: get-address
              method: GET
              description: "Get a specific address by ID."
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-address
              method: PUT
              description: "Update a specific address by ID."
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data: {}
            - name: delete-address
              method: DELETE
              description: "Delete a specific address by ID."
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: address-groups
          path: /sse/config/v1/address-groups
          operations:
            - name: list-address-groups
              method: GET
              description: "List all address groups with optional filters."
              inputParameters:
                - name: folder
                  in: query
                  type: string
                  required: false
                - name: snippet
                  in: query
                  type: string
                  required: false
                - name: device
                  in: query
                  type: string
                  required: false
                - name: limit
                  in: query
                  type: integer
                  required: false
                - name: offset
                  in: query
                  type: integer
                  required: false
                - name: name
                  in: query
                  type: string
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-address-group
              method: POST
              description: "Create a new address group."
              inputParameters:
                - name: folder
                  in: query
                  type: string
                  required: false
                - name: snippet
                  in: query
                  type: string
                  required: false
                - name: device
                  in: query
                  type: string
                  required: false
                - name: name
                  in: body
                  type: string
                  required: true
                - name: static
                  in: body
                  type: object
                  required: false
                - name: dynamic
                  in: body
                  type: object
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  static: "{{tools.static}}"
                  dynamic: "{{tools.dynamic}}"
        - name: address-group
