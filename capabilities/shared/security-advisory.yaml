naftiko: "1.0.0-alpha1"

info:
  label: "Security Advisory"
  description: "Query Palo Alto Networks security advisories, CVEs, and affected products from the public advisory API."
  tags:
    - security
    - advisories
    - cve
    - vulnerabilities
    - palo-alto-networks
  created: "2026-04-16"
  modified: "2026-04-16"

capability:
  consumes:
    - type: http
      namespace: security-advisory
      baseUri: https://security.paloaltonetworks.com/api
      resources:
        - name: advisories
          path: /advisories
          operations:
            - name: list-advisories
              method: GET
              description: "List security advisories with optional filtering by severity and affected product."
              inputParameters:
                - name: severity
                  in: query
                  type: string
                  required: false
                - name: affected_product
                  in: query
                  type: string
                  required: false
                - name: sort
                  in: query
                  type: string
                  required: false
                - name: limit
                  in: query
                  type: integer
                  required: false
                - name: offset
                  in: query
                  type: integer
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-advisory
              method: GET
              description: "Get details of a specific security advisory by ID."
              path: /{advisory_id}
              inputParameters:
                - name: advisory_id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-advisory-by-cve
              method: GET
              description: "Get a security advisory by its CVE identifier."
              path: /cve/{cve_id}
              inputParameters:
                - name: cve_id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: products
          path: /products
          operations:
            - name: list-affected-products
              method: GET
              description: "List all products affected by security advisories."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8110
      namespace: security-advisory-rest
      resources:
        - path: /v1/advisories
          operations:
            - method: GET
              name: list-advisories
              call: "security-advisory.list-advisories"
              with:
                severity: "rest.severity"
                affected_product: "rest.affected_product"
                sort: "rest.sort"
                limit: "rest.limit"
                offset: "rest.offset"
              outputParameters:
                - type: array
                  mapping: "$."
        - path: /v1/advisories/{advisory_id}
          operations:
            - method: GET
              name: get-advisory
              call: "security-advisory.get-advisory"
              with:
                advisory_id: "rest.advisory_id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/advisories/cves/{cve_id}
          operations:
            - method: GET
              name: get-advisory-by-cve
              call: "security-advisory.get-advisory-by-cve"
              with:
                cve_id: "rest.cve_id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/affected-products
          operations:
            - method: GET
              name: list-affected-products
              call: "security-advisory.list-affected-products"
              outputParameters:
                - type: array
                  mapping: "$."

    - type: mcp
      port: 9120
      namespace: security-advisory-mcp
      transport: http
      tools:
        - name: list-advisories
          description: "List security advisories with optional filtering by severity and affected product."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          inputParameters:
            - name: severity
              type: string
              required: false
            - name: affected_product
              type: string
              required: false
            - name: sort
              type: string
              required: false
            - name: limit
              type: integer
              required: false
            - name: offset
              type: integer
              required: false
          call: "security-advisory.list-advisories"
          with:
            severity: "tools.severity"
            affected_product: "tools.affected_product"
            sort: "tools.sort"
            limit: "tools.limit"
            offset: "tools.offset"
          outputParameters:
            - type: array
              mapping: "$."
        - name: get-advisory
          description: "Get details of a specific security advisory by ID."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          inputParameters:
            - name: advisory_id
              type: string
              required: true
          call: "security-advisory.get-advisory"
          with:
            advisory_id: "tools.advisory_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-advisory-by-cve
          description: "Get a security advisory by its CVE identifier."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          inputParameters:
            - name: cve_id
              type: string
              required: true
          call: "security-advisory.get-advisory-by-cve"
          with:
            cve_id: "tools.cve_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-affected-products
          description: "List all products affected by security advisories."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          inputParameters: []
          call: "security-advisory.list-affected-products"
          outputParameters:
            - type: array
              mapping: "$."
