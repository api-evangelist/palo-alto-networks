              description: "Create a new subnet rule."
              inputParameters:
                - name: name
                  in: body
                  type: string
                  required: true
                - name: subnet
                  in: body
                  type: string
                  required: true
                - name: group_id
                  in: body
                  type: string
                  required: true
                - name: enabled
                  in: body
