                - name: ports
                  in: body
                  type: object
                  required: true
                - name: enabled
                  in: body
                  type: boolean
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  fqdn_pattern: "{{tools.fqdn_pattern}}"
                  group_id: "{{tools.group_id}}"
                  ports: "{{tools.ports}}"
                  enabled: "{{tools.enabled}}"
        - name: subnet-rules
          path: /v2/subnet-rules
          operations:
            - name: list-subnet-rules
