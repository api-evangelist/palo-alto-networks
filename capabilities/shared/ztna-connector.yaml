naftiko: "1.0.0-alpha1"

info:
  label: "ZTNA Connector"
  description: "Manages ZTNA connectors, connector groups, applications, FQDN rules, subnet rules, and licenses for Zero Trust Network Access."
  tags:
    - Security
    - Zero Trust
    - Networking
    - Palo Alto
  created: "2026-04-16"
  modified: "2026-04-16"

binds:
  - namespace: env
    keys:
      PALO_ALTO_OAUTH_TOKEN: PALO_ALTO_OAUTH_TOKEN

capability:
  consumes:
    - type: http
      namespace: ztna-connector
      baseUri: https://api.sase.paloaltonetworks.com/ztna
      description: "ZTNA Connector API for managing connectors, connector groups, applications, FQDN rules, subnet rules, and licenses."
      authentication:
        type: bearer
        token: "{{env.PALO_ALTO_OAUTH_TOKEN}}"
      resources:
        - name: connectors
          path: /v2/connectors
          operations:
            - name: list-connectors
              method: GET
              description: "List all ZTNA connectors."
              inputParameters:
                - name: group_id
                  in: query
                  type: string
                  required: false
                - name: status
                  in: query
                  type: string
                  required: false
                - name: offset
                  in: query
                  type: integer
                  required: false
                - name: limit
                  in: query
                  type: integer
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-connector
              method: POST
              description: "Create a new ZTNA connector."
              inputParameters:
                - name: name
                  in: body
                  type: string
                  required: true
                - name: group_id
                  in: body
                  type: string
                  required: true
                - name: description
                  in: body
                  type: string
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  group_id: "{{tools.group_id}}"
                  description: "{{tools.description}}"
        - name: connector
          path: /v2/connectors/{connector_id}
          operations:
            - name: get-connector
              method: GET
              description: "Get a specific ZTNA connector by ID."
              inputParameters:
                - name: connector_id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-connector
              method: PUT
              description: "Update a specific ZTNA connector by ID."
              inputParameters:
                - name: connector_id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data: {}
            - name: delete-connector
              method: DELETE
              description: "Delete a specific ZTNA connector by ID."
              inputParameters:
                - name: connector_id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: connector-upgrade
          path: /v2/connectors/{connector_id}/upgrade
          operations:
            - name: schedule-connector-upgrade
              method: POST
              description: "Schedule an upgrade for a ZTNA connector."
              inputParameters:
                - name: connector_id
                  in: path
                  type: string
                  required: true
                - name: scheduled_at
                  in: body
                  type: string
                  required: true
                - name: target_version
                  in: body
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  scheduled_at: "{{tools.scheduled_at}}"
                  target_version: "{{tools.target_version}}"
        - name: connector-groups
          path: /v2/connector-groups
          operations:
            - name: list-connector-groups
              method: GET
              description: "List all ZTNA connector groups."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-connector-group
              method: POST
              description: "Create a new ZTNA connector group."
              inputParameters:
                - name: name
                  in: body
                  type: string
                  required: true
                - name: description
                  in: body
                  type: string
                  required: false
                - name: region
                  in: body
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  description: "{{tools.description}}"
                  region: "{{tools.region}}"
        - name: connector-group
          path: /v2/connector-groups/{group_id}
          operations:
            - name: get-connector-group
              method: GET
              description: "Get a specific ZTNA connector group by ID."
              inputParameters:
                - name: group_id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-connector-group
              method: PUT
              description: "Update a specific ZTNA connector group by ID."
              inputParameters:
                - name: group_id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data: {}
            - name: delete-connector-group
              method: DELETE
              description: "Delete a specific ZTNA connector group by ID."
              inputParameters:
                - name: group_id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: applications
          path: /v2/applications
          operations:
            - name: list-ztna-applications
              method: GET
              description: "List all ZTNA applications."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-ztna-application
              method: POST
              description: "Create a new ZTNA application."
              inputParameters:
                - name: name
                  in: body
                  type: string
                  required: true
                - name: group_id
                  in: body
                  type: string
                  required: true
                - name: fqdn
                  in: body
                  type: string
                  required: true
                - name: description
                  in: body
                  type: string
                  required: false
                - name: ports
                  in: body
                  type: object
                  required: true
                - name: protocols
                  in: body
                  type: object
                  required: true
                - name: enabled
                  in: body
                  type: boolean
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  group_id: "{{tools.group_id}}"
                  fqdn: "{{tools.fqdn}}"
                  description: "{{tools.description}}"
                  ports: "{{tools.ports}}"
                  protocols: "{{tools.protocols}}"
                  enabled: "{{tools.enabled}}"
        - name: application
          path: /v2/applications/{app_id}
          operations:
            - name: get-ztna-application
              method: GET
              description: "Get a specific ZTNA application by ID."
              inputParameters:
                - name: app_id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-ztna-application
              method: PUT
              description: "Update a specific ZTNA application by ID."
              inputParameters:
                - name: app_id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data: {}
            - name: delete-ztna-application
              method: DELETE
              description: "Delete a specific ZTNA application by ID."
              inputParameters:
                - name: app_id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: fqdn-rules
          path: /v2/fqdn-rules
          operations:
            - name: list-fqdn-rules
              method: GET
              description: "List all FQDN rules."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-fqdn-rule
              method: POST
              description: "Create a new FQDN rule."
              inputParameters:
                - name: name
                  in: body
                  type: string
                  required: true
                - name: fqdn_pattern
                  in: body
                  type: string
                  required: true
                - name: group_id
                  in: body
