        - name: create-syslog-destination
          description: "Create a syslog destination for a log forwarding profile."
          hints:
            readOnly: false
            destructive: false
            idempotent: false
            openWorld: true
          inputParameters:
            - name: profile_id
              type: string
              required: true
            - name: name
              type: string
              required: true
            - name: server
              type: string
              required: true
            - name: port
              type: integer
              required: true
            - name: protocol
              type: string
              required: true
            - name: format
              type: string
              required: true
            - name: facility
              type: string
              required: true
            - name: enabled
              type: boolean
              required: false
          call: "strata-logging-service.create-syslog-destination"
          with:
            profile_id: "tools.profile_id"
            name: "tools.name"
            server: "tools.server"
            port: "tools.port"
            protocol: "tools.protocol"
            format: "tools.format"
            facility: "tools.facility"
            enabled: "tools.enabled"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-https-destinations
          description: "List HTTPS destinations for a log forwarding profile."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          inputParameters:
            - name: profile_id
              type: string
