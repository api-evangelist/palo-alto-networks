naftiko: "1.0.0-alpha1"

info:
  label: "Strata Logging Service"
  description: "Manages log forwarding profiles and destinations including syslog, HTTPS, and email for the Strata Logging Service."
  tags:
    - logging
    - security
    - monitoring
    - palo-alto
  created: "2026-04-16"
  modified: "2026-04-16"

binds:
  - namespace: env
    keys:
      PALO_ALTO_OAUTH_TOKEN: PALO_ALTO_OAUTH_TOKEN

capability:
  consumes:
    - type: http
      namespace: strata-logging-service
      baseUri: https://api.sase.paloaltonetworks.com/logging-service/v1
      description: "Strata Logging Service API for managing log forwarding profiles and their syslog, HTTPS, and email destinations."
      authentication:
        type: bearer
        token: "{{env.PALO_ALTO_OAUTH_TOKEN}}"
      resources:
        - name: log-forwarding-profiles
          path: /log-forwarding-profiles
          operations:
            - name: list-log-forwarding-profiles
              method: GET
              description: "List all log forwarding profiles."
              inputParameters:
                - name: offset
                  in: query
                  type: integer
                  required: false
                - name: limit
                  in: query
                  type: integer
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-log-forwarding-profile
              method: POST
              description: "Create a new log forwarding profile."
              inputParameters:
                - name: name
                  in: body
                  type: string
                  required: true
                - name: log_types
                  in: body
                  type: object
                  required: true
                - name: description
                  in: body
                  type: string
                  required: false
                - name: enabled
                  in: body
                  type: boolean
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  log_types: "{{tools.log_types}}"
                  description: "{{tools.description}}"
                  enabled: "{{tools.enabled}}"
        - name: log-forwarding-profile
          path: /log-forwarding-profiles/{profile_id}
          operations:
            - name: get-log-forwarding-profile
              method: GET
              description: "Get a specific log forwarding profile by ID."
              inputParameters:
                - name: profile_id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-log-forwarding-profile
              method: PUT
              description: "Update a specific log forwarding profile by ID."
              inputParameters:
                - name: profile_id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data: {}
            - name: delete-log-forwarding-profile
              method: DELETE
              description: "Delete a specific log forwarding profile by ID."
              inputParameters:
                - name: profile_id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: syslog-destinations
          path: /log-forwarding-profiles/{profile_id}/destinations/syslog
          operations:
            - name: list-syslog-destinations
              method: GET
              description: "List syslog destinations for a log forwarding profile."
              inputParameters:
                - name: profile_id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-syslog-destination
              method: POST
              description: "Create a syslog destination for a log forwarding profile."
              inputParameters:
                - name: profile_id
                  in: path
                  type: string
                  required: true
                - name: name
                  in: body
                  type: string
                  required: true
                - name: server
                  in: body
                  type: string
                  required: true
                - name: port
                  in: body
                  type: integer
                  required: true
                - name: protocol
                  in: body
                  type: string
                  required: true
                - name: format
                  in: body
                  type: string
                  required: true
                - name: facility
                  in: body
                  type: string
                  required: true
                - name: enabled
                  in: body
                  type: boolean
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  server: "{{tools.server}}"
                  port: "{{tools.port}}"
                  protocol: "{{tools.protocol}}"
                  format: "{{tools.format}}"
                  facility: "{{tools.facility}}"
                  enabled: "{{tools.enabled}}"
        - name: https-destinations
          path: /log-forwarding-profiles/{profile_id}/destinations/https
          operations:
            - name: list-https-destinations
              method: GET
              description: "List HTTPS destinations for a log forwarding profile."
              inputParameters:
                - name: profile_id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-https-destination
              method: POST
              description: "Create an HTTPS destination for a log forwarding profile."
              inputParameters:
                - name: profile_id
                  in: path
                  type: string
                  required: true
                - name: name
                  in: body
                  type: string
                  required: true
                - name: uri
                  in: body
                  type: string
                  required: true
                - name: http_method
                  in: body
                  type: string
                  required: true
                - name: headers
                  in: body
                  type: object
                  required: false
                - name: tls_verify
                  in: body
                  type: boolean
                  required: false
                - name: enabled
                  in: body
                  type: boolean
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  uri: "{{tools.uri}}"
                  http_method: "{{tools.http_method}}"
                  headers: "{{tools.headers}}"
                  tls_verify: "{{tools.tls_verify}}"
                  enabled: "{{tools.enabled}}"
        - name: email-destinations
          path: /log-forwarding-profiles/{profile_id}/destinations/email
          operations:
            - name: list-email-destinations
              method: GET
              description: "List email destinations for a log forwarding profile."
              inputParameters:
                - name: profile_id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-email-destination
              method: POST
              description: "Create an email destination for a log forwarding profile."
              inputParameters:
                - name: profile_id
                  in: path
                  type: string
                  required: true
                - name: name
                  in: body
                  type: string
                  required: true
                - name: gateway
                  in: body
                  type: string
                  required: true
                - name: from
                  in: body
                  type: string
                  required: true
                - name: to
                  in: body
                  type: string
                  required: true
                - name: and_also_to
                  in: body
                  type: string
                  required: false
                - name: enabled
                  in: body
                  type: boolean
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  gateway: "{{tools.gateway}}"
                  from: "{{tools.from}}"
                  to: "{{tools.to}}"
                  and_also_to: "{{tools.and_also_to}}"
                  enabled: "{{tools.enabled}}"
        - name: log-forwarding-status
          path: /log-forwarding-profiles/{profile_id}/status
          operations:
            - name: get-log-forwarding-status
              method: GET
              description: "Get the status of a log forwarding profile."
              inputParameters:
                - name: profile_id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8113
      namespace: strata-logging-service-rest
      resources:
        - path: /v1/log-forwarding-profiles
          name: log-forwarding-profiles
          operations:
            - method: GET
              name: list-log-forwarding-profiles
              call: "strata-logging-service.list-log-forwarding-profiles"
              with:
                offset: "rest.offset"
                limit: "rest.limit"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-log-forwarding-profile
              call: "strata-logging-service.create-log-forwarding-profile"
              with:
                name: "rest.name"
                log_types: "rest.log_types"
                description: "rest.description"
                enabled: "rest.enabled"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/log-forwarding-profiles/{profile_id}
          name: log-forwarding-profile
          operations:
            - method: GET
              name: get-log-forwarding-profile
              call: "strata-logging-service.get-log-forwarding-profile"
              with:
                profile_id: "rest.profile_id"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: PUT
              name: update-log-forwarding-profile
              call: "strata-logging-service.update-log-forwarding-profile"
              with:
                profile_id: "rest.profile_id"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: DELETE
              name: delete-log-forwarding-profile
              call: "strata-logging-service.delete-log-forwarding-profile"
              with:
                profile_id: "rest.profile_id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/log-forwarding-profiles/{profile_id}/destinations/syslog
          name: syslog-destinations
          operations:
            - method: GET
              name: list-syslog-destinations
              call: "strata-logging-service.list-syslog-destinations"
              with:
                profile_id: "rest.profile_id"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-syslog-destination
              call: "strata-logging-service.create-syslog-destination"
              with:
                profile_id: "rest.profile_id"
                name: "rest.name"
                server: "rest.server"
                port: "rest.port"
                protocol: "rest.protocol"
                format: "rest.format"
                facility: "rest.facility"
                enabled: "rest.enabled"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/log-forwarding-profiles/{profile_id}/destinations/https
          name: https-destinations
          operations:
            - method: GET
              name: list-https-destinations
              call: "strata-logging-service.list-https-destinations"
              with:
                profile_id: "rest.profile_id"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-https-destination
              call: "strata-logging-service.create-https-destination"
              with:
                profile_id: "rest.profile_id"
                name: "rest.name"
                uri: "rest.uri"
                http_method: "rest.http_method"
                headers: "rest.headers"
                tls_verify: "rest.tls_verify"
                enabled: "rest.enabled"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/log-forwarding-profiles/{profile_id}/destinations/email
          name: email-destinations
          operations:
            - method: GET
              name: list-email-destinations
              call: "strata-logging-service.list-email-destinations"
              with:
                profile_id: "rest.profile_id"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-email-destination
              call: "strata-logging-service.create-email-destination"
              with:
                profile_id: "rest.profile_id"
                name: "rest.name"
                gateway: "rest.gateway"
                from: "rest.from"
                to: "rest.to"
                and_also_to: "rest.and_also_to"
                enabled: "rest.enabled"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/log-forwarding-profiles/{profile_id}/status
          name: log-forwarding-status
          operations:
            - method: GET
              name: get-log-forwarding-status
              call: "strata-logging-service.get-log-forwarding-status"
              with:
                profile_id: "rest.profile_id"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9123
      namespace: strata-logging-service-mcp
      transport: http
      tools:
        - name: list-log-forwarding-profiles
          description: "List all log forwarding profiles."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          inputParameters:
            - name: offset
              type: integer
              required: false
            - name: limit
              type: integer
              required: false
          call: "strata-logging-service.list-log-forwarding-profiles"
          with:
            offset: "tools.offset"
            limit: "tools.limit"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-log-forwarding-profile
          description: "Create a new log forwarding profile."
          hints:
            readOnly: false
            destructive: false
            idempotent: false
            openWorld: true
          inputParameters:
            - name: name
              type: string
              required: true
            - name: log_types
              type: object
              required: true
            - name: description
              type: string
              required: false
            - name: enabled
              type: boolean
              required: false
          call: "strata-logging-service.create-log-forwarding-profile"
          with:
            name: "tools.name"
            log_types: "tools.log_types"
            description: "tools.description"
            enabled: "tools.enabled"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-log-forwarding-profile
          description: "Get a specific log forwarding profile by ID."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          inputParameters:
            - name: profile_id
              type: string
              required: true
          call: "strata-logging-service.get-log-forwarding-profile"
          with:
            profile_id: "tools.profile_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: update-log-forwarding-profile
          description: "Update a specific log forwarding profile by ID."
          hints:
            readOnly: false
            destructive: false
            idempotent: true
            openWorld: true
          inputParameters:
            - name: profile_id
              type: string
              required: true
          call: "strata-logging-service.update-log-forwarding-profile"
          with:
            profile_id: "tools.profile_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: delete-log-forwarding-profile
          description: "Delete a specific log forwarding profile by ID."
          hints:
            readOnly: false
            destructive: true
            idempotent: true
            openWorld: true
          inputParameters:
            - name: profile_id
              type: string
              required: true
          call: "strata-logging-service.delete-log-forwarding-profile"
          with:
            profile_id: "tools.profile_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-syslog-destinations
          description: "List syslog destinations for a log forwarding profile."
          hints:
