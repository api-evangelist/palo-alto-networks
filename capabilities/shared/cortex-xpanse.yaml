                filters: "rest.filters"
                search_from: "rest.search_from"
                search_to: "rest.search_to"
              outputParameters:
                - type: array
                  mapping: "$."
        - path: /v1/incidents/{incident_id}
          name: incident-update
          description: "Incident update operations."
          operations:
            - method: PUT
              name: update-incident
              description: "Update an Xpanse incident."
              inputParameters:
                - name: incident_id
                  in: path
                  type: string
                  required: true
                  description: "The incident ID."
                - name: update_data
                  in: body
                  type: object
                  required: true
                  description: "Data to update on the incident."
              call: "cortex-xpanse.update-incident"
              with:
                x-xdr-api-key: "{{CORTEX_XDR_API_KEY}}"
                incident_id: "rest.incident_id"
                update_data: "rest.update_data"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/attack-surface-rules
          name: attack-surface-rules
          description: "Attack surface rule operations."
          operations:
            - method: POST
              name: get-attack-surface-rules
              description: "Get attack surface rules."
              inputParameters:
                - name: filters
                  in: body
                  type: array
                  required: false
                  description: "Array of filter objects."
              call: "cortex-xpanse.get-attack-surface-rules"
              with:
                x-xdr-api-key: "{{CORTEX_XDR_API_KEY}}"
                filters: "rest.filters"
              outputParameters:
                - type: array
                  mapping: "$."
        - path: /v1/attack-surface-rules/{rule_id}
          name: attack-surface-rule-update
          description: "Attack surface rule update."
          operations:
            - method: PUT
              name: update-attack-surface-rule
              description: "Update an attack surface rule."
              inputParameters:
                - name: rule_id
                  in: path
                  type: string
                  required: true
                  description: "The rule ID."
                - name: update_data
                  in: body
                  type: object
                  required: true
                  description: "Data to update on the rule."
              call: "cortex-xpanse.update-attack-surface-rule"
              with:
                x-xdr-api-key: "{{CORTEX_XDR_API_KEY}}"
                rule_id: "rest.rule_id"
                update_data: "rest.update_data"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/services
          name: services
          description: "Service operations."
          operations:
            - method: POST
              name: get-services
              description: "Get services."
              inputParameters:
                - name: filters
                  in: body
                  type: array
                  required: false
                  description: "Array of filter objects."
              call: "cortex-xpanse.get-services"
              with:
                x-xdr-api-key: "{{CORTEX_XDR_API_KEY}}"
                filters: "rest.filters"
              outputParameters:
                - type: array
                  mapping: "$."
        - path: /v1/owned-ip-ranges
          name: owned-ip-ranges
          description: "Owned IP range operations."
          operations:
            - method: POST
              name: get-owned-ip-ranges
              description: "Get owned IP ranges."
              inputParameters:
                - name: search_params
                  in: body
                  type: object
                  required: false
                  description: "Search parameters for IP ranges."
              call: "cortex-xpanse.get-owned-ip-ranges"
              with:
                x-xdr-api-key: "{{CORTEX_XDR_API_KEY}}"
                search_params: "rest.search_params"
              outputParameters:
                - type: array
                  mapping: "$."
        - path: /v1/audit-management-logs
          name: audit-management-logs
          description: "Audit management log operations."
          operations:
            - method: POST
              name: get-audit-management-logs
              description: "Get audit management logs."
              inputParameters:
                - name: filters
                  in: body
                  type: array
                  required: false
                  description: "Array of filter objects."
                - name: search_from
                  in: body
                  type: integer
                  required: false
                  description: "Start index for pagination."
                - name: search_to
                  in: body
