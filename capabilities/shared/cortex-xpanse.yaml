naftiko: "1.0.0-alpha1"

info:
  label: "Cortex Xpanse"
  description: "Capability for the Palo Alto Networks Cortex Xpanse API, providing attack surface management including asset exposure, incidents, attack surface rules, services, and IP range operations."
  tags:
    - palo-alto-networks
    - cortex-xpanse
    - attack-surface-management
    - security
    - asset-exposure
  created: "2026-04-16"
  modified: "2026-04-16"

binds:
  - namespace: env
    keys:
      CORTEX_XDR_API_KEY_ID: CORTEX_XDR_API_KEY_ID
      CORTEX_XDR_API_KEY: CORTEX_XDR_API_KEY

capability:
  consumes:
    - type: http
      namespace: cortex-xpanse
      baseUri: https://{fqdn}/public_api/v1
      description: "Palo Alto Networks Cortex Xpanse API for attack surface management."
      authentication:
        type: apikey
        key: x-xdr-auth-id
        value: "{{CORTEX_XDR_API_KEY_ID}}"
        placement: header
      resources:
        - name: assets
          path: /assets
          description: "Asset exposure operations."
          operations:
            - name: get-assets-internet-exposure
              method: POST
              description: "Get assets with internet exposure."
              inputParameters:
                - name: x-xdr-api-key
                  in: header
                  type: string
                  required: true
                  description: "XDR API key for authentication."
                - name: filters
                  in: body
                  type: array
                  required: false
                  description: "Array of filter objects."
                - name: search_from
                  in: body
                  type: integer
                  required: false
                  description: "Start index for pagination."
                - name: search_to
                  in: body
                  type: integer
                  required: false
                  description: "End index for pagination."
              outputRawFormat: json
              outputParameters:
                - name: assets
                  type: array
                  value: "$.reply.assets"
              body:
                type: json
                data:
                  request_data:
                    filters: "{{tools.filters}}"
                    search_from: "{{tools.search_from}}"
                    search_to: "{{tools.search_to}}"
            - name: get-asset-internet-exposure
              method: POST
              description: "Get internet exposure details for specific assets."
              inputParameters:
                - name: x-xdr-api-key
                  in: header
                  type: string
                  required: true
                  description: "XDR API key for authentication."
                - name: asm_id_list
                  in: body
                  type: array
                  required: true
                  description: "List of ASM IDs to query."
              outputRawFormat: json
              outputParameters:
                - name: assets
                  type: array
                  value: "$.reply.assets"
              body:
                type: json
                data:
                  request_data:
                    asm_id_list: "{{tools.asm_id_list}}"
        - name: incident-management
          path: /incident_management
          description: "Incident management operations."
          operations:
            - name: get-incidents
              method: POST
              description: "Get Xpanse incidents."
              inputParameters:
                - name: x-xdr-api-key
                  in: header
                  type: string
                  required: true
                  description: "XDR API key for authentication."
                - name: filters
                  in: body
                  type: array
                  required: false
                  description: "Array of filter objects."
                - name: search_from
                  in: body
                  type: integer
                  required: false
                  description: "Start index for pagination."
                - name: search_to
                  in: body
                  type: integer
                  required: false
                  description: "End index for pagination."
              outputRawFormat: json
              outputParameters:
                - name: incidents
                  type: array
                  value: "$.reply.incidents"
              body:
                type: json
                data:
                  request_data:
                    filters: "{{tools.filters}}"
                    search_from: "{{tools.search_from}}"
                    search_to: "{{tools.search_to}}"
            - name: update-incident
              method: POST
              description: "Update an Xpanse incident."
              inputParameters:
                - name: x-xdr-api-key
                  in: header
                  type: string
                  required: true
                  description: "XDR API key for authentication."
                - name: incident_id
                  in: body
                  type: string
                  required: true
                  description: "The incident ID."
                - name: update_data
                  in: body
                  type: object
                  required: true
                  description: "Data to update on the incident."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$.reply"
              body:
                type: json
                data:
                  request_data:
                    incident_id: "{{tools.incident_id}}"
                    update_data: "{{tools.update_data}}"
        - name: attack-surface-rules
          path: /attack_surface_rules
          description: "Attack surface rule operations."
          operations:
            - name: get-attack-surface-rules
              method: POST
              description: "Get attack surface rules."
              inputParameters:
                - name: x-xdr-api-key
                  in: header
                  type: string
                  required: true
                  description: "XDR API key for authentication."
                - name: filters
                  in: body
                  type: array
                  required: false
                  description: "Array of filter objects."
              outputRawFormat: json
              outputParameters:
                - name: rules
                  type: array
                  value: "$.reply.rules"
              body:
                type: json
                data:
                  request_data:
                    filters: "{{tools.filters}}"
            - name: update-attack-surface-rule
              method: POST
              description: "Update an attack surface rule."
              inputParameters:
                - name: x-xdr-api-key
                  in: header
                  type: string
                  required: true
                  description: "XDR API key for authentication."
                - name: rule_id
                  in: body
                  type: string
                  required: true
                  description: "The rule ID."
                - name: update_data
                  in: body
                  type: object
                  required: true
                  description: "Data to update on the rule."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$.reply"
              body:
                type: json
                data:
                  request_data:
                    rule_id: "{{tools.rule_id}}"
                    update_data: "{{tools.update_data}}"
        - name: services
          path: /services
          description: "Service operations."
          operations:
            - name: get-services
              method: POST
              description: "Get services."
              inputParameters:
                - name: x-xdr-api-key
                  in: header
                  type: string
                  required: true
                  description: "XDR API key for authentication."
                - name: filters
                  in: body
                  type: array
                  required: false
                  description: "Array of filter objects."
              outputRawFormat: json
              outputParameters:
                - name: services
                  type: array
                  value: "$.reply.services"
              body:
                type: json
                data:
                  request_data:
                    filters: "{{tools.filters}}"
        - name: ip-ranges
          path: /ip_range
          description: "IP range operations."
          operations:
            - name: get-owned-ip-ranges
              method: POST
              description: "Get owned IP ranges."
              inputParameters:
                - name: x-xdr-api-key
                  in: header
                  type: string
                  required: true
                  description: "XDR API key for authentication."
                - name: search_params
                  in: body
                  type: object
                  required: false
                  description: "Search parameters for IP ranges."
              outputRawFormat: json
              outputParameters:
                - name: ip_ranges
                  type: array
                  value: "$.reply.ip_ranges"
              body:
                type: json
                data:
                  request_data:
                    search_params: "{{tools.search_params}}"
        - name: audit
          path: /audit
          description: "Audit log operations."
          operations:
            - name: get-audit-management-logs
              method: POST
              description: "Get audit management logs."
              inputParameters:
                - name: x-xdr-api-key
                  in: header
                  type: string
                  required: true
                  description: "XDR API key for authentication."
                - name: filters
                  in: body
                  type: array
                  required: false
                  description: "Array of filter objects."
                - name: search_from
                  in: body
                  type: integer
                  required: false
                  description: "Start index for pagination."
                - name: search_to
                  in: body
                  type: integer
                  required: false
                  description: "End index for pagination."
              outputRawFormat: json
              outputParameters:
                - name: logs
                  type: array
                  value: "$.reply.data"
              body:
                type: json
                data:
                  request_data:
                    filters: "{{tools.filters}}"
                    search_from: "{{tools.search_from}}"
                    search_to: "{{tools.search_to}}"

  exposes:
    - type: rest
      port: 8081
      namespace: cortex-xpanse-rest
      description: "REST adapter for the Cortex Xpanse API."
      resources:
        - path: /v1/assets/internet-exposures
          name: assets-internet-exposures
          description: "Asset internet exposure operations."
          operations:
            - method: POST
              name: get-assets-internet-exposure
              description: "Get assets with internet exposure."
              inputParameters:
                - name: filters
                  in: body
                  type: array
                  required: false
                  description: "Array of filter objects."
                - name: search_from
                  in: body
                  type: integer
                  required: false
                  description: "Start index for pagination."
                - name: search_to
                  in: body
                  type: integer
                  required: false
                  description: "End index for pagination."
              call: "cortex-xpanse.get-assets-internet-exposure"
              with:
                x-xdr-api-key: "{{CORTEX_XDR_API_KEY}}"
                filters: "rest.filters"
                search_from: "rest.search_from"
                search_to: "rest.search_to"
              outputParameters:
                - type: array
                  mapping: "$."
        - path: /v1/assets/internet-exposures/details
          name: asset-internet-exposure-details
          description: "Specific asset internet exposure details."
          operations:
            - method: POST
              name: get-asset-internet-exposure
              description: "Get internet exposure details for specific assets."
              inputParameters:
                - name: asm_id_list
                  in: body
                  type: array
                  required: true
                  description: "List of ASM IDs to query."
              call: "cortex-xpanse.get-asset-internet-exposure"
              with:
                x-xdr-api-key: "{{CORTEX_XDR_API_KEY}}"
                asm_id_list: "rest.asm_id_list"
              outputParameters:
                - type: array
                  mapping: "$."
        - path: /v1/incidents
          name: incidents
          description: "Incident management."
          operations:
            - method: POST
              name: get-incidents
              description: "Get Xpanse incidents."
              inputParameters:
                - name: filters
                  in: body
                  type: array
                  required: false
                  description: "Array of filter objects."
                - name: search_from
                  in: body
                  type: integer
                  required: false
                  description: "Start index for pagination."
                - name: search_to
                  in: body
                  type: integer
                  required: false
                  description: "End index for pagination."
              call: "cortex-xpanse.get-incidents"
              with:
