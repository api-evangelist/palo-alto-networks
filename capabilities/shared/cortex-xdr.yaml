                  description: "The XQL query string."
                - name: timeframe
                  in: body
                  type: object
                  required: false
                  description: "Timeframe for the query."
              call: "cortex-xdr.start-xql-query"
              with:
                x-xdr-api-key: "{{CORTEX_XDR_API_KEY}}"
                query: "rest.query"
                timeframe: "rest.timeframe"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/xql-queries/{query_id}/results
          name: xql-query-results
          description: "XQL query results."
          operations:
            - method: GET
              name: get-xql-query-results
              description: "Get XQL query results."
              inputParameters:
                - name: query_id
                  in: path
