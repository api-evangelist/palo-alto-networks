naftiko: "1.0.0-alpha1"

info:
  label: "Cortex XDR"
  description: "Capability for the Palo Alto Networks Cortex XDR API, providing incident management, alert investigation, endpoint operations, script execution, XQL queries, and audit logging."
  tags:
    - Palo Alto Networks
    - Cortex XDR
    - Security
    - Incident Response
    - Endpoint Detection
  created: "2026-04-16"
  modified: "2026-04-16"

binds:
  - namespace: env
    keys:
      CORTEX_XDR_API_KEY_ID: CORTEX_XDR_API_KEY_ID
      CORTEX_XDR_API_KEY: CORTEX_XDR_API_KEY

capability:
  consumes:
    - type: http
      namespace: cortex-xdr
      baseUri: https://{fqdn}/public_api/v1
      description: "Palo Alto Networks Cortex XDR API for extended detection and response."
      authentication:
        type: apikey
        key: x-xdr-auth-id
        value: "{{CORTEX_XDR_API_KEY_ID}}"
        placement: header
      resources:
        - name: incidents
          path: /incidents
          description: "Incident management operations."
          operations:
            - name: get-incidents
              method: POST
              description: "Get a list of incidents."
              inputParameters:
                - name: x-xdr-api-key
                  in: header
                  type: string
                  required: true
                  description: "XDR API key for authentication."
                - name: filters
                  in: body
                  type: array
                  required: false
                  description: "Array of filter objects."
                - name: search_from
                  in: body
                  type: integer
                  required: false
                  description: "Start index for pagination."
                - name: search_to
                  in: body
                  type: integer
                  required: false
                  description: "End index for pagination."
                - name: sort
                  in: body
                  type: object
                  required: false
                  description: "Sort configuration."
              outputRawFormat: json
              outputParameters:
                - name: incidents
                  type: array
                  value: "$.reply.incidents"
              body:
                type: json
                data:
                  request_data:
                    filters: "{{tools.filters}}"
                    search_from: "{{tools.search_from}}"
                    search_to: "{{tools.search_to}}"
                    sort: "{{tools.sort}}"
            - name: get-incident-extra-data
              method: POST
              description: "Get extra data for a specific incident."
              inputParameters:
                - name: x-xdr-api-key
                  in: header
                  type: string
                  required: true
                  description: "XDR API key for authentication."
                - name: incident_id
                  in: body
                  type: string
                  required: true
                  description: "The incident ID."
              outputRawFormat: json
              outputParameters:
                - name: incident
                  type: object
                  value: "$.reply"
              body:
                type: json
                data:
                  request_data:
                    incident_id: "{{tools.incident_id}}"
            - name: update-incident
              method: POST
              description: "Update an incident."
              inputParameters:
                - name: x-xdr-api-key
                  in: header
                  type: string
                  required: true
                  description: "XDR API key for authentication."
                - name: incident_id
                  in: body
                  type: string
                  required: true
                  description: "The incident ID."
                - name: update_data
                  in: body
                  type: object
                  required: true
                  description: "Data to update on the incident."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$.reply"
              body:
                type: json
                data:
                  request_data:
                    incident_id: "{{tools.incident_id}}"
                    update_data: "{{tools.update_data}}"
        - name: alerts
          path: /alerts
          description: "Alert operations."
          operations:
            - name: get-alerts
              method: POST
              description: "Get a list of alerts."
              inputParameters:
                - name: x-xdr-api-key
                  in: header
                  type: string
                  required: true
                  description: "XDR API key for authentication."
                - name: filters
                  in: body
                  type: array
                  required: false
                  description: "Array of filter objects."
                - name: search_from
                  in: body
                  type: integer
                  required: false
                  description: "Start index for pagination."
                - name: search_to
                  in: body
                  type: integer
                  required: false
                  description: "End index for pagination."
                - name: sort
                  in: body
                  type: object
                  required: false
                  description: "Sort configuration."
              outputRawFormat: json
              outputParameters:
                - name: alerts
                  type: array
                  value: "$.reply.alerts"
              body:
                type: json
                data:
                  request_data:
                    filters: "{{tools.filters}}"
                    search_from: "{{tools.search_from}}"
                    search_to: "{{tools.search_to}}"
                    sort: "{{tools.sort}}"
        - name: endpoints
          path: /endpoints
          description: "Endpoint operations."
          operations:
            - name: get-endpoints
              method: POST
              description: "Get a list of endpoints."
              inputParameters:
                - name: x-xdr-api-key
                  in: header
                  type: string
                  required: true
                  description: "XDR API key for authentication."
                - name: filters
                  in: body
                  type: array
                  required: false
                  description: "Array of filter objects."
                - name: search_from
                  in: body
                  type: integer
                  required: false
                  description: "Start index for pagination."
                - name: search_to
                  in: body
                  type: integer
                  required: false
                  description: "End index for pagination."
                - name: sort
                  in: body
                  type: object
                  required: false
                  description: "Sort configuration."
              outputRawFormat: json
              outputParameters:
                - name: endpoints
                  type: array
                  value: "$.reply.endpoints"
              body:
                type: json
                data:
                  request_data:
                    filters: "{{tools.filters}}"
                    search_from: "{{tools.search_from}}"
                    search_to: "{{tools.search_to}}"
                    sort: "{{tools.sort}}"
            - name: isolate-endpoints
              method: POST
              description: "Isolate endpoints."
              inputParameters:
                - name: x-xdr-api-key
                  in: header
                  type: string
                  required: true
                  description: "XDR API key for authentication."
                - name: filters
                  in: body
                  type: array
                  required: true
                  description: "Array of filter objects to identify endpoints."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$.reply"
              body:
                type: json
                data:
                  request_data:
                    filters: "{{tools.filters}}"
            - name: unisolate-endpoints
              method: POST
              description: "Unisolate endpoints."
              inputParameters:
                - name: x-xdr-api-key
                  in: header
                  type: string
                  required: true
                  description: "XDR API key for authentication."
                - name: filters
                  in: body
                  type: array
                  required: true
                  description: "Array of filter objects to identify endpoints."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$.reply"
              body:
                type: json
                data:
                  request_data:
                    filters: "{{tools.filters}}"
            - name: scan-endpoints
              method: POST
              description: "Scan endpoints."
              inputParameters:
                - name: x-xdr-api-key
                  in: header
                  type: string
                  required: true
                  description: "XDR API key for authentication."
                - name: filters
                  in: body
                  type: array
                  required: true
                  description: "Array of filter objects to identify endpoints."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$.reply"
              body:
                type: json
                data:
                  request_data:
                    filters: "{{tools.filters}}"
        - name: scripts
          path: /scripts
          description: "Script execution operations."
          operations:
            - name: run-script
              method: POST
              description: "Run a script on endpoints."
              inputParameters:
                - name: x-xdr-api-key
                  in: header
                  type: string
                  required: true
                  description: "XDR API key for authentication."
                - name: script_uid
                  in: body
                  type: string
                  required: true
                  description: "UID of the script to run."
                - name: timeout
                  in: body
                  type: integer
                  required: false
                  description: "Script execution timeout in seconds."
                - name: endpoint_ids
                  in: body
                  type: array
                  required: true
                  description: "List of endpoint IDs."
                - name: parameters
                  in: body
                  type: object
                  required: false
                  description: "Script parameters."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$.reply"
              body:
                type: json
                data:
                  request_data:
                    script_uid: "{{tools.script_uid}}"
                    timeout: "{{tools.timeout}}"
                    endpoint_ids: "{{tools.endpoint_ids}}"
                    parameters: "{{tools.parameters}}"
            - name: get-script-execution-results
              method: POST
              description: "Get script execution results."
              inputParameters:
                - name: x-xdr-api-key
                  in: header
                  type: string
                  required: true
                  description: "XDR API key for authentication."
                - name: action_id
                  in: body
                  type: string
                  required: true
                  description: "The action ID from the script execution."
              outputRawFormat: json
              outputParameters:
                - name: results
                  type: array
                  value: "$.reply.results"
              body:
                type: json
                data:
                  request_data:
                    action_id: "{{tools.action_id}}"
        - name: xql
          path: /xql
          description: "XQL query operations."
          operations:
            - name: start-xql-query
              method: POST
              description: "Start an XQL query."
              inputParameters:
                - name: x-xdr-api-key
                  in: header
                  type: string
                  required: true
                  description: "XDR API key for authentication."
                - name: query
                  in: body
                  type: string
                  required: true
                  description: "The XQL query string."
                - name: timeframe
                  in: body
                  type: object
                  required: false
                  description: "Timeframe for the query."
              outputRawFormat: json
              outputParameters:
                - name: query_id
                  type: string
                  value: "$.reply.query_id"
              body:
                type: json
                data:
                  request_data:
                    query: "{{tools.query}}"
                    timeframe: "{{tools.timeframe}}"
            - name: get-xql-query-results
              method: POST
              description: "Get XQL query results."
              inputParameters:
                - name: x-xdr-api-key
                  in: header
                  type: string
                  required: true
                  description: "XDR API key for authentication."
                - name: query_id
                  in: body
                  type: string
                  required: true
                  description: "The query ID from a started XQL query."
              outputRawFormat: json
              outputParameters:
                - name: results
                  type: object
                  value: "$.reply"
              body:
                type: json
                data:
                  request_data:
                    query_id: "{{tools.query_id}}"
        - name: audit
          path: /audit
          description: "Audit log operations."
          operations:
            - name: get-audit-management-logs
              method: POST
              description: "Get audit management logs."
              inputParameters:
                - name: x-xdr-api-key
                  in: header
                  type: string
                  required: true
                  description: "XDR API key for authentication."
                - name: filters
                  in: body
                  type: array
                  required: false
                  description: "Array of filter objects."
                - name: search_from
                  in: body
                  type: integer
                  required: false
                  description: "Start index for pagination."
                - name: search_to
                  in: body
                  type: integer
                  required: false
                  description: "End index for pagination."
                - name: sort
                  in: body
                  type: object
                  required: false
                  description: "Sort configuration."
              outputRawFormat: json
              outputParameters:
                - name: logs
                  type: array
                  value: "$.reply.data"
              body:
                type: json
                data:
                  request_data:
                    filters: "{{tools.filters}}"
                    search_from: "{{tools.search_from}}"
                    search_to: "{{tools.search_to}}"
                    sort: "{{tools.sort}}"

  exposes:
    - type: rest
      port: 8081
      namespace: cortex-xdr-rest
      description: "REST adapter for the Cortex XDR API."
      resources:
        - path: /v1/incidents
          name: incidents
          description: "Incident management."
          operations:
            - method: POST
              name: get-incidents
              description: "Get a list of incidents."
              inputParameters:
                - name: filters
                  in: body
                  type: array
                  required: false
                  description: "Array of filter objects."
                - name: search_from
                  in: body
                  type: integer
                  required: false
                  description: "Start index for pagination."
                - name: search_to
                  in: body
                  type: integer
                  required: false
                  description: "End index for pagination."
                - name: sort
                  in: body
                  type: object
                  required: false
                  description: "Sort configuration."
              call: "cortex-xdr.get-incidents"
              with:
                x-xdr-api-key: "{{CORTEX_XDR_API_KEY}}"
                filters: "rest.filters"
                search_from: "rest.search_from"
                search_to: "rest.search_to"
                sort: "rest.sort"
              outputParameters:
                - type: array
                  mapping: "$."
        - path: /v1/incidents/{incident_id}/details
          name: incident-details
          description: "Incident extra data."
          operations:
            - method: GET
              name: get-incident-extra-data
              description: "Get extra data for a specific incident."
              inputParameters:
                - name: incident_id
                  in: path
                  type: string
                  required: true
                  description: "The incident ID."
              call: "cortex-xdr.get-incident-extra-data"
              with:
                x-xdr-api-key: "{{CORTEX_XDR_API_KEY}}"
                incident_id: "rest.incident_id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/incidents/{incident_id}
          name: incident-update
          description: "Incident update operations."
          operations:
            - method: PUT
              name: update-incident
              description: "Update an incident."
              inputParameters:
                - name: incident_id
                  in: path
                  type: string
                  required: true
                  description: "The incident ID."
                - name: update_data
                  in: body
                  type: object
                  required: true
                  description: "Data to update on the incident."
              call: "cortex-xdr.update-incident"
              with:
                x-xdr-api-key: "{{CORTEX_XDR_API_KEY}}"
                incident_id: "rest.incident_id"
                update_data: "rest.update_data"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/alerts
          name: alerts
          description: "Alert operations."
          operations:
            - method: POST
              name: get-alerts
              description: "Get a list of alerts."
              inputParameters:
                - name: filters
                  in: body
                  type: array
                  required: false
                  description: "Array of filter objects."
                - name: search_from
                  in: body
                  type: integer
                  required: false
                  description: "Start index for pagination."
                - name: search_to
                  in: body
                  type: integer
                  required: false
                  description: "End index for pagination."
                - name: sort
                  in: body
                  type: object
                  required: false
                  description: "Sort configuration."
              call: "cortex-xdr.get-alerts"
              with:
                x-xdr-api-key: "{{CORTEX_XDR_API_KEY}}"
                filters: "rest.filters"
                search_from: "rest.search_from"
                search_to: "rest.search_to"
                sort: "rest.sort"
              outputParameters:
                - type: array
                  mapping: "$."
        - path: /v1/endpoints
          name: endpoints
          description: "Endpoint query operations."
          operations:
            - method: POST
              name: get-endpoints
              description: "Get a list of endpoints."
              inputParameters:
                - name: filters
                  in: body
                  type: array
                  required: false
                  description: "Array of filter objects."
                - name: search_from
                  in: body
                  type: integer
                  required: false
                  description: "Start index for pagination."
                - name: search_to
                  in: body
                  type: integer
                  required: false
                  description: "End index for pagination."
                - name: sort
                  in: body
                  type: object
                  required: false
                  description: "Sort configuration."
              call: "cortex-xdr.get-endpoints"
              with:
                x-xdr-api-key: "{{CORTEX_XDR_API_KEY}}"
                filters: "rest.filters"
                search_from: "rest.search_from"
                search_to: "rest.search_to"
                sort: "rest.sort"
              outputParameters:
                - type: array
                  mapping: "$."
        - path: /v1/endpoints/isolations
          name: endpoint-isolations
          description: "Endpoint isolation operations."
          operations:
            - method: POST
              name: isolate-endpoints
              description: "Isolate endpoints."
              inputParameters:
                - name: filters
                  in: body
                  type: array
                  required: true
                  description: "Array of filter objects to identify endpoints."
              call: "cortex-xdr.isolate-endpoints"
              with:
                x-xdr-api-key: "{{CORTEX_XDR_API_KEY}}"
                filters: "rest.filters"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/endpoints/unisolations
          name: endpoint-unisolations
          description: "Endpoint unisolation operations."
          operations:
            - method: POST
              name: unisolate-endpoints
              description: "Unisolate endpoints."
              inputParameters:
                - name: filters
                  in: body
                  type: array
                  required: true
                  description: "Array of filter objects to identify endpoints."
              call: "cortex-xdr.unisolate-endpoints"
              with:
                x-xdr-api-key: "{{CORTEX_XDR_API_KEY}}"
                filters: "rest.filters"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/endpoints/scans
          name: endpoint-scans
          description: "Endpoint scan operations."
          operations:
            - method: POST
              name: scan-endpoints
              description: "Scan endpoints."
              inputParameters:
                - name: filters
                  in: body
                  type: array
                  required: true
                  description: "Array of filter objects to identify endpoints."
              call: "cortex-xdr.scan-endpoints"
              with:
                x-xdr-api-key: "{{CORTEX_XDR_API_KEY}}"
                filters: "rest.filters"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/scripts/executions
          name: script-executions
          description: "Script execution operations."
          operations:
            - method: POST
              name: run-script
              description: "Run a script on endpoints."
              inputParameters:
                - name: script_uid
                  in: body
                  type: string
                  required: true
                  description: "UID of the script to run."
                - name: timeout
                  in: body
