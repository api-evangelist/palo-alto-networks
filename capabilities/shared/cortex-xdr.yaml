                  mapping: "$."
        - path: /v1/scripts/executions/{action_id}/results
          name: script-execution-results
          description: "Script execution results."
          operations:
            - method: GET
              name: get-script-execution-results
              description: "Get script execution results."
              inputParameters:
                - name: action_id
                  in: path
                  type: string
