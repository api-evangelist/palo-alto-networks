    - type: mcp
      port: 9091
      namespace: cortex-xdr-mcp
      transport: http
      description: "MCP adapter for the Cortex XDR API."
      tools:
        - name: get-incidents
          description: "Get a list of XDR incidents."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          inputParameters:
            - name: filters
              type: array
              description: "Array of filter objects."
              required: false
            - name: search_from
              type: integer
              description: "Start index for pagination."
              required: false
            - name: search_to
              type: integer
              description: "End index for pagination."
              required: false
            - name: sort
              type: object
              description: "Sort configuration."
              required: false
          call: "cortex-xdr.get-incidents"
          with:
            x-xdr-api-key: "{{CORTEX_XDR_API_KEY}}"
            filters: "tools.filters"
            search_from: "tools.search_from"
            search_to: "tools.search_to"
            sort: "tools.sort"
          outputParameters:
            - type: array
              mapping: "$."
        - name: get-incident-extra-data
          description: "Get extra data for a specific XDR incident."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          inputParameters:
            - name: incident_id
              type: string
              description: "The incident ID."
              required: true
          call: "cortex-xdr.get-incident-extra-data"
          with:
            x-xdr-api-key: "{{CORTEX_XDR_API_KEY}}"
            incident_id: "tools.incident_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: update-incident
          description: "Update an XDR incident."
          hints:
            readOnly: false
            destructive: false
            idempotent: true
            openWorld: true
          inputParameters:
            - name: incident_id
              type: string
              description: "The incident ID."
              required: true
            - name: update_data
              type: object
              description: "Data to update on the incident."
              required: true
          call: "cortex-xdr.update-incident"
          with:
            x-xdr-api-key: "{{CORTEX_XDR_API_KEY}}"
            incident_id: "tools.incident_id"
            update_data: "tools.update_data"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-alerts
          description: "Get a list of XDR alerts."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          inputParameters:
            - name: filters
              type: array
