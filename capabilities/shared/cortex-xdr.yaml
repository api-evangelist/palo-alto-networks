        - path: /v1/audit-management-logs
          name: audit-management-logs
          description: "Audit management log operations."
          operations:
            - method: POST
              name: get-audit-management-logs
              description: "Get audit management logs."
              inputParameters:
                - name: filters
                  in: body
                  type: array
                  required: false
