        - name: list-path-rules
          description: "Retrieve a list of path rules"
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          inputParameters:
            - name: offset
              type: integer
              required: false
            - name: limit
              type: integer
              required: false
          call: "prisma-sd-wan.list-path-rules"
          with:
            offset: "tools.offset"
            limit: "tools.limit"
          outputParameters:
            - type: array
              mapping: "$."

        - name: create-path-rule
          description: "Create a new path rule"
