naftiko: "1.0.0-alpha1"

info:
  label: "Prisma SD-WAN"
  description: "Provides software-defined wide area network management through the Prisma SD-WAN API, including site configuration, WAN and LAN interface management, QoS and path policies, and network monitoring."
  tags:
    - sd-wan
    - networking
    - site-management
    - qos
    - monitoring
  created: "2026-04-16"
  modified: "2026-04-16"

binds:
  - namespace: env
    keys:
      PALO_ALTO_OAUTH_TOKEN: PALO_ALTO_OAUTH_TOKEN

capability:
  consumes:
    - type: http
      namespace: prisma-sd-wan
      baseUri: https://api.sase.paloaltonetworks.com
      authentication:
        type: bearer
        token: "{{env.PALO_ALTO_OAUTH_TOKEN}}"
      resources:
        - name: sites
          path: /sdwan/config/v1/sites
          operations:
            - name: list-sites
              method: GET
              description: "Retrieve a list of SD-WAN sites"
              inputParameters:
                - name: offset
                  in: query
                  type: integer
                  required: false
                - name: limit
                  in: query
                  type: integer
                  required: false
                - name: name
                  in: query
                  type: string
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: create-site
              method: POST
              description: "Create a new SD-WAN site"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  description: "{{tools.description}}"
                  admin_state: "{{tools.admin_state}}"
                  element_cluster_role: "{{tools.element_cluster_role}}"
                  address: "{{tools.address}}"
                  location: "{{tools.location}}"
                  tags: "{{tools.tags}}"

        - name: site-by-id
          path: /sdwan/config/v1/sites/{site_id}
          operations:
            - name: get-site
              method: GET
              description: "Retrieve details for a specific SD-WAN site"
              inputParameters:
                - name: site_id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: update-site
              method: PUT
              description: "Update an existing SD-WAN site"
              inputParameters:
                - name: site_id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  description: "{{tools.description}}"
                  admin_state: "{{tools.admin_state}}"
                  element_cluster_role: "{{tools.element_cluster_role}}"
                  address: "{{tools.address}}"
                  location: "{{tools.location}}"
                  tags: "{{tools.tags}}"

            - name: delete-site
              method: DELETE
              description: "Delete an SD-WAN site"
              inputParameters:
                - name: site_id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: site-wan-interfaces
          path: /sdwan/config/v1/sites/{site_id}/wan-interfaces
          operations:
            - name: list-site-wan-interfaces
              method: GET
              description: "Retrieve WAN interfaces for a specific site"
              inputParameters:
                - name: site_id
                  in: path
                  type: string
                  required: true
                - name: offset
                  in: query
                  type: integer
                  required: false
                - name: limit
                  in: query
                  type: integer
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: create-site-wan-interface
              method: POST
              description: "Create a WAN interface for a specific site"
              inputParameters:
                - name: site_id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  type: "{{tools.type}}"
                  description: "{{tools.description}}"
                  link_bw_down: "{{tools.link_bw_down}}"
                  link_bw_up: "{{tools.link_bw_up}}"

        - name: site-lan-networks
          path: /sdwan/config/v1/sites/{site_id}/lan-networks
          operations:
            - name: list-site-lan-networks
              method: GET
              description: "Retrieve LAN networks for a specific site"
              inputParameters:
                - name: site_id
                  in: path
                  type: string
                  required: true
                - name: offset
                  in: query
                  type: integer
                  required: false
                - name: limit
                  in: query
                  type: integer
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: create-site-lan-network
              method: POST
              description: "Create a LAN network for a specific site"
              inputParameters:
                - name: site_id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  network: "{{tools.network}}"
                  description: "{{tools.description}}"
                  vlan_id: "{{tools.vlan_id}}"
                  dhcp_enabled: "{{tools.dhcp_enabled}}"

        - name: qos-rules
          path: /sdwan/config/v1/policies/qos-rules
          operations:
            - name: list-qos-rules
              method: GET
              description: "Retrieve a list of QoS rules"
              inputParameters:
                - name: offset
                  in: query
                  type: integer
                  required: false
                - name: limit
                  in: query
                  type: integer
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: create-qos-rule
              method: POST
              description: "Create a new QoS rule"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  priority: "{{tools.priority}}"
                  dscp_class: "{{tools.dscp_class}}"
                  app_filters: "{{tools.app_filters}}"
                  bandwidth_limit_up: "{{tools.bandwidth_limit_up}}"
                  bandwidth_limit_down: "{{tools.bandwidth_limit_down}}"

        - name: path-rules
          path: /sdwan/config/v1/policies/path-rules
          operations:
            - name: list-path-rules
              method: GET
              description: "Retrieve a list of path rules"
              inputParameters:
                - name: offset
                  in: query
                  type: integer
                  required: false
                - name: limit
                  in: query
                  type: integer
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: create-path-rule
              method: POST
              description: "Create a new path rule"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  app_filters: "{{tools.app_filters}}"
                  preferred_paths: "{{tools.preferred_paths}}"
                  sla_threshold: "{{tools.sla_threshold}}"

        - name: site-metrics
          path: /sdwan/monitor/v1/sites/{site_id}/metrics
          operations:
            - name: get-site-metrics
              method: GET
              description: "Retrieve monitoring metrics for a specific site"
              inputParameters:
                - name: site_id
                  in: path
                  type: string
                  required: true
                - name: start_time
                  in: query
                  type: string
                  required: false
                - name: end_time
                  in: query
                  type: string
                  required: false
                - name: metric_type
                  in: query
                  type: string
                  required: false
                - name: granularity
                  in: query
                  type: string
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: application-usage
          path: /sdwan/monitor/v1/applications
          operations:
            - name: get-application-usage
              method: GET
              description: "Retrieve application usage metrics across the SD-WAN"
              inputParameters:
                - name: start_time
                  in: query
                  type: string
                  required: false
                - name: end_time
                  in: query
                  type: string
                  required: false
                - name: site_id
                  in: query
                  type: string
                  required: false
                - name: offset
                  in: query
                  type: integer
                  required: false
                - name: limit
                  in: query
                  type: integer
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: alarms
          path: /sdwan/monitor/v1/alarms
          operations:
            - name: list-alarms
              method: GET
              description: "Retrieve a list of SD-WAN alarms"
              inputParameters:
                - name: site_id
                  in: query
                  type: string
                  required: false
                - name: severity
                  in: query
                  type: string
                  required: false
                - name: acknowledged
                  in: query
                  type: boolean
                  required: false
                - name: offset
                  in: query
                  type: integer
                  required: false
                - name: limit
                  in: query
                  type: integer
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8102
      namespace: rest-prisma-sd-wan
      resources:
        - path: /v1/sites
          operations:
            - method: GET
              name: list-sites
              call: "prisma-sd-wan.list-sites"
              with:
                offset: "rest.offset"
                limit: "rest.limit"
                name: "rest.name"
              outputParameters:
                - type: array
                  mapping: "$."

            - method: POST
              name: create-site
              call: "prisma-sd-wan.create-site"
              with:
                name: "rest.name"
                description: "rest.description"
                admin_state: "rest.admin_state"
                element_cluster_role: "rest.element_cluster_role"
                address: "rest.address"
                location: "rest.location"
                tags: "rest.tags"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/sites/{site_id}
          operations:
            - method: GET
              name: get-site
              call: "prisma-sd-wan.get-site"
              with:
                site_id: "rest.site_id"
              outputParameters:
                - type: object
                  mapping: "$."

            - method: PUT
              name: update-site
              call: "prisma-sd-wan.update-site"
              with:
                site_id: "rest.site_id"
                name: "rest.name"
                description: "rest.description"
                admin_state: "rest.admin_state"
                element_cluster_role: "rest.element_cluster_role"
                address: "rest.address"
                location: "rest.location"
                tags: "rest.tags"
              outputParameters:
                - type: object
                  mapping: "$."

            - method: DELETE
              name: delete-site
              call: "prisma-sd-wan.delete-site"
              with:
                site_id: "rest.site_id"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/sites/{site_id}/wan-interfaces
          operations:
            - method: GET
              name: list-site-wan-interfaces
              call: "prisma-sd-wan.list-site-wan-interfaces"
              with:
                site_id: "rest.site_id"
                offset: "rest.offset"
                limit: "rest.limit"
              outputParameters:
                - type: array
                  mapping: "$."

            - method: POST
              name: create-site-wan-interface
              call: "prisma-sd-wan.create-site-wan-interface"
              with:
                site_id: "rest.site_id"
                name: "rest.name"
                type: "rest.type"
                description: "rest.description"
                link_bw_down: "rest.link_bw_down"
                link_bw_up: "rest.link_bw_up"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/sites/{site_id}/lan-networks
          operations:
            - method: GET
              name: list-site-lan-networks
              call: "prisma-sd-wan.list-site-lan-networks"
              with:
                site_id: "rest.site_id"
                offset: "rest.offset"
                limit: "rest.limit"
              outputParameters:
                - type: array
                  mapping: "$."

            - method: POST
              name: create-site-lan-network
              call: "prisma-sd-wan.create-site-lan-network"
              with:
                site_id: "rest.site_id"
                name: "rest.name"
                network: "rest.network"
                description: "rest.description"
                vlan_id: "rest.vlan_id"
                dhcp_enabled: "rest.dhcp_enabled"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/qos-rules
          operations:
            - method: GET
              name: list-qos-rules
              call: "prisma-sd-wan.list-qos-rules"
              with:
                offset: "rest.offset"
                limit: "rest.limit"
              outputParameters:
                - type: array
                  mapping: "$."

            - method: POST
              name: create-qos-rule
              call: "prisma-sd-wan.create-qos-rule"
              with:
                name: "rest.name"
                priority: "rest.priority"
                dscp_class: "rest.dscp_class"
                app_filters: "rest.app_filters"
                bandwidth_limit_up: "rest.bandwidth_limit_up"
                bandwidth_limit_down: "rest.bandwidth_limit_down"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/path-rules
          operations:
            - method: GET
              name: list-path-rules
              call: "prisma-sd-wan.list-path-rules"
              with:
                offset: "rest.offset"
                limit: "rest.limit"
              outputParameters:
                - type: array
                  mapping: "$."

            - method: POST
              name: create-path-rule
              call: "prisma-sd-wan.create-path-rule"
              with:
                name: "rest.name"
                app_filters: "rest.app_filters"
                preferred_paths: "rest.preferred_paths"
                sla_threshold: "rest.sla_threshold"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/sites/{site_id}/metrics
          operations:
            - method: GET
              name: get-site-metrics
              call: "prisma-sd-wan.get-site-metrics"
              with:
                site_id: "rest.site_id"
                start_time: "rest.start_time"
                end_time: "rest.end_time"
                metric_type: "rest.metric_type"
                granularity: "rest.granularity"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/applications
          operations:
            - method: GET
              name: get-application-usage
              call: "prisma-sd-wan.get-application-usage"
              with:
                start_time: "rest.start_time"
                end_time: "rest.end_time"
                site_id: "rest.site_id"
                offset: "rest.offset"
                limit: "rest.limit"
              outputParameters:
                - type: array
                  mapping: "$."

        - path: /v1/alarms
          operations:
            - method: GET
              name: list-alarms
              call: "prisma-sd-wan.list-alarms"
              with:
                site_id: "rest.site_id"
                severity: "rest.severity"
                acknowledged: "rest.acknowledged"
                offset: "rest.offset"
                limit: "rest.limit"
              outputParameters:
                - type: array
                  mapping: "$."

    - type: mcp
      port: 9112
      namespace: mcp-prisma-sd-wan
      transport: http
      tools:
        - name: list-sites
          description: "Retrieve a list of SD-WAN sites"
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          inputParameters:
            - name: offset
              type: integer
              required: false
            - name: limit
              type: integer
              required: false
            - name: name
              type: string
              required: false
          call: "prisma-sd-wan.list-sites"
          with:
            offset: "tools.offset"
            limit: "tools.limit"
            name: "tools.name"
          outputParameters:
            - type: array
              mapping: "$."

        - name: create-site
          description: "Create a new SD-WAN site"
          hints:
            readOnly: false
            destructive: false
            idempotent: false
            openWorld: true
          inputParameters:
            - name: name
              type: string
              required: true
            - name: description
              type: string
              required: false
            - name: admin_state
              type: string
              required: false
            - name: element_cluster_role
              type: string
              required: false
            - name: address
              type: object
              required: false
            - name: location
