              type: string
              required: true
            - name: priority
              type: integer
              required: true
            - name: dscp_class
              type: string
              required: false
            - name: app_filters
              type: object
              required: false
            - name: bandwidth_limit_up
              type: integer
              required: false
            - name: bandwidth_limit_down
              type: integer
              required: false
          call: "prisma-sd-wan.create-qos-rule"
          with:
            name: "tools.name"
            priority: "tools.priority"
            dscp_class: "tools.dscp_class"
            app_filters: "tools.app_filters"
            bandwidth_limit_up: "tools.bandwidth_limit_up"
