          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          inputParameters:
            - name: site_id
              type: string
              required: true
          call: "prisma-sd-wan.get-site"
          with:
            site_id: "tools.site_id"
          outputParameters:
            - type: object
              mapping: "$."

        - name: update-site
          description: "Update an existing SD-WAN site"
          hints:
            readOnly: false
            destructive: false
            idempotent: true
            openWorld: true
          inputParameters:
            - name: site_id
              type: string
              required: true
            - name: name
              type: string
              required: false
            - name: description
              type: string
              required: false
            - name: admin_state
              type: string
              required: false
            - name: element_cluster_role
              type: string
              required: false
            - name: address
              type: object
              required: false
            - name: location
              type: object
              required: false
            - name: tags
              type: object
              required: false
          call: "prisma-sd-wan.update-site"
          with:
            site_id: "tools.site_id"
            name: "tools.name"
            description: "tools.description"
            admin_state: "tools.admin_state"
            element_cluster_role: "tools.element_cluster_role"
            address: "tools.address"
            location: "tools.location"
            tags: "tools.tags"
          outputParameters:
            - type: object
              mapping: "$."

        - name: delete-site
          description: "Delete an SD-WAN site"
          hints:
            readOnly: false
            destructive: true
            idempotent: true
            openWorld: true
          inputParameters:
            - name: site_id
              type: string
              required: true
          call: "prisma-sd-wan.delete-site"
          with:
            site_id: "tools.site_id"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-site-wan-interfaces
          description: "Retrieve WAN interfaces for a specific site"
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          inputParameters:
            - name: site_id
              type: string
              required: true
            - name: offset
              type: integer
              required: false
            - name: limit
              type: integer
              required: false
          call: "prisma-sd-wan.list-site-wan-interfaces"
          with:
            site_id: "tools.site_id"
            offset: "tools.offset"
            limit: "tools.limit"
          outputParameters:
            - type: array
              mapping: "$."

        - name: create-site-wan-interface
          description: "Create a WAN interface for a specific site"
          hints:
            readOnly: false
            destructive: false
            idempotent: false
            openWorld: true
          inputParameters:
            - name: site_id
              type: string
              required: true
            - name: name
              type: string
              required: true
            - name: type
              type: string
              required: true
            - name: description
              type: string
              required: false
            - name: link_bw_down
              type: integer
              required: false
            - name: link_bw_up
              type: integer
              required: false
          call: "prisma-sd-wan.create-site-wan-interface"
          with:
            site_id: "tools.site_id"
            name: "tools.name"
            type: "tools.type"
            description: "tools.description"
            link_bw_down: "tools.link_bw_down"
            link_bw_up: "tools.link_bw_up"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-site-lan-networks
          description: "Retrieve LAN networks for a specific site"
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          inputParameters:
            - name: site_id
              type: string
              required: true
            - name: offset
              type: integer
              required: false
            - name: limit
              type: integer
              required: false
          call: "prisma-sd-wan.list-site-lan-networks"
          with:
            site_id: "tools.site_id"
            offset: "tools.offset"
            limit: "tools.limit"
          outputParameters:
            - type: array
