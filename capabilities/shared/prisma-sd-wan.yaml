        - name: create-site-lan-network
          description: "Create a LAN network for a specific site"
          hints:
            readOnly: false
            destructive: false
            idempotent: false
            openWorld: true
          inputParameters:
            - name: site_id
              type: string
              required: true
            - name: name
              type: string
              required: true
            - name: network
              type: string
              required: true
            - name: description
              type: string
              required: false
            - name: vlan_id
              type: integer
              required: false
            - name: dhcp_enabled
              type: boolean
              required: false
          call: "prisma-sd-wan.create-site-lan-network"
          with:
            site_id: "tools.site_id"
            name: "tools.name"
            network: "tools.network"
            description: "tools.description"
            vlan_id: "tools.vlan_id"
            dhcp_enabled: "tools.dhcp_enabled"
          outputParameters:
            - type: object
