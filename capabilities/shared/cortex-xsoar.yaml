        - name: search-integrations
          description: "Search for available integrations in Cortex XSOAR."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          inputParameters:
            - name: query
              type: string
              description: "Search query string."
              required: false
          call: "cortex-xsoar-api.search-integrations"
          with:
            query: "tools.query"
          outputParameters:
            - type: object
              mapping: "$."

        - name: search-integration-instances
          description: "Search for integration instances in Cortex XSOAR."
          hints:
            readOnly: true
