naftiko: "1.0.0-alpha1"

info:
  label: "WildFire"
  description: "Submits files, URLs, and links for malware analysis and retrieves verdicts, reports, samples, and packet captures from WildFire."
  tags:
    - Security
    - Malware Analysis
    - Threat Intelligence
    - Palo Alto
  created: "2026-04-16"
  modified: "2026-04-16"

binds:
  - namespace: env
    keys:
      WILDFIRE_API_KEY: WILDFIRE_API_KEY

capability:
  consumes:
    - type: http
      namespace: wildfire
      baseUri: https://wildfire.paloaltonetworks.com/publicapi
      description: "WildFire API for submitting files, URLs, and links for malware analysis and retrieving verdicts, reports, samples, and packet captures."
      authentication:
        type: apikey
        name: apikey
        in: body
        value: "{{env.WILDFIRE_API_KEY}}"
      resources:
        - name: submit-file
          path: /submit/file
          operations:
            - name: submit-file
              method: POST
              description: "Submit a file for WildFire analysis."
              inputParameters:
                - name: apikey
                  in: body
                  type: string
                  required: true
                - name: file
                  in: body
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: multipart
                data:
                  apikey: "{{tools.apikey}}"
                  file: "{{tools.file}}"
        - name: submit-url
          path: /submit/url
          operations:
            - name: submit-url
              method: POST
              description: "Submit a URL for WildFire analysis."
              inputParameters:
                - name: apikey
                  in: body
                  type: string
                  required: true
                - name: url
                  in: body
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: form
                data:
                  apikey: "{{tools.apikey}}"
                  url: "{{tools.url}}"
        - name: submit-link
          path: /submit/link
          operations:
            - name: submit-link
              method: POST
              description: "Submit a link for WildFire analysis."
              inputParameters:
                - name: apikey
                  in: body
                  type: string
                  required: true
                - name: link
                  in: body
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: form
                data:
                  apikey: "{{tools.apikey}}"
                  link: "{{tools.link}}"
        - name: get-verdict
          path: /get/verdict
          operations:
            - name: get-verdict
              method: POST
              description: "Get the verdict for a file hash."
              inputParameters:
                - name: apikey
                  in: body
                  type: string
                  required: true
                - name: hash
                  in: body
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: form
                data:
                  apikey: "{{tools.apikey}}"
                  hash: "{{tools.hash}}"
        - name: get-bulk-verdicts
          path: /get/verdicts
          operations:
            - name: get-bulk-verdicts
              method: POST
              description: "Get verdicts for multiple file hashes (max 500)."
              inputParameters:
                - name: apikey
                  in: body
                  type: string
                  required: true
                - name: hash
                  in: body
                  type: object
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: form
                data:
                  apikey: "{{tools.apikey}}"
                  hash: "{{tools.hash}}"
        - name: get-report
          path: /get/report
          operations:
            - name: get-report
              method: POST
              description: "Get the analysis report for a file hash."
              inputParameters:
                - name: apikey
                  in: body
                  type: string
                  required: true
                - name: hash
                  in: body
                  type: string
                  required: true
                - name: format
                  in: body
                  type: string
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: form
                data:
                  apikey: "{{tools.apikey}}"
                  hash: "{{tools.hash}}"
                  format: "{{tools.format}}"
        - name: get-sample
          path: /get/sample
          operations:
            - name: get-sample
              method: POST
              description: "Download a sample file by hash."
              inputParameters:
                - name: apikey
                  in: body
                  type: string
                  required: true
                - name: hash
                  in: body
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: form
                data:
                  apikey: "{{tools.apikey}}"
                  hash: "{{tools.hash}}"
        - name: get-pcap
          path: /get/pcap
          operations:
            - name: get-pcap
              method: POST
              description: "Get packet capture for a file hash."
              inputParameters:
                - name: apikey
                  in: body
                  type: string
                  required: true
                - name: hash
                  in: body
                  type: string
                  required: true
                - name: platform
                  in: body
                  type: string
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: form
                data:
                  apikey: "{{tools.apikey}}"
                  hash: "{{tools.hash}}"
                  platform: "{{tools.platform}}"

  exposes:
    - type: rest
      port: 8115
      namespace: wildfire-rest
      resources:
        - path: /v1/submit-file
          name: submit-file
          operations:
            - method: POST
              name: submit-file
              call: "wildfire.submit-file"
              with:
                apikey: "rest.apikey"
                file: "rest.file"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/submit-url
          name: submit-url
          operations:
            - method: POST
              name: submit-url
              call: "wildfire.submit-url"
              with:
                apikey: "rest.apikey"
                url: "rest.url"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/submit-link
          name: submit-link
          operations:
            - method: POST
              name: submit-link
              call: "wildfire.submit-link"
              with:
                apikey: "rest.apikey"
                link: "rest.link"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/verdicts
          name: get-verdict
          operations:
            - method: POST
              name: get-verdict
              call: "wildfire.get-verdict"
              with:
                apikey: "rest.apikey"
                hash: "rest.hash"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/bulk-verdicts
          name: get-bulk-verdicts
          operations:
            - method: POST
              name: get-bulk-verdicts
              call: "wildfire.get-bulk-verdicts"
              with:
                apikey: "rest.apikey"
                hash: "rest.hash"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/reports
          name: get-report
          operations:
            - method: POST
              name: get-report
              call: "wildfire.get-report"
              with:
                apikey: "rest.apikey"
                hash: "rest.hash"
                format: "rest.format"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/samples
          name: get-sample
          operations:
            - method: POST
              name: get-sample
              call: "wildfire.get-sample"
              with:
                apikey: "rest.apikey"
                hash: "rest.hash"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/pcaps
          name: get-pcap
          operations:
            - method: POST
              name: get-pcap
              call: "wildfire.get-pcap"
              with:
                apikey: "rest.apikey"
                hash: "rest.hash"
                platform: "rest.platform"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9125
      namespace: wildfire-mcp
      transport: http
      tools:
        - name: submit-file
          description: "Submit a file for WildFire analysis."
          hints:
            readOnly: false
            destructive: false
            idempotent: false
            openWorld: true
          inputParameters:
            - name: apikey
              type: string
              required: true
            - name: file
              type: string
              required: true
          call: "wildfire.submit-file"
          with:
            apikey: "tools.apikey"
            file: "tools.file"
          outputParameters:
            - type: object
              mapping: "$."
        - name: submit-url
          description: "Submit a URL for WildFire analysis."
          hints:
            readOnly: false
            destructive: false
            idempotent: false
            openWorld: true
          inputParameters:
            - name: apikey
              type: string
              required: true
            - name: url
              type: string
              required: true
          call: "wildfire.submit-url"
          with:
            apikey: "tools.apikey"
            url: "tools.url"
          outputParameters:
            - type: object
              mapping: "$."
        - name: submit-link
          description: "Submit a link for WildFire analysis."
          hints:
            readOnly: false
            destructive: false
            idempotent: false
            openWorld: true
          inputParameters:
            - name: apikey
              type: string
              required: true
            - name: link
              type: string
              required: true
          call: "wildfire.submit-link"
          with:
            apikey: "tools.apikey"
            link: "tools.link"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-verdict
          description: "Get the verdict for a file hash."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          inputParameters:
            - name: apikey
              type: string
              required: true
            - name: hash
              type: string
              required: true
          call: "wildfire.get-verdict"
          with:
            apikey: "tools.apikey"
            hash: "tools.hash"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-bulk-verdicts
          description: "Get verdicts for multiple file hashes (max 500)."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          inputParameters:
            - name: apikey
              type: string
              required: true
            - name: hash
              type: object
              required: true
          call: "wildfire.get-bulk-verdicts"
          with:
            apikey: "tools.apikey"
            hash: "tools.hash"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-report
          description: "Get the analysis report for a file hash."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          inputParameters:
            - name: apikey
              type: string
              required: true
            - name: hash
              type: string
              required: true
            - name: format
              type: string
              required: false
          call: "wildfire.get-report"
          with:
            apikey: "tools.apikey"
            hash: "tools.hash"
            format: "tools.format"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-sample
          description: "Download a sample file by hash."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          inputParameters:
            - name: apikey
              type: string
              required: true
            - name: hash
              type: string
              required: true
          call: "wildfire.get-sample"
          with:
            apikey: "tools.apikey"
            hash: "tools.hash"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-pcap
          description: "Get packet capture for a file hash."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          inputParameters:
            - name: apikey
              type: string
              required: true
            - name: hash
              type: string
              required: true
            - name: platform
              type: string
              required: false
          call: "wildfire.get-pcap"
          with:
            apikey: "tools.apikey"
            hash: "tools.hash"
            platform: "tools.platform"
          outputParameters:
            - type: object
              mapping: "$."
