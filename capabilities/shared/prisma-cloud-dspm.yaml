naftiko: "1.0.0-alpha1"

info:
  label: "Prisma Cloud DSPM"
  description: "Provides data security posture management through the Prisma Cloud DSPM API, including data asset discovery, risk management, data store inventory, classification tracking, and data security alerting."
  tags:
    - Data Security
    - DSPM
    - Risk Management
    - Data Classification
    - Cloud Security
  created: "2026-04-16"
  modified: "2026-04-16"

binds:
  - namespace: env
    keys:
      PRISMA_CLOUD_JWT_TOKEN: PRISMA_CLOUD_JWT_TOKEN

capability:
  consumes:
    - type: http
      namespace: prisma-cloud-dspm
      baseUri: https://api.prismacloud.io
      authentication:
        type: bearer
        token: "{{env.PRISMA_CLOUD_JWT_TOKEN}}"
      resources:
        - name: data-assets
          path: /dspm/api/v1/data-assets
          operations:
            - name: list-data-assets
              method: GET
              description: "Retrieve a list of discovered data assets"
              inputParameters:
                - name: offset
                  in: query
                  type: integer
                  required: false
                - name: limit
                  in: query
                  type: integer
                  required: false
                - name: dataStoreId
                  in: query
                  type: string
                  required: false
                - name: classificationLabel
                  in: query
                  type: string
                  required: false
                - name: sensitivityLevel
                  in: query
                  type: string
                  required: false
                - name: search
                  in: query
                  type: string
                  required: false
                - name: sortBy
                  in: query
                  type: string
                  required: false
                - name: sortOrder
                  in: query
                  type: string
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: data-asset-by-id
          path: /dspm/api/v1/data-assets/{id}
          operations:
            - name: get-data-asset
              method: GET
              description: "Retrieve details for a specific data asset"
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: risks
          path: /dspm/api/v1/risks
          operations:
            - name: list-risks
              method: GET
              description: "Retrieve a list of data security risks"
              inputParameters:
                - name: offset
                  in: query
                  type: integer
                  required: false
                - name: limit
                  in: query
                  type: integer
                  required: false
                - name: riskLevel
                  in: query
                  type: string
                  required: false
                - name: status
                  in: query
                  type: string
                  required: false
                - name: cloudProvider
                  in: query
                  type: string
                  required: false
                - name: search
                  in: query
                  type: string
                  required: false
                - name: sortBy
                  in: query
                  type: string
                  required: false
                - name: sortOrder
                  in: query
                  type: string
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: risk-by-id
          path: /dspm/api/v1/risks/{id}
          operations:
            - name: get-risk
              method: GET
              description: "Retrieve details for a specific risk"
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: risk-status
          path: /dspm/api/v1/risks/{id}/status
          operations:
            - name: update-risk-status
              method: PUT
              description: "Update the status of a specific risk"
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  status: "{{tools.status}}"
                  comment: "{{tools.comment}}"

        - name: data-stores
          path: /dspm/api/v1/data-stores
          operations:
            - name: list-data-stores
              method: GET
              description: "Retrieve a list of data stores"
              inputParameters:
                - name: offset
                  in: query
                  type: integer
                  required: false
                - name: limit
                  in: query
                  type: integer
                  required: false
                - name: cloudProvider
                  in: query
                  type: string
                  required: false
                - name: region
                  in: query
                  type: string
                  required: false
                - name: serviceType
                  in: query
                  type: string
                  required: false
                - name: riskLevel
                  in: query
                  type: string
                  required: false
                - name: hasSensitiveData
                  in: query
                  type: boolean
                  required: false
                - name: search
                  in: query
                  type: string
                  required: false
                - name: sortBy
                  in: query
                  type: string
                  required: false
                - name: sortOrder
                  in: query
                  type: string
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: classifications
          path: /dspm/api/v1/classifications
          operations:
            - name: list-classifications
              method: GET
              description: "Retrieve a list of data classifications"
              inputParameters:
                - name: offset
                  in: query
                  type: integer
                  required: false
                - name: limit
                  in: query
                  type: integer
                  required: false
                - name: category
                  in: query
                  type: string
                  required: false
                - name: isBuiltIn
                  in: query
                  type: boolean
                  required: false
                - name: search
                  in: query
                  type: string
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: dspm-policies
          path: /dspm/api/v1/policies
          operations:
            - name: list-dspm-policies
              method: GET
              description: "Retrieve a list of DSPM policies"
              inputParameters:
                - name: offset
                  in: query
                  type: integer
                  required: false
                - name: limit
                  in: query
                  type: integer
                  required: false
                - name: enabled
                  in: query
                  type: boolean
                  required: false
                - name: search
                  in: query
                  type: string
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: data-security-alerts
          path: /dspm/api/v1/alerts
          operations:
            - name: list-data-security-alerts
              method: GET
              description: "Retrieve a list of data security alerts"
              inputParameters:
                - name: offset
                  in: query
                  type: integer
                  required: false
                - name: limit
                  in: query
                  type: integer
                  required: false
                - name: severity
                  in: query
                  type: string
                  required: false
                - name: status
                  in: query
                  type: string
                  required: false
                - name: cloudProvider
                  in: query
                  type: string
                  required: false
                - name: start_time
                  in: query
                  type: string
                  required: false
                - name: end_time
                  in: query
                  type: string
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8101
      namespace: rest-prisma-cloud-dspm
      resources:
        - path: /v1/data-assets
          operations:
            - method: GET
              name: list-data-assets
              call: "prisma-cloud-dspm.list-data-assets"
              with:
                offset: "rest.offset"
                limit: "rest.limit"
                dataStoreId: "rest.dataStoreId"
                classificationLabel: "rest.classificationLabel"
                sensitivityLevel: "rest.sensitivityLevel"
                search: "rest.search"
                sortBy: "rest.sortBy"
                sortOrder: "rest.sortOrder"
              outputParameters:
                - type: array
                  mapping: "$."

        - path: /v1/data-assets/{id}
          operations:
            - method: GET
              name: get-data-asset
              call: "prisma-cloud-dspm.get-data-asset"
              with:
                id: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/risks
          operations:
            - method: GET
              name: list-risks
              call: "prisma-cloud-dspm.list-risks"
              with:
                offset: "rest.offset"
                limit: "rest.limit"
                riskLevel: "rest.riskLevel"
                status: "rest.status"
                cloudProvider: "rest.cloudProvider"
                search: "rest.search"
                sortBy: "rest.sortBy"
                sortOrder: "rest.sortOrder"
              outputParameters:
                - type: array
                  mapping: "$."

        - path: /v1/risks/{id}
          operations:
            - method: GET
              name: get-risk
              call: "prisma-cloud-dspm.get-risk"
              with:
                id: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/risks/{id}/statuses
          operations:
            - method: PUT
              name: update-risk-status
              call: "prisma-cloud-dspm.update-risk-status"
              with:
                id: "rest.id"
                status: "rest.status"
                comment: "rest.comment"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/data-stores
          operations:
            - method: GET
              name: list-data-stores
              call: "prisma-cloud-dspm.list-data-stores"
              with:
                offset: "rest.offset"
                limit: "rest.limit"
                cloudProvider: "rest.cloudProvider"
                region: "rest.region"
                serviceType: "rest.serviceType"
                riskLevel: "rest.riskLevel"
                hasSensitiveData: "rest.hasSensitiveData"
                search: "rest.search"
                sortBy: "rest.sortBy"
                sortOrder: "rest.sortOrder"
              outputParameters:
                - type: array
                  mapping: "$."

        - path: /v1/classifications
          operations:
            - method: GET
              name: list-classifications
              call: "prisma-cloud-dspm.list-classifications"
              with:
                offset: "rest.offset"
                limit: "rest.limit"
                category: "rest.category"
                isBuiltIn: "rest.isBuiltIn"
                search: "rest.search"
              outputParameters:
                - type: array
                  mapping: "$."

        - path: /v1/dspm-policies
          operations:
            - method: GET
              name: list-dspm-policies
              call: "prisma-cloud-dspm.list-dspm-policies"
              with:
                offset: "rest.offset"
                limit: "rest.limit"
                enabled: "rest.enabled"
                search: "rest.search"
              outputParameters:
                - type: array
                  mapping: "$."

        - path: /v1/data-security-alerts
          operations:
            - method: GET
              name: list-data-security-alerts
              call: "prisma-cloud-dspm.list-data-security-alerts"
              with:
                offset: "rest.offset"
                limit: "rest.limit"
                severity: "rest.severity"
                status: "rest.status"
                cloudProvider: "rest.cloudProvider"
                start_time: "rest.start_time"
                end_time: "rest.end_time"
              outputParameters:
                - type: array
                  mapping: "$."

    - type: mcp
      port: 9111
      namespace: mcp-prisma-cloud-dspm
      transport: http
      tools:
        - name: list-data-assets
          description: "Retrieve a list of discovered data assets"
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          inputParameters:
            - name: offset
              type: integer
              required: false
            - name: limit
              type: integer
              required: false
            - name: dataStoreId
              type: string
              required: false
            - name: classificationLabel
              type: string
              required: false
            - name: sensitivityLevel
              type: string
              required: false
            - name: search
              type: string
              required: false
            - name: sortBy
              type: string
              required: false
            - name: sortOrder
              type: string
              required: false
          call: "prisma-cloud-dspm.list-data-assets"
          with:
            offset: "tools.offset"
            limit: "tools.limit"
            dataStoreId: "tools.dataStoreId"
            classificationLabel: "tools.classificationLabel"
            sensitivityLevel: "tools.sensitivityLevel"
            search: "tools.search"
            sortBy: "tools.sortBy"
            sortOrder: "tools.sortOrder"
          outputParameters:
            - type: array
              mapping: "$."

        - name: get-data-asset
          description: "Retrieve details for a specific data asset"
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          inputParameters:
            - name: id
              type: string
              required: true
          call: "prisma-cloud-dspm.get-data-asset"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-risks
          description: "Retrieve a list of data security risks"
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          inputParameters:
            - name: offset
              type: integer
              required: false
            - name: limit
              type: integer
              required: false
            - name: riskLevel
              type: string
              required: false
            - name: status
              type: string
              required: false
            - name: cloudProvider
              type: string
              required: false
            - name: search
              type: string
              required: false
            - name: sortBy
              type: string
              required: false
            - name: sortOrder
              type: string
              required: false
          call: "prisma-cloud-dspm.list-risks"
          with:
            offset: "tools.offset"
            limit: "tools.limit"
            riskLevel: "tools.riskLevel"
            status: "tools.status"
            cloudProvider: "tools.cloudProvider"
            search: "tools.search"
            sortBy: "tools.sortBy"
            sortOrder: "tools.sortOrder"
          outputParameters:
            - type: array
              mapping: "$."

        - name: get-risk
          description: "Retrieve details for a specific risk"
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          inputParameters:
            - name: id
              type: string
              required: true
          call: "prisma-cloud-dspm.get-risk"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."

        - name: update-risk-status
          description: "Update the status of a specific risk"
          hints:
            readOnly: false
            destructive: false
            idempotent: true
            openWorld: true
          inputParameters:
            - name: id
              type: string
              required: true
            - name: status
              type: string
              required: true
            - name: comment
              type: string
              required: false
          call: "prisma-cloud-dspm.update-risk-status"
          with:
            id: "tools.id"
            status: "tools.status"
            comment: "tools.comment"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-data-stores
          description: "Retrieve a list of data stores"
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          inputParameters:
            - name: offset
              type: integer
              required: false
            - name: limit
              type: integer
              required: false
            - name: cloudProvider
              type: string
              required: false
            - name: region
              type: string
              required: false
            - name: serviceType
              type: string
              required: false
            - name: riskLevel
              type: string
              required: false
            - name: hasSensitiveData
              type: boolean
              required: false
            - name: search
              type: string
              required: false
            - name: sortBy
              type: string
              required: false
            - name: sortOrder
              type: string
              required: false
          call: "prisma-cloud-dspm.list-data-stores"
          with:
            offset: "tools.offset"
            limit: "tools.limit"
            cloudProvider: "tools.cloudProvider"
            region: "tools.region"
            serviceType: "tools.serviceType"
            riskLevel: "tools.riskLevel"
            hasSensitiveData: "tools.hasSensitiveData"
            search: "tools.search"
            sortBy: "tools.sortBy"
            sortOrder: "tools.sortOrder"
          outputParameters:
            - type: array
              mapping: "$."

        - name: list-classifications
          description: "Retrieve a list of data classifications"
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          inputParameters:
            - name: offset
              type: integer
              required: false
            - name: limit
              type: integer
              required: false
            - name: category
              type: string
              required: false
            - name: isBuiltIn
              type: boolean
              required: false
            - name: search
              type: string
              required: false
          call: "prisma-cloud-dspm.list-classifications"
          with:
            offset: "tools.offset"
            limit: "tools.limit"
            category: "tools.category"
            isBuiltIn: "tools.isBuiltIn"
            search: "tools.search"
          outputParameters:
            - type: array
              mapping: "$."

        - name: list-dspm-policies
          description: "Retrieve a list of DSPM policies"
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          inputParameters:
            - name: offset
              type: integer
              required: false
            - name: limit
              type: integer
              required: false
            - name: enabled
              type: boolean
              required: false
            - name: search
              type: string
              required: false
          call: "prisma-cloud-dspm.list-dspm-policies"
          with:
            offset: "tools.offset"
            limit: "tools.limit"
            enabled: "tools.enabled"
            search: "tools.search"
          outputParameters:
            - type: array
              mapping: "$."

        - name: list-data-security-alerts
          description: "Retrieve a list of data security alerts"
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          inputParameters:
            - name: offset
              type: integer
              required: false
            - name: limit
              type: integer
              required: false
            - name: severity
              type: string
              required: false
            - name: status
              type: string
              required: false
            - name: cloudProvider
              type: string
              required: false
            - name: start_time
              type: string
              required: false
            - name: end_time
              type: string
              required: false
          call: "prisma-cloud-dspm.list-data-security-alerts"
          with:
            offset: "tools.offset"
            limit: "tools.limit"
            severity: "tools.severity"
            status: "tools.status"
            cloudProvider: "tools.cloudProvider"
            start_time: "tools.start_time"
            end_time: "tools.end_time"
          outputParameters:
            - type: array
              mapping: "$."
