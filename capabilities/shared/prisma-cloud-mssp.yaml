naftiko: "1.0.0-alpha1"

info:
  label: "Prisma Cloud MSSP"
  description: "Manage Prisma Cloud Managed Security Service Provider operations including tenant lifecycle, user management, policy groups, tenant groups, licensing, and operations."
  tags:
    - "Prisma Cloud"
    - "MSSP"
    - "Multi Tenant"
    - "Managed Services"
  created: "2026-04-17"
  modified: "2026-04-17"

binds:
  - namespace: env
    keys:
      PALO_ALTO_PRISMA_CLOUD_TOKEN: PALO_ALTO_PRISMA_CLOUD_TOKEN

capability:
  consumes:
    - type: http
      namespace: prisma-cloud-mssp
      baseUri: https://api.prismacloud.io
      authentication:
        type: bearer
        token: "{{env.PALO_ALTO_PRISMA_CLOUD_TOKEN}}"
      resources:
        - name: login
          path: /api/v1/login
          operations:
            - name: login
              method: POST
              description: "Login with username and password."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  username: "{{tools.username}}"
                  password: "{{tools.password}}"
        - name: mssp-account
          path: /api/v1/mssp/{mssp_id}
          operations:
            - name: get-mssp
              method: GET
              description: "Get the details of an existing MSSP account."
              inputParameters:
                - name: mssp_id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: mssp-tos
          path: /api/v1/mssp/{mssp_id}/tos
          operations:
            - name: accept-terms-of-service
              method: POST
              description: "Accept terms of service for an MSSP."
              inputParameters:
                - name: mssp_id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: mssp-token-refresh
          path: /api/v1/mssp/{mssp_id}/token-refresh
          operations:
            - name: refresh-token
              method: GET
              description: "Refresh user JWT token."
              inputParameters:
                - name: mssp_id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: mssp-operations
          path: /api/v1/mssp/{mssp_id}/operation
          operations:
            - name: list-operations
              method: GET
              description: "Get the operation list for an MSSP."
              inputParameters:
                - name: mssp_id
                  in: path
                  type: string
                  required: true
                - name: status
                  in: query
                  type: string
                  required: false
                - name: show_retried
                  in: query
                  type: boolean
                  required: false
                - name: nextPageToken
                  in: query
                  type: string
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: mssp-operation-retry
          path: /api/v1/mssp/{mssp_id}/operation/{request_id}/retry
          operations:
            - name: retry-operation
              method: POST
              description: "Retry a failed MSSP operation."
              inputParameters:
                - name: mssp_id
                  in: path
                  type: string
                  required: true
                - name: request_id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  acknowledged: "{{tools.acknowledged}}"
        - name: mssp-license-pool
          path: /api/v1/mssp/{mssp_id}/license-pool
          operations:
            - name: get-license-pools
              method: GET
              description: "Get the license pool details of an existing MSSP."
              inputParameters:
                - name: mssp_id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: license-usage
          path: /api/v1/license/usage
          operations:
            - name: get-license-usage
              method: POST
              description: "Get the license usage for an MSSP."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  timeRange: "{{tools.timeRange}}"
        - name: license-info
          path: /api/v1/license/info
          operations:
            - name: get-license-info
              method: GET
              description: "Get the license info for an MSSP."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: stack-mapping
          path: /api/v1/stack-mapping
          operations:
            - name: get-stack-mapping
              method: GET
              description: "Get list of stacks, API hosts, and plan types."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: users
          path: /api/v1/mssp/{mssp_id}/user
          operations:
            - name: list-users
              method: GET
              description: "List users for a given MSSP console."
              inputParameters:
                - name: mssp_id
                  in: path
                  type: string
                  required: true
                - name: next_page_token
                  in: query
                  type: string
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-user
              method: POST
              description: "Create a new user under a specific MSSP account."
              inputParameters:
                - name: mssp_id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  username: "{{tools.username}}"
                  firstName: "{{tools.firstName}}"
                  lastName: "{{tools.lastName}}"
                  role: "{{tools.role}}"
            - name: get-user
              method: GET
              description: "Get user by username."
              path: /{username}
              inputParameters:
                - name: mssp_id
                  in: path
                  type: string
                  required: true
                - name: username
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-user
              method: PUT
              description: "Update an existing user."
              path: /{username}
              inputParameters:
                - name: mssp_id
                  in: path
                  type: string
                  required: true
                - name: username
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  firstName: "{{tools.firstName}}"
                  lastName: "{{tools.lastName}}"
                  role: "{{tools.role}}"
            - name: delete-user
              method: DELETE
              description: "Delete an existing user."
              path: /{username}
              inputParameters:
                - name: mssp_id
                  in: path
                  type: string
                  required: true
                - name: username
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: user-credential
          path: /api/v1/user/{username}/credential
          operations:
            - name: change-password
              method: PUT
              description: "Change password for a user."
              inputParameters:
                - name: username
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  oldPassword: "{{tools.oldPassword}}"
                  newPassword: "{{tools.newPassword}}"
        - name: user-reset-token
          path: /api/v1/user/{username}/credential/reset-token
          operations:
            - name: generate-password-reset-token
              method: GET
              description: "Trigger the forgot password flow with a reset token email."
              inputParameters:
                - name: username
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: user-validate-token
          path: /api/v1/user/{username}/credential/reset-token/validate
          operations:
            - name: validate-reset-token
              method: POST
              description: "Validate a forgot password token and generate a special JWT."
              inputParameters:
                - name: username
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  token: "{{tools.token}}"
        - name: managed-tenants
          path: /api/v1/mssp/{mssp_id}/managed-tenant
          operations:
            - name: list-managed-tenants
              method: GET
              description: "Get the list of managed tenants for an MSSP."
              inputParameters:
                - name: mssp_id
                  in: path
                  type: string
                  required: true
                - name: tenant_group
                  in: query
                  type: string
                  required: false
                - name: show_synthetic_tenant
                  in: query
                  type: boolean
                  required: false
                - name: show_deleted_tenants
                  in: query
                  type: boolean
                  required: false
                - name: next_page_token
                  in: query
                  type: string
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-managed-tenant
              method: POST
              description: "Create a new managed tenant belonging to the MSSP."
              inputParameters:
                - name: mssp_id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  tenantName: "{{tools.tenantName}}"
                  tenantGroupId: "{{tools.tenantGroupId}}"
                  planType: "{{tools.planType}}"
                  stackId: "{{tools.stackId}}"
            - name: get-managed-tenant
              method: GET
              description: "Get the details of an existing managed tenant."
              path: /{tenant_id}
              inputParameters:
                - name: mssp_id
                  in: path
                  type: string
                  required: true
                - name: tenant_id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-managed-tenant
              method: PATCH
              description: "Modify select attributes of an existing managed tenant."
              path: /{tenant_id}
              inputParameters:
                - name: mssp_id
                  in: path
                  type: string
                  required: true
                - name: tenant_id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  tenantGroupId: "{{tools.tenantGroupId}}"
            - name: delete-managed-tenant
              method: DELETE
              description: "Delete a managed tenant."
              path: /{tenant_id}
              inputParameters:
                - name: mssp_id
                  in: path
                  type: string
                  required: true
                - name: tenant_id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: seamless-login
              method: GET
              description: "Seamless login to a managed tenant."
              path: /{tenant_id}/login
              inputParameters:
                - name: mssp_id
                  in: path
                  type: string
                  required: true
                - name: tenant_id
                  in: path
                  type: string
                  required: true
                - name: landing_page
                  in: query
                  type: string
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: tenant-groups
          path: /api/v1/mssp/{mssp_id}/tenant-group
          operations:
            - name: list-tenant-groups
              method: GET
              description: "Get the tenant group list for an MSSP."
              inputParameters:
                - name: mssp_id
                  in: path
                  type: string
                  required: true
                - name: next_page_token
                  in: query
                  type: string
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-tenant-group
              method: POST
              description: "Create a tenant group."
              inputParameters:
                - name: mssp_id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  description: "{{tools.description}}"
            - name: get-tenant-group
              method: GET
              description: "Get a tenant group by ID."
              path: /{id}
              inputParameters:
                - name: mssp_id
                  in: path
                  type: string
                  required: true
                - name: id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-tenant-group
              method: PATCH
              description: "Modify a tenant group by ID."
              path: /{id}
              inputParameters:
                - name: mssp_id
                  in: path
                  type: string
                  required: true
                - name: id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  description: "{{tools.description}}"
            - name: delete-tenant-group
              method: DELETE
              description: "Delete an existing tenant group."
              path: /{id}
              inputParameters:
                - name: mssp_id
                  in: path
                  type: string
                  required: true
                - name: id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: policy-groups
          path: /api/v1/mssp/{mssp_id}/policy-group
          operations:
            - name: list-policy-groups
              method: GET
              description: "Get the details of all existing policy groups."
              inputParameters:
                - name: mssp_id
                  in: path
                  type: string
                  required: true
                - name: next_page_token
                  in: query
                  type: string
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-policy-group
              method: POST
              description: "Create a policy group."
              inputParameters:
                - name: mssp_id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  description: "{{tools.description}}"
                  policies: "{{tools.policies}}"
            - name: get-policy-group
              method: GET
              description: "Get the details of an existing policy group."
              path: /{pg_id}
              inputParameters:
                - name: mssp_id
                  in: path
                  type: string
                  required: true
                - name: pg_id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-policy-group
              method: PUT
              description: "Update a policy group."
              path: /{pg_id}
              inputParameters:
                - name: mssp_id
                  in: path
                  type: string
                  required: true
                - name: pg_id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  description: "{{tools.description}}"
                  policies: "{{tools.policies}}"
            - name: delete-policy-group
              method: DELETE
              description: "Delete an existing policy group."
              path: /{pg_id}
              inputParameters:
                - name: mssp_id
                  in: path
                  type: string
                  required: true
                - name: pg_id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: tenant-group-policy-group-mapping
          path: /api/v1/mssp/{mssp_id}/tenant-group-policy-group-mapping
          operations:
            - name: create-policy-group-mapping
              method: POST
              description: "Associate policy groups to a selected tenant group."
              inputParameters:
                - name: mssp_id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  tenantGroupId: "{{tools.tenantGroupId}}"
                  policyGroupIds: "{{tools.policyGroupIds}}"
            - name: delete-policy-group-mapping
              method: DELETE
              description: "Delete an association of policy group from tenant group."
              path: /{mapping_id}
              inputParameters:
                - name: mssp_id
                  in: path
                  type: string
                  required: true
                - name: mapping_id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: proxy
          path: /api/v1/proxy/tenant/{prisma_id}
          operations:
            - name: proxy-request
              method: GET
              description: "Proxy a request to a managed tenant."
              inputParameters:
                - name: prisma_id
                  in: path
                  type: integer
                  required: true
                - name: body
                  in: query
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8140
      namespace: prisma-cloud-mssp-rest
      resources:
        - path: /v1/login
          operations:
            - method: POST
              name: login
              call: "prisma-cloud-mssp.login"
              with:
                username: "rest.username"
                password: "rest.password"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/mssp/{mssp_id}
          operations:
            - method: GET
              name: get-mssp
              call: "prisma-cloud-mssp.get-mssp"
              with:
                mssp_id: "rest.mssp_id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/mssp/{mssp_id}/user
          operations:
            - method: GET
              name: list-users
              call: "prisma-cloud-mssp.list-users"
              with:
                mssp_id: "rest.mssp_id"
                next_page_token: "rest.next_page_token"
              outputParameters:
                - type: array
                  mapping: "$."
            - method: POST
              name: create-user
              call: "prisma-cloud-mssp.create-user"
              with:
                mssp_id: "rest.mssp_id"
                username: "rest.username"
                firstName: "rest.firstName"
                lastName: "rest.lastName"
                role: "rest.role"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/mssp/{mssp_id}/user/{username}
          operations:
            - method: GET
              name: get-user
              call: "prisma-cloud-mssp.get-user"
              with:
                mssp_id: "rest.mssp_id"
                username: "rest.username"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: PUT
              name: update-user
              call: "prisma-cloud-mssp.update-user"
              with:
                mssp_id: "rest.mssp_id"
                username: "rest.username"
                firstName: "rest.firstName"
                lastName: "rest.lastName"
                role: "rest.role"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: DELETE
              name: delete-user
              call: "prisma-cloud-mssp.delete-user"
              with:
                mssp_id: "rest.mssp_id"
                username: "rest.username"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/mssp/{mssp_id}/managed-tenant
          operations:
            - method: GET
              name: list-managed-tenants
              call: "prisma-cloud-mssp.list-managed-tenants"
              with:
                mssp_id: "rest.mssp_id"
                tenant_group: "rest.tenant_group"
                show_synthetic_tenant: "rest.show_synthetic_tenant"
                show_deleted_tenants: "rest.show_deleted_tenants"
                next_page_token: "rest.next_page_token"
              outputParameters:
                - type: array
                  mapping: "$."
            - method: POST
              name: create-managed-tenant
              call: "prisma-cloud-mssp.create-managed-tenant"
              with:
                mssp_id: "rest.mssp_id"
                tenantName: "rest.tenantName"
                tenantGroupId: "rest.tenantGroupId"
                planType: "rest.planType"
                stackId: "rest.stackId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/mssp/{mssp_id}/managed-tenant/{tenant_id}
          operations:
            - method: GET
              name: get-managed-tenant
              call: "prisma-cloud-mssp.get-managed-tenant"
              with:
                mssp_id: "rest.mssp_id"
                tenant_id: "rest.tenant_id"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: PATCH
              name: update-managed-tenant
              call: "prisma-cloud-mssp.update-managed-tenant"
              with:
                mssp_id: "rest.mssp_id"
                tenant_id: "rest.tenant_id"
                tenantGroupId: "rest.tenantGroupId"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: DELETE
              name: delete-managed-tenant
              call: "prisma-cloud-mssp.delete-managed-tenant"
              with:
                mssp_id: "rest.mssp_id"
                tenant_id: "rest.tenant_id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/mssp/{mssp_id}/managed-tenant/{tenant_id}/login
          operations:
            - method: GET
              name: seamless-login
              call: "prisma-cloud-mssp.seamless-login"
              with:
                mssp_id: "rest.mssp_id"
                tenant_id: "rest.tenant_id"
                landing_page: "rest.landing_page"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/mssp/{mssp_id}/tenant-group
          operations:
            - method: GET
              name: list-tenant-groups
              call: "prisma-cloud-mssp.list-tenant-groups"
              with:
                mssp_id: "rest.mssp_id"
                next_page_token: "rest.next_page_token"
              outputParameters:
                - type: array
                  mapping: "$."
            - method: POST
              name: create-tenant-group
              call: "prisma-cloud-mssp.create-tenant-group"
              with:
                mssp_id: "rest.mssp_id"
                name: "rest.name"
                description: "rest.description"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/mssp/{mssp_id}/tenant-group/{id}
          operations:
            - method: GET
              name: get-tenant-group
              call: "prisma-cloud-mssp.get-tenant-group"
              with:
                mssp_id: "rest.mssp_id"
                id: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: PATCH
              name: update-tenant-group
              call: "prisma-cloud-mssp.update-tenant-group"
              with:
                mssp_id: "rest.mssp_id"
                id: "rest.id"
                name: "rest.name"
                description: "rest.description"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: DELETE
              name: delete-tenant-group
