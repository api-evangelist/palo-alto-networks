naftiko: "1.0.0-alpha1"

info:
  label: "Prisma Cloud Compute"
  description: "Provides container, image, host, and serverless security through the Prisma Cloud Compute API, including vulnerability scanning, compliance policies, runtime protection, and defender management."
  tags:
    - cloud-security
    - container-security
    - vulnerability-management
    - compliance
    - runtime-protection
  created: "2026-04-16"
  modified: "2026-04-16"

binds:
  - namespace: env
    keys:
      PRISMA_CLOUD_COMPUTE_TOKEN: PRISMA_CLOUD_COMPUTE_TOKEN

capability:
  consumes:
    - type: http
      namespace: prisma-cloud-compute
      baseUri: https://{console}/api/v1
      authentication:
        type: bearer
        token: "{{env.PRISMA_CLOUD_COMPUTE_TOKEN}}"
      resources:
        - name: authentication
          path: /authenticate
          operations:
            - name: authenticate
              method: POST
              description: "Authenticate to Prisma Cloud Compute and retrieve a token"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  username: "{{tools.username}}"
                  password: "{{tools.password}}"
                  project: "{{tools.project}}"

        - name: images
          path: /images
          operations:
            - name: get-images
              method: GET
              description: "Retrieve a list of scanned images with vulnerability and compliance data"
              inputParameters:
                - name: offset
                  in: query
                  type: integer
                  required: false
                - name: limit
                  in: query
                  type: integer
                  required: false
                - name: search
                  in: query
                  type: string
                  required: false
                - name: sort
                  in: query
                  type: string
                  required: false
                - name: reverse
                  in: query
                  type: boolean
                  required: false
                - name: collections
                  in: query
                  type: string
                  required: false
                - name: clusters
                  in: query
                  type: string
                  required: false
                - name: compact
                  in: query
                  type: boolean
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: images-download
          path: /images/download
          operations:
            - name: download-image-scan-results
              method: GET
              description: "Download image scan results as a CSV file"
              inputParameters:
                - name: search
                  in: query
                  type: string
                  required: false
                - name: collections
                  in: query
                  type: string
                  required: false
                - name: clusters
                  in: query
                  type: string
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: containers
          path: /containers
          operations:
            - name: get-containers
              method: GET
              description: "Retrieve a list of running containers with security information"
              inputParameters:
                - name: offset
                  in: query
                  type: integer
                  required: false
                - name: limit
                  in: query
                  type: integer
                  required: false
                - name: search
                  in: query
                  type: string
                  required: false
                - name: collections
                  in: query
                  type: string
                  required: false
                - name: clusters
                  in: query
                  type: string
                  required: false
                - name: hostname
                  in: query
                  type: string
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: hosts
          path: /hosts
          operations:
            - name: get-hosts
              method: GET
              description: "Retrieve a list of scanned hosts with vulnerability and compliance data"
              inputParameters:
                - name: offset
                  in: query
                  type: integer
                  required: false
                - name: limit
                  in: query
                  type: integer
                  required: false
                - name: search
                  in: query
                  type: string
                  required: false
                - name: sort
                  in: query
                  type: string
                  required: false
                - name: reverse
                  in: query
                  type: boolean
                  required: false
                - name: collections
                  in: query
                  type: string
                  required: false
                - name: clusters
                  in: query
                  type: string
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: image-vulnerability-policy
          path: /policies/vulnerability/images
          operations:
            - name: get-image-vulnerability-policy
              method: GET
              description: "Retrieve the image vulnerability policy rules"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: update-image-vulnerability-policy
              method: PUT
              description: "Update the image vulnerability policy rules"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  rules: "{{tools.rules}}"

        - name: image-compliance-policy
          path: /policies/compliance/images
          operations:
            - name: get-image-compliance-policy
              method: GET
              description: "Retrieve the image compliance policy rules"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: container-runtime-policy
          path: /policies/runtime/container
          operations:
            - name: get-container-runtime-policy
              method: GET
              description: "Retrieve the container runtime policy rules"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: registries
          path: /registry
          operations:
            - name: get-registries
              method: GET
              description: "Retrieve a list of configured registry scan settings"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: add-registry
              method: POST
              description: "Add a new registry scan configuration"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  version: "{{tools.version}}"
                  registry: "{{tools.registry}}"

        - name: defenders
          path: /defenders
          operations:
            - name: get-defenders
              method: GET
              description: "Retrieve a list of deployed defenders"
              inputParameters:
                - name: offset
                  in: query
                  type: integer
                  required: false
                - name: limit
                  in: query
                  type: integer
                  required: false
                - name: search
                  in: query
                  type: string
                  required: false
                - name: connected
                  in: query
                  type: boolean
                  required: false
                - name: type
                  in: query
                  type: string
                  required: false
                - name: cluster
                  in: query
                  type: string
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: defenders-summary
          path: /defenders/summary
          operations:
            - name: get-defenders-summary
              method: GET
              description: "Retrieve a summary of all deployed defenders"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: scans
          path: /scans
          operations:
            - name: get-ci-scans
              method: GET
              description: "Retrieve CI scan results"
              inputParameters:
                - name: offset
                  in: query
                  type: integer
                  required: false
                - name: limit
                  in: query
                  type: integer
                  required: false
                - name: search
                  in: query
                  type: string
                  required: false
                - name: type
                  in: query
                  type: string
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8099
      namespace: rest-prisma-cloud-compute
      resources:
        - path: /v1/authentication
          operations:
            - method: POST
              name: authenticate
              call: "prisma-cloud-compute.authenticate"
              with:
                username: "rest.username"
                password: "rest.password"
                project: "rest.project"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/images
          operations:
            - method: GET
              name: get-images
              call: "prisma-cloud-compute.get-images"
              with:
                offset: "rest.offset"
                limit: "rest.limit"
                search: "rest.search"
                sort: "rest.sort"
                reverse: "rest.reverse"
                collections: "rest.collections"
                clusters: "rest.clusters"
                compact: "rest.compact"
              outputParameters:
                - type: array
                  mapping: "$."

        - path: /v1/images/downloads
          operations:
            - method: GET
              name: download-image-scan-results
              call: "prisma-cloud-compute.download-image-scan-results"
              with:
                search: "rest.search"
                collections: "rest.collections"
                clusters: "rest.clusters"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/containers
          operations:
            - method: GET
              name: get-containers
              call: "prisma-cloud-compute.get-containers"
              with:
                offset: "rest.offset"
                limit: "rest.limit"
                search: "rest.search"
                collections: "rest.collections"
                clusters: "rest.clusters"
                hostname: "rest.hostname"
              outputParameters:
                - type: array
                  mapping: "$."

        - path: /v1/hosts
          operations:
            - method: GET
              name: get-hosts
              call: "prisma-cloud-compute.get-hosts"
              with:
                offset: "rest.offset"
                limit: "rest.limit"
                search: "rest.search"
                sort: "rest.sort"
                reverse: "rest.reverse"
                collections: "rest.collections"
                clusters: "rest.clusters"
              outputParameters:
                - type: array
                  mapping: "$."

        - path: /v1/policies/vulnerabilities/images
          operations:
            - method: GET
              name: get-image-vulnerability-policy
              call: "prisma-cloud-compute.get-image-vulnerability-policy"
              outputParameters:
                - type: object
                  mapping: "$."

            - method: PUT
              name: update-image-vulnerability-policy
              call: "prisma-cloud-compute.update-image-vulnerability-policy"
              with:
                rules: "rest.rules"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/policies/compliance/images
          operations:
            - method: GET
              name: get-image-compliance-policy
              call: "prisma-cloud-compute.get-image-compliance-policy"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/policies/runtime/containers
          operations:
            - method: GET
              name: get-container-runtime-policy
              call: "prisma-cloud-compute.get-container-runtime-policy"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/registries
          operations:
            - method: GET
              name: get-registries
              call: "prisma-cloud-compute.get-registries"
              outputParameters:
                - type: array
                  mapping: "$."

            - method: POST
              name: add-registry
              call: "prisma-cloud-compute.add-registry"
              with:
                version: "rest.version"
                registry: "rest.registry"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/defenders
          operations:
            - method: GET
              name: get-defenders
              call: "prisma-cloud-compute.get-defenders"
              with:
                offset: "rest.offset"
                limit: "rest.limit"
                search: "rest.search"
                connected: "rest.connected"
                type: "rest.type"
                cluster: "rest.cluster"
              outputParameters:
                - type: array
                  mapping: "$."

        - path: /v1/defenders/summaries
          operations:
            - method: GET
              name: get-defenders-summary
              call: "prisma-cloud-compute.get-defenders-summary"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/scans
          operations:
            - method: GET
              name: get-ci-scans
              call: "prisma-cloud-compute.get-ci-scans"
              with:
                offset: "rest.offset"
                limit: "rest.limit"
                search: "rest.search"
                type: "rest.type"
              outputParameters:
                - type: array
                  mapping: "$."

    - type: mcp
      port: 9109
      namespace: mcp-prisma-cloud-compute
      transport: http
      tools:
        - name: authenticate
          description: "Authenticate to Prisma Cloud Compute and retrieve a token"
          hints:
            readOnly: false
            destructive: false
            idempotent: true
            openWorld: true
          inputParameters:
            - name: username
              type: string
              required: true
            - name: password
              type: string
              required: true
            - name: project
              type: string
              required: false
          call: "prisma-cloud-compute.authenticate"
          with:
            username: "tools.username"
            password: "tools.password"
            project: "tools.project"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-images
          description: "Retrieve a list of scanned images with vulnerability and compliance data"
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          inputParameters:
            - name: offset
              type: integer
              required: false
            - name: limit
              type: integer
              required: false
            - name: search
              type: string
              required: false
            - name: sort
              type: string
              required: false
            - name: reverse
              type: boolean
              required: false
            - name: collections
              type: string
              required: false
            - name: clusters
              type: string
              required: false
            - name: compact
              type: boolean
              required: false
          call: "prisma-cloud-compute.get-images"
          with:
            offset: "tools.offset"
            limit: "tools.limit"
            search: "tools.search"
            sort: "tools.sort"
            reverse: "tools.reverse"
            collections: "tools.collections"
            clusters: "tools.clusters"
            compact: "tools.compact"
          outputParameters:
            - type: array
              mapping: "$."

        - name: download-image-scan-results
          description: "Download image scan results as a CSV file"
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          inputParameters:
            - name: search
              type: string
              required: false
            - name: collections
              type: string
              required: false
            - name: clusters
              type: string
              required: false
          call: "prisma-cloud-compute.download-image-scan-results"
          with:
            search: "tools.search"
            collections: "tools.collections"
            clusters: "tools.clusters"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-containers
          description: "Retrieve a list of running containers with security information"
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          inputParameters:
            - name: offset
              type: integer
              required: false
            - name: limit
              type: integer
              required: false
            - name: search
              type: string
              required: false
            - name: collections
              type: string
              required: false
            - name: clusters
              type: string
              required: false
            - name: hostname
              type: string
              required: false
          call: "prisma-cloud-compute.get-containers"
          with:
            offset: "tools.offset"
            limit: "tools.limit"
            search: "tools.search"
            collections: "tools.collections"
            clusters: "tools.clusters"
            hostname: "tools.hostname"
          outputParameters:
            - type: array
              mapping: "$."

        - name: get-hosts
          description: "Retrieve a list of scanned hosts with vulnerability and compliance data"
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          inputParameters:
            - name: offset
              type: integer
              required: false
            - name: limit
              type: integer
              required: false
            - name: search
              type: string
              required: false
            - name: sort
              type: string
              required: false
            - name: reverse
              type: boolean
              required: false
            - name: collections
              type: string
              required: false
            - name: clusters
              type: string
              required: false
          call: "prisma-cloud-compute.get-hosts"
          with:
            offset: "tools.offset"
            limit: "tools.limit"
            search: "tools.search"
            sort: "tools.sort"
            reverse: "tools.reverse"
            collections: "tools.collections"
            clusters: "tools.clusters"
          outputParameters:
            - type: array
              mapping: "$."

        - name: get-image-vulnerability-policy
          description: "Retrieve the image vulnerability policy rules"
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          call: "prisma-cloud-compute.get-image-vulnerability-policy"
          outputParameters:
            - type: object
              mapping: "$."

        - name: update-image-vulnerability-policy
          description: "Update the image vulnerability policy rules"
          hints:
            readOnly: false
            destructive: false
            idempotent: true
            openWorld: true
          inputParameters:
            - name: rules
              type: object
              required: true
          call: "prisma-cloud-compute.update-image-vulnerability-policy"
          with:
            rules: "tools.rules"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-image-compliance-policy
          description: "Retrieve the image compliance policy rules"
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          call: "prisma-cloud-compute.get-image-compliance-policy"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-container-runtime-policy
          description: "Retrieve the container runtime policy rules"
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          call: "prisma-cloud-compute.get-container-runtime-policy"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-registries
          description: "Retrieve a list of configured registry scan settings"
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          call: "prisma-cloud-compute.get-registries"
          outputParameters:
            - type: array
              mapping: "$."

        - name: add-registry
          description: "Add a new registry scan configuration"
          hints:
            readOnly: false
            destructive: false
            idempotent: false
            openWorld: true
          inputParameters:
            - name: version
              type: string
              required: true
            - name: registry
              type: object
              required: true
          call: "prisma-cloud-compute.add-registry"
          with:
            version: "tools.version"
            registry: "tools.registry"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-defenders
          description: "Retrieve a list of deployed defenders"
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          inputParameters:
            - name: offset
              type: integer
              required: false
            - name: limit
              type: integer
              required: false
            - name: search
              type: string
              required: false
            - name: connected
              type: boolean
              required: false
            - name: type
              type: string
              required: false
            - name: cluster
              type: string
              required: false
          call: "prisma-cloud-compute.get-defenders"
          with:
            offset: "tools.offset"
            limit: "tools.limit"
            search: "tools.search"
            connected: "tools.connected"
            type: "tools.type"
            cluster: "tools.cluster"
          outputParameters:
            - type: array
              mapping: "$."

        - name: get-defenders-summary
          description: "Retrieve a summary of all deployed defenders"
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          call: "prisma-cloud-compute.get-defenders-summary"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-ci-scans
          description: "Retrieve CI scan results"
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          inputParameters:
            - name: offset
              type: integer
              required: false
            - name: limit
              type: integer
              required: false
            - name: search
              type: string
              required: false
            - name: type
              type: string
              required: false
          call: "prisma-cloud-compute.get-ci-scans"
          with:
            offset: "tools.offset"
            limit: "tools.limit"
            search: "tools.search"
            type: "tools.type"
          outputParameters:
            - type: array
              mapping: "$."
