naftiko: "1.0.0-alpha1"

info:
  label: "Prisma Access Browser Management"
  description: "Manages Prisma Access Browser policies, users, sessions, and deployments."
  tags:
    - Browser
    - Security
    - SASE
    - Palo Alto
  created: "2026-04-16"
  modified: "2026-04-16"

binds:
  - namespace: env
    keys:
      PALO_ALTO_OAUTH_TOKEN: PALO_ALTO_OAUTH_TOKEN

capability:
  consumes:
    - type: http
      namespace: prisma-access-browser
      baseUri: https://api.sase.paloaltonetworks.com/browser
      description: "Prisma Access Browser Management API for managing browser policies, users, sessions, and deployments."
      authentication:
        type: bearer
        token: "{{env.PALO_ALTO_OAUTH_TOKEN}}"
      resources:
        - name: browser-policies
          path: /v1/policies
          operations:
            - name: list-browser-policies
              method: GET
              description: "List all browser policies with pagination."
              inputParameters:
                - name: offset
                  in: query
                  type: integer
                  required: false
                - name: limit
                  in: query
                  type: integer
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-browser-policy
              method: POST
              description: "Create a new browser policy."
              inputParameters:
                - name: name
                  in: body
                  type: string
                  required: true
                - name: rules
                  in: body
                  type: object
                  required: true
                - name: enabled
                  in: body
                  type: boolean
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  rules: "{{tools.rules}}"
                  enabled: "{{tools.enabled}}"
        - name: browser-policy
          path: /v1/policies/{policy_id}
          operations:
            - name: get-browser-policy
              method: GET
              description: "Get a specific browser policy by ID."
              inputParameters:
                - name: policy_id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-browser-policy
              method: PUT
              description: "Update a specific browser policy by ID."
              inputParameters:
                - name: policy_id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data: {}
            - name: delete-browser-policy
              method: DELETE
              description: "Delete a specific browser policy by ID."
              inputParameters:
                - name: policy_id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: browser-users
          path: /v1/users
          operations:
            - name: list-browser-users
              method: GET
              description: "List all browser users with pagination."
              inputParameters:
                - name: offset
                  in: query
                  type: integer
                  required: false
                - name: limit
                  in: query
                  type: integer
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: user-sessions
          path: /v1/users/{user_id}/sessions
          operations:
            - name: get-user-sessions
              method: GET
              description: "Get sessions for a specific user."
              inputParameters:
                - name: user_id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: deployments
          path: /v1/deployments
          operations:
            - name: list-deployments
              method: GET
              description: "List all deployments with pagination."
              inputParameters:
                - name: offset
                  in: query
                  type: integer
                  required: false
                - name: limit
                  in: query
                  type: integer
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-deployment
              method: POST
              description: "Create a new deployment."
              inputParameters:
                - name: name
                  in: body
                  type: string
                  required: true
                - name: platform
                  in: body
                  type: string
                  required: true
                - name: settings
                  in: body
                  type: object
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  platform: "{{tools.platform}}"
                  settings: "{{tools.settings}}"

  exposes:
    - type: rest
      port: 8094
      namespace: prisma-access-browser-rest
      resources:
        - path: /v1/browser-policies
          name: browser-policies
          operations:
            - method: GET
              name: list-browser-policies
              call: "prisma-access-browser.list-browser-policies"
              with:
                offset: "rest.offset"
                limit: "rest.limit"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-browser-policy
              call: "prisma-access-browser.create-browser-policy"
              with:
                name: "rest.name"
                rules: "rest.rules"
                enabled: "rest.enabled"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/browser-policies/{policy_id}
          name: browser-policy
          operations:
            - method: GET
              name: get-browser-policy
              call: "prisma-access-browser.get-browser-policy"
              with:
                policy_id: "rest.policy_id"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: PUT
              name: update-browser-policy
              call: "prisma-access-browser.update-browser-policy"
              with:
                policy_id: "rest.policy_id"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: DELETE
              name: delete-browser-policy
              call: "prisma-access-browser.delete-browser-policy"
              with:
                policy_id: "rest.policy_id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/browser-users
          name: browser-users
          operations:
            - method: GET
              name: list-browser-users
              call: "prisma-access-browser.list-browser-users"
              with:
                offset: "rest.offset"
                limit: "rest.limit"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/browser-users/{user_id}/sessions
          name: user-sessions
          operations:
            - method: GET
              name: get-user-sessions
              call: "prisma-access-browser.get-user-sessions"
              with:
                user_id: "rest.user_id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/deployments
          name: deployments
          operations:
            - method: GET
              name: list-deployments
              call: "prisma-access-browser.list-deployments"
              with:
                offset: "rest.offset"
                limit: "rest.limit"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-deployment
              call: "prisma-access-browser.create-deployment"
              with:
                name: "rest.name"
                platform: "rest.platform"
                settings: "rest.settings"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9104
      namespace: prisma-access-browser-mcp
      transport: http
      tools:
        - name: list-browser-policies
          description: "List all browser policies with pagination."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          inputParameters:
            - name: offset
              type: integer
              required: false
            - name: limit
              type: integer
              required: false
          call: "prisma-access-browser.list-browser-policies"
          with:
            offset: "tools.offset"
            limit: "tools.limit"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-browser-policy
          description: "Create a new browser policy."
          hints:
            readOnly: false
            destructive: false
            idempotent: false
            openWorld: true
          inputParameters:
            - name: name
              type: string
              required: true
            - name: rules
              type: object
              required: true
            - name: enabled
              type: boolean
              required: true
          call: "prisma-access-browser.create-browser-policy"
          with:
            name: "tools.name"
            rules: "tools.rules"
            enabled: "tools.enabled"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-browser-policy
          description: "Get a specific browser policy by ID."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          inputParameters:
            - name: policy_id
              type: string
              required: true
          call: "prisma-access-browser.get-browser-policy"
          with:
            policy_id: "tools.policy_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: update-browser-policy
          description: "Update a specific browser policy by ID."
          hints:
            readOnly: false
            destructive: false
            idempotent: true
            openWorld: true
          inputParameters:
            - name: policy_id
              type: string
              required: true
          call: "prisma-access-browser.update-browser-policy"
          with:
            policy_id: "tools.policy_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: delete-browser-policy
          description: "Delete a specific browser policy by ID."
          hints:
            readOnly: false
            destructive: true
            idempotent: true
            openWorld: true
          inputParameters:
            - name: policy_id
              type: string
              required: true
          call: "prisma-access-browser.delete-browser-policy"
          with:
            policy_id: "tools.policy_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-browser-users
          description: "List all browser users with pagination."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          inputParameters:
            - name: offset
              type: integer
              required: false
            - name: limit
              type: integer
              required: false
          call: "prisma-access-browser.list-browser-users"
          with:
            offset: "tools.offset"
            limit: "tools.limit"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-user-sessions
          description: "Get sessions for a specific user."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          inputParameters:
            - name: user_id
              type: string
              required: true
          call: "prisma-access-browser.get-user-sessions"
          with:
            user_id: "tools.user_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-deployments
          description: "List all deployments with pagination."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          inputParameters:
            - name: offset
              type: integer
              required: false
            - name: limit
              type: integer
              required: false
          call: "prisma-access-browser.list-deployments"
          with:
            offset: "tools.offset"
            limit: "tools.limit"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-deployment
          description: "Create a new deployment."
          hints:
            readOnly: false
            destructive: false
            idempotent: false
            openWorld: true
          inputParameters:
            - name: name
              type: string
              required: true
            - name: platform
              type: string
              required: true
            - name: settings
              type: object
              required: true
          call: "prisma-access-browser.create-deployment"
          with:
            name: "tools.name"
            platform: "tools.platform"
            settings: "tools.settings"
          outputParameters:
            - type: object
              mapping: "$."
