naftiko: "1.0.0-alpha1"

info:
  label: "Prisma Access Configuration"
  description: "Manages Prisma Access remote networks, service connections, mobile agent settings, and IKE gateways."
  tags:
    - Networking
    - Security
    - SASE
    - Palo Alto
  created: "2026-04-16"
  modified: "2026-04-16"

binds:
  - namespace: env
    keys:
      PALO_ALTO_OAUTH_TOKEN: PALO_ALTO_OAUTH_TOKEN

capability:
  consumes:
    - type: http
      namespace: prisma-access
      baseUri: https://api.sase.paloaltonetworks.com/sse/config/v1
      description: "Prisma Access Configuration API for managing remote networks, service connections, mobile agent infrastructure, and IKE gateways."
      authentication:
        type: bearer
        token: "{{env.PALO_ALTO_OAUTH_TOKEN}}"
      resources:
        - name: remote-networks
          path: /remote-networks
          operations:
            - name: list-remote-networks
              method: GET
              description: "List all remote networks with pagination."
              inputParameters:
                - name: offset
                  in: query
                  type: integer
                  required: false
                - name: limit
                  in: query
                  type: integer
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-remote-network
              method: POST
              description: "Create a new remote network."
              inputParameters:
                - name: name
                  in: body
                  type: string
                  required: true
                - name: location
                  in: body
                  type: string
                  required: true
                - name: subnets
                  in: body
                  type: string
                  required: true
                - name: ike_gateway
                  in: body
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  location: "{{tools.location}}"
                  subnets: "{{tools.subnets}}"
                  ike_gateway: "{{tools.ike_gateway}}"
        - name: remote-network
          path: /remote-networks/{id}
          operations:
            - name: get-remote-network
              method: GET
              description: "Get a specific remote network by ID."
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-remote-network
              method: PUT
              description: "Update a specific remote network by ID."
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data: {}
            - name: delete-remote-network
              method: DELETE
              description: "Delete a specific remote network by ID."
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: service-connections
          path: /service-connections
          operations:
            - name: list-service-connections
              method: GET
              description: "List all service connections with pagination."
              inputParameters:
                - name: offset
                  in: query
                  type: integer
                  required: false
                - name: limit
                  in: query
                  type: integer
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-service-connection
              method: POST
              description: "Create a new service connection."
              inputParameters:
                - name: name
                  in: body
                  type: string
                  required: true
                - name: ipsec_tunnel
                  in: body
                  type: string
                  required: true
                - name: region
                  in: body
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  ipsec_tunnel: "{{tools.ipsec_tunnel}}"
                  region: "{{tools.region}}"
        - name: service-connection
          path: /service-connections/{id}
          operations:
            - name: get-service-connection
              method: GET
              description: "Get a specific service connection by ID."
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-service-connection
              method: PUT
              description: "Update a specific service connection by ID."
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data: {}
            - name: delete-service-connection
              method: DELETE
              description: "Delete a specific service connection by ID."
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: mobile-agent-infrastructure-settings
          path: /mobile-agent/infrastructure-settings
          operations:
            - name: get-mobile-agent-infrastructure-settings
              method: GET
              description: "Get mobile agent infrastructure settings."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-mobile-agent-infrastructure-settings
              method: POST
              description: "Create or update mobile agent infrastructure settings."
              inputParameters:
                - name: settings
                  in: body
                  type: object
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  settings: "{{tools.settings}}"
        - name: ike-gateways
          path: /ike-gateways
          operations:
            - name: list-ike-gateways
              method: GET
              description: "List all IKE gateways with pagination."
              inputParameters:
                - name: offset
                  in: query
                  type: integer
                  required: false
                - name: limit
                  in: query
                  type: integer
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8093
      namespace: prisma-access-rest
      resources:
        - path: /v1/remote-networks
          name: remote-networks
          operations:
            - method: GET
              name: list-remote-networks
              call: "prisma-access.list-remote-networks"
              with:
                offset: "rest.offset"
                limit: "rest.limit"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-remote-network
              call: "prisma-access.create-remote-network"
              with:
                name: "rest.name"
                location: "rest.location"
                subnets: "rest.subnets"
                ike_gateway: "rest.ike_gateway"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/remote-networks/{id}
          name: remote-network
          operations:
            - method: GET
              name: get-remote-network
              call: "prisma-access.get-remote-network"
              with:
                id: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: PUT
              name: update-remote-network
              call: "prisma-access.update-remote-network"
              with:
                id: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: DELETE
              name: delete-remote-network
              call: "prisma-access.delete-remote-network"
              with:
                id: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/service-connections
          name: service-connections
          operations:
            - method: GET
              name: list-service-connections
              call: "prisma-access.list-service-connections"
              with:
                offset: "rest.offset"
                limit: "rest.limit"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-service-connection
              call: "prisma-access.create-service-connection"
              with:
                name: "rest.name"
                ipsec_tunnel: "rest.ipsec_tunnel"
                region: "rest.region"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/service-connections/{id}
          name: service-connection
          operations:
            - method: GET
              name: get-service-connection
              call: "prisma-access.get-service-connection"
              with:
                id: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: PUT
              name: update-service-connection
              call: "prisma-access.update-service-connection"
              with:
                id: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: DELETE
              name: delete-service-connection
              call: "prisma-access.delete-service-connection"
              with:
                id: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/mobile-agent-infrastructure-settings
          name: mobile-agent-infrastructure-settings
          operations:
            - method: GET
              name: get-mobile-agent-infrastructure-settings
              call: "prisma-access.get-mobile-agent-infrastructure-settings"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-mobile-agent-infrastructure-settings
              call: "prisma-access.create-mobile-agent-infrastructure-settings"
              with:
                settings: "rest.settings"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/ike-gateways
          name: ike-gateways
          operations:
            - method: GET
              name: list-ike-gateways
              call: "prisma-access.list-ike-gateways"
              with:
                offset: "rest.offset"
                limit: "rest.limit"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9103
      namespace: prisma-access-mcp
      transport: http
      tools:
