naftiko: "1.0.0-alpha1"

info:
  label: "Threat Vault"
  description: "Queries threat intelligence, ATP reports, release notes, and statistics from the Palo Alto Networks Threat Vault."
  tags:
    - Security
    - Threat Intelligence
    - Malware
    - Palo Alto
  created: "2026-04-16"
  modified: "2026-04-16"

binds:
  - namespace: env
    keys:
      THREAT_VAULT_API_KEY: THREAT_VAULT_API_KEY

capability:
  consumes:
    - type: http
      namespace: threat-vault
      baseUri: https://api.threatvault.paloaltonetworks.com/service/v1
      description: "Threat Vault API for querying threat signatures, ATP reports, release notes, and statistics."
      authentication:
        type: apikey
        name: X-API-KEY
        in: header
        value: "{{env.THREAT_VAULT_API_KEY}}"
      resources:
        - name: threats
          path: /threats
          operations:
            - name: get-threats
              method: GET
              description: "Search for threats by type, ID, SHA256, name, CVE, or date range."
              inputParameters:
                - name: type
                  in: query
                  type: string
                  required: false
                - name: id
                  in: query
                  type: string
                  required: false
                - name: sha256
                  in: query
                  type: string
                  required: false
                - name: name
                  in: query
                  type: string
                  required: false
                - name: cve
                  in: query
                  type: string
                  required: false
                - name: from
                  in: query
                  type: string
                  required: false
                - name: to
                  in: query
                  type: string
                  required: false
                - name: offset
                  in: query
                  type: integer
                  required: false
                - name: limit
                  in: query
                  type: integer
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: threat-history
          path: /threats/history
          operations:
            - name: get-threat-history
              method: GET
              description: "Get the history of a specific threat by ID and type."
              inputParameters:
                - name: id
                  in: query
                  type: string
                  required: true
                - name: type
                  in: query
                  type: string
                  required: true
                - name: offset
                  in: query
                  type: integer
                  required: false
                - name: limit
                  in: query
                  type: integer
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: atp-reports
          path: /atp/reports
          operations:
            - name: get-atp-reports
              method: GET
              description: "Get Advanced Threat Prevention reports."
              inputParameters:
                - name: sha256
                  in: query
                  type: string
                  required: false
                - name: id
                  in: query
                  type: string
                  required: false
                - name: offset
                  in: query
                  type: integer
                  required: false
                - name: limit
                  in: query
                  type: integer
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: atp-report-pcaps
          path: /atp/reports/pcaps
          operations:
            - name: get-atp-report-pcaps
              method: GET
              description: "Get packet captures from ATP reports."
              inputParameters:
                - name: sha256
                  in: query
                  type: string
                  required: true
                - name: id
                  in: query
                  type: string
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: release-notes
          path: /release-notes
          operations:
            - name: get-release-notes
              method: GET
              description: "Get release notes for threat content updates."
              inputParameters:
                - name: type
                  in: query
                  type: string
                  required: true
                - name: version
                  in: query
                  type: string
                  required: false
                - name: offset
                  in: query
                  type: integer
                  required: false
                - name: limit
                  in: query
                  type: integer
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: stats
          path: /stats
          operations:
            - name: get-stats
              method: GET
              description: "Get Threat Vault statistics."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8114
      namespace: threat-vault-rest
      resources:
        - path: /v1/threats
          name: threats
          operations:
            - method: GET
              name: get-threats
              call: "threat-vault.get-threats"
              with:
                type: "rest.type"
                id: "rest.id"
                sha256: "rest.sha256"
                name: "rest.name"
                cve: "rest.cve"
                from: "rest.from"
                to: "rest.to"
                offset: "rest.offset"
                limit: "rest.limit"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/threat-history
          name: threat-history
          operations:
            - method: GET
              name: get-threat-history
              call: "threat-vault.get-threat-history"
              with:
                id: "rest.id"
                type: "rest.type"
                offset: "rest.offset"
                limit: "rest.limit"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/atp-reports
          name: atp-reports
          operations:
            - method: GET
              name: get-atp-reports
              call: "threat-vault.get-atp-reports"
              with:
                sha256: "rest.sha256"
                id: "rest.id"
                offset: "rest.offset"
                limit: "rest.limit"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/atp-report-pcaps
          name: atp-report-pcaps
          operations:
            - method: GET
              name: get-atp-report-pcaps
              call: "threat-vault.get-atp-report-pcaps"
              with:
                sha256: "rest.sha256"
                id: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/release-notes
          name: release-notes
          operations:
            - method: GET
              name: get-release-notes
              call: "threat-vault.get-release-notes"
              with:
                type: "rest.type"
                version: "rest.version"
                offset: "rest.offset"
                limit: "rest.limit"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/stats
          name: stats
          operations:
            - method: GET
              name: get-stats
              call: "threat-vault.get-stats"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9124
      namespace: threat-vault-mcp
      transport: http
      tools:
        - name: get-threats
          description: "Search for threats by type, ID, SHA256, name, CVE, or date range."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          inputParameters:
            - name: type
              type: string
              required: false
            - name: id
              type: string
              required: false
            - name: sha256
              type: string
              required: false
            - name: name
              type: string
              required: false
            - name: cve
              type: string
              required: false
            - name: from
              type: string
              required: false
            - name: to
              type: string
              required: false
            - name: offset
              type: integer
              required: false
            - name: limit
              type: integer
              required: false
          call: "threat-vault.get-threats"
          with:
            type: "tools.type"
            id: "tools.id"
            sha256: "tools.sha256"
            name: "tools.name"
            cve: "tools.cve"
            from: "tools.from"
            to: "tools.to"
            offset: "tools.offset"
            limit: "tools.limit"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-threat-history
          description: "Get the history of a specific threat by ID and type."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          inputParameters:
            - name: id
              type: string
              required: true
            - name: type
              type: string
              required: true
            - name: offset
              type: integer
              required: false
            - name: limit
              type: integer
              required: false
          call: "threat-vault.get-threat-history"
          with:
            id: "tools.id"
            type: "tools.type"
            offset: "tools.offset"
            limit: "tools.limit"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-atp-reports
          description: "Get Advanced Threat Prevention reports."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          inputParameters:
            - name: sha256
              type: string
              required: false
            - name: id
              type: string
              required: false
            - name: offset
              type: integer
              required: false
            - name: limit
              type: integer
              required: false
          call: "threat-vault.get-atp-reports"
          with:
            sha256: "tools.sha256"
            id: "tools.id"
            offset: "tools.offset"
            limit: "tools.limit"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-atp-report-pcaps
          description: "Get packet captures from ATP reports."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          inputParameters:
            - name: sha256
              type: string
              required: true
            - name: id
              type: string
              required: false
          call: "threat-vault.get-atp-report-pcaps"
          with:
            sha256: "tools.sha256"
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-release-notes
          description: "Get release notes for threat content updates."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          inputParameters:
            - name: type
              type: string
              required: true
            - name: version
              type: string
              required: false
            - name: offset
              type: integer
              required: false
            - name: limit
              type: integer
              required: false
          call: "threat-vault.get-release-notes"
          with:
            type: "tools.type"
            version: "tools.version"
            offset: "tools.offset"
            limit: "tools.limit"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-stats
          description: "Get Threat Vault statistics."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          call: "threat-vault.get-stats"
          outputParameters:
            - type: object
              mapping: "$."
