naftiko: "1.0.0-alpha1"

info:
  label: "Prisma Cloud Code Security"
  description: "Manages code security repositories, scan integrations, suppressions, errors, and fix suggestions."
  tags:
    - code-security
    - devsecops
    - scanning
    - palo-alto
  created: "2026-04-16"
  modified: "2026-04-16"

binds:
  - namespace: env
    keys:
      PRISMA_CLOUD_TOKEN: PRISMA_CLOUD_TOKEN

capability:
  consumes:
    - type: http
      namespace: prisma-cloud-code-security
      baseUri: https://api.prismacloud.io/bridgecrew
      description: "Prisma Cloud Code Security API for managing repositories, scans, suppressions, errors, and fix suggestions."
      authentication:
        type: apikey
        name: x-redlock-auth
        in: header
        value: "{{env.PRISMA_CLOUD_TOKEN}}"
      resources:
        - name: repositories
          path: /repositories
          operations:
            - name: list-repositories
              method: GET
              description: "List all repositories with pagination and filtering."
              inputParameters:
                - name: offset
                  in: query
                  type: integer
                  required: false
                - name: limit
                  in: query
                  type: integer
                  required: false
                - name: search
                  in: query
                  type: string
                  required: false
                - name: sourceType
                  in: query
                  type: string
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: add-repository
              method: POST
              description: "Add a new repository."
              inputParameters:
                - name: id
                  in: body
                  type: string
                  required: true
                - name: sourceType
                  in: body
                  type: string
                  required: true
                - name: owner
                  in: body
                  type: string
                  required: true
                - name: name
                  in: body
                  type: string
                  required: true
                - name: defaultBranch
                  in: body
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  id: "{{tools.id}}"
                  sourceType: "{{tools.sourceType}}"
                  owner: "{{tools.owner}}"
                  name: "{{tools.name}}"
                  defaultBranch: "{{tools.defaultBranch}}"
            - name: remove-repository
              method: DELETE
              description: "Remove a repository."
              inputParameters:
                - name: id
                  in: body
                  type: string
                  required: true
                - name: sourceType
                  in: body
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  id: "{{tools.id}}"
                  sourceType: "{{tools.sourceType}}"
        - name: scan-integrations
          path: /scans/integrations
          operations:
            - name: list-scan-integrations
              method: GET
              description: "List all scan integrations with pagination."
              inputParameters:
                - name: offset
                  in: query
                  type: integer
                  required: false
                - name: limit
                  in: query
                  type: integer
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: scans
          path: /scans
          operations:
            - name: trigger-scan
              method: POST
              description: "Trigger a new scan for a repository."
              inputParameters:
                - name: repositoryId
                  in: body
                  type: string
                  required: true
                - name: branch
                  in: body
                  type: string
                  required: true
                - name: scanTypes
                  in: body
                  type: object
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  repositoryId: "{{tools.repositoryId}}"
                  branch: "{{tools.branch}}"
                  scanTypes: "{{tools.scanTypes}}"
        - name: scan-status
          path: /scans/{scan_id}
          operations:
            - name: get-scan-status
              method: GET
              description: "Get the status of a scan."
              inputParameters:
                - name: scan_id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: suppressions
          path: /suppressions
          operations:
            - name: list-suppressions
              method: GET
              description: "List all suppressions with pagination and filtering."
              inputParameters:
                - name: offset
                  in: query
                  type: integer
                  required: false
                - name: limit
                  in: query
                  type: integer
                  required: false
                - name: policyId
                  in: query
                  type: string
                  required: false
                - name: suppressionType
                  in: query
                  type: string
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-suppression
              method: POST
              description: "Create a new suppression."
              inputParameters:
                - name: policyId
                  in: body
                  type: string
                  required: true
                - name: suppressionType
                  in: body
                  type: string
                  required: true
                - name: justification
                  in: body
                  type: string
                  required: true
                - name: expirationDate
                  in: body
                  type: string
                  required: false
                - name: resources
                  in: body
                  type: object
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  policyId: "{{tools.policyId}}"
                  suppressionType: "{{tools.suppressionType}}"
                  justification: "{{tools.justification}}"
                  expirationDate: "{{tools.expirationDate}}"
                  resources: "{{tools.resources}}"
        - name: suppression
          path: /suppressions/{suppression_id}
          operations:
            - name: delete-suppression
              method: DELETE
              description: "Delete a specific suppression by ID."
              inputParameters:
                - name: suppression_id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: errors-by-branch
          path: /errors/branch
          operations:
            - name: get-errors-by-branch
              method: GET
              description: "Get errors for a specific repository branch."
              inputParameters:
                - name: repositoryId
                  in: query
                  type: string
                  required: true
                - name: branch
                  in: query
                  type: string
                  required: true
                - name: severity
                  in: query
                  type: string
                  required: false
                - name: errorType
                  in: query
                  type: string
                  required: false
                - name: status
                  in: query
                  type: string
                  required: false
                - name: offset
                  in: query
                  type: integer
                  required: false
                - name: limit
                  in: query
                  type: integer
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: fix-suggestions
          path: /fixes/pull_request
          operations:
            - name: get-fix-suggestions-for-pr
              method: GET
              description: "Get fix suggestions for a pull request."
              inputParameters:
                - name: repositoryId
                  in: query
                  type: string
                  required: true
                - name: branch
                  in: query
                  type: string
                  required: true
                - name: filePath
                  in: query
                  type: string
                  required: false
                - name: offset
                  in: query
                  type: integer
                  required: false
                - name: limit
                  in: query
                  type: integer
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8098
      namespace: prisma-cloud-code-security-rest
      resources:
        - path: /v1/repositories
          name: repositories
          operations:
            - method: GET
              name: list-repositories
              call: "prisma-cloud-code-security.list-repositories"
              with:
                offset: "rest.offset"
                limit: "rest.limit"
                search: "rest.search"
                sourceType: "rest.sourceType"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: add-repository
              call: "prisma-cloud-code-security.add-repository"
              with:
                id: "rest.id"
                sourceType: "rest.sourceType"
                owner: "rest.owner"
                name: "rest.name"
                defaultBranch: "rest.defaultBranch"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: DELETE
              name: remove-repository
              call: "prisma-cloud-code-security.remove-repository"
              with:
                id: "rest.id"
                sourceType: "rest.sourceType"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/scan-integrations
          name: scan-integrations
          operations:
            - method: GET
              name: list-scan-integrations
              call: "prisma-cloud-code-security.list-scan-integrations"
              with:
                offset: "rest.offset"
                limit: "rest.limit"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/scans
          name: scans
          operations:
            - method: POST
              name: trigger-scan
              call: "prisma-cloud-code-security.trigger-scan"
              with:
                repositoryId: "rest.repositoryId"
                branch: "rest.branch"
                scanTypes: "rest.scanTypes"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/scans/{scan_id}
          name: scan-status
          operations:
            - method: GET
              name: get-scan-status
              call: "prisma-cloud-code-security.get-scan-status"
              with:
                scan_id: "rest.scan_id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/suppressions
          name: suppressions
          operations:
            - method: GET
              name: list-suppressions
              call: "prisma-cloud-code-security.list-suppressions"
              with:
                offset: "rest.offset"
                limit: "rest.limit"
                policyId: "rest.policyId"
                suppressionType: "rest.suppressionType"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-suppression
              call: "prisma-cloud-code-security.create-suppression"
              with:
                policyId: "rest.policyId"
                suppressionType: "rest.suppressionType"
                justification: "rest.justification"
                expirationDate: "rest.expirationDate"
                resources: "rest.resources"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/suppressions/{suppression_id}
          name: suppression
          operations:
            - method: DELETE
              name: delete-suppression
              call: "prisma-cloud-code-security.delete-suppression"
              with:
                suppression_id: "rest.suppression_id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/branch-errors
          name: errors-by-branch
          operations:
            - method: GET
              name: get-errors-by-branch
              call: "prisma-cloud-code-security.get-errors-by-branch"
              with:
                repositoryId: "rest.repositoryId"
                branch: "rest.branch"
                severity: "rest.severity"
                errorType: "rest.errorType"
                status: "rest.status"
                offset: "rest.offset"
                limit: "rest.limit"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/fix-suggestions
          name: fix-suggestions
          operations:
            - method: GET
              name: get-fix-suggestions-for-pr
              call: "prisma-cloud-code-security.get-fix-suggestions-for-pr"
              with:
                repositoryId: "rest.repositoryId"
                branch: "rest.branch"
                filePath: "rest.filePath"
                offset: "rest.offset"
                limit: "rest.limit"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9108
      namespace: prisma-cloud-code-security-mcp
      transport: http
      tools:
        - name: list-repositories
          description: "List all repositories with pagination and filtering."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          inputParameters:
            - name: offset
              type: integer
              required: false
            - name: limit
              type: integer
              required: false
            - name: search
              type: string
              required: false
            - name: sourceType
              type: string
              required: false
          call: "prisma-cloud-code-security.list-repositories"
          with:
            offset: "tools.offset"
            limit: "tools.limit"
            search: "tools.search"
            sourceType: "tools.sourceType"
          outputParameters:
            - type: object
              mapping: "$."
        - name: add-repository
          description: "Add a new repository."
          hints:
            readOnly: false
            destructive: false
            idempotent: false
            openWorld: true
          inputParameters:
            - name: id
              type: string
              required: true
            - name: sourceType
              type: string
              required: true
            - name: owner
              type: string
              required: true
            - name: name
              type: string
              required: true
            - name: defaultBranch
              type: string
              required: true
          call: "prisma-cloud-code-security.add-repository"
          with:
            id: "tools.id"
            sourceType: "tools.sourceType"
            owner: "tools.owner"
            name: "tools.name"
            defaultBranch: "tools.defaultBranch"
          outputParameters:
            - type: object
              mapping: "$."
        - name: remove-repository
          description: "Remove a repository."
          hints:
            readOnly: false
            destructive: true
            idempotent: true
            openWorld: true
          inputParameters:
            - name: id
              type: string
              required: true
            - name: sourceType
              type: string
              required: true
          call: "prisma-cloud-code-security.remove-repository"
          with:
            id: "tools.id"
            sourceType: "tools.sourceType"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-scan-integrations
          description: "List all scan integrations with pagination."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          inputParameters:
            - name: offset
              type: integer
              required: false
            - name: limit
              type: integer
              required: false
          call: "prisma-cloud-code-security.list-scan-integrations"
          with:
            offset: "tools.offset"
            limit: "tools.limit"
          outputParameters:
            - type: object
              mapping: "$."
        - name: trigger-scan
          description: "Trigger a new scan for a repository."
          hints:
            readOnly: false
            destructive: false
            idempotent: false
            openWorld: true
          inputParameters:
            - name: repositoryId
              type: string
              required: true
            - name: branch
              type: string
              required: true
            - name: scanTypes
              type: object
              required: true
          call: "prisma-cloud-code-security.trigger-scan"
          with:
            repositoryId: "tools.repositoryId"
            branch: "tools.branch"
            scanTypes: "tools.scanTypes"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-scan-status
          description: "Get the status of a scan."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          inputParameters:
            - name: scan_id
              type: string
              required: true
          call: "prisma-cloud-code-security.get-scan-status"
          with:
            scan_id: "tools.scan_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-suppressions
          description: "List all suppressions with pagination and filtering."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          inputParameters:
            - name: offset
              type: integer
              required: false
            - name: limit
              type: integer
              required: false
            - name: policyId
              type: string
              required: false
            - name: suppressionType
              type: string
              required: false
          call: "prisma-cloud-code-security.list-suppressions"
          with:
            offset: "tools.offset"
            limit: "tools.limit"
            policyId: "tools.policyId"
            suppressionType: "tools.suppressionType"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-suppression
          description: "Create a new suppression."
          hints:
            readOnly: false
            destructive: false
            idempotent: false
            openWorld: true
          inputParameters:
            - name: policyId
              type: string
              required: true
            - name: suppressionType
              type: string
              required: true
            - name: justification
              type: string
              required: true
            - name: expirationDate
              type: string
              required: false
            - name: resources
              type: object
              required: false
          call: "prisma-cloud-code-security.create-suppression"
          with:
            policyId: "tools.policyId"
            suppressionType: "tools.suppressionType"
            justification: "tools.justification"
            expirationDate: "tools.expirationDate"
            resources: "tools.resources"
          outputParameters:
            - type: object
              mapping: "$."
        - name: delete-suppression
          description: "Delete a specific suppression by ID."
          hints:
            readOnly: false
            destructive: true
            idempotent: true
            openWorld: true
          inputParameters:
            - name: suppression_id
              type: string
              required: true
          call: "prisma-cloud-code-security.delete-suppression"
          with:
            suppression_id: "tools.suppression_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-errors-by-branch
          description: "Get errors for a specific repository branch."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          inputParameters:
            - name: repositoryId
              type: string
              required: true
            - name: branch
              type: string
              required: true
            - name: severity
              type: string
              required: false
            - name: errorType
              type: string
              required: false
            - name: status
              type: string
              required: false
            - name: offset
              type: integer
              required: false
            - name: limit
              type: integer
              required: false
          call: "prisma-cloud-code-security.get-errors-by-branch"
          with:
            repositoryId: "tools.repositoryId"
            branch: "tools.branch"
            severity: "tools.severity"
            errorType: "tools.errorType"
            status: "tools.status"
            offset: "tools.offset"
            limit: "tools.limit"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-fix-suggestions-for-pr
          description: "Get fix suggestions for a pull request."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          inputParameters:
            - name: repositoryId
              type: string
              required: true
            - name: branch
              type: string
              required: true
            - name: filePath
              type: string
              required: false
            - name: offset
              type: integer
              required: false
            - name: limit
              type: integer
              required: false
          call: "prisma-cloud-code-security.get-fix-suggestions-for-pr"
          with:
            repositoryId: "tools.repositoryId"
            branch: "tools.branch"
            filePath: "tools.filePath"
            offset: "tools.offset"
            limit: "tools.limit"
          outputParameters:
            - type: object
              mapping: "$."
