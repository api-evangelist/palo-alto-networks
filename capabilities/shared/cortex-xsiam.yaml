naftiko: "1.0.0-alpha1"

info:
  label: "Cortex XSIAM"
  description: "Capability for the Palo Alto Networks Cortex XSIAM API, providing incident management, alert investigation, XQL queries, asset management, endpoint operations, audit logging, and datasource configuration."
  tags:
    - Palo Alto Networks
    - Cortex XSIAM
    - Security
    - SIEM
    - Incident Response
  created: "2026-04-16"
  modified: "2026-04-16"

binds:
  - namespace: env
    keys:
      CORTEX_XSIAM_API_KEY_ID: CORTEX_XSIAM_API_KEY_ID
      CORTEX_XSIAM_API_KEY: CORTEX_XSIAM_API_KEY

capability:
  consumes:
    - type: http
      namespace: cortex-xsiam
      baseUri: https://{fqdn}/public_api/v1
      description: "Palo Alto Networks Cortex XSIAM API for autonomous security operations."
      authentication:
        type: apikey
        key: x-xdr-auth-id
        value: "{{CORTEX_XSIAM_API_KEY_ID}}"
        placement: header
      resources:
        - name: incidents
          path: /incidents
          description: "Incident management operations."
          operations:
            - name: get-incidents
              method: POST
              description: "Get a list of incidents."
              inputParameters:
                - name: x-xdr-api-key
                  in: header
                  type: string
                  required: true
                  description: "XSIAM API key for authentication."
                - name: filters
                  in: body
                  type: array
                  required: false
                  description: "Array of filter objects."
                - name: search_from
                  in: body
                  type: integer
                  required: false
                  description: "Start index for pagination."
                - name: search_to
                  in: body
                  type: integer
                  required: false
                  description: "End index for pagination."
              outputRawFormat: json
              outputParameters:
                - name: incidents
                  type: array
                  value: "$.reply.incidents"
              body:
                type: json
                data:
                  request_data:
                    filters: "{{tools.filters}}"
                    search_from: "{{tools.search_from}}"
                    search_to: "{{tools.search_to}}"
        - name: alerts
          path: /alerts
          description: "Alert operations."
          operations:
            - name: get-alerts
              method: POST
              description: "Get a list of alerts."
              inputParameters:
                - name: x-xdr-api-key
                  in: header
                  type: string
                  required: true
                  description: "XSIAM API key for authentication."
                - name: filters
                  in: body
                  type: array
                  required: false
                  description: "Array of filter objects."
                - name: search_from
                  in: body
                  type: integer
                  required: false
                  description: "Start index for pagination."
                - name: search_to
                  in: body
                  type: integer
                  required: false
                  description: "End index for pagination."
              outputRawFormat: json
              outputParameters:
                - name: alerts
                  type: array
                  value: "$.reply.alerts"
              body:
                type: json
                data:
                  request_data:
                    filters: "{{tools.filters}}"
                    search_from: "{{tools.search_from}}"
                    search_to: "{{tools.search_to}}"
        - name: xql
          path: /xql
          description: "XQL query operations."
          operations:
            - name: start-xql-query
              method: POST
              description: "Start an XQL query."
              inputParameters:
                - name: x-xdr-api-key
                  in: header
                  type: string
                  required: true
                  description: "XSIAM API key for authentication."
                - name: query
                  in: body
                  type: string
                  required: true
                  description: "The XQL query string."
                - name: timeframe
                  in: body
                  type: object
                  required: false
                  description: "Timeframe for the query."
              outputRawFormat: json
              outputParameters:
                - name: query_id
                  type: string
                  value: "$.reply.query_id"
              body:
                type: json
                data:
                  request_data:
                    query: "{{tools.query}}"
                    timeframe: "{{tools.timeframe}}"
            - name: get-xql-query-results
              method: POST
              description: "Get XQL query results."
              inputParameters:
                - name: x-xdr-api-key
                  in: header
                  type: string
                  required: true
                  description: "XSIAM API key for authentication."
                - name: query_id
                  in: body
                  type: string
                  required: true
                  description: "The query ID from a started XQL query."
              outputRawFormat: json
              outputParameters:
                - name: results
                  type: object
                  value: "$.reply"
              body:
                type: json
                data:
                  request_data:
                    query_id: "{{tools.query_id}}"
        - name: assets
          path: /assets
          description: "Asset management operations."
          operations:
            - name: list-assets
              method: POST
              description: "List assets."
              inputParameters:
                - name: x-xdr-api-key
                  in: header
                  type: string
                  required: true
                  description: "XSIAM API key for authentication."
                - name: filters
                  in: body
                  type: array
                  required: false
                  description: "Array of filter objects."
              outputRawFormat: json
              outputParameters:
                - name: assets
                  type: array
                  value: "$.reply.assets"
              body:
                type: json
                data:
                  request_data:
                    filters: "{{tools.filters}}"
        - name: endpoints
          path: /endpoints
          description: "Endpoint operations."
          operations:
            - name: get-endpoints
              method: POST
              description: "Get a list of endpoints."
              inputParameters:
                - name: x-xdr-api-key
                  in: header
                  type: string
                  required: true
                  description: "XSIAM API key for authentication."
                - name: filters
                  in: body
                  type: array
                  required: false
                  description: "Array of filter objects."
              outputRawFormat: json
              outputParameters:
                - name: endpoints
                  type: array
                  value: "$.reply.endpoints"
              body:
                type: json
                data:
                  request_data:
                    filters: "{{tools.filters}}"
        - name: audits
          path: /audits/management_logs
          description: "Management log operations."
          operations:
            - name: get-management-logs
              method: POST
              description: "Get management logs."
              inputParameters:
                - name: x-xdr-api-key
                  in: header
                  type: string
                  required: true
                  description: "XSIAM API key for authentication."
                - name: filters
                  in: body
                  type: array
                  required: false
                  description: "Array of filter objects."
              outputRawFormat: json
              outputParameters:
                - name: logs
                  type: array
                  value: "$.reply.data"
              body:
                type: json
                data:
                  request_data:
                    filters: "{{tools.filters}}"
        - name: ingestion
          path: /ingestion
          description: "Data ingestion and datasource operations."
          operations:
            - name: configure-datasource
              method: POST
              description: "Configure a datasource for ingestion."
              inputParameters:
                - name: x-xdr-api-key
                  in: header
                  type: string
                  required: true
                  description: "XSIAM API key for authentication."
                - name: name
                  in: body
                  type: string
                  required: true
                  description: "Name of the datasource."
                - name: type
                  in: body
                  type: string
                  required: true
                  description: "Type of the datasource."
                - name: config
                  in: body
                  type: object
                  required: true
                  description: "Datasource configuration."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$.reply"
              body:
                type: json
                data:
                  request_data:
                    name: "{{tools.name}}"
                    type: "{{tools.type}}"
                    config: "{{tools.config}}"

  exposes:
    - type: rest
      port: 8081
      namespace: cortex-xsiam-rest
      description: "REST adapter for the Cortex XSIAM API."
      resources:
        - path: /v1/incidents
          name: incidents
          description: "Incident management."
          operations:
            - method: POST
              name: get-incidents
              description: "Get a list of incidents."
              inputParameters:
                - name: filters
                  in: body
                  type: array
                  required: false
                  description: "Array of filter objects."
                - name: search_from
                  in: body
                  type: integer
                  required: false
                  description: "Start index for pagination."
                - name: search_to
                  in: body
                  type: integer
                  required: false
                  description: "End index for pagination."
              call: "cortex-xsiam.get-incidents"
              with:
                x-xdr-api-key: "{{CORTEX_XSIAM_API_KEY}}"
                filters: "rest.filters"
                search_from: "rest.search_from"
                search_to: "rest.search_to"
              outputParameters:
                - type: array
                  mapping: "$."
        - path: /v1/alerts
          name: alerts
          description: "Alert operations."
          operations:
            - method: POST
              name: get-alerts
              description: "Get a list of alerts."
              inputParameters:
                - name: filters
                  in: body
                  type: array
                  required: false
                  description: "Array of filter objects."
                - name: search_from
                  in: body
                  type: integer
                  required: false
                  description: "Start index for pagination."
                - name: search_to
                  in: body
                  type: integer
                  required: false
                  description: "End index for pagination."
              call: "cortex-xsiam.get-alerts"
              with:
                x-xdr-api-key: "{{CORTEX_XSIAM_API_KEY}}"
                filters: "rest.filters"
                search_from: "rest.search_from"
                search_to: "rest.search_to"
              outputParameters:
                - type: array
                  mapping: "$."
        - path: /v1/xql-queries
          name: xql-queries
          description: "XQL query operations."
          operations:
            - method: POST
              name: start-xql-query
              description: "Start an XQL query."
              inputParameters:
                - name: query
                  in: body
                  type: string
                  required: true
                  description: "The XQL query string."
                - name: timeframe
                  in: body
                  type: object
                  required: false
                  description: "Timeframe for the query."
              call: "cortex-xsiam.start-xql-query"
              with:
                x-xdr-api-key: "{{CORTEX_XSIAM_API_KEY}}"
                query: "rest.query"
                timeframe: "rest.timeframe"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/xql-queries/{query_id}/results
          name: xql-query-results
          description: "XQL query results."
          operations:
            - method: GET
              name: get-xql-query-results
              description: "Get XQL query results."
              inputParameters:
                - name: query_id
                  in: path
                  type: string
                  required: true
                  description: "The query ID from a started XQL query."
              call: "cortex-xsiam.get-xql-query-results"
              with:
                x-xdr-api-key: "{{CORTEX_XSIAM_API_KEY}}"
                query_id: "rest.query_id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/assets
          name: assets
          description: "Asset management."
          operations:
            - method: POST
              name: list-assets
              description: "List assets."
              inputParameters:
                - name: filters
                  in: body
                  type: array
                  required: false
                  description: "Array of filter objects."
              call: "cortex-xsiam.list-assets"
              with:
                x-xdr-api-key: "{{CORTEX_XSIAM_API_KEY}}"
                filters: "rest.filters"
              outputParameters:
                - type: array
                  mapping: "$."
        - path: /v1/endpoints
          name: endpoints
          description: "Endpoint operations."
          operations:
            - method: POST
              name: get-endpoints
              description: "Get a list of endpoints."
              inputParameters:
                - name: filters
                  in: body
                  type: array
                  required: false
                  description: "Array of filter objects."
              call: "cortex-xsiam.get-endpoints"
              with:
                x-xdr-api-key: "{{CORTEX_XSIAM_API_KEY}}"
                filters: "rest.filters"
              outputParameters:
                - type: array
                  mapping: "$."
        - path: /v1/management-logs
          name: management-logs
          description: "Management log operations."
          operations:
            - method: POST
              name: get-management-logs
              description: "Get management logs."
              inputParameters:
                - name: filters
                  in: body
                  type: array
                  required: false
                  description: "Array of filter objects."
              call: "cortex-xsiam.get-management-logs"
              with:
                x-xdr-api-key: "{{CORTEX_XSIAM_API_KEY}}"
                filters: "rest.filters"
              outputParameters:
                - type: array
                  mapping: "$."
        - path: /v1/datasources
          name: datasources
          description: "Datasource configuration."
          operations:
            - method: POST
              name: configure-datasource
              description: "Configure a datasource for ingestion."
              inputParameters:
                - name: name
                  in: body
                  type: string
                  required: true
                  description: "Name of the datasource."
                - name: type
                  in: body
                  type: string
                  required: true
                  description: "Type of the datasource."
                - name: config
                  in: body
                  type: object
                  required: true
                  description: "Datasource configuration."
              call: "cortex-xsiam.configure-datasource"
              with:
                x-xdr-api-key: "{{CORTEX_XSIAM_API_KEY}}"
                name: "rest.name"
                type: "rest.type"
                config: "rest.config"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9091
      namespace: cortex-xsiam-mcp
      transport: http
      description: "MCP adapter for the Cortex XSIAM API."
      tools:
        - name: get-incidents
          description: "Get a list of XSIAM incidents."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          inputParameters:
            - name: filters
              type: array
              description: "Array of filter objects."
              required: false
            - name: search_from
              type: integer
              description: "Start index for pagination."
              required: false
            - name: search_to
              type: integer
              description: "End index for pagination."
              required: false
          call: "cortex-xsiam.get-incidents"
          with:
            x-xdr-api-key: "{{CORTEX_XSIAM_API_KEY}}"
            filters: "tools.filters"
            search_from: "tools.search_from"
            search_to: "tools.search_to"
          outputParameters:
            - type: array
              mapping: "$."
        - name: get-alerts
          description: "Get a list of XSIAM alerts."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          inputParameters:
            - name: filters
              type: array
              description: "Array of filter objects."
              required: false
            - name: search_from
              type: integer
              description: "Start index for pagination."
              required: false
            - name: search_to
              type: integer
              description: "End index for pagination."
              required: false
          call: "cortex-xsiam.get-alerts"
          with:
            x-xdr-api-key: "{{CORTEX_XSIAM_API_KEY}}"
            filters: "tools.filters"
            search_from: "tools.search_from"
            search_to: "tools.search_to"
          outputParameters:
            - type: array
              mapping: "$."
        - name: start-xql-query
          description: "Start an XQL query."
          hints:
            readOnly: false
            destructive: false
            idempotent: false
            openWorld: true
          inputParameters:
            - name: query
              type: string
              description: "The XQL query string."
              required: true
            - name: timeframe
              type: object
              description: "Timeframe for the query."
              required: false
          call: "cortex-xsiam.start-xql-query"
          with:
            x-xdr-api-key: "{{CORTEX_XSIAM_API_KEY}}"
            query: "tools.query"
            timeframe: "tools.timeframe"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-xql-query-results
          description: "Get XQL query results."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          inputParameters:
            - name: query_id
              type: string
              description: "The query ID from a started XQL query."
              required: true
          call: "cortex-xsiam.get-xql-query-results"
          with:
            x-xdr-api-key: "{{CORTEX_XSIAM_API_KEY}}"
            query_id: "tools.query_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-assets
          description: "List XSIAM assets."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          inputParameters:
            - name: filters
              type: array
              description: "Array of filter objects."
              required: false
          call: "cortex-xsiam.list-assets"
          with:
            x-xdr-api-key: "{{CORTEX_XSIAM_API_KEY}}"
            filters: "tools.filters"
          outputParameters:
            - type: array
              mapping: "$."
        - name: get-endpoints
          description: "Get a list of endpoints."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          inputParameters:
            - name: filters
              type: array
              description: "Array of filter objects."
              required: false
          call: "cortex-xsiam.get-endpoints"
          with:
            x-xdr-api-key: "{{CORTEX_XSIAM_API_KEY}}"
            filters: "tools.filters"
          outputParameters:
            - type: array
              mapping: "$."
        - name: get-management-logs
          description: "Get management logs."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
            openWorld: true
          inputParameters:
            - name: filters
              type: array
              description: "Array of filter objects."
              required: false
          call: "cortex-xsiam.get-management-logs"
          with:
            x-xdr-api-key: "{{CORTEX_XSIAM_API_KEY}}"
            filters: "tools.filters"
          outputParameters:
            - type: array
              mapping: "$."
        - name: configure-datasource
          description: "Configure a datasource for ingestion."
          hints:
            readOnly: false
            destructive: false
            idempotent: false
            openWorld: true
          inputParameters:
            - name: name
              type: string
              description: "Name of the datasource."
              required: true
            - name: type
              type: string
              description: "Type of the datasource."
              required: true
            - name: config
              type: object
              description: "Datasource configuration."
              required: true
          call: "cortex-xsiam.configure-datasource"
          with:
            x-xdr-api-key: "{{CORTEX_XSIAM_API_KEY}}"
            name: "tools.name"
            type: "tools.type"
            config: "tools.config"
          outputParameters:
            - type: object
              mapping: "$."
