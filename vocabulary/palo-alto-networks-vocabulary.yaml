vocabulary: "1.0.0"

info:
  provider: Palo Alto Networks
  description: >-
    Vocabulary and taxonomy for the Palo Alto Networks API ecosystem, capturing the
    operational dimension (51 APIs across network security, cloud security, SASE,
    security operations, and AI security) and capability dimension (10 workflow
    capabilities composing 41 shared API definitions) to provide a unified view of
    what this platform offers and how it can be used.
  created: "2026-04-17"
  modified: "2026-04-17"

# ============================================================
# OPERATIONAL DIMENSION (from OpenAPI)
# What the platform exposes at the protocol level
# ============================================================

